  - {type: variant, offset: 3356, length: 602, content: 曲當作朗月篇酒至顏自解聲和心亦宣千金何足重所存意氣間東門行傷禽惡弦驚倦客惡離聲離聲斷客情賓御皆涕零涕零心斷絕將去復還訣一息不相知何況異鄉別遙遙征駕遠杳杳白日晚居人掩閨臥行子夜中飯野風吹草木行子心腸斷食梅常苦酸衣葛常苦寒絲竹徒滿座憂人不解顏長歌欲自慰彌起長恨端芳樹相思早春日煙華雜如霧復此佳麗人含情結芳樹綺羅已自憐萱風多有趣去來徘徊者佳人不可遇迴文詩枝大柳塞北葉闇榆關東垂條逐絮轉落蕊散花業池蓮照曉月幔錦披朝風低吹雜綸羽薄粉艷粧紅離情隔遠道歎結深閨中蕭諮議西上夜禁徘徊將所愛惜別在河梁衿袖三春隔江山千里長寸心無遠近邊地有風霜勉哉勤歲暮敬矣慎容光山中殊未懌杜若空自芳銅雀臺妓繐幃飄井幹樽酒若平生鬱鬱西陵樹詎聞鼓吹聲芳襟染淚迹嬋娟空復情玉座猶寂寞況迺妾身輕贈故人芳洲有杜若可以慰佳期望望忽超遠何由見所思我行未千里山川已間之離居方歲月佳人不在茲清風動簾夜孤月照窗時安得同攜手酌酒賦新詩別江水曹山中上芳月故人清樽賞遠山翠百重迴流映千丈花枝聚如雪垂籐散似網別後能相思何嗟異風壤離夜詩玉繩隱高樹斜漢映層臺離堂華燭盡別幌清琴哀翻潮尚知恨客思眇難裁山川不可盡況乃故人桮詠竹火籠庭雪亂如花井冰粲成玉因炎入貂袖懷溫奉芳褥體密用宜通文斜性非曲暫承君王旨請謝陽春旭邯鄲行趙女擫鳴琴邯鄲紛躧步長袖曳三街兼金輕一顧有美獨臨風佳人在遐路相思欲褰衽叢臺日已暮自君之出矣楊柳正依依君出無消息惟見黃鶴飛關山多險阻士馬少光輝流年無止極君去何時歸, SBCK: 首施榮泰}
