body:
  text: 江淹古體四首古離別遠與君別者乃至鴈門關黃雲蔽千里遊子何時還送君如昨日簷前露已團不惜蕙草晚所悲道里寒君行在天涯妾心久別離願一見顏色不異瓊樹枝兔絲及水萍所寄終不移班婕妤扇綾扇如團月出自機中素畫作秦王女乘鸞向煙霧彩色世所重雖新不代故竊悲涼風至吹我玉階樹君子恩未畢零落在中路張司空離情秋月映簾櫳懸光入丹墀佳人撫鳴琴清夜守空帷蘭徑少行迹玉臺生網絲庭樹發紅彩閨草含碧滋羅綺為君整萬里贈所思願垂湛露惠信我皎日期休上人怨別西北秋風至楚客心悠哉日暮碧雲合佳人殊未來露彩方泛艷月華始徘徊寶書為君掩瑤琴詎能開相思巫山渚悵望陽雲臺金爐絕沉燎綺席徧浮埃桂水日千里因之平生懷敬酬柳僕射征怨清歌自言妍雅舞空仙仙耳中解明月頭上落金鈿雀飛且近遠暮入綺羅前魚戲雖南北終還荷葉邊惟見君行久新年非故年荅徐侍中為人贈婦丈夫吐然諾受命本遺家糟糠且棄置蓬首亂如麻側聞洛陽客金蓋翼高車謁帝時來下光景不可奢幽房一洞啟二八盡芳華羅裾有長短翠鬢無低斜長眉橫玉臉皓腕卷輕紗俱看依井蝶共取落簷花何言征戍苦抱膝空咨嗟登高望春登高眺京洛街巷紛漠漠迴首望長安城闕鬱盤桓日出照鈿黛風過動羅紈齊童躡朱履趙女揚翠翰春風搖雜樹葳蕤綠且丹寶瑟玫瑰柱金羈玳瑁鞍淹留宿下蔡置酒過上蘭解眉還復歛方知巧笑難佳期空靡靡含睇未成歡嘉客不可見因君寄長歎昭君辭朝發披香殿夕濟汾陰河於茲懷九逝自此歛雙蛾沾粧疑湛露繞臆狀流波日見奔沙起稍覺轉蓬多胡風犯肌骨非直傷綺羅銜涕強南望關山鬱嵯峨試作陽春曲終成苦寒歌唯有三五夜明月暫經過少年新婚為之詠山陰柳家女薄言出田墅丰容好姿顏便僻巧言語腰肢既軟弱衣服亦華楚紅輪映早寒畫扇迎初暑錦履並花紋繡帶同心苣羅襦金薄廁雲鬢花釵舉我情已鬱紆何用表崎嶇託意眉間黛申心口上朱莫爭三春價坐喪千金軀盈尺青銅鏡九寸合浦珠無因達往意欲寄雙飛鳧裾開見玉趾衫薄映凝膚羞言趙飛燕笑殺秦羅敷自顧雖悴薄冠蓋曜城隅高門列騶駕廣路從驪駒何慚鹿盧劍詎減府中趨還家問鄉里詎堪持作夫雜曲三首攜手曲捨轡下彫輅更衣奉玉床斜簪映秋水開鏡比春粧所畏紅顏促君恩不可長雞冠且容裔豈吝桂枝亡有所思西征登隴首東望不見家關樹抽紫葉塞草發青芽昆明池欲滿蒲萄應作花流淚對漢使因書寄斜狹夜夜曲河漢縱且橫北斗橫復直星漢空如此寧知心有憶孤燈曖不明寒機曉猶織零淚向誰道雞鳴徒歎息雜詠五首詠春楊柳亂如絲綺羅不自持春草青復綠客心傷此時翠苔已結洧碧水復盈淇日華照趙瑟風色動燕姬衿前萬行淚故是一相思詠桃風來吹葉動風去畏花傷紅英已照灼況復含日光歌童暗理曲游女夜縫裳詎減當春淚能斷思人腸詠月月華臨靜夜夜靜滅氛埃方暉竟戶入圓影隙中來高樓切思婦西園游上才網軒映珠綴應門照綠苔洞房殊未曉清光信悠哉詠柳輕陰拂建章夾道連未央因風結復解霑露柔且長楚妃思欲絕班女淚成行遊人未應去為此歸故鄉詠箎江南簫管地妙響發孫枝慇懃寄玉指含情舉復垂彫梁再三繞輕塵四五移曲中有深意丹誠君詎知六憶詩四首憶來時灼灼上階墀勤勤聚別離慊慊道相思相看常不足相見乃忘飢憶坐時黯黯羅帳前或歌四五曲或弄兩三絃笑時應無比嗔時更可憐憶食時臨盤動容色欲坐復羞坐欲食復羞食含哺不如飢擎甌似無力憶眠時人眠強未眠解羅不待勸就枕更須牽復恐傍人見嬌羞在燭前十詠二首領邊繡纖手製新奇刺作可憐儀縈絲飛鳳子結縷坐花兒不聲如動吹無風自褭枝麗色儻未歇聊承雲鬢垂腳下履丹墀上颯沓玉殿下趨鏘逆轉珠珮響先表繡袿香裾開臨舞席袖拂繞歌堂所歎亡懷妾見委入羅床擬青青河邊草漠漠床上塵中心憶故人故人不肯憶中夜長歎息歎息想容儀不欲長別離別離稍已久空床寄杯酒擬三婦大婦掃玉墀中婦結羅幃小婦獨無事對鏡畫娥眉良人且安臥夜長方自私古意挾瑟叢臺下徙倚愛容光佇立日已暮戚戚苦人腸露葵已堪擿淇水未沾裳錦衾無獨暖羅衣空自香明月雖外照寧知心內傷夢見美人夜聞長歎息知君心有憶果自閶闔開魂交覩容色既薦巫山枕又奉齊眉食立望復橫陳忽覺非在側那知神傷者潺湲淚沾臆效古可憐桂樹枝單雄憶故雌歲暮異栖宿春至猶別離山河隔長路路遠絕容儀豈云無我匹寸心終不移初春扶道覓陽春佳人共攜手草色猶自菲林中都未有無事逐梅花空中信楊柳且復共歸來含情寄杯酒悼往去秋三五月今秋還照房今春蘭蕙草來春復吐芳悲哉人道異一謝永銷亡屏筵空有設帷席更施張遊塵掩虛座孤帳覆空床萬事無不盡徒令存者傷擣衣詩孤衾紛思緒獨枕愴憂端深庭秋草綠高門白露寒思君起清夜促柱奏幽蘭不怨飛蓬苦徒傷蕙草殘行役滯風波游人淹不歸亭皋木葉下隴首秋雲飛寒園夕鳥集思牖草虫悲嗟矣當春服安見禦冬衣鶴鳴勞永歎採菉傷時暮念君方遠徭望妾理紈素秋風吹綠潭明月懸高樹佳人飭淨容招攜從所務步欄杳不極離堂肅已扃軒高夕杵散氣爽夜碪鳴瑤草隨步響幽蘭逐袂生踟躕理金翠容與納宵清泛艷迴煙綵淵旋龜鶴文淒淒合歡袖冉冉蘭麝芬不怨杼軸苦所悲千里分垂泣送行李傾首遲歸雲鼓吹曲二首獨不見別島望風臺天淵臨水殿芳草生未積春花落如霰出從張公子還過趙飛燕奉帚長信宮誰知獨不見度關山少長倡家女出入燕南垂唯持德自美本以容見知舊聞關山遠何事總金羈妾心日已亂秋風鳴細枝雜詩雲輕暮色轉草綠晨芳歸山墟罷寒晦園澤潤朝暉春心多感動睹物情復悲自君之去矣蘭堂罷鳴機徒知游宦是不念別離非長門怨玉戶夜愔愔應門重且深秋風動桂樹流月搖輕陰綺簷清露滴網戶思虫吟歎息下蘭閤含愁奏雅琴何由鳴曉珮復得抱宵衾無復金屋念豈照長門心江南曲汀洲採白蘋日暖江南春洞庭有歸客瀟湘逢故人故人何不返春華復將晚不道新知樂祗言行路遠起夜來城南斷車騎閣道覆清埃露華光翠網月影入蘭臺洞房且莫掩應門或復開颯颯秋桂響非君起夜來七夕穿針代馬秋不歸緇紈無復緒迎寒理夜縫映月抽纖縷的皪愁睇光連娟思眉聚清露下羅衣三風吹玉柱流陰稍已多餘光欲難取詠席照日汀洲際搖風綠潭側雖無獨繭輕幸有青袍色羅袖少輕塵象床多麗飾願君蘭夜飲佳人時宴息詠歌姬寶鑷間珠花分明靚粧點薄鬢約微黃輕紅澹鉛臉發言芳已馳復加蘭蕙染浮聲易傷歎沈唱安而險孤轉忽徘徊雙蛾乍舒歛不持全示人半用輕紗掩詠舞女腰纖蔑楚媛體輕非趙姬映襟闐寶粟綠肘挂珠絲發袖已成態動足復含姿斜睛若不眄當轉復遲疑何慚雲鶴起詎減鳳驚時詠紅箋雜彩何足奇惟紅偏作可灼爍類蕖開輕明似霞破鏤質卷芳脂裁花承百和且傳別離心復是相思裹不值情牽人豈識風流座詠薔薇當戶種薔薇枝葉太葳蕤不搖香已亂無風花自飛春閨不能靜開匣理明妃曲池浮采采斜岸列依依或聞好音度時見銜泥歸且對清觴湛其餘任是非詠鏡初上鳳皇墀此鏡照蛾眉言照長相守不照長相思虛心會不採貞明空自欺無言故此物更復照新期詠畫扇細絲本自輕弱綵何足眄直為發紅顏謬成握中扇乍奉長門泣時承柏梁宴思粧開已掩歌容隱而見但畫雙黃鵠莫作孤飛燕詠玉階玉階已夸麗復得臨紫微北戶接翠幄南路抵金扉重疊通日影參差藏月輝輕苔染珠履微㶑拂羅衣獨笑崑山曲空見青鳧飛學謝體桂臺清露拂銅陛落花沾美人紅粧罷攀鉤捲細簾思君暫促柱玉指何纖纖未應為此別無故坐相嫌和虞記室騰古意美人弄白日灼灼當春牖清鏡對蛾眉新花映玉手燕下拾池泥風來吹細柳君子何時歸與我酌樽酒和繆郎視月清夜未亡疲細簾聊可發泠泠玉潭水映見蛾眉月靡靡露方垂輝輝光稍沒佳人復千里餘影徒揮忽詠步搖花珠華縈翡翠寶葉間金瓊剪荷不似製為花如自生低枝拂繡領微步動瑤玦但令雲髻插蛾眉本易成戲繡娘明珠翠羽帳金薄綠綃帷因風時暫舉想象見芳姿清晨插步搖向晚解羅衣託意風流子佳情詎可私詠五彩竹火籠可憐潤霜質纖剖復豪分織作迴風苣製為縈綺文含芳出珠被曜彩接緗裙徒嗟今麗飾豈念昔凌雲詠燈綺筵日已暮羅幃月未歸開花散鵠采含光出九微風軒動丹焰冰宇澹清暉不畏輕蛾繞唯恐曉蠅飛日夕望江贈魚司馬湓城帶湓水湓水索如帶日夕望高城眇眇青雲外城中多宴賞絲竹常繁會管聲已流悅絃聲復淒切歌黛慘如愁舞腰疑欲絕仲秋黃葉下長風正騷屑早鴈出雲飛故燕辭簷別晝悲在異縣夜夢還洛汭洛汭何悠悠起望登西樓的的帆向浦團團日隱洲誰能一羽化輕舉逐飛浮擬輕薄篇城東美少年重身輕萬億柘彈隨珠丸白馬黃金勒長安九逵土青槐蔭道植轂擊晨已喧肩排暝不息走狗通西望牽牛亘南直相期百戲傍去來三市側象床沓繡被玉盤傳綺食大婦掩扇歌小婦開簾織相看獨隱笑見人還歛色黃鶴悲故群山枝詠初識鳥飛過客盡雀聚行龍匿酌羽方猒猒此時歡未極詠照鏡珠簾旦初捲綺羅朝未織玉匣開鑒形寶臺臨凈飾對影獨含笑看花空轉側聊為出繭眉試染桃夭色羽釵如可間金鈿畏相逼蕩子行未歸啼粧坐沾臆閨怨曉河沒高棟斜月半空庭窗中度落葉簾外隔飛螢含情下翠帳掩涕閉金屏昔期今未反春草寒復青思君無轉易何異北辰星詠七夕仙車駐七襄鳳駕出天潢月照九微火風吹百和香來歡暫巧笑還淚已啼粧依稀猶洛汭倏忽似高唐別離不得見河漢漸湯湯詠舞管清羅薦合絃驚雪袖遲逐唱迴纖手聽曲轉蛾眉凝情盼墮珥微睇託含辭日暮留嘉客相看愛此時看新婦霧夕蓮出水霞朝日照梁何如花燭夜輕扇掩紅粧良人復灼灼席上自生光所悲高駕動環珮出長廊詠倡家皎皎高樓暮華燭帳前明羅帷雀釵影寶瑟鳳雛聲夜光枝上發新月霧中生誰念當窗牖相望獨盈盈詠白鷗嘲別者可憐雙白鷗朝夕水上浮何言異栖息雌住雄不留孤飛出嶼浦獨宿下滄洲東西從此去影響絕無由學青青河邊草春園日應好折花望遠道秋夜苦復長抱枕向空床吹樓下促節不言於此別歌筵掩團扇何時一相見絃絕猶依軫葉落裁下枝即此雖云別方我未成離嘲劉諮議孝綽房櫳滅夜火窗戶映朝光妖女褰幃出蹀躞初下床雀釵橫曉鬢蛾眉艷宿粧稍聞玉釧逮猶憐翠被香寧知早朝客差池已鴈行古意應蕭信武歌朝取飢蠶食夜縫千里衣復聞南陌上日暮採蓮歸青苔覆寒井紅藥間青薇人生樂自極良時徒見違何由及新燕雙雙還共飛至烏林村見採桑者因有贈遙見提筐下翩妍實端妙將去復迴身欲語先為笑閨中初別離不許覓新知空結茱萸帶敢報木蘭枝徐尚書座賦得阿憐紅蓮披早露玉貌映朝霞飛燕啼粧罷顧步插餘花溘匝金鈿滿參差繡領斜暮還垂瑤帳香燈照九華秋閨有望耿耿橫天漢飄飄出岫雲月斜樹倒影風至水迴文已泣機中婦復悲堂上君羅襦曉長襞翠被夜徒薰空汲銀床井誰縫金縷裙所思竟不至持酒清夜分夜夢還家歸飛夢所憶共子汲寒漿銅瓶素絲綆綺井白銀床雀出丰茸樹虫飛玳瑁梁離人不相見爭忍對春光范雲巫山高不極白日隱光輝靄靄朝雲去冥冥暮雨歸巖懸獸無跡林暗鳥疑飛枕席竟誰薦相望徒依依望織女盈盈一水邊夜夜空自憐不辭精衛苦河流未可填寸情百重結一心萬處懸願作雙青鳥共舒明鏡前思歸春草醉春煙春閨人獨眠積恨顏將老相思心欲然幾回明月夜飛夢到郎邊送別東風柳線長送郎上河梁未盡樽前酒妾淚已千行不愁書難寄但恐鬢將霜空懷白首約江上早歸航征怨蕩子從征久鳳樓簫管閑獨枕凋雲鬢孤鐙損玉顏何日邊塵靜庭前征馬還詠美人春遊江南二月春東風轉綠蘋不知誰家子看花桃李津白雪凝瓊貌問珠點絳脣行人咸息駕爭擬洛川神西洲曲憶梅下西洲折梅寄江北單衫杏子紅雙鬢雅鶵色西洲在何處兩槳橋頭渡日暮伯勞飛風吹鳥桕樹樹下即門前門中露翠鈿開門郎不至出門採紅蓮採蓮南塘秋蓮花過人頭低頭弄蓮子蓮子清如水置蓮懷袖中蓮心徹底紅憶郎郎不至仰首望飛鴻鴻飛滿西洲望郎上青樓樓高望不見盡日欄杆頭欄杆十二曲垂手明如玉卷簾天自高海水搖空綠海水夢悠悠君愁我亦愁南風知我意吹夢到西洲潘岳黃門述哀青春速天機素秋馳白日美人歸重泉悽愴無終畢殯宮已肅清松柏轉蕭索俯仰未能弭尋念非但一拊衿悼寂寞怳然若有失明月入綺窗髣髴想蕙質消憂非萱草永懷寄夢寐夢寐復冥冥何由覿爾形我慚北海術爾無帝女靈願言出遠山徘徊泣松銘雨絕無還雲華落豈留英日月方代序寢興何時平塘上行澤蘭被荒徑孤芳豈自通幸逢瑤池曠得與金芝叢朝承紫臺露夕潤淥池風既美修嫮女復悅繁華童夙昔玉霜滿旦暮翠條空葉飄儲胥右芳歇露寒東紀化尚盈昃俗志信頹隆財殫交易絕華落愛難終所惜改歡眄豈恨逐征蓬願回朝陽景持照長門宮秋夜月洛宵向分紫煙鬱氛氳曀曀螢入霧離離雁度雲巴童暗理瑟漢女夜縫裙新知樂如是久要詎相聞詠鶴閑園有孤鶴摧藏信可憐寧望春皋下刷羽翫花鈿何時秋海上照影弄長川曉鳴動遙怨夕唳感孀眠哀咽芳林右憫默華池邊猶冀凌霄志萬里共翩翩
