seq: 3
front:
  text: 擬古七首髙樓一何峻苕苕峻而安綺窓出塵冥飛階躡雲端佳人撫琴瑟纎手清且閑芳草隨風結哀響馥若蘭玉容誰能顧傾城在一彈佇立望日昃躑躅再三歎不怨佇立久但願歌者歡思駕歸鴻羽比翼雙飛翰
  hash: sha256:17fe9a4995ce67c1da701c23e2418f353c7db74bd4da53e346a8bd484d6d2756
body:
  text: 擬西北有髙樓西山何其峻曾曲鬱崔嵬零露彌天墜蕙葉慿林衰寒暑相因襲時逝忽如遺三閭結飛轡大耋悲落暉曷為牽世務中心悵有違京雒多妖麗玉顔侔瓊蕤閒夜撫鳴琴恵音清且悲長歌赴促節哀響逐髙徽一唱萬夫歡再唱梁塵飛思為河曲鳥雙遊豐水湄擬東城髙且長嘉樹生朝陽凝霜封其條執心守時信嵗寒不敢凋美人何其曠灼灼在雲霄隆想彌年時長嘯入風飄引領望天末譬彼向陽翹擬蘭若生春陽炤炤天漢暉粲粲光天步牽牛西北囘織女東南顧華容一何綺揮手如振素怨彼河無梁悲此年歳暮跂彼無良縁睨焉不得度引領望大川雙涕如沾露擬苕苕牽牛星靡靡江離草熠燿生河側皎皎彼姝女阿那當軒織粲粲妖容姿灼灼華美色良人遊不歸偏棲獨隻翼空房來悲風中夜起歎息擬青青河畔草歡友蘭時往苕苕匿音徽虞淵引絶景四節遊若飛芳草久已茂佳人竟不歸躑躅遵林渚恵風入我懐感物戀所歡采此欲貽誰擬庭中有竒樹上山采瓊繠穹谷饒芳蘭采采不盈掬悠悠懐所歡故鄉一何曠山川阻且難沈思鐘萬里躑躅獨吟歎擬涉江采芙蓉為顧彦先贈婦二首辭家逺行遊悠悠三千里京洛多風塵素衣化為緇循身悼憂苦感念同懐子隆思亂心曲沈歡滯不起歡沈難克興心亂誰為理願假歸鴻翼翻飛浙江汜東南有思婦長歎充幽闥借問歎何為佳人眇天末遊宦久不歸山川修且闊形影參商乖音息曠不達離合非有常譬彼弦與筈願保金石志慰妾長飢渴周夫人贈車騎一首碎碎織細練為君作􅀈襦君行豈有顧憶君是妾夫昔者得君書聞君在髙平今時得君書聞君在京城京城華麗所璀粲多異端男兒多遠志豈知妾念君昔者與君别歳聿薄將暮日月一何速素秋墜湛露湛露何冉冉思君隨歳晩對食不能飱臨觴不能飯樂府三首扶桑升朝暉照此髙臺端髙臺多妖麗洞房出清顔淑貌曜皎日恵心清且閑美目揚玉澤蛾眉象翠翰鮮膚一何潤秀色若可餐窈窕多容儀婉媚巧笑言暮春春服成粲粲綺與紈金雀垂藻翹瓊珮結瑶璠方駕揚清塵濯足洛水瀾藹藹風雲㑹佳人一何繁南崖充羅幕北渚盈軿軒清川含藻影髙岸被華丹馥馥芳袖揮泠泠纎指彈悲歌吐清響雅舞播幽蘭丹脣含九秋妍迹凌七盤赴曲迅驚鴻蹈節如集鸞綺態隨顔變沈姿無定源俯仰紛阿那顧歩咸可歡遺芳結飛飇浮景映清湍冶容不足詠春遊良可歎豔歌行遊僊聚靈族髙㑹曾城阿長風萬里舉慶雲鬱嵯峨宓妃興洛浦王韓起泰華北徵瑶壹女南要湘川娥肅肅宵駕動翩翩翠蓋羅羽旗棲瓊鸞玉衡吐鳴和太容揮髙弦洪崖發清歌獻酬既已周輕舉垂紫霞總轡扶桑枝濯足湯谷波清暉溢天門垂慶恵皇家前緩聲歌江蘺生幽渚微芳不足宣被蒙風雨㑹移居華池邊發藻玉臺下垂影滄浪淵霑潤既已渥結根奥且堅四節逝不處華繁難久鮮淑氣與時殞餘芳隨風捐天道有遷易人理無常全男懽智傾愚女愛衰避妍不惜微軀退但懼蒼蠅前願君廣末光照妾薄暮年塘上行陸雲為顧彦先贈婦往反四首我在三川陽子居五湖隂山海一何曠譬彼飛與沈目想清恵姿耳存淑媚音獨寐多逺念寤言撫空衿彼美同懐子非爾誰為心悠悠君行邁㷀㷀妾獨止山河安可踰永路隔萬里京室多妖冶粲粲都人子雅步嫋纎腰巧笑發皓齒佳麗良可美衰賤焉足紀逺蒙眷顧言銜恩非望始翩翩飛蓬征郁郁寒木榮遊止固殊性浮沉豈一情隆愛結在昔信誓貫三靈秉心金石固豈從時俗傾美目逝不顧纎腰徒盈盈何用結中款仰指北辰星浮海難為水遊林難為觀容色貴及時朝華忌日晏皎皎彼姝子灼灼懐春粲西城善雅舞總章饒清彈鳴簧發丹脣朱弦繞素腕輕裾猶電揮雙袂如霞散華容溢藻幄哀響入雲漢知音世所希非君誰能讚棄置北辰星問此𤣥龍煥時暮復何言華落理必賤張協雜詩一首秋夜凉風起清氣蕩暄濁蜻蛚吟階下飛蛾拂明燭君子從逺役佳人守㷀獨離居幾何時鑽燧忽改木房櫳無行迹庭草萋已緑青苔依空牆蜘蛛網四屋感物多所懐沈憂結心曲楊方合歡詩五首虎嘯谷風起龍躍景雲浮同聲好相應同氣自相求我情與子親譬如影追軀食共並根穂飲共連理桮衣用雙絲絹寢共無縫綯居願接膝坐行願攜手趨子静我不動子遊我無留齊彼同心鳥譬此比目魚情至斷金石膠漆未為牢但願長無别合形作一軀生為併身物死為同棺灰秦氏自言至我情不可儔磁石招長針陽燧下炎煙宫商聲相和心同自相親我情與子合亦如影追身寢共織成被絮用同功綿暑摇比翼扇寒坐併肩氈子笑我必哂子慼我無懽來與子共迹去與子同塵齊彼蛩蛩獸舉動不相捐惟願長無别合形作一身生有同室好死成併棺民徐氏自言至我情不可陳獨坐空室中愁有數千端悲響荅愁歎哀涕應苦言仿偟四顧望白日入西山不覩佳人來但見飛鳥還飛鳥亦何樂夕宿自作羣飛黄銜長轡翼翼囘輕輪俯涉緑水澗仰過九層山修途曲且險秋草生兩邊黄華如沓金白華如散銀青敷羅翠彩絳葩象赤雲爰有承露枝紫榮合素芬扶疎垂清藻布翹芳且鮮目為豔彩囘心為竒色旋撫心悼孤客俯仰還自憐歭􅡨向壁歎攬茟作此文南隣有竒樹承春挺素華豐翹被長條緑葉蔽朱柯因風吐微音芳氣入紫霞我心羡此樹願徙着余家夕得遊其下朝得弄其葩爾根深且堅余宅淺且洿移植良無期歎息將如何王鑒七夕觀織女一首牽牛悲殊館織女悼離家一稔期一宵此期良可嘉赫奕𤣥門開飛閣鬱嵯峨隠隠驅千乗闐闐越星河六龍奮瑶轡文螭負瓊車火闕秉瑰燭素女執瓊華絳旗若吐電朱蓋如振霞雲韶何嘈嗷靈鼔鳴相和亭軒紆髙盼眷子在岌峩澤因芳露霑恩附蘭風加明發相從遊翩翩鸞鷟羅同遊不同觀念子憂怨多敬因三祝末以爾屬皇娥李充嘲友人一首同好齊歡愛纒綿一何深子既識我情我亦知子心嬿婉厯年歳和樂如瑟琴良辰不我俱中闊似商參爾隔北山陽我分南川隂嘉㑹罔克從積思安可任目想妍麗姿耳存清媚音修晝興永念遥夜獨悲吟逝將尋行役言别涕霑衿願爾降玉趾一顧重千金曹毗夜聽𢷬衣一首寒興御紈素佳人理衣襟冬夜清且永皓月照堂隂纎手疊輕素朗杵叩鳴砧清風流繁節囘飈灑微吟嗟此往運速悼彼幽滯心二物感余懐豈但聲與音陶潛擬古一首日暮天無雲春風扇微和佳人美清夜達曙酣且歌歌竟長歎息持此感人多明明雲間月灼灼葉中花豈無一時好不久當如何荀昶樂府二首朝發邯鄲邑暮宿井陘間井陘一何狹車馬不得旋邂逅相逢值﨑嶇交一言一言不容多伏軾問君家君家誠難知難知復易博南面平原居北趨相如閣飛樓臨夕都通門枕華郭入門無所見但見雙棲鶴棲鶴數十雙鴛鴦羣相追大兄珥金鐺中兄振纓緌伏臘二來歸隣里生光煇小弟無所作鬬雞東陌逵大婦織紈綺中婦縫羅衣小婦無所作挾瑟弄音徽丈人且却坐梁塵將欲飛擬相逢狹路間熒熒山上火苕苕隔隴左隴左不可至精爽通寤寐寤寐衾幬同忽覺在他邦他邦各異邑相逐不相及迷墟在望煙木落知冰堅升朝各自進誰肯相攀牽客從北方來遺我端弋綈命僕開弋綈中有隠起珪長跽讀隱珪辭苦聲亦悽上言各努力下言長相懐擬青青河邊草王微雜詩二首桑妾獨何懐傾筐未盈把自言悲苦多排却不肯捨妾悲叵陳訴填憂不消冶寒鴈歸所從半塗失慿假壯情抃驅馳猛氣捍朝社常懐雪漢慙常欲復周雅重名好銘勒輕軀願圖寫萬里度沙漠懸師蹈朔野傳聞兵失利不見來歸者奚處埋旍麾何處喪車馬拊心悼恭人零淚覆面下徒謂久别離不見長孤寡寂寂揜髙門寥寥空廣厦待君竟不歸收顔今就檟思婦臨髙臺長想慿華軒弄弦不成曲哀歌送苦言箕帚留江介良人處鴈門詎憶無衣苦但知狐白溫日暗牛羊下野雀滿空園孟冬寒風起東壁正中昏朱火獨照人抱景自愁怨誰知心曲亂所思不可論謝恵連雜詩三首落日隠簷楹升月照房櫳團團滿葉露析析振條風蹀足循廣塗瞬目曬曾穹雲漢有靈匹彌年闕相從遐川阻暱愛脩渚曠清容弄杼不成彩聳轡驚前蹤昔離秋已兩今聚夕無雙傾河易囘幹款顔難久悰沃若靈駕旋寂寥雲幄空留情顧華寢遥心逐奔龍沈吟為爾感情深意彌重七月七日詠牛女衡紀無淹度晷運倐如催白露滋園菊秋風落庭槐肅肅沙鷄羽烈烈寒螿嗁夕隂結空幕宵月皓中閨美人戒常服端飭相招攜簪玉出北房鳴金步南階欄髙砧響發楹長杵聲哀微芳起兩袖輕汗染雙題紈素既已成君子行不歸裁用笥中刀縫為萬里衣盈篋自予手幽緘俟君開腰帶準疇昔不知今是非𢷬衣客從逺方來贈我鵠文綾貯以相思篋緘以同心繩裁為親身服著以俱寢興别來經年歳歡心不可凌寫酒置井中誰能辯斗升合如桮中水誰能判淄澠代古劉鑠雜詩五首眇眇凌羡道遥遥行逺之囘車背京里揮手於此辭堂上流塵生庭中緑草滋寒螿翔水曲秋依山基芳年有華月佳人無還期日夕凉風起對酒長相思悲發江南調憂委子衿詩卧㸔明鐙晦坐見輕紈緇淚容曠不飭幽鏡難復治願垂薄暮景照妾桑榆時代行行重行行落宿半遥城浮雲藹曽闕玉宇來清風羅帳延秋月結思想伊人沈憂懐明發誰謂行客遊屢見流芳歇河廣川無梁山髙路難越代明月何皎皎白露秋風始秋風明月初明月照髙樓白露皎𤣥除迨及凉雲起行見寒林疎客從逺方至贈我千里書先敘懐舊愛末陳久離居一章意不盡三復情有餘願遂平生眷無使甘言虚代孟冬寒氣至淒淒含露臺肅肅迎風館思女御櫺軒哀心徹雲漢端撫悲弦泣獨對明鐙歎良人久徭役耿介終昬旦楚楚秋水歌依依采蔆彈代青青河畔草秋動清氛扇火移炎氣歇廣欄含夜隂髙軒通夕月安步巡芳林傾望極雲闕組幕縈漢陳龍駕凌霄發誰云長河遥頗劇促筵越沈情未申寫飛光已飄忽來對眇難期今歡自兹没詠牛女玉臺新詠巻三欽定四庫全書玉臺新詠巻四陳徐陵撰王僧達七夕月下一首顔延之為織女贈牽牛七夕一首秋胡詩九首鮑昭雜詩九首王素學阮步兵體一首吳邁逺擬樂府四首鮑令暉雜詩六首丘巨源雜詩二首王尤長雜詩五首謝眺雜詩十二首陸厥中山王孺子妾歌一首施榮泰雜詩一首王僧達七夕月下一首逺山斂雰祲廣庭揚月波氣往風集隙秋還露泫柯節期既已孱中霄振綺羅來歡詎終夕收淚泣分河顔延之為織女贈牽牛七夕一首婺女儷經星常娥棲飛月慙無二媛靈託身侍天闕閶闔殊未暉咸池豈沐髪隡隂不久張長河為誰越雖有促讌期方須凉風發虛計雙曜周空遲三星沒非怨杼軸勞但念芳菲歇秋胡
