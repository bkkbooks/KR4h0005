  - {type: variant, offset: 4541, length: 163, content: 常定薄命為女何必麤君不見人生百年如流電心中坎壈君不見我昔初入椒房時詎減班姬與飛燕朝踰金梯上鳳樓暮下瓊鉤息鸞殿柏臺晝夜香錦帳自飛揚笙歌膝上吹琵琶陌上桑過蒙恩所賜餘光曲沾被既逢陰后不自專復值班姬有所避黃河十年始一清微軀再逢永無議蛾眉偃月徒自妍傅粉施朱欲誰為不如天淵水中鳥雙去雙歸長比翅烏栖曲芙蓉作船絲作䋏北斗橫天月將落採蓮渡頭礙黃, SBCK: 黄}
