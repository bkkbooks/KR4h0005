body:
  text: 卷第一古詩八首上山採蘼蕪下山逢故夫長跪問故夫新人復何如新人雖言好未若故人姝顏色類相似手爪不相如新人從門入故人從閣去新人工織縑故人工織素織縑日一匹織素五丈餘將縑來比素新人不如故凜凜歲云暮螻蛄多鳴悲涼風率已厲遊子寒無衣錦衾遺洛浦同袍與我違獨宿纍長夜夢想見容輝良人唯古歡枉駕惠前綏願得常巧笑攜手同車歸既來不須臾又不處重闈諒無晨風翼焉能凌風飛眄睞以適意引領遙相睎徙倚懷感傷垂涕沾雙扉冉冉孤生竹結根泰山阿與君為新婚菟絲附女蘿菟絲生有時夫婦會有宜千里遠結婚悠悠隔山陂思君令人老軒車來何遲傷彼蕙蘭花含英揚光輝過時而不採將隨秋草萎君亮報高節賤妾亦何為孟冬寒氣至北風何慘栗愁多知夜長仰觀衆星列三五明月滿四五蟾兔缺客從遠方來遺我一書扎上言長相思下言久離別置書懷袖中三歲字不滅一心抱區區懼君不識察客從遠方來遺我一端綺相去萬餘里故人心尚爾文彩雙鴛鴦裁為合歡被著以長相思緣以結不解以膠投漆中誰能別離此四座且莫喧願聽歌一言請說銅爐器崔嵬象南山上枝似松柏下根據銅盤雕文各異類離婁自相聯誰能為此器公輸與魯班朱火然其中青煙揚其間從風入君懷四座且莫歡香風難久居空令蕙草殘悲與親友別氣結不能言贈子以自愛道遠會見難人生無幾時顛沛在其間念子棄我去新心有所歡結志青雲上何時復來還穆穆清風至吹我羅裳裾青袍似春草長條隨風舒朝登津梁上褰裳望所思安得抱柱信皎日以為期古樂府詩六首日出東南隅行日出東南隅照我秦氏樓秦氏有好女自言名羅敷羅敷善蠶桑採桑城南隅青絲為籠繩桂枝為籠鉤頭上倭隨髻耳中明月珠緑綺為下裳紫綺為上襦觀者見羅敷下檐捋髭鬚少年見羅敷脫巾著幧頭耕者忘其耕鋤者忘其鋤來歸自相喜但坐觀羅敷使君從南來五馬立踟蹰使者遣吏往問此誰家姝答云秦氏女且言名羅敷羅敷年幾何二十尚未滿十五頗有餘使君謝羅敷寧可共載不羅敷前置辭使君一何愚使君自有婦羅敷自有夫東方千餘騎夫壻居上頭何以識夫壻白馬從驪駒素絲繫馬尾黃金絡馬頭腰間鹿盧劍可直千萬餘十五府小吏二十朝大夫三十侍中郎四十專城居為人潔白晢髯髯頗有鬚盈盈公府步冉冉府中趨坐中數千人皆言夫壻殊相逢狹路間道隘不容車如何兩少年挾轂問君家君家誠易知易知復難忘黃金為君門白玉為君堂堂上置樽酒使作邯鄲娼中庭生桂樹華燭何煌煌兄弟兩三人中子為侍郎五日一來遊道上自生光黃金絡馬頭觀者滿路傍入門時左顧但見雙鴛鴦鴛鴦七十二羅列自成行音聲何噰噰鶴鳴東西廂大婦織羅綺中婦織流黃小婦無所作挾瑟上高堂丈人且安坐調絲未遽央隴西行天上何所有歷歷種白榆桂樹夾道生青龍對道隅鳳凰鳴啾啾一母將九雛顧視世間人為樂甚獨殊好婦出迎客顏色正敷愈伸腰再拜跪問客平安不請客北堂上坐客氈氍毹清白各異樽酒上正華疏酌酒持與客客言主人持卻略再拜跪然後持一杯談笑未及竟左顧敕中廚促令辨粗飯慎莫使稽留廢禮送客出盈盈庭中趨送客亦不遠足不過門樞取婦得如此齊姜亦不如健婦持門戶勝一大丈夫艷歌行翩翩堂前燕冬藏夏來見兄弟兩三人流蕩在他縣故人誰為補新衣誰當綻賴得賢主人覽取為吾綻夫壻從門來斜倚西北眄語卿且勿眄水清石自見不見何纍纍遠行不如歸皚如山上雪皎若雲間月聞君有兩意故來相決絶今日斗酒會明旦溝水頭蹀躞御溝上溝水東西流凄凄復凄凄嫁娶不須啼願得一心人白頭不相離竹竿何嫋嫋魚尾何蓰蓰男兒重意氣何用錢刀為雙白鵠飛來雙白鵠乃從西北來十十將五五羅列行不齊忽然卒疲病不能飛相隨五里一反顧六里一徘徊吾欲銜汝去口噤不能開吾欲負汝去羽毛日摧頽樂哉新相知憂來生別離踟蹰顧群侶淚落縱橫垂今日樂相樂延年萬歲期雜詩九首西北有高樓上與浮雲齊交疏結綺窗阿閣三重階上有絃歌聲音響一何悲誰能為此曲無乃杞梁妻清商隨風發中曲正徘徊一彈再三嘆慷慨有餘哀不惜歌者苦但傷知音稀願為雙鴻鵠奮翅起高飛東城高且長逶迤自相屬回風動地起秋草萋已緑四時更變化歲暮一何速晨風懷苦心蟋蟀傷局促蕩滌放情志何為自結束燕趙多佳人美者顏如玉被服羅衣裳當戶理清曲音響一何悲絃急知柱促馳情整巾帶沉吟聊躑躅思為雙飛燕銜泥巢君屋行行重行行與君生別離相去萬餘里各在天一涯道路阻且長會面安可知胡馬嘶北風越鳥巢南枝相去日已遠衣帶日已緩浮雲蔽白日遊子不復返思君令人老歲月忽已晚棄捐勿復道努力加飱飯涉江採芙蓉蘭澤多芳草採之欲遺誰所思在遠道還顧望舊鄉長路漫浩浩同心而離居傷憂以終老青青河畔草鬱鬱園中柳盈盈樓上女皎皎當窗牖娥娥紅粉粧纖纖出素手昔為娼家女今為蕩子婦蕩子行不歸空床難獨守蘭若生春陽涉冬猶盛滋願言追昔愛情款感四時美人在雲端天路隔無期夜光照玄陰長嘆戀所思誰謂我無憂積念發狂癡庭前有奇樹緑葉發華滋攀條折其榮將以遺所思馨香盈懷袖路遠莫致之此物何足貴但感別經時迢迢牽牛星皎皎河漢女纖纖濯素手札札弄機杼終日不成章泣涕零如雨河漢清且淺相去復幾許盈盈一水間脈脈不得語明月何皎皎照我羅裳幃憂愁不能寐攬衣起徘徊行客雖云樂不如早旋歸出戶獨倣徨愁思當告誰引領還入房淚下沾裳衣歌詩並序李延年知音善歌舞每為漢武帝作新歌變曲聞者莫不感動延年侍坐上起舞歌曰北方有佳人絶世而獨立一顧傾人城再顧傾人國傾城復傾國佳人難再得詩結髮為夫婦恩愛兩不疑歡娛在今夕嬿婉及良時征夫懷遠路起視夜何其參辰皆已沒去去從此辭行役在戰場相見未有期握手一長歎淚為生別滋努力愛春華莫忘歡樂時生當復來歸死當長相思羽林郎詩昔有霍家奴姓馮名子都依倚將軍勢調笑酒家胡胡姬年十五春日獨當罏長裾連理帶廣袖合歡襦頭上藍田玉耳後大秦珠兩鬟何窈窕一世良所無一鬟五百萬兩鬟千萬餘不意金吾子娉婷過我廬銀鞍何煜爚翠蓋空踟蹰就我求清酒絲蠅提玉壺就我求珍肴金盤膾鯉魚貽我青銅鏡結我紅羅裾不惜紅羅裂何論輕賤軀男兒愛後婦女子重前夫人生有新故貴賤不相踰多謝金吾子私愛徒區區怨詩並序昔漢成帝班婕妤失寵供養於長信宮乃作賦自傷并為怨詩新製齊紈素鮮潔如霜雪裁為合歡扇團團似明月出入君懷袖動搖微風發常恐秋節至涼飆奪炎熱棄捐篋笥中恩情中道絶董嬌饒詩洛陽城東路桃李生路傍花花自相對葉葉自相當春風東北起花葉正低昂不知誰家子提籠行採桑纖手折其枝花落何飄揚請謝彼姝子何為見損傷高秋八九月白露變為霜終年會飄墮安得久馨香秋時自零落春月復芬芳何時盛年去歡愛永相忘吾欲竟此曲此曲愁人腸歸來酌美酒挾瑟上高堂漢時童謠歌城中好高髻四方高一尺城中好大眉四方皆半額城中好廣袖四方用匹帛同聲詩邂逅承際會偶得充後房情好新交接恐栗若探湯不才勉自竭賤妾職所當綢繆主中饋奉禮助蒸嘗思為莞蒻席在下蔽匡床願為羅衾幬在上衛風霜灑掃清枕席鞮芬以秋香重戶結金扃高下華燈光解衣巾粉卸列圖陳枕張素女為我師儀態盈萬方衆夫所希見天老教軒皇樂莫斯夜樂沒齒焉可忘贈婦詩三首並序秦嘉字士會隴西人也為郡上掾其妻徐淑寢疾還家不獲面別贈詩云爾人生譬朝露居世多屯蹇憂艱常早至歡會常苦晚念當奉時役去爾日遙遠遣車迎子還空往復空返省書情悽愴臨食不能飯獨坐空房中誰與相勸勉長夜不能眠伏枕獨展轉憂來如尋環匪席不可卷皇靈無私親為善荷天祿傷我與爾身少小罹煢獨既得結大義歡樂若不足念當遠離別思念敘款曲河廣無舟梁道近隔丘陸臨路懷惆悵中駕正躑躅浮雲起高山悲風激深谷良馬不回鞍輕車不轉轂針藥可屢進愁思難為數貞士篤終始恩義不可促肅肅僕夫征鏘鏘揚和鈴清晨當引邁束帶待雞鳴顧看空室中髣佛想姿形一別懷萬恨起坐為不寧何用敘我心遺思致款誠寶叉好耀首明鏡可鑒形芳香去垢穢素琴有清聲詩人感木瓜乃欲答瑤瓊愧彼贈我厚慚此往物輕雖知未足報貴用敘我情答詩妾身兮不令嬰疾兮來歸沉滯兮家門歷時兮不差曠廢兮侍覲情敬兮有違君今兮奉命遠邇兮京師悠悠兮離別無因兮敘懷瞻望兮踴躍佇立兮徘徊思君兮感結夢想兮容輝君發兮引邁去我兮日乖恨無兮羽翼高飛兮相追長吟兮永歎淚下兮沾衣飲馬長城窟行青青河邊草綿綿思遠道遠道不可思宿昔夢見之夢見在我旁忽覺在他鄉他鄉各異縣展轉不相見枯桑知天風海水知天寒入門各自媚誰肯相為言客從遠方來遺我雙鯉魚呼兒烹鯉魚中有尺素書長跪讀素書書上竟何如上有加飱食下有長相思飲馬長城窟水寒傷馬骨請謂長城吏慎莫稽留太原卒官作自有程舉築諧汝聲男兒寧當格鬭死何能怫鬱築長城長城何連連連連三千里邊城多健兒內舍多寡婦作書與內舍便嫁莫留住善事新姑嫜時時念我故夫子報書與邊地君今出語一何鄙身在禍難中何為稽留他家子生男慎莫舉生女哺用脯君獨不見長城下死人骸骨相撐拄結髮行事君慊慊心意間明知邊地苦賤妾何能久自全雜詩五首沉陰結愁憂愁憂為誰興念與君相別各在天一方良會未有期中心摧且傷不聊憂餐食慊慊常飢空端坐而無為髣佛君容光峨峨高山首悠悠萬里道君去日已遠鬱結令人老人生一世間忽若暮春草時不可再得何為自愁惱每誦昔鴻恩賤軀焉足保浮雲何洋洋願因通我辭飄颻不可寄徙倚徒相思人離皆復會君獨無反期自君之出矣明鏡暗不治思君如流水何有窮已時慘慘時節盡蘭華凋復零喟然長歎息君期慰我情展轉不能寐長夜何綿綿躡履起出戶仰觀三星連自恨志不遂泣涕如涌泉思君見巾櫛以益我勞勤安得鴻鸞羽覯此心中人誠心亮不遂搔首立悁悁何言一不見復會無因緣故然比目魚今隔如參辰室思人靡不有初想君能終之別來歷年歲舊思何可期重新而忘故君子所猶譏寄身雖在遠豈忘君須臾既厚不為薄想君時見思情詩高殿鬱崇崇廣廈淒泠泠微風起閨闥落日照階庭踟蹰雲屋下笑歌倚華楹君行殊不返我飾為誰榮爐薰闔不用鏡匣上塵生綺羅失常色金翠暗無精嘉希既忘御旨酒亦常停顧瞻空寂寂唯聞燕雀聲憂思連相屬中心如宿酲定情詩我出東門遊邂逅承清塵思君即幽房侍寢執衣巾時無桑中契迫此路側人我既媚君姿君亦悅我顏何以致拳拳綰臂雙金鐶何以致殷勤約指一雙銀何以致區區耳中雙明珠何以致叩叩香囊繫肘後何以致契闊繞腕雙跳脫何以結恩情美玉綴羅纓何以結中心素縷連雙針何以結相投金薄畫搔頭何以慰別離耳後玳瑁叉何以答歡悅紈素三條裾何以結愁悲白絹雙中衣與我期何所乃期東山隅日旰子不來谷風吹我襦遠望無所見涕泣起踟蹰與我期何所乃期山南陽日中兮不來凱風吹我裳逍遙莫誰覩望君愁我腸與我期何所乃期西山側日夕兮不來躑躅長嘆歎息遠望涼風至俯仰正衣服與我期何所乃期山北岑日暮兮不來淒風吹我襟望君不能坐悲苦愁我心愛身以何為惜我華色時中情既款款然後剋密期褰衣躡茂草謂君不我欺廁此醜陋質徙倚無所之自傷失所欲淚下如連絲古詩為焦仲卿妻作並序漢末建安中廬江府小吏焦仲卿妻劉氏為仲卿母所遣自誓不嫁其家逼之乃沒水而死仲卿聞之亦自縊於庭樹時傷之為詩云爾孔雀東南飛五里一徘徊十三能織素十四學裁衣十五彈箜篌十六誦詩書十七為君婦心中常苦悲君既為府吏守節情不移賤妾留空房相見常日稀彼意常依依雞鳴入機織夜夜不得息三日斷五匹大人故嫌責非為織作遲君家婦難為妾不堪驅使徒留無所施便可白公姥及時相遣歸府吏得聞之堂上啓阿母兒已薄祿相幸復得此婦結髮同枕席黃泉共為友共事三二年始爾未為久女行無偏斜何意致不厚阿母謂府吏何乃太區區此婦無禮節舉動自專諸吾意久懷忿汝豈得自由東家有賢女自名秦羅敷可憐體無比阿母為汝求便可速遣之遣之慎莫留府吏長跪告伏惟啓阿母今若遣此婦終老不復取阿母得聞之捶床便大怒小子無所畏何敢助婦語吾已失恩義會不相從許府吏默無聲再拜還入戶舉言謂新婦哽咽不能語我自不驅卿逼迫有阿母卿但暫還家吾今且報府不久當歸還還必相迎取以此下心意慎勿違吾語新婦謂府吏勿復重紛紜往昔初陽歲謝家來貴門奉事循公姥進止敢自專晝夜勤作息伶俜縈苦辛謂言無罪過供養卒大恩仍更被驅遣何言復來還妾有繡腰襦萎蕤自生光紅羅復斗帳四角垂香囊箱簾六七十緑碧青絲繩物物各自異種種在其中人賤物亦鄙不足迎後人留待作遺施於今無會因時時為安慰久久莫相忘雞鳴外欲曙新婦起嚴粧著我繡夾裙事事四五通足下躡絲履頭上玳瑁光腰若流紈素耳著明月璫指如削蔥根口如含朱丹纖纖作細步精妙世無雙上堂拜阿母阿母怒不止昔作女兒時生小出野里本自無教訓兼愧貴家子受母錢帛多不堪母驅使今日還家去念母勞家裏卻與小姑別淚落連珠子新婦初來時小姑始扶床今日被驅遣小姑如我長勤心養公姥好自相扶將初七及下九嬉戲莫相忘出門登車去涕落百餘行府吏馬在前新婦車在後隱隱何甸甸俱會大道口下馬入車中低頭共耳語誓不相隔鄉且暫歸家去吾今且赴府不久當還歸誓天不相負新婦謂府吏感君區區懷君既若見録不久望君來君當作盤石妾當作蒲葦蒲葦紉如絲盤石無轉移我有親父兄性行暴如雷恐不忍我意逆以煎我懷舉手長勞勞二情同依依入門上家堂進退無顏儀阿母大拊掌不圖子自歸十三教汝織十四能裁衣十五彈箜篌十六知禮儀十七遣汝嫁謂言無誓違汝今何罪過不迎而自歸蘭芝慚阿母兒實無罪過阿母大悲摧還家十餘日縣令遣媒來云有第三郎窈窕世無雙年始十八九便言多令才阿母謂阿女汝可去應之阿女含淚答蘭芝初還時府吏見丁寧結誓不別離今日違情義恐此事非奇自可斷來信徐徐更謂之阿母白媒人貧賤有此女始適還家門不堪吏人婦豈合令郎君幸可廣問訊不可便相許媒人去數日尋遣丞請還說有蘭家女承籍有宦官云有第五郎嬌逸未有婚遣丞為媒人主簿通語言直說太守家有此令郎君既欲結大義故遣來貴門阿母謝媒人女子先有誓老姥豈敢言阿兄得聞之悵然心中煩舉言謂阿妹作計何不量先嫁得府吏後嫁得郎君否泰如天地足以榮汝身不嫁義即體其住欲何云蘭芝仰頭答理實如兄言謝家事夫壻中道還兄門處分適兄意那得自任專雖與府吏要渠會永無緣登即相許和便可作婚姻媒人下床去諾諾復爾爾還部白府君下官奉使命言談大有緣府君得聞之心中大歡喜視曆復閲書便利此月內六合正相應良吉三十日今已二十七卿可去成婚交語速裝束絡繹如浮雲青雀白鵠舫四角龍子幡婀娜隨風轉金車玉作輪躑躅青驄馬流蘇金鏤鞍齎錢三百萬皆用青絲穿雜彩三百匹交廣市鮭珍從人四五百鬱鬱登郡門阿母謂阿女適得府君書明日來迎汝何不作衣裳莫令事不舉阿女默無聲手巾掩口啼淚落便如瀉移我琉璃搨出置前窗下左手持刀尺右手執綾羅朝成繡夾裙晚成單羅衫䁆䁆日欲暝愁思出門啼府吏聞此變因求假暫歸未至二三里摧藏馬悲哀新婦識馬聲躡履相逢迎悵然遙相望知是故人來舉手拍馬鞍嗟嘆使心傷自君別我後人事不可量果不如先願又非君所詳我有親父母逼迫兼弟兄以我應他人君還何所望府吏謂新婦賀卿得高遷盤石方且厚可以卒千年蒲葦一時紉便作旦夕間卿當日勝貴吾獨向黃泉新婦謂府吏何意出此言同是被迫逼君爾妾亦然黃泉下相見勿違今日言執手分道去各各還家門生人作死別恨恨那可論念與世間辭千萬不復全府吏還家去上堂拜阿母今日大風寒寒風摧樹木嚴霜結庭蘭兒今日冥冥令母在後單故作不良計勿復怨鬼神命如南山石四體康且直阿母得聞之零淚應聲落汝是大家子仕宦於臺閣慎勿為婦死貴賤情何薄東家有賢女窈窕艷城郭阿母為汝求便復在旦夕府吏再拜還長嘆空房中作計乃爾立轉頭向戶裏漸見愁煎迫其日牛馬嘶新婦入青廬淹淹黃昏後寂寂人定初我命絶今日魂去尸長留攬裙脫絲履舉身赴清池府吏聞此事心知長別離徘徊顧樹下自掛東南枝兩家求合葬合葬華山傍東西植松柏左右種梧桐枝枝相覆蓋葉葉相交通中有雙飛鳥自名為鴛鴦仰頭相向鳴夜夜達五更行人駐足聽寡婦起傍徨多謝後世人戒之慎勿忘
