  - {type: variant, offset: 0, length: 0, content: '', WYG: 妾思不堪采桑渭城南帶減連枝繡髪亂鳯皇篸花舞衣裳薄蛾飛愛緑潭無由報君子流涕向春蠶其一妾本倡家女出入魏王宫既得承琱輦亦在更衣中蓮花銜青雀寳粟鈿金蟲猶言不得意流涕憶遼東其二春草攏可結妾心正斷絶緑鬢愁中改紅顔嗁裏滅非獨淚成珠亦見珠成血願為飛鵲鏡翩翩照離别其三何處報君書隴右五岐路淚研兎枝墨筆染鵝毛素碧浮孟渚水香下洞庭路應歸遂不歸芳春空擲度其四妾家横塘北發艷小長干花釵}
