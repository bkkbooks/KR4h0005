body:
  text: 陳徐陵撰古詩八首古樂府詩六首枚乗雜詩九首李延年歌詩一首并序蘇武詩一首辛延年羽林郎詩一首班婕妤怨詩一首并序宋子侯董嬌嬈詩一首漢時童謡歌一首張衡同聲歌一首秦嘉贈婦詩三首并序秦嘉妻徐淑荅詩一首蔡邕飲馬長城窟行一首陳琳飲馬長城窟行一首徐幹詩二首繁欽定情詩一首古詩無人名為焦仲卿妻作并序古詩八首上山采蘼蕪下山逢故夫長跪問故夫新人復何如新人雖言好未若故人姝顔色類相似手爪不相如新人從門入故人從閤去新人工織縑故人工織素織縑日一疋織素五丈餘將縑來比素新人不如故凛凛嵗云暮螻蛄多鳴悲凉風率已厲遊子寒無衣錦衾遺洛浦同袍與我違獨宿累長夜夢想見容煇良人惟古歡枉駕恵前綏願得常巧笑攜手同車歸既來不須臾又不處重闈諒無鷐風翼焉得凌風飛眄睞以適意引領遥相睎徙倚懐感傷垂涕霑雙扉冉冉孤生竹結根泰山阿與君為新婚菟絲附女蘿莵絲生有時夫婦㑹有宜千里逺結婚悠悠隔山陂思君令人老軒車來何遲傷彼蕙蘭花含英揚光煇過時而不采將隨秋草萎君亮執髙節賤妾亦何為孟冬寒氣至北風何慘􅀈愁多知夜長仰觀衆星列三五明月滿四五蟾兎缺客從逺方來遺我一書札上言長相思下言久離别置書懐袖中三嵗字不滅一心抱區區懼君不識察客從逺方來遺我一端綺相去萬餘里故人心尚爾文彩雙鴛鴦裁為合歡被著以長相思縁以結不解以膠投漆中誰能别離此四坐且莫諠願聽歌一言請說銅鑪器崔嵬象南山上枝似松柏下根據銅盤彫文各異類離婁自相聫誰能為此器公輸與魯班朱火然其中青煙颺其間從風入君懐四坐莫不歎香風難久居空令蕙草殘悲與親友别氣結不能言贈子以自愛道逺㑹見難人生無幾時顛沛在其間念子棄我去新心有所歡結志青雲上何時復來還穆穆清風至吹我羅裳裾青袍似春草長條隨風舒朝登津梁山褰裳望所思安得抱柱信皎日以為期古樂府詩六首日出東南隅照我秦氏樓秦氏有好女自言名羅敷羅敷善蠶桑采桑城南隅青絲為籠繩桂枝為籠鉤頭上倭墮髻耳中明月珠緑綺為下裾紫綺為上襦觀者見羅敷下擔捋髭鬚少年見羅敷脫巾著帩頭耕者忘其耕鋤者忘其鋤來歸相怨怒但坐觀羅敷使君從南來五馬立歭􅡨使君遣吏往問此誰家姝秦氏有好女自名為羅敷羅敷年幾何二十尚未滿十五頗有餘使君謝羅敷寧可共載不羅敷前置辭使君一何愚使君自有婦羅敷自有夫東方千餘騎夫壻居上頭何以識夫壻白馬從驪駒青絲繫馬尾黄金駱馬頭腰間鹿盧劒可直千萬餘十五府小吏二十朝大夫三十侍中郎四十專城居為人潔白晳髯髯頗有鬚盈盈公府步冉冉府中趨坐中數千人皆言夫壻殊日出東南隅行相逢狹路間道隘不容車如何兩少年挾轂問君家君家誠易知易知復難忘黄金為君門白玉為君堂堂上置樽酒使作邯鄲倡中庭生桂樹華鐙何煌煌兄弟兩三人中子為侍郎五日一來歸道上自生光黄金駱馬頭觀者滿路傍入門時左顧但見雙鴛鴦鴛鴦七十二羅列自成行音聲何噰噰鶴鳴東西廂大婦織羅綺中婦織流黄小婦無所作挾瑟上髙堂丈人且安坐調絲未遽央相逢狹路間天上何所有厯厯種白榆桂樹夾道生青龍對道隅鳯皇鳴啾啾一母將九鶵顧視世間人為樂甚獨殊好婦出迎客顔色正敷愉伸腰再拜跪問客平安不請客北堂上坐客氈氍毹清白各異樽酒上正華疏酌酒持與客客言主人持却略再拜跪然後持一桮談笑未及竟左顧勅中厨促令辦粗飯慎莫使稽留廢禮送客出盈盈府中趨送客亦不逺足不過門樞取婦得如此齊姜亦不如健婦持門户勝一大丈夫隴西行翩翩堂前燕冬藏夏來見兄弟兩三人流蕩在他縣故衣誰當補新衣誰當綻賴得賢主人覽取為吾綻夫壻從門來斜柯西北眄語卿且勿眄水清石自見石見何纍纍遠行不如歸艶歌行皚如山上雪皎若雲間月聞君有兩意故來相决絶今日斗酒㑹明旦溝水頭􅉜蹀御溝上溝水東西流淒淒復淒淒嫁娶不須嗁願得一心人白頭不相離竹竿何嫋嫋魚尾何蓰蓰男兒重意氣何用錢刀為山上雪飛來雙白鵠乃從西北來十十將五五羅列行不齊忽然卒疲病不能飛相隨五里一反顧六里一徘徊吾欲銜汝去口噤不能開吾欲負汝去羽毛日摧頽樂哉新相知憂來生别離歭􅡨顧羣侣淚落縱横催今日樂相樂延年萬歳期雙白鵠枚乗雜詩九首西北有高樓上與浮雲齊交疏結綺窓阿閣三重階上有弦歌聲音響一何悲誰能為此曲無乃杞梁妻清商隨風發中曲正徘徊一彈再三歎慷慨有餘哀不惜歌者苦但傷知音稀願為雙鴻鵠奮翅起髙飛東城髙且長逶迤自相屬囘風動地起秋草萋已緑四時更變化歳暮一何速鷐風懐苦心蟋蟀傷局促蕩滌放情志何為自結束燕趙多佳人美者顔如玉被服羅裳衣當户理清曲音響一何悲弦急知柱促馳情整中帶沈吟聊躑躅思為雙飛燕銜泥巢君屋行行重行行與君生别離相去萬餘里各在天一涯道路阻且長㑹面安可知胡馬嘶北風越鳥巢南枝相去日已逺衣帶日已緩浮雲蔽白日遊子不顧反思君令人老嵗月忽已晩棄捐勿復道努力加飱飯涉江采芙蓉蘭澤多芳草采之欲遺誰所思在遠道還顧望舊鄉長路漫浩浩同心而離居傷憂以終老青青河畔草鬱鬱園中桞盈盈樓上女皎皎當窓牖娥娥紅粉妝纎纎出素手昔為倡家女今為蕩子婦蕩子行不歸空牀難獨守蘭若生春陽涉冬猶盛滋願言追昔愛情款感四時美人在雲端天路隔無期夜光照𤣥隂長歎戀所思誰謂我無憂積念發狂癡庭前有竒樹緑葉發華滋攀條折其榮將以遺所思馨香盈懐袖路逺莫致之此物何足貴但感别經時迢迢牽牛星皎皎河漢女纎纎擢素手札札弄機杼終日不成章泣涕零如雨河漢清且淺相去復幾許盈盈一水間脉脉不得語明月何皎皎照我羅牀帷憂愁不能寐覽衣起徘徊客行雖云樂不如早旋歸出户獨彷徨愁思當告誰引領還入房淚下霑裳衣李延年歌詩一首并序李延年知音善歌舞每為漢武帝作新歌變曲聞者莫不感動延年侍上坐起舞歌曰北方有佳人絶世而獨立一顧傾人城再顧傾人國傾城復傾國佳人難再得蘇武詩一首結髪為夫婦恩愛兩不疑懽娛在今夕嬿婉及良時征夫懐逺路起視夜何其參辰皆已沒去去從此辭征役在戰塲相見未有期握手一長歎淚為生别滋努力愛春華莫忘歡樂時生當復來歸死當長相思辛延年羽林郎詩一首昔有霍家姝姓馮名子都依倚將軍勢調笑酒家胡胡姬年十五春日獨當鑪長裾連理帶廣袖合歡襦頭上藍田玉耳後大秦珠兩鬟何窕窕一世良所無一鬟五百萬兩鬟千萬餘不意金吾子娉婷過我廬銀鞍何昱爚翠蓋何歭􅡨就我求清酒絲繩提玉壺就我求珍肴金盤膾鯉魚貽我青銅鏡結我紅羅裾不惜紅羅裂何論輕賤軀男兒愛後婦女子重前夫人生有新故貴賤不相渝多謝金吾子私愛徒區區班婕妤怨詩一首并序昔漢成帝班婕妤失寵供養於長信宫乃作賦自傷并為怨詩一首新裂齊紈素鮮潔如霜雪裁為合歡扇團團似明月出入君懐袖動摇微風發常恐秋節至凉風奪炎熱棄捐篋笥中恩情中道絶宋子侯董嬌嬈詩一首洛陽城東路桃李生路傍花花自相對葉葉自相當春風東北起花葉正低昂不知誰家子提籠行采桑纎手折其枝花落何飄颺請謝彼姝子何為見損傷髙秋八九月白露變為霜終年㑹飄墮安得久馨香秋時自零落春月復芬芳何時盛年去懽愛永相忘吾欲竟此曲此曲愁人腸歸來酌美酒挾瑟上髙堂漢時童謡歌一首城中好髙髻四方髙一尺城中好大眉四方眉半額城中好廣袖四方用匹帛張衡同聲歌一首邂逅承際㑹偶得充後房情好新交接恐㬓若探湯不才勉自竭賤妾職所當綢繆主中饋奉禮助蒸嘗思為苑蒻席在下蔽匡牀願為羅衾幬在上衛風霜洒埽清枕席鞮芬以狄香重户結金扃髙下華鐙光衣解巾粉御列圖陳枕張素女為我師儀態盈萬方衆夫所希見天老教軒皇樂莫斯夜樂没齒焉可忘秦嘉贈婦詩三首并序秦嘉字士㑹隴西人也為郡上掾其妻徐淑寢疾還家不獲面别贈詩云爾人生譬朝露居世多屯蹇憂艱常早至懽㑹常苦晩念當奉時役去爾日遥逺遣車迎子還空往復空返省書情悽愴臨食不能飯獨坐空房中誰與相勸勉長夜不能眠伏枕獨展轉憂來如尋環匪席不可捲皇靈無私親為善荷天祿傷我與爾身少小罹㷀獨既得結大義懽樂若不足念當逺離别思念叙款曲河廣無舟梁道近隔邱陸臨陸懐惆悵中駕正躑躅浮雲起髙山悲風激深谷良馬不囘鞍輕車不轉轂針藥可屢進愁思難為數貞士篤終始恩義不可屬肅肅僕夫征鏘鏘揚和鈴清晨當引邁束帶待鷄鳴顧㸔空室中髣髴想姿形一别懐萬恨起坐為不寧何用敘我心遺思致款誠寶釵可耀首明鏡可鑒形芳香去垢穢素琴有清聲詩人感木瓜乃欲荅瑶瓊媿彼贈我厚慙此往物輕雖知未足報貴用敘我情秦嘉妻徐淑荅詩一首妾身兮不令嬰疾兮來歸沈滯兮家門厯時兮不差曠廢兮侍覲情敬兮有違君今兮奉命逺適兮京師悠悠兮離别無因兮敘懐瞻望兮踴躍佇立兮徘徊思君兮感結夢想兮容煇君發兮引邁去我兮日乖恨無兮羽翼髙飛兮相追長吟兮永歎淚下兮霑衣蔡邕飲馬長城窟行一首青青河邊草綿綿思遠道遠道不可思宿昔夢見之夢見在我傍忽覺在他鄉他鄉各異縣展轉不相見枯桑知天風海水知天寒入門各自媚誰肯相為言客從逺方來遺我雙鯉魚呼兒烹鯉魚中有尺素書長跪讀素書書上竟何如上有加飱食下有長相憶陳琳飲馬長城窟行一首飲馬長城窟水寒傷馬骨往謂長城吏慎莫稽留太原卒官作自有程舉築諧汝聲男兒寧當格鬭死何能怫鬱築長城長城何連連連連三千里邊城多健少内舍多寡婦作書與内舍便嫁莫留住善事新姑嫜時時念我故夫子報書往邊地君今出語一何鄙身在禍難中何為稽留他家子生男慎莫舉生女哺用脯君獨不見長城下死人骸骨相撐拄結髪行事君慊慊心意關邊地苦賤妾何能久自全繁欽定情詩一首我出東門遊邂逅承清塵思君即幽房侍寢執衣巾時無桑中契迫此路側人我即媚君姿君亦恱我顔何以致拳拳綰臂雙金鐶何以致殷勤約指一雙銀何以致區區耳中雙明珠何以致叩叩香囊繫肘後何以致契闊繞腕雙跳脫何以結恩情珮玉綴羅纓何以結中心素縷連雙針何以結相於金薄畫搔頭何以慰别離耳後瑇瑁釵何以荅歡恱紈素三條裾何以結愁悲白絹雙中衣與我期何所乃期東山隅日旰兮不至谷風吹我襦逺望無所見涕泣起歭􅡨與我期何所乃期山南陽日中兮不來凱風吹我裳逍遥莫誰覩望君愁我膓與我期何所乃期西山側日夕兮不來躑躅長歎息遠望凉風至俯仰正衣服與我期何所乃期山北岑日暮兮不來淒風吹我衿望君不能坐悲苦愁我心愛身以何為惜我華色時中情既款款然後尅密期褰衣躡茂草謂君不我欺厠此醜陋質徙倚無所之自傷失所欲淚下如連絲古詩無名人為焦仲卿妻作并序漢末建安中廬江府小吏焦仲卿妻劉氏為仲卿母所遣自誓不嫁其家逼之乃没水而死仲卿聞之亦自縊於庭樹時傷之為詩云爾孔雀東南飛五里一徘徊十三能織素十四學裁衣十五彈箜篌十六誦詩書十七為君婦心中常苦悲君既為府吏守節情不移鷄鳴入機織夜夜不得息三日斷五疋大人故嫌遲非為織作遲君家婦難為妾不堪驅使徒留無所施便可白公姥及時相遣歸府吏得聞之堂上啓阿母兒已薄祿相幸復得此婦結髪同枕席黄泉共為友共事二三年始爾未為久女行無偏斜何意致不厚阿母謂府吏何乃太區區此婦無禮節舉動自專由吾意久懐忿汝豈得自由東家有賢女自名秦羅敷可憐體無比阿母為汝求便可速遣之遣之慎莫留府吏長跪荅伏惟啓阿母今若遣此婦終老不復取阿母得聞之搥牀便大怒小子無所畏何敢助婦語吾已失恩義㑹不相從許府吏黙無聲再拜還入户舉言謂新婦哽咽不能語我自不驅卿逼迫有阿母卿但暫還家吾今且報府不久當歸還還必相迎取以此下心意慎勿違吾語新婦謂府吏勿復重紛紜往昔初陽嵗謝家來貴門奉事循公姥進止敢自專晝夜勤作息伶俜縈苦辛謂言無罪過供養卒大恩仍更被驅遣何言復來還妾有繡腰襦萎蕤自生光紅羅複斗帳四角垂香囊箱簾六七十緑碧青絲繩物物各自異種種在其中人賤物亦鄙不足迎後人留待作遺施於今無㑹因時時為安慰久久莫相忘雞鳴外欲曙新婦起嚴妝著我繡裌裠事事四五通足下躡絲履頭上瑇瑁光腰若流紈素耳著明月璫指如削蔥根口如含朱丹纎纎作細步精妙世無雙上堂拜阿母母聽去不止昔作女兒時生小出野里本自無教訓兼媿貴家子受母錢帛多不堪母驅使今日還家去念母勞家裏却與小姑别淚落連珠子新婦初來時小姑如我長勤心養公姥好自相扶將初七及下九嬉戲莫相忘出門登車去涕落百餘行府吏馬在前新婦車在後隠隠何甸甸俱㑹大道口下馬入車中低頭共耳語誓不相隔鄉且暫還家去吾今且赴府不久當還歸誓天不相負新婦謂府吏感君區區懐君既若見錄不久望君來君當作盤石妾當作蒲葦蒲葦紉如絲盤石無轉移我有親父兄性行暴如雷恐不任我意逆以煎我懐舉手長勞勞二情同依依入門上家堂進退無顔儀阿母大拊掌不圖子自歸十三教汝織十四能裁衣十五彈箜篌十六知禮儀十七遣汝嫁謂言無誓違汝今無罪過不迎而自歸蘭芝慙阿母兒實無罪過阿母大悲摧還家十餘日縣令遣媒來云有第三郎窈窕世無雙年始十八九便言多令才阿母謂阿女汝可去應之阿女銜淚荅蘭芝初還時府吏見丁寧結誓不别離今日違情義恐此事非竒自可斷來信徐徐更謂之阿母白媒人貧賤有此女始適還家門不堪吏人婦豈合令郎君幸可廣問訊不得便相許媒人去數日尋遣丞請還說有蘭家女承籍有宦官云有第五郎嬌逸未有婚遣丞為媒人主簿通語言直說太守家有此令郎君既欲結大義故遣來貴門阿母謝媒人女子先有誓老姥豈敢言阿兄得聞之悵然心中煩舉言為阿妹作計何不量先嫁得府吏後嫁得郎君否泰如天地足以榮汝身不嫁義郎體其往欲何云蘭芝仰頭荅理實如兄言謝家事夫壻中道還兄門處分適兄意那得自任専雖與府吏要渠㑹永無縁登即相許和便可結㛰姻媒人下牀去諾諾復爾爾還部白府君下官奉使命言談大有縁府君得聞之心中大歡喜視厯復開書便利此月内六合正相應良吉三十日今已二十七卿可去成婚交語速裝束駱驛如浮雲青雀白鵠舫四角龍子幡婀娜隨風轉金車玉作輪躑躅青驄馬流蘇金鏤鞍齎錢三百萬皆用青絲穿雜綵三百匹交廣市鮭珍從人四五百鬱鬱登郡門阿母謂阿女適得府君書明日來迎汝何不作衣裳莫令事不舉阿女黙無聲手巾掩口嗁淚落便如瀉移我瑠璃榻出置前窓下左手持刀尺右手執綾羅朝成繡裌裠晩成單羅衫晻晻日欲暝愁思出門嗁府吏聞此變因求假暫歸未至二三里催藏馬悲哀新婦識馬聲躡履相逢迎悵然遥相望知是故人來舉手柏馬鞍嗟嘆使心傷自君别我後人事不可量果不如先願又非君所詳我有親父母逼迫兼弟兄以我應他人君還何所望府吏謂新婦賀卿得髙遷盤石方且厚可以卒千年蒲葦一時紉便作旦夕間卿當日勝貴吾獨向黄泉新婦謂府吏何意出此言同是被逼迫君爾妾亦然黄泉下相見勿違今日言執手分道去各各還家門生人作死别恨恨那可論念與世間辭千萬不復全府吏還家去上堂拜阿母今日大風寒寒風摧樹木嚴霜結庭蘭兒今日冥冥令母在後單故作不良計勿復怨鬼神命如南山石四體康且直阿母得聞之零淚應聲落汝是大家子仕宦於臺閣慎勿為婦死貴賤情何薄東家有賢女窈窕豔城郭阿母為汝求便復在旦夕府吏再拜還長嘆空房中作計乃爾立轉頭向户裏漸見愁煎迫其日牛馬嘶新婦入青廬菴菴黄昏後寂寂人定初我命絶今日魂去尸長留攬裠脫絲履舉身赴青池府吏聞此事心知長别離徘徊庭樹下自挂東南枝兩家求合葬合葬華山傍東西植松柏左右種梧桐枝枝相覆葢葉葉相交通中有雙飛鳥自名為鴛鴦仰頭相向鳴夜夜達五更行人駐足聽寡婦起傍徨多謝後世人戒之慎勿忘玉臺新詠巻一欽定四庫全書玉臺新詠巻二陳徐陵撰魏文帝
