晩篁初解籜藹藹霧滿閨融融景盈幕乳燕逐草蟲巢蜂拾花藥是節最暄妍佳服又新爍斂歎對囘塗揚歌弄場藿抽琴試佇思薦珮果誠託承君郢中美服義久心諾衛風古愉􅃩鄭俗舊浮薄虚願悲渡湘空賦笑瀍洛盛明難重來淵意為誰涸君其且調弦桂酒妾行酌采桑詩銜淚出郭門撫劔無人逵沙風闇塞起離心眷鄉畿夜分就孤枕夢想暫言歸孀婦當户笑搔絲復鳴機慊款論久别相將還綺幃靡靡簷下涼朧朧窻裏煇刈蘭争芬芳采菊競葳蕤開匳集香蘇探袖解纓徽寐中長路近覺後大江違驚起空歎息恍忽神魂飛白水漫浩浩髙山壯巍巍波潮異往復風霜改榮衰此土非吾土慷慨當訴誰夢還詩河畔草未黄胡鴈已矯翼秋蛩扶户吟寒婦晨夜織去歳征人還流傳舊相識聞君上壟時東望久歎息宿昔衣帶改旦暮異容色念此憂如何夜長憂向多明鏡塵匣中寳琴生網羅擬古雙燕戲雲崖羽翮始差池出入南閨裏經過北堂垂意欲巢君幕層楹不可窺沈吟芳歳晩徘囘韶景移悲歌辭舊愛銜泥覔新知詠燕寒灰滅更然夕華晨更鮮春冰雖暫解冬冰復還堅佳人捨我去賞愛長絶縁歡至不留時每感輙傷年雙劔將别離先在匣中鳴煙雨交將夕從此遂分形雌沈吳江水雄飛入楚城吳江深無底楚城有崇扃一為天地别豈直阻幽明神物終不隔千祀儻還并贈故人王素學阮步兵體沈情發遐慮紆鬱懐所思髣髴聞簫管鳴鳯接嬴姬聮綿共雲翼嬿婉相攜持寄言芳華士寵利不常期涇渭分清濁視彼谷風詩吳邁逺擬樂府四首可憐雙白鶴雙雙絶塵氛連翩弄光景交頸遊青雲逢羅復逢繳雌雄一旦分哀聲流海曲孤叫出江濆豈不慕前侣為爾不及羣步步一零淚千里猶待君樂哉新相知悲矣生别離恃此百年命共逐寸隂移譬如空山草零落心自知飛來雙白鵠百里望咸陽知是帝京域緑樹揺雲光春城起風色佳人愛景華流靡園塘側妍姿􅃩月映羅衣飄蟬翼宋玉歌陽春巴人長歎息雅鄭不同賞那令君愴惻生平重愛恵私自憐何極陽春曲生離不可聞况復長相思如何與君别當我盛年時􅈍花每揺蕩妾心空自持榮乏草木歡悴極霜露悲富貴身難老貧賤年易衰持此斷君腸君亦宜自疑淮隂有逸將折翮謝翻飛楚亦扛鼎士出門不得歸正為隆準公杖劔入紫微君才定何如白日下争暉長别離晨有行路客依依造門端人馬風塵色知從河塞還時我有同棲結宦遊邯鄲將不異客子分飢復共寒煩君尺帛書寸心從此單遣妾長憔悴豈復歌笑顔簷隠千霜樹庭枯十載蘭經春不舉袖秋落寧復㸔一見願道意君門已九關虞卿棄相印擔簦為同歡閨隂欲早霜何事空盤桓長相思鮑令暉雜詩六首裊裊臨窻竹藹藹垂門桐灼灼青軒女泠泠髙臺中明志逸秋霜玉顔􅃩春紅人生誰不别恨君早從戎鳴弦慙夜月紺黛羞春風擬青青河畔草客從逺方來贈我漆鳴琴木有相思文弦有别離音終身執此調歳寒不改心願作陽春曲宫商長相尋擬客從逺方來自君之出矣臨軒不解顔砧杵夜不發髙門晝常關帳中流熠燿庭前華紫蘭物枯謝節異鴻來知客寒遊用暮冬盡除春待君還題書後寄行人寒鄉無異服衣氈代文練月月望君歸年年不解綖荆揚春早和幽冀猶霜霰北寒妾已知南心君不見誰為道辛苦寄情雙飛燕形迫杼煎絲顔落風催電容華一朝盡惟餘心不變古意贈今人明月何皎皎垂櫎照羅茵若共相思夜知同憂怨晨芳華豈矜皃霜露不憐人君非青雲逝飄迹事咸秦妾持一生淚經秋復度春君子將傜役遺我雙題錦臨當欲去時復留相思枕題用常著心枕以憶同寢行行日已逺轉覺思彌甚代葛沙門妻郭小玉詩丘巨源雜詩二首妙縞貴東夏巧媛出吳闉裁狀白玉璧縫似明月輪表裏鏤七寳中銜駭雞珍畫作景山樹圖為河洛神來延揮握玩入與鐶釧親生風長袖際晞華紅粉津拂眄迎嬌意隐映含歌人時移務忘故節改競存新巻情隨象簟舒心謝錦茵懕歇何足道敬哉先後辰詠七寳扇披衽乏遊術慿軾寡文才蓬門長自寂虚席視生埃貴里臨妝館東隣歌吹臺雲閒嬌響徹風末􅃩聲來飛華瑶翠幄揚芬金碧桮久絶中州美從念尸鄉灰遺情悲近世中山安在哉聽鄰妓王元長雜詩五首遊禽暮知反行人獨不歸坐銷芳草氣空度明月煇嚬容入朝鏡思淚㸃春衣巫山彩雲沒淇上緑條稀待君竟不至秋鴈雙雙飛霜氣下孟津秋風度函谷念君淒已寒當軒巻羅縠纎手廢裁縫曲鬢罷膏沐千里不相聞寸心鬱氛氲况復飛螢夜木葉亂紛紛古意抱月如可明懐風殊復清絲中傳意緒花裏寄春情掩抑有竒態悽鏘多好聲芳袖幸時拂龍門空自生詠琵琶幸得與珠綴羃䍥君之楹月映不辭巻風來輒自輕每聚金鑪氣時駐玉琴聲俱願致尊酒蘭缸當夜明詠幔響像巫山髙薄暮陽臺曲煙霞乍舒巻蘅芳時斷續彼美如可期寤言紛在屬撫然坐相思秋風下庭緑巫山髙謝脁雜詩十二首日落窻中坐紅妝好顔色舞衣襞未縫流黄覆不織蜻蛉草際飛遊蜂花上食一遇長相思願寄連翩翼清吹要碧玉調弦命緑珠輕歌急綺帶含笑解羅襦餘曲詎幾許髙駕且歭􅡨徘徊韶景暮惟有洛城隅贈王主簿掖庭聘絶國長門失歡讌相逢詠蘼蕪辭寵悲團扇花叢亂數蝶風簾入雙燕徒使春帶賒坐惜紅顔變平生一顧重夙昔千金賤故人心尚爾故心人不見和王主簿怨情瓊閨釧響聞瑶席芳塵滿要取洛陽人共命江南管情多舞態遲意傾歌弄緩知君密見親寸心傳玉鋺上客光四座佳麗直千金挂􅁫報纓絶墮珥荅琴心蛾眉已共笑清香復入䘳夜樂夜方静翠帳垂沈沈夜聽妓生平宫閤裏出入侍丹墀開笥方羅縠窺鏡比蛾眉初别意未解去久日生悲顦顇不自識嬌羞餘故姿夢中忽髣髴猶言承讌私詠邯鄲故才人嫁為厮養卒婦秋夜促織鳴南隣𢷬衣急思君隔九重夜夜空佇立北窻輕幔垂西户月光入何知白露下坐視前階濕誰能長分居秋盡冬復及秋夜發翠斜漢裏蓄寳宕山峰抽莖類僊掌銜光似燭龍飛蛾再三繞輕花四五重孤對相思夕空照儛衣縫鐙杏梁賔未散桂宫明欲沈曖色輕帷裏低光照寳琴徘徊雲髻影灼爍綺疎金恨君秋月夜遺我洞房隂燭本生朝夕池落景照參差汀洲蔽杜若幽渚奪江離遇君時采擷玉座奉金巵但願羅衣拂無使素塵彌席玲瓏類丹檻苕亭似𤣥闕對鳯懸清冰垂龍挂明月照粉拂紅妝挿花理雲髪玉顔徒自見常畏君情歇鏡臺新葉初苒苒初繠新霏霏逢君後園讌相隨巧笑歸親勞君玉指摘以贈南威用持挿雲髻翡翠比光煇日暮長零落君恩不可追落梅陸厥中山王孺子妾歌一首如姬寢卧内班妾坐同車洪波陪飲帳林光晏秦餘歳暮寒飈及秋水落芙蕖子瑕矯後駕安陵泣前魚賤妾終已矣君子定焉如施榮泰雜詩趙女修麗姿燕姬正容飾妝成桃毀紅黛起草慙色羅裠數十重猶輕一蟬翼不言縠袖輕專歎風多力鏘珮玉池邊弄笑銀臺側折栁貽目成挿蒲贈心識來時嬌未盡還去媚何極玉臺新詠巻四欽定四庫全書玉臺新詠巻五陳徐陵撰江淹四首丘遲二首沈約二十四首栁惲九首江洪四首髙爽一首鮑子卿二首何子朗三首范靖婦四首何遜十一首王樞三首庾丹二首江淹四首逺與君别者乃至鴈門關黄雲蔽千里遊子何時還送君如昨日檐前露已團不惜􅈍草晩所悲道里寒君子在天涯妾心久别離願一見顔色不異瓊樹枝兎絲及水萍所寄終不移古體綾扇如團月出自機中素畫作秦王女乗鸞向煙霧彩色世所重雖新不代故竊悲凉風至吹我玉階樹君子恩未畢零落在中路班婕妤秋月映簾櫳懸光入丹墀佳人撫鳴琴清夜守空帷蘭徑少行迹玉臺生網絲夜樹發紅彩閨草含碧滋羅綺為君整萬里贈所思願垂湛露恵信我皎日期張司空離情西北秋風至楚客心悠哉日暮碧雲合佳人殊未來露彩方泛􅃩月華始徘徊寳書為君掩瑶琴詎能開相思巫山渚悵望雲陽臺金鑪絶沈燎綺席徧浮埃桂水日千里因之平生懐休上人怨别丘遲二首清歌自言妍雅舞空仙仙耳中解明月頭上落金鈿雀飛且近逺暮入綺窻前魚戲雖南北終還荷葉邊惟見君行久新年非故年敬詶栁僕射征怨丈夫吐然諾受命本遺家糟糠且棄置蓬首亂如麻側聞洛陽客金蓋翼髙車謁帝時來下光景不可奢幽房一洞啓二八盡芬華羅裾有長短翠鬢無低斜長眉横玉臉皓腕巻輕紗俱㸔依井蝶共取落檐花何言征戍苦抱膝空咨嗟荅徐侍中為人贈婦沈約二十四首登髙眺京洛街巷紛漠漠囘首望長安城闕鬱盤桓日出照鈿黛風過動羅紈齊童躡朱履趙女揚翠翰春風揺雜樹葳蕤緑且丹寳瑟玫瑰柱金覊瑇瑁鞍淹留宿下蔡置酒過上蘭解眉還復斂方知巧笑難佳期空靡靡含睇未成歡嘉客不可見因君寄長歎登髙望春朝發披香殿夕濟汾隂河於兹懐九逝自此斂雙蛾沾莊疑湛露繞臆狀流波日見奔沙起稍覺轉蓬多寒風犯肌骨非直傷綺羅銜涕試南望闗山鬱嵯峨始作陽春曲終成苦寒歌惟有三五夜明月蹔經過昭君辭山隂栁家女莫言出田墅丰容好姿顔便僻工言語腰肢既軟弱衣服亦華楚紅輪映早寒畫扇迎初暑錦履並花紋繡帶同心苣羅襦金薄厠雲鬢花􅁫舉我情已鬱紆何用表﨑嶇託意眉間黛申心口上朱莫争三春價坐喪千金軀盈尺青銅鏡徑寸合浦珠無因達往意欲寄雙飛鳬裾開見玉趾衫薄映凝膚羞言趙飛燕笑殺秦羅敷自顧雖悴薄冠蓋曜城隅髙門列騶駕廣路從驪駒何慚鹿盧劔詎减府中趨還家問鄉里詎堪持作夫少年新婚為之詠捨轡下彫輅更衣奉玉牀斜簪映秋水開鏡比春妝所畏紅顔促君恩不可長雞冠且容裔豈吝桂枝亡攜手曲西征登隴首東望不見家關樹㨨紫葉塞草發青牙昆明當欲滿蒲萄應作花流淚對漢使因書寄狹邪有所思河漢縱且横北斗横復直星漢空如此寧知心有憶孤鐙曖不明寒機曉猶織零淚向誰道鷄鳴徒歎息夜夜曲楊桞亂如絲綺羅不自持春草青復緑客心傷此時翠苔已結洧碧水復盈淇日華照趙瑟風心動燕姬䘳中萬行淚故是一相思春詠風來吹葉動風去畏花傷紅英已照灼況復含日光歌童暗理曲游女夜縫裳詎减當春淚能斷思人腸詠桃月華臨静夜夜静滅氛埃方暉竟户入圓影隙中來髙樓切思婦西園游上才網軒映珠綴應門照緑苔洞房殊未曉清光信悠哉詠月輕隂拂建章夾道連未央因風結復解霑露柔且長楚妃思欲絶班女淚成行流人未應去為此歸故鄉詠桞江南簫管地妙響發孫枝殷勤寄玉指含情舉復垂彫梁再三繞輕塵四五移曲中有深意丹誠君詎知詠篪憶來時的的上階墀勤勤敘離别慊慊道相思相看常不足相見乃忘飢憶坐時㸃㸃羅帳前或歌四五曲或弄兩三弦笑時應無比嗔時更可憐憶食時臨盤動容色欲坐復羞坐欲食復羞食含情如不飢擎甌似無力憶眠時人眠彊未眠解羅不待勸就枕更須牽復恐傍人見嬌羞在燭前四憶纎手製新竒刺作可憐儀縈絲飛鳯子結縷坐花兒不聲如動吹無風自裊移麗色儻未歇聊承雲鬢垂領邊繡丹墀上颯沓玉殿下趨鏘逆轉珠珮響先表繡袿香裾開臨舞席拂袖繞歌堂所歎忘懐妾見委入羅牀脚下履漠漠牀上塵中心憶故人故人不可憶中夜長歎息歎息想容儀不欲長别離别離稍已久空牀寄桮酒擬青青河邊草大婦埽玉墀中婦結羅帷小婦獨無事對鏡畫蛾眉良人且安卧夜長方自私擬三婦挾瑟叢臺下徙倚愛容光佇立日已暮戚戚苦人腸露葵已堪擿湛水未霑裳錦衾無獨煖羅衣空自香明月雖外照寧知心内傷古意夜聞長歎息知君心有憶果自閶闔開魂交覩容色既薦巫山枕又奉齊眉食立望復横陳忽覺非在側那惡神傷者潺湲淚霑臆夢見美人可憐桂樹枝單雄憶故雌歳暮異棲宿春至猶别離山河隔長路路逺絶容儀豈云無我匹寸心終不移效古扶道覔陽春佳人共攜手草色猶自非林中都未有無事逐梅花空中信楊桞且復歸去來含情寄桮酒初春去秋三五月今秋還照房今春蘭􅈍草來春復吐芳悲哉人道異一謝永銷亡屏筵空有設帷席更施張遊塵掩虚座孤帳覆空牀萬事無不盡徒令存者傷悼亡桞惲九首孤衾引思緒獨枕愴憂端深庭秋草緑髙門白露寒思君起清夜促柱奏幽蘭不怨飛蓬苦徒傷􅈍草殘其一行役滯風波遊人淹不歸亭臯木葉下壟首秋雲飛寒園夕鳥集思牖草蟲悲嗟矣當春服安見禦冬衣其二鶴鳴勞永歎采菉傷時暮念君方逺徭望妾理紈素秋風吹緑潭明月懸髙樹佳人飾淨容招攜從所務其三步欄杳不極離家肅已扃軒髙夕杵散氣爽夜砧鳴瑶華隨步響幽蘭逐袂生歭􅡨理金翠容與納宵清其四泛􅃩囘煙彩淵旋龜鶴文淒淒合歡袖苒苒蘭麝芬不怨杼軸苦所悲千里分垂泣送行李傾首遲歸雲其五𢷬衣詩别島望風臺天淵臨水殿芳草生未積春花落如霰出從張公子還過趙飛燕奉帚長信宫誰知獨不見獨不見少長倡家女出入燕南垂惟持徳自美本以容見知舊聞關山遠何事總金羈妾心日已亂秋風鳴細枝度關山雲輕色轉暖草緑晨芳歸山墟罷寒晦園澤潤朝暉春心多感動覩物情復悲自君之出矣蘭堂罷鳴機徒知游宦是不念别離非雜詩玉壺夜愔愔應門重且深秋風動桂樹流月揺輕隂綺檐清露溽網户思蟲吟歎息下蘭閤含愁奏雅琴何由鳴曉珮復得抱宵衾無復金屋念豈照長門心長門怨汀州采白蘋日落江南春洞庭有歸客瀟湘逢故人故人何不返春華復應晩不道新知樂且言行路逺江南曲城南斷車騎閣道覆清埃露華光翠網月影入蘭臺洞房且莫掩應門或復開䬃䬃秋桂響非君起夜來起夜來黛馬秋不歸緇紈無復緒迎寒理夜縫映月㨨纎縷的皪愁睇光連娟思眉聚清露下羅衣秋風吹玉柱流隂稍已多餘光欲難取七夕穿針照日汀州際揺風緑潭側雖無獨繭輕幸有青袍色羅袖少輕塵象牀多麗飾願君蘭夜飲佳人時宴息詠席江洪四首寳鑷間珠花分明靚莊㸃薄鬢約微黄輕紅澹鉛臉發言芳已馳復加蘭􅈍染浮聲易傷歎沈唱安而險孤轉忽徘徊雙蛾乍舒斂不持全示人半用輕紗掩詠歌姬腰纎蔑楚媛體輕非趙姬映䘳闐寳粟縁肘挂珠絲發袖已成態動足復含姿斜睛若不眄當轉復遲疑何慙雲鶴起詎減鳯鸞時舞女雜彩何足竒惟紅偏作可灼爍類蕖開輕明似霞破鏤質巻芳脂栽花承百和且傳别離心復是相思裹不值情幸人豈識風流座詠紅箋當户種薔薇枝葉太葳蕤不揺香已亂無風花自飛春閨不能静開匣對明妃曲池浮采采斜岸列依依或聞好音度時見銜泥歸且對清觴湛其餘任是非詠薔薇髙爽一首初上鳯皇墀此鏡照蛾眉言照長相守不照長相思虚心㑹不采貞明空自欺無言故此物更復對新期詠鏡鮑子卿二首細絲本自輕弱彩何足眄直為發紅顔謬成握中扇乍奉長門泣時承柏梁宴思莊開已掩歌容隠而見但畫雙黄鶴莫作孤飛燕詠畫扇玉階已夸麗復得臨紫微北户接翠幄南路低金扉重疊通日影參差藏月煇輕苔染珠履微澱拂羅衣獨笑崑山曲空見青鳬飛詠玉階何子朗三首桂臺清霞拂銅陛落花沾美人紅妝罷攀鉤巻細簾思君擊促織玉指何纎纎未應為此别無故坐相嫌學謝體美人弄白日灼灼當春牖清鏡對蛾眉新花映玉手燕下拾池泥風來吹細桞君子何時歸與我酌尊酒和虞記室騫古意清夜未云疲細簾聊可發玲玲玉潭水映見蛾眉月靡靡露方垂煇煇光稍沒佳人復千里餘影徒揮忽和繆郎視月范靖婦四首珠華縈翡翠寳葉間金瓊剪荷不似製為花如自生低枝拂繡領微步動瑶瑛但令雲髻挿蛾眉本易成詠步揺花明珠翠羽帳金薄緑綃帷因風時蹔舉想象見芳姿清晨挿步揺向晩解羅衣託意風流子佳情詎肯私戲蕭孃可憐潤霜質纎剖復毫分織作囘風苣製為縈綺文含芳出珠被曜彩接緗裠徒嗟金麗飾豈念昔凌雲詠五彩竹火籠綺筵日已暮羅帷月未歸開花散鵠彩含光出九微風軒動丹熖冰宇澹清暉不吝輕蛾繞惟恐曉蠅飛詠鐙何遜十一首湓城帶湓水湓水縈如帶日夕望髙城耿耿青雲外城中多宴賞絲竹常繁㑹管聲已流恱弦聲復悽切歌黛慘如愁舞腰疑欲絶仲秋黄葉下長風正騷屑早鴈出雲歸故燕辭檐别晝悲在異縣夜夢還洛汭洛汭何悠悠起望登西樓的的颿向浦團團日隠州誰能一羽化輕舉逐飛浮日夕望江贈魚司馬城東美少年重身輕萬億柘彈隨珠丸白馬黄金飾長安九逵上青槐䕃道植轂擊晨已喧肩排暗不息走狗通西望牽牛亘南直相期百戲傍去來三市側象牀沓繡被玉盤傳綺食倡女掩扇歌小婦開簾織相㸔獨隠笑見人還斂色黄鶴悲故羣山枝詠初識烏飛過客盡雀聚行龍匿酌羽前厭厭此時歡未極擬輕薄篇珠簾旦初捲綺機朝未織玉匣開鑒形寳臺臨浄飾對影獨含笑㸔花空轉側聊為出繭眉試染夭桃色羽􅁫如可閒金鈿長相逼蕩子行未歸嗁妝坐霑臆詠照鏡曉河沒髙棟斜月半空庭窓中度落葉簾外隔飛螢含情下翠帳掩涕閉金屏昔期今未反春草寒復青思君無轉易何異北辰星閨怨僊車駐七襄鳯駕出天潢月映九微火風吹百和香來歡蹔巧笑還淚已嗁妝依稀猶洛汭倐忽似髙唐别離不得見河漢漸湯湯詠七夕管清羅薦合弦驚雪袖遲逐唱囘纎手聽曲動蛾眉凝睛盼墮珥微睇託含辭日暮留嘉客相㸔愛此時詠舞妓霧夕蓮出水霞朝日照梁何如花燭夜輕扇掩紅妝良人復灼灼席上自生光所悲髙駕動環珮出長廊㸔新婦皎皎髙樓暮華燭帳前明羅帷雀􅁫影寶瑟鳯鶵聲夜花枝上發新月霧中生誰念當窻牖相望獨盈盈詠倡家可憐雙白鷗朝夕水上游何言異棲息雌住雄不留孤飛出嶼浦獨宿下滄州東西從此去影響絶無由詠白鷗嘲别者春園日應好折花望逺道秋夜苦復長抱枕向空牀吹樓下促節不言於此别歌筵掩團扇何時一相見弦絶猶依軫葉落裁下枝即此雖云别方我未成離學青青河邊草房櫳滅夜火窻户映朝光妖女褰帷出蹀􅉜初下牀雀􅁫横曉鬢蛾眉􅃩宿妝稍聞玉環逺猶憐翠被香寧知早朝客差池已鴈行嘲劉孝綽王樞三首朝取飢蠶食夜縫千里衣復聞南陌上日暮采蓮歸青苔覆寒井紅藥間青微人生樂自極良時徒見違何由及新燕雙雙還共飛古意應蕭信武教遥見提筐下翩妍實端妙將去復囘身欲語先為笑閨中初别離不許覔新知空結茱萸帶敢報木蘭枝至烏林村見采桑者聊以贈之紅蓮披早露玉貌映朝霞飛燕嗁妝罷顧步挿餘花溘帀金鈿滿參差繡領斜暮還垂瑶帳香鐙照九華徐尚書座賦得可憐庾丹二首耿耿横天漢飄飄出岫雲月斜樹倒影風至水囘文已泣機中婦復悲牀上君羅襦曉長襞翠被夜徒薰空汲銀牀井誰縫金縷裠所思竟不至空持清夜分秋閨有望歸飛夢所憶共子汲寒漿銅瓶素絲綆綺井白銀牀雀出丰茸樹蟲飛瑇瑁梁離人不相見難忍對春光夜夢還家玉臺新詠巻五欽定四庫全書玉臺新詠巻六陳徐陵撰呉均二十首王僧孺一十七首張率擬樂府三首徐悱詩二首費昶一十首姚翻同郭侍郎采桑一首孔翁歸和湘東王班姬一首徐悱妻劉令嫺答外二首何思澄三首徐悱答唐孃七夕所穿針一首呉均二十首賤妾思不堪采桑渭城南帶減連枝繡髪亂鳯皇篸花舞衣裳薄蛾飛愛緑潭無由報君子流涕向春蠶其一妾本倡家女出入魏王宫既得承琱輦亦在更衣中蓮花銜青雀寳粟鈿金蟲猶言不得意流涕憶遼東其二春草攏可結妾心正斷絶緑鬢愁中改紅顔嗁裏滅非獨淚成珠亦見珠成血願為飛鵲鏡翩翩照離别其三何處報君書隴右五岐路淚研兎枝墨筆染鵝毛素碧浮孟渚水香下洞庭路應歸遂不歸芳春空擲度其四妾家横塘北發艷小長干花釵玉腕轉珠繩金絡丸羃䍥懸青鳯逶迤揺白團誰堪乆見此含恨不相看其五匈奴數欲盡僕在玉門闗蓮花穿劒鍔秋月掩刀環春機鳴窈窕夏鳥思緜蠻中人坐相望狂夫終未還其六和蕭洗馬子顯古意六首黄鸝飛上苑緑芷出汀洲日映昆明水春生鳷鵲樓飄颺白花舞瀾漫紫萍流畫織回文錦無因寄隴頭思君甚瓊樹不見方離憂鳴鞭適大阿聨翩渡漳河燕姬及趙女挾瑟夜經過纎腰曳廣袖半額畫長蛾客本倦遊者箕帚在江沱故人不可棄新知空復何離君苦無樂向暮心悽悽要途訪趙使聞君仕執珪杜蘅色已發菖蒲葉未齊羃䍥蠶弭繭差池鷰吐泥願逐春風去飄蕩至遼西白日隱城樓勁風掃寒木離析隔西東執手異涼燠相思咽不言洞房清且肅嵗去甚流煙年來如轉軸别鶴千里飛孤雌夜未宿閨房宿已靜落月有餘暉寒蟲隠壁思秋蛾繞燭飛絶雲斷更合離禽去復歸佳人今何在迢遞江之湄一為别鶴弄千里淚霑衣秋雲靜晩天寒夜方綿綿聞君吹急管相思雜采蓮别離未幾日髙月三成弦蹀疊黄河浪嘶喝隴頭蟬寄君蘼蕪葉揷著叢臺邊與栁惲相贈答六首嫋嫋陌上桑䕃陌復垂塘長條映白日細葉隱鸝黄蠶飽妾復思拭淚且提筐故人寜知此離恨煎人腸陌上桑咸陽春草芳秦帝巻衣裳玉檢茱萸匣金泥蘇合香初芳薰複帳餘暉曜玉牀當須宴朝罷持此贈華陽秦王巻衣錦帶雜花鈿羅衣垂緑川問子今何去出采江南蓮遼西三千里欲寄無因縁願君早旋反及此荷花鮮来蓮艷裔陽之春攜手清洛濱鷄鳴上林苑薄暮小平津長裾藻白日廣袖帶芳塵故交一如此新知詎憶人攜手擬古四首一鷰海上來一鷰髙臺息一朝所逢遇依然舊相識問我來何遲關山幾迂直答言海路長風多飛無力昔别縫羅衣春風初入帷今來夏欲晩桑蛾薄樹飛贈杜容成一首春從何處來拂衣復驚梅雲障青瑣闥風吹承露臺美人隔千里羅幃閉不開無由得共語空對相思桮春詠棄妾在河橋相思復相遼鳯凰簪落鬢蓮花帶緩腰腸從别處斷貌在淚中消願君憶疇昔片言時見饒去妾贈前夫董生惟巧笑子都信美目百萬市一言千金買相逐不道參差菜誰論窈窕淑願君捧繡被來就越人宿詠少年王僧孺一十七首四時如湍水飛奔競回復夜鳥響嚶嚶朝光照煜煜厭見花成子多看筍為竹萬里斷音書十載異棲宿積愁落芳鬢長嗁壊美目君去在榆關妾留住函谷惟對莫邪房如見蜘蛛屋獨與響相酬還將影自逐象牀易氊簟羅衣變單複幾過度風霜猶能保㷀獨春怨二八人如花三五月如鏡開簾一種色當户兩相映重價出秦韓髙名入燕鄭十城屢請易千金幾爭聘君意自能專妾心本無競月夜詠陳南康新有所納乆想專房麗未見傾城者千金訪繁華一朝遇容冶家本薊門外來戲叢臺下長卿幸未匹文君復新寡見貴者初迎盛姬聊為之詠洞房風已激長廊月復清藹藹夜庭廣飄飄曉帳輕雜聞百蟲思偏傷一息聲鳥聲長不息妾心復何極猶恐君無衣夜夜當忩織與司馬治書同聞隣婦夜織櫩露滴為珠池冰合成璧萬行朝淚瀉千里夜愁極孤帳閉不開寒膏盡復益誰知心眼亂看朱忽成碧夜愁愁來不理鬢春至更攢眉悲看蛺蜨粉泣望蜘蛛絲月映寒蛩褥風吹翡翠帷飛鱗難託意駃翼不銜辭春閨有怨足傷金管處多愴緹光促下機騖西眺鳴砧遽東旭芳汗似蘭湯雕金辟龍燭散度廣陵音操寫漁陽曲别鶴悲不已離鸞斷更續尺素在魚腸寸心憑鴈足擣衣已知想成夢未信夢如此皎皎無片非的的一皆是以親芙蓉褥方開合歡被雅步極嫣妍含辭恣委靡如言非倐忽不意成俄爾及寤盡空無方知悉虚詭為人述夢嬴女鳯凰樓漢姬柏梁殿詎勝仙將死音容猶可見我有一心人同鄉不異縣異縣不成隔同鄉更􅎃􅎃􅎃􅎃如牛女無妨年一語為人傷近不見出户望蘭薰褰簾正逢君歛容纔一訪新知詎可聞新人含笑近故人含淚隱妾意在寒松君心逐朝槿為何庫部舊姬擬蘼蕪之句窈窕宋容華但歌有清曲轉盻非無以斜扇還相矚詎減許飛瓊多勝劉碧玉何因送款款伴飲桮中醁在王晉安酒席散韻碧玉與緑珠張盧復雙女曼聲古難匹長袂世無侣似出鳯凰樓言發瀟湘渚幸有褰裳便含情寄一語為人有贈寒樹棲羈雌月映風復吹逐臣與棄妾零落心可知寶琴徒七絃蘭鐙空百枝顰容不足效嗁妝拭復垂同衾成楚越異國非仳離何生姬人有怨夜風吹熠熠朝光照莫邪幾銷蘼蕪葉空落蒲桃花不堪長織素誰能獨浣紗光陰復何極望促反成賒知君自蕩子柰妾亦倡家鼓瑟曲有所思可憐獨立樹枝輕根易搖已為露所浥復為風所飄錦衾襞不臥端坐夜及朝是妾愁成瘦非君重細腰為人寵姬有怨自知心裏恨還向影中羞回持昔慊慊變作今悠悠還君與妾珥歸妾奉君裘絃斷猶可續心去最難留為人自傷斜光隱西壁暮鵲上南枝風來秋扇屏月出夜鐙吹深心起百際遙淚非一垂徒勞妾辛苦終言君不知秋閨怨張率擬樂府三首相逢夕陰階獨趨尚冠里髙門既如一甲第復相似憑軾日欲昏何處訪公子公子之所在所在良易知青樓出上路漸臺臨曲池堂上撫流徽雷尊朝夕施橘柚芬華實朱火燎金枝兄弟兩三人裾珮紛陸離朝從禁中出車騎並驅馳金鞍瑪瑙勒聚觀路傍兒入門一顧望鳬鵠有雄雌雄雌各數千相鳴戲羽儀並在東西立羣次何離離大婦刺方領中婦抱嬰兒小婦尚嬌稚端坐吹參差丈人無遽起神鳯且來儀相逢行對酒誠可樂此酒復能醇如華良可貴如乳更非珍何以留上客為寄掌中人金尊清復滿玉盌亟來親誰能共遲暮對酒及芳晨君歌當未罷却坐避梁塵對酒逺期終不歸節物坐將變白露愴單棲秋風息團扇誰能乆離别他鄉且異縣浮雲蔽重山相望何時見寄言逺行者空閨淚如霰逺期徐悱詩二首日暮想清陽躡履出椒房網蟲生錦薦遊塵掩玉牀不見可憐影空餘黼帳香彼美情多樂挾瑟坐髙堂豈忘離憂者向隅心獨傷聊因一書札以代九回腸贈内相思上北閣徙倚望東家忽有當軒樹兼含映日花方鮮類紅粉比素若鉛華更使增心憶彌令想狹斜無如一路阻衇衇似雲霞嚴城不可越言折代踈麻對房前桃樹詠佳期贈内費昶一十首閶闔下重關丹墀吐明月秋氣城中冷秋砧城外發浮聲繞雀臺飄響度龍闕婉轉何藏摧當從上路來藏摧意未已定自乘軒裏乘軒盡世家佳麗似朝霞圓璫耳上照方繡領間斜衣薰百和屑鬢搖九枝花昨暮庭槐落今朝羅綺薄拂席巻鴛鴦開縵舒龜鶴金波正容與玉步依砧杵紅袖徃還縈素腕參差舉徒聞不得見獨夜空愁佇獨夜何窮極懐之在心側階垂玉衡露庭舞相風翼􅅹滴流星輝燦爛長河色三冬誠足用五日無糧食揚雲已寂寥今君復弦直華觀省中夜聞城外擣衣芳樹發春暉蔡子望青衣水逐桃花去春隨楊栁歸楊栁何時歸裊裊復依依已蔭章臺陌復掃長門扉獨知離心者坐惜春光違洛陽逺如日何由見宓妃和蕭記室春旦有所思芳郊拾翠人回袖掩芳春金輝起步搖紅彩發吹綸湯湯蓋頂日飄飄馬足塵薄暮髙樓下當知妾姓秦春郊望美人晨暉照杏梁飛鷰起朝妝留心散廣黛輕手約花黄正釵時念影拂絮且憐香方嫌翠色故乍道玉無光城中皆半額非妾畫睂長詠照鏡日淨班姬門風輕董賢館巻耳縁階出反舌登牆喚蠶女桂枝鉤遊童蘇合彈拂袖當留客相逢莫相難陽春發和氣佳人在河内征夫鎮馬邑零露一朝團中夜兩垂泣氣爽牀帳冷天寒針縷澀紅顏本暫時君還詎相及秋夜涼風起和蕭洗馬畫屏風二首妾家五湖口采蔆五湖側玉靣不關妝雙睂本翠色日斜天欲暮風生浪未息宛在水中央空作兩相憶采蔆向夕千愁起自悔何嗟及愁思且歸牀羅襦方掩泣絳樹搖風軟黄鳥弄聲急金屋貯嬌時不言君不入長門后怨巫山光欲晩陽臺色依依彼美巖之曲寧知心是非朝雲觸石起暮雨潤羅衣願解千金珮請逐大王歸巫山髙上林烏欲棲長安日行暮所思鬱不見空想丹墀步簾動憶君來雷聲似車度北方佳麗子窈窕能回顧夫君自迷惑非為妾心妒有所思鼓吹曲二首姚翻詩一首鴈還髙栁北春歸洛水南日照茱萸領風搖翡翠篸桑間視欲暮閨裏遽饑蠶相思君助取相望妾那堪同郭侍郎采桑孔翁歸詩一首長門與長信日暮九重空雷聲聽隠隠車響絶瓏瓏恩光隨妙舞團扇逐秋風鉛華誰不慕人意自難終奉和湘東王教班婕妤徐悱妻劉令嫺詩二首花庭麗景斜蘭牖輕風度落日更新妝開簾對春樹鳴鸝葉中響戲蜨枝邊騖調瑟本要歡心愁不成趣良㑹誠非逺佳期今不遇欲知幽怨多春閨深且暮答外東家挺竒麗南國擅容輝夜月方神女朝霞喻洛妃還看鏡中色比艷自知非摛辭徒妙好連類頓乖違智夫雖已麗傾城未敢希同前何思澄三首寂寂長信晩雀聲哦洞房蜘蛛網髙閣駮蘚被長廊虚殿簾帷静閒階花蘂香悠悠視日暮還復拂空牀奉和湘東王教班婕妤故交不可忘猶如蘭桂芳新知雖可悦不異茱萸香妾有鳯鶵曲非為陌上桑薦君君不御抱瑟自悲涼擬古洛浦疑回雪巫山似旦雲傾城今始見傾國昔曾聞媚服隨嬌合丹唇逐笑分風巻蒲萄帶日照石榴裙自有狂夫在空持勞使君南苑逢美人徐悱一首倡人助漢女靚妝臨月華連針學竝蔕縈縷作開花孀閨絶綺羅攬贈自傷嗟雖言未相識聞道出良家曾停霍君騎經過栁惠車無由一共語蹔看日昇霞答唐孃七夕所穿針玉臺新詠巻六欽定四庫全書玉臺新詠巻七陳徐陵撰梁武帝詩十四首梁簡文帝詩四十三首邵陵王綸詩三首湘東王繹詩七首武陵王紀詩四首梁武帝詩十四首駕言易水北送别河之陽沈思慘行鑣結夢在空牀既寤丹緑謬始知紈素傷中州木葉下邊城應早霜隂蟲日慘烈庭草復云黄冷風但清夜明月懸洞房嫋嫋同宫女助我理衣裳參差夕杵引哀怨秋砧揚輕羅飛玉腕弱翠低紅妝朱顔色已興眄睇目増光擣以一匪石文成雙鴛鴦制握斷金刀薰用如蘭芳佳期乆不歸持此寄寒鄉妾身誰為容思君苦人腸擣衣洛陽有曲陌陌曲不通驛忽逢二少童扶轡問君宅君宅邯鄲右易憶復可知大息組緼絪中息珮陸離小息尚青綺總丱遊南皮三息俱入門家臣拜門垂三息俱升堂㫖酒盈千巵三息俱入户户内有光儀大婦理金翠中婦事么觿小婦獨閒暇調笙遊曲池丈人少徘徊鳯吹方參差擬長安有狹斜十韻圓魄當虚闥清光流思筵筵思照孤影悽怨還自憐臺鏡早生塵匣琴又無絃悲慕屢傷節離憂亟華年君如東榑景妾似西栁煙相去旣路迥明晦亦殊懸願為銅鐡轡以感長樂前擬明月照髙樓幕幕繡户絲悠悠懐音期昔期乆不歸鄉國曠音煇音煇空結遲半寢覺如至旣寤了無形與君隔平生月以雲掩光葉以霜摧老當途競自容莫肯為妾道擬青青河邊草良人與我期不謂當過時秋風忽送節白露凝前基愴愴獨涼枕搔搔孤月帷或聽西北鴈似從寒海湄果銜萬里書中有生離詞惟言長别矣不復道相思胡羊乆剽奪漢節故支持帛上看未終臉下淚如絲空懐之死誓逺勞同穴詩代蘇屬國婦飛鳥起離離驚散忽差池嗷嘈繞樹上翩翻集寒枝旣悲征役乆偏傷壟上兒寄言閨中愛此心詎能知不見松上蘿葉落根不移當春有一草緑花復重枝云是忘憂物生在北堂垂飛飛雙蛺蜨低低兩差池差池低復起此芳性不移飛蜨雙復隻此心人莫知古意二首緑樹始搖芳芳生非一葉一葉度春風芳芳自相接色雜亂參差衆花紛重疊重疊不可思思此誰能愜芳樹髙臺半行雲望望髙不極草樹無參差山河同一色髣髴洛陽道道逺難别識玉階故情人情來共相憶臨髙臺誰言生離乆適意與君别衣上芳猶在握裏書未滅腰中雙綺帶夢為同心結常恐所思露瑤華未忍折有所思種蘭玉臺下氣暖蘭始萌芬芳與時發婉轉迎節生獨使金翠嬌偏動紅綺情二遊何足壊一顧非傾城羞將苓芝侣豈畏鶗鴂鳴紫蘭始萌送别出南軒離思沈幽室調梭輟寒夜鳴機罷秋日良人在萬里誰與共成匹願得一回光照此憂與疾君情儻未忘妾心長自畢織婦白露月下圓秋風枝上鮮瑤臺函碧霧瓊幕生紫煙妙㑹非綺節佳期乃良年玉壺承夜急蘭膏依曉煎昔時悲難越今傷何易旋怨咽雙念斷悽草兩情懸七夕宓妃生洛浦遊女出漢陽妖閑逾下蔡神妙絶髙唐緜駒且變俗王豹復移鄉況兹集靈異豈得無方將長袂必留客清哇咸繞梁燕趙羞容止西妲慙芬芳徒聞珠可弄定自乏明璫戲作梁簡文帝詩四十三首凌晨光景麗倡女鳯樓中前瞻削成小傍望巻旌空分妝開淺靨繞臉傅斜紅張琴未調軫飲吹不全終自知心所愛出入仕秦宫誰言連伊屈更是莫敖通輕軺綴皂蓋飛轡轢雲驄金鞍隨繫尾銜瑣映纒騣戈鏤荆山玉劒餙丹陽銅左把蘇合彈傍持大屈弓控弦因鵲血挽强用牛螉弋獵多登隴酣歌毎入豐暉暉隱落日冉冉還房櫳鐙生陽燧火塵散鯉魚風流蘇時下帳象簟復韜筒霧暗忩前栁寒踈井上桐女蘿託松際甘瓜蔓井東拳拳持君寵嵗暮望無窮艷歌篇十八韻銅梁指斜谷劒道望中區通星上分野作固為下都雅歌因良守妙舞自巴渝陽城嬉樂所劒騎鬱相趨五婦行難至百兩好游娛牲祈望帝祀酒酹蜀侯誅江妃納重聘卓女受將鶵停弦時繫爪息吹更治朱春衫湔錦浪回扇避陽烏聞君握節反賤妾下城隅蜀國絃歌篇十韻名都多麗質本自恃容姿蕩子行未至秋胡無定期玉貌歇紅臉長顰串翠睂籨鏡迷朝色縫針脆故絲本異摇舟咎何關竊席疑生離誰撫背溘死詎成遲毛嬙貌本絶踉蹌入氊帷盧姬嫁日晩非復好年時傳山猶可逐烏白望難期妾心徒自苦傍人㑹見嗤妾薄命篇十韻樂府三首遙看雲霧中刻桷映丹紅珠簾通曉日金花拂夜風欲知聲管處來過安樂宫新成安樂宫季月雙桐井新枝雜舊株晩葉藏棲鳯朝花拂曙烏還看西子照銀牀牽鹿盧雙桐生空井閨閑漏永永漏長宵寂寂草螢飛夜户絲蟲繞秋壁薄笑未為欣微歎還成戚金簪鬢下垂玉箸衣前滴楚妃歎代樂府三首洛陽佳麗所大道滿春光遊童初挾彈蠶妾始提筐金鞍照龍馬羅袂拂春桑玉車争晩入潘果溢髙箱洛陽道楊栁亂成絲攀折上春時葉宻鳥飛礙風輕花落遲城髙短簫發林空畫角悲曲中無别意併為乆相思折楊栁賤妾朝下機正值良人歸青絲懸玉磴朱汗染香衣驟急珍珂響􅘠多塵亂飛雕胡幸可薦故心君莫違紫騮馬和湘東王横吹曲三首南湖荇葉浮復有佳期遊銀綸翡翠釣玉舳芙蓉舟荷香亂衣麝橈聲隨急流南湖岸陰垂栁葉平湖含粉堞好値城傍人多逢蕩舟妾緑水濺長袖浮苔染輕檝北渚宜城斷中道行旅亟流連山妻工織素妖姬慣數錢吹彫留上客貰酒逐神仙大隄雍州十曲抄三首采蓮前岸隈舟子屢徘􅆦荷披衣可識風疎香不來欲知船渡處當看荷葉開蓮舟買荷度相隨照緑水意欲重涼風流搖妝影壊釵落鬢華空佳期在何許徒傷心不同照流看落釵同庾肩吾四詠二首花樹含春叢羅幃夜長空風聲隨篠韻月色與池同彩箋徒自襞無信徃雲中春宵冬朝日照梁含怨下前牀帳褰竹葉帶鏡轉蔆花光㑹是無人見何用早紅妝冬曉和湘東王三韻二首雜蕊映南庭庭中光景媚可憐枝上花早得春風意春風復有情拂幔且開楹開楹開碧煙拂幔拂垂蓮偏使紅花散飄颺落眼前眼亦多無況參差鬱可望珠繩翡翠帷綺幕芙蓉帳香煙出忩裏落日斜階上日影去遲遲節華咸在兹桃花紅若㸃栁葉亂如絲絲條轉暮光影落暮陰長春鷰雙雙舞春心處處傷酒滿心聊足萱枝愁不忘戲作謝惠連體十三韻綺忩臨畫閣飛閣繞長廊風散同心草月送可憐光髣髴簾中出妖麗特非常恥學秦羅髻羞為樓上妝散誕披紅帔生情新約黄斜鐙入錦帳微煙出玉牀六安雙瑇瑁八幅兩鴛鴦猶是别時許留致解心傷含涕坐度日俄頃變炎涼玉關驅夜雪金氣落嚴霜飛狐驛使斷交河川路長蕩子無消息朱唇徒自香倡婦怨情十二韻宻房寒日晩落照度忩邊紅簾遙不隔輕帷半巻懸方知纎手製詎減縫裳妍龍刀横膝上畫尺墮衣前熨斗金塗色簪管白牙纒衣裁合歡襵文作鴛鴦連縫用雙針縷絮是八蠶綿香和麗邱蜜麝吐中臺烟已入琉璃帳兼雜太華氊且共雕鑪暖非同團扇捐更恐從軍别空牀徒自憐和徐録事見内人作臥具麗妲與妖嬙共拂可憐妝同安鬟裏撥異作額間黄羅裙宜細􅂤畫􅓏重髙牆含羞未上砌微笑出長廊取花爭閒鑷攀枝念蕊香但歌聊一曲鳴絃未息張自矜心所愛三十侍中郎戲贈麗人非關長信别詎是良人征九重忽不見萬恨滿心生夕門掩魚鑰宵牀悲畫屏迥月臨忩度吟蟲繞砌鳴初霜霣細葉秋風驅亂螢故妝猶累日新衣襞未成欲知妾不寐城外擣衣聲秋閨夜思美人稱絶世麗色譬花叢雖居李城北住在宋家東教歌公主第學舞漢成宫多遊淇水上好在鳯樓中履髙疑上砌裾開持畏風衫輕見跳脱珠概雜青蟲垂絲繞帷幔落日度房櫳妝忩隔栁色井水照桃紅非憐江浦珮羞使春閨空和湘東王名士悦傾城漢渚水初緑江南草復黄日照蒲心暖風吹梅蕊香征艫艤湯塹歸騎息金隍舞觀衣常襞歌臺絃未張持此横行去誰念守空牀從頓蹔還城昔時嬌玉步含羞花燭邊豈言心愛斷銜嗁私自憐常見歡成怨非關醜易妍獨鵠罷中路孤鸞死鏡前詠人棄妾舞女及燕姬倡樓復蕩婦參差大戾發搖曳小垂手釣竿蜀國彈新城折楊栁玉案西王桃蠡桮石榴酒甲乙羅帳異辛壬房戶暉夜夜有明月時時憐更衣執筆戲書雲楣桂成戶飛棟杏為梁斜忩通蕊氣細隙引塵光裁衣魏后尺汲水淮南牀青驪暮當反預使羅裙香艷歌曲秋風與白團本自不相安新人及故愛意氣豈能寛黄金肘後鈴白玉案前盤誰堪空對此還成無嵗寒怨靄靄夜中霜何關向曉光枕嗁常帶粉身眠不著牀蘭膏盡更益薰鑪滅復香但問愁多少便知夜短長擬沈隱侯夜夜曲秋期此時浹長夜徙河靈紫烟凌鳯羽奔光隨玉軿洛陽疑劒氣成都怪客星天梭織來乆方逢今夜停七夕晩霰飛銀礫浮雲暗未開入池消不積因風墜復來思婦流黄素温姬玉鏡臺看花言可挿定自非春梅同劉諮議詠春雪細樹含殘影春閨散晩香輕花鬢邊墮微汗粉中光飛鳬初罷曲嗁烏忽度行羞令白日暮車馬鬱相望晩景出行垂手忽苕苕飛鷰掌中嬌羅衣恣風引輕帶任情摇詎似長沙地促舞不回腰賦樂府得大垂手捩遲初挑吹弄急時催舞釧響逐弦鳴私回半障柱欲知心不平君看黛睂聚賦樂器名得箜篌可憐初二八逐節似飛鴻懸勝河陽妓闇與淮南同入行看履進轉靣望鬟空腕動苕華玉袖隨如意風上客何須起嗁烏曲未終詠舞楊栁葉纎纎佳人􅈸織縑正衣還向鏡迎春試舉簾摘梅多繞樹覓鷰好窺檐只言逐花草計校應非嫌春閨情珠簾向暮下妖姿不可追花風暗裏覺蘭燭帳中飛何時玉忩裏夜夜更縫衣又三韻借問仙將畫詎有此佳人傾城且傾國如雨復如神漢后憐名鷰周王重姓申挾瑟曾遊趙吹簫屢入秦玉階偏望樹長廊毎逐春約黄出意巧纒弦用法新迎風時引袖避日暫披巾疎花映鬟揷細珮繞衫身誰知日欲暮含羞不自陳率爾為詠北忩向朝鏡錦帳復斜縈嬌羞不肯出猶言妝未成散黛隨眉廣燕脂逐臉生試將持出衆定得可憐名美人晨妝十五正團團流光滿上闌當鑪設夜酒宿客解金鞍迎來挾瑟易送别但歌難詎知心恨急翻令衣帶寛賦得詠當鑪炎光向夕斂促宴臨前池泉深影相得花與靣相宜篪聲如鳥哢舞袂寫風枝歡樂不知醉千秋長若斯林下妓杏梁斜日照餘暉映美人開函脱寶釧向鏡理紈巾游魚動池葉舞鶴散階塵空嗟千嵗久願得及陽春擬落日窻中坐殿上圖神女宫裏出佳人可憐俱是畫誰能辨偽眞分明淨睂眼一種細腰身所可持為異長有好精神美人觀畫孌童嬌麗質賤董復超瑕羽帳晨香滿珠簾夕漏賒翠被含鴛色雕牀鏤象牙妙年同小史姝貌比朝霞袖裁連璧錦箋織細橦花攬袴輕紅出回頭雙鬢斜嬾眼時含笑玉手乍攀花懐猜非後釣密愛似前車足使燕姬妒彌令鄭女嗟孌童邵陵王綸詩三首蕩子從遊宦思妾守房櫳塵鏡朝朝掩寒牀夜夜空若非新有悦何事久西東知人相憶否淚盡夢嗁中代秋胡婦閨怨關情出睂眼軟媚著腰支語笑能嬌媄行步絶逶迤空中自迷惑渠傍㑹不知懸念猶如此得時應若為車中見美人寜為萬里别乍此死生離那堪眼前見故愛逐新移未展春光落遽被秋風吹怨黛舒還歛嗁妝拭更垂誰能巧為賦黄金妾自貲代舊姬有怨湘東王繹詩七首髙樓三五夜流影入丹墀先時留上客夫婿美容姿妝成理蟬鬢笑罷斂娥眉衣香知步近釧動覺行遲如何舞舘樂翻見歌梁悲猶懸北窻櫎未巻南軒帷寂寂空郊暮非復少年時登顏園故閣入堂值小婦出門逢故夫含辭未及吐絞袖且峙􅡨搖兹扇似月掩此淚如珠今懐固無已故情今有餘戲作艷詩燭暗行人靜簾開雲影入風細雨聲遲夜短更籌急能下班姬淚復使倡樓泣况此客遊人中宵空佇立夜遊栢齋新鶯隠葉囀新鷰向窻飛栁絮時依酒梅花乍入衣玉珂逐風度金鞍映日暉無令春色晩獨望行人歸和劉上黄日暮連翩翼俱向上林棲風多前歸駛雲暗後羣迷路逺聲難徹飛斜行未齊應從故鄉返幾過入蘭閨借問倡樓妾何如蕩子妻詠晩棲烏鳥鵲夜南飛良人