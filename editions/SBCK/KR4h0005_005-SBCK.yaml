front:
  text: 玉臺新詠卷之五
  hash: sha256:e1135f08c58eea7033af813a88ce445cde96fd766d90e19a389ea512a8835453
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0005_SBCK_005-1a}
body:
  text: 古體江淹遠與君别者乃至鴈門關黃雲蔽千里逰子何時還送君如昨日簷前露已團不惜蕙草晚所悲道里寒君行在天涯妾心久别離願一見顔色不異瓊樹枝兔絲及水萍所􅀉終不移班婕妤扇紈扇如團月出自機中素􅀞作秦王女乗鸞向煙霧彩色世所重雖新不代故竊悲凉風至吹我玉堦樹君子恩未畢零落在中路張司空離情華秋月映簾櫳懸光入丹墀佳人撫鳴琴清夜守空帷蘭徑少行迹玉臺生網絲庭樹發紅彩閨草含碧滋羅綺爲君整萬里贈所思願垂湛露惠信我皎日期休上人怨别惠休西北秋風至楚客心悠哉日暮碧雲合佳人殊未來露彩方泛艶月華始徘徊寳書爲君掩瑶琴詎能開相思巫山渚悵望陽雲臺金爐絶沈燎綺席徧浮埃桂水日千里因之平生懷敬酬柳僕射征怨丘遲清歌自言妍雅舞空仙仙耳中解眀月頭上落金鈿雀飛且近遠暮入綺羅前魚戯雖􅀯北終還荷葉邊惟見君行久新年非故年荅徐侍中爲人贈婦丈夫吐然諾受命夲遺家糟糠且棄置蓬首亂如麻側聞洛陽客金蓋翼高車謁帝時來下光景不可奢幽房一洞啓二八盡芳華羅裾有長短翠鬂無低斜長眉横玉臉皓腕卷輕紗俱看依井蝶共取落簷花何言征戌苦抱脉空咨嗟登高望春沈約登高眺京洛街巷紛漠漠廻首望長安城闕欝盤桓日出照鈿黛風過動羅紈齊童躡朱履趙女揚翠翰春風摇雜樹葳㽔綠且丹寳瑟玟瑰柱金覊玳瑁鞍淹留宿下蔡置酒過上蘭觧眉還復歛方知巧笑難佳期空靡靡含睇未成歡嘉客不可見因君􅀉長歎昭君辭朝發披香殿夕濟汾隂河於玆懷九逝自此歛双蛾沾粧疑湛露繞臆狀流波日見奔沙起稍􅁴轉蓬多胡風犯肌骨非􅀡傷綺羅銜涕強南望關山欝嵯峨試作陽春曲終成苦寒歌唯有三五夜明月暫經過少年新婚爲之詠山隂柳家女薄言岀田墅丰容好姿顏便僻巧言語腰肢旣軟弱衣服亦華楚紅輪映早寒􅀞扇迎初暑錦履並花紋繡帶同心苣羅襦金薄厠雲鬂花􅁫舉我情已鬱紆何用表﨑嶇託意眉間黛申心口上朱莫爭三春價坐喪千金軀盈尺靑銅鏡九寸合浦珠無因達徃意欲􅀉雙飛鳧裾開見玉趾衫薄映凝膚羞言趙飛燕笑殺秦羅敷自顧雖悴薄冠蓋曜城隅高門列騶駕廣路從驪駒何慚鹿盧劒詎减府中趨還家問鄕里詎堪持作夫携手曲捨轡下彫輅更衣奉玉牀斜簪映秋水開鏡比春粧所畏紅顏促君恩不可長雞冠且容裔豈􅈔桂枝亡有所思西征登隴首東望不見家關樹抽紫葉塞草發青芽昆明池欲滿蒲萄應作花流淚對漢使因書􅀉斜狹夜夜曲河漢縱且橫北斗横復􅀡星漢空如此寧知心有憶􅀌燈曖不眀寒機曉猶織零淚向誰道雞鳴徒歎息詠春楊柳亂如絲綺羅不自持春草青復綠客心傷此時翠苔已結洧碧水復盈淇日華照趙瑟風色動燕􅁎衿前萬行淚故是一相思詠桃風來吹葉動風去畏花傷紅映已照灼况復含日光歌童暗理曲㳺女夜縫裳詎减當春淚能斷思人腸詠月月華臨靜夜夜靜㓕氛埃方暉竟戶入圓影隟中來高樓切思婦西園㳺上才網軒映珠綴應門照綠苔洞房殊未曉清光信悠哉詠篪江南簫管地妙響發孫枝慇懃􅀉玉指含情舉復垂彫梁再三繞輕塵四五移曲中有深意丹誠君詎知六憶詩四首三言五言憶來時灼灼上堦墀勤勤叙别離慊慊道相思相看常不足相見乃忘飢憶坐時黯黯羅帳前或歌四五曲或弄兩三絃笑時應無比嗔時更可憐憶食時臨盤動容色欲坐復羞坐欲食復羞食含哺不如飢擎甌似無力憶眠時人眠彊未眠解羅不待勸就枕更須牽復恐傍人見嬌羞在燭前領邊繡纎手製新竒刺作可憐儀縈絲飛鳳子結縷坐花兒不聲如動吹無風自褭枝麗色儻未歇聊承雲􅁂垂脚下履丹墀上颯沓玉殿下趨鏘逆轉珠珮響先表繡袿香裾開臨舞席袖拂繞歌堂所歎亡懷妾見委入羅牀擬靑靑河邊草漠漠牀上塵中心憶故人故人不肯憶中夜長歎息歎息想容儀不欲長别離别離稍已久空牀􅀉杯酒擬三婦大婦掃玉墀中婦結羅幃小婦獨無事對鏡盡娥眉良人且安臥夜長方自􅀻古意挾瑟叢臺下徙􅀝愛容光佇立日巳暮戚戚苦人腸露葵已堪擿湛水未沾裳錦衾無獨暖羅衣空自香明月雖外照寧知心内傷夢見美人夜聞長歎息知君心有憶果自閶闔開魂交覩容色旣薦巫山枕又奉齊眉食立望復橫陳忽􅁴非在側那知神傷者潺湲淚沾臆効古可憐桂樹枝單雄憶故雌歲暮異栖宿春至猶别離山河隔長路路遠絶容儀豈云無我匹寸心終不移初春挾道覔陽春佳人共携手草色猶自非林中都未有無事逐梅花空中信楊柳且復共歸來含情􅀉杯酒悼往去秋三五月今秋還照房今春蘭􅈍草來春復吐芳悲哉人道異一謝永銷亡屏筵空有設帷席更施張逰塵掩虚座孤帳覆空牀萬事無不盡徒令存者傷擣衣詩孤衾紛思緒獨枕愴憂端深庭秋草綠高門白露寒思君起清夜促柱奏幽蘭不怨飛蓬苦徒傷蕙草殘行役滯風波㳺人淹不歸亭臯木葉下壠首秋雲飛寒園夕鳥集思牖草虫悲嗟矣當春服安見禦冬衣鶴鳴勞永歎採菉傷時暮念君方遠徭望妾理紈素秋風吹綠潭眀月懸高樹佳人􅅚淨容招携從所務歩欄杳不極離堂肅已扃軒高夕杵散氣爽夜碪鳴瑶草隨歩響幽蘭逐袂生踟躕理金翠容與納宵清泛艶廻煙綵淵旋亀鶴文凄凄合歡袖冉冉蘭麝芬不怨杼軸苦所悲千里分垂泣送行李傾首遲歸雲鼓吹曲二首獨不見别島望風臺天淵臨水殿芳草生未積春花落如霰出從張公子還過趙飛燕奉帚長信宮誰知獨不見度關山少長倡家女出入燕􅀯垂唯持德自美本以容見知舊聞關山逺何事摠金覊妾心日已亂秋風鳴細枝雜詩雲輕暮色轉草綠晨芳歸山墟罷寒晦園澤潤朝暉春心多感動覩物情復悲自君之去矣蘭堂罷鳴機徒知㳺宦是不念别離非長門怨玉戶夜愔愔應門重且深秋風動桂樹流月摇輕隂綺簷清露滴網戶思虫吟歎息下蘭閤含愁奏雅琴何由鳴曉佩復得抱宵衾無復金屋念豈照長門心江南曲汀洲採白蘋日暖江南春洞庭有歸客瀟湘逢故人故人何不返春華復􅀅晚不道新知樂秪言行路遠起夜來城南斷車􅀐閣道覆清埃露華光翠網月影入蘭臺洞房且莫掩應門或復開颯颯秋桂響非君起夜來七夕穿針代馬秋不歸緇紈無復緒迎寒理夜縫映月抽纎縷的皪愁睇光連娟思眉聚清露下羅衣三風吹玉柱流隂稍已多餘光欲難取詠席照日汀洲際摇風綠潭側雖無獨蠒輕幸有靑袍色羅袖少輕塵象牀多麗節願君蘭夜飮佳人時宴息詠歌􅁎江洪寳鑷間珠花分明靚粧􅀧薄􅁂約微黃輕紅澹􅉢臉發言芳已馳復加蘭蕙染浮聲易傷歎沈唱安而險􅀌轉忽徘徊雙蛾乍舒歛不持全示人半用輕紗掩舞女腰纎蔑楚媛體輕非趙􅁎映襟閴寳粟緣肘挂珠絲發袖已成態動足復含姿斜睛􅀂不眄當轉復遲疑何慙雲鶴起詎减鳳驚時詠紅牋雜彩何足竒惟紅偏作可灼爍􅀋蕖開輕明似霞破鏤質卷芳脂裁花承百和且傳别離心復是相思裏不値情牽人豈識風流座詠薔薇當戸種薔薇枝葉太葳㽔不摇香巳亂無風花自飛春閨不能靜開匣理眀妃曲池浮采采斜岸列依依或聞好音度時見銜泥歸且對清觴湛其餘任是非詠鏡高爽初上鳳皇墀此鏡照蛾眉言照長相守不照長相思虛心㑹不採貞明空自欺無言故此物更復照新期詠畫扇鮑子􅀸新絲本自輕弱綵何足眄􅀡爲發紅顏謬成握中扇乍奉長門泣時承柏梁宴思粧開已歌掩容隱而見但􅀞双黃鵠莫作孤飛燕詠玉階玉階已夸麗復得臨紫微北戶接翠幄南路抵金扉重疉通日影參差藏月輝輕苔染珠履微㶑拂羅衣獨笑崑山曲空見靑鳧飛學謝體何子朗桂臺清露拂銅陛落花沾美人紅粧羅攀鉤捲細簾思君暫促柱玉指何纎纎未應爲此别無故坐相嫌和虞記室騰古意美人弄白日灼灼當春牖清鏡對蛾眉新花映玉手燕下拾池泥風來吹細柳君子何時歸與我酌樽酒和繆郎視月清夜未亡疲細簾聊可發泠泠玉潭水映我蛾眉月靡靡露方垂輝輝光稍沒佳人復千里餘影徒揮忽詠歩摇花范靖婦珠華縈翡翠寳葉間金瓊剪荷不似製爲花如自生低枝拂繡領微歩動瑶玦但令雲髻揷蛾眉本易成戯繡娘眀珠翠羽帳金薄綠綃帷因風時暫舉想象見芳姿清晨揷歩摇向晚解羅衣託意風流子佳情詎可􅀻詠五彩竹火籠可憐潤霜質纎剖復豪分織作廻風苣製爲縈綺文含芳出珠被曜彩接緗裙徒嗟今麗飾豈念昔凌雲詠燈綺筵日巳暮羅幃月未歸開花散鵠采含光出九微風軒動丹熖冰宇澹清暉不畏輕蛾繞唯恐曉蠅飛日夕望江贈魚司馬何遜湓城帶湓水湓水索如帶日夕望高城􅆌􅆌靑雲外城中多宴賞絲竹常繁㑹管聲已流悅絃聲復凄切歌黛慘如愁舞腰疑欲絶仲秋黃葉下長風正騷屑早鴈出雲飛故燕辭簷别晝悲在異縣夜夢還洛汭洛汭何悠悠起望登西樓的的帆向浦團團日隱洲誰能一羽化輕舉逐飛浮擬輕蒲篇城東美少年重身輕萬億柘彈隨珠丸白馬黃金勒長安九逵上青槐䕃道植轂擊晨已喧肩排暝不息走狗通西望牽牛亘南􅀡相期百戯傍去來三市側象牀沓繡被玉盤傅綺食大婦掩扇歌小婦開簾織相看獨隱笑見人還歛色黃鶴悲故群山枝詠初識鳥飛過客盡雀聚行龍匿酌羽方猒猒此時歡未極詠照鏡珠簾旦初捲綺羅朝未織玉匣開鑒形寳臺臨凈飾對影獨含笑看花空轉側聊爲出蠒眉試染桃夭色羽􅁫如可間金鈿畏相逼蕩子行未歸啼粧坐沾臆閨怨曉河沒高棟斜月半空庭窓中度落葉􅄕外隔飛螢含情下翠帳掩涕閉金屏昔期今末反春草寒復青思君無轉易何異北辰星詠七夕仙車駐七襄鳳駕出天潢月照九微火風吹百和香來歡暫巧笑還涙已啼粧依稀猶洛汭侯忽似高唐别離不得見河漢漸湯湯詠舞管清羅薦合絃驚雪袖遲逐唱廻纎手聽曲轉蛾眉凝情盼墮珥微睇託含辭日暮留嘉客相看愛此時看新婦霧夕蓮出水霞朝日照梁何如花燭夜輕扇掩紅粧良人復灼灼席上自生光所悲高駕動環珮岀長廊詠倡家皎皎高樓暮華燭帳前眀羅帷雀􅁫影寳瑟鳳雛聲夜光枝上發新月霧中生誰念當窓牖相望獨盈盈詠白鷗嘲别者可憐雙白鷗朝夕水上浮何言異䄽息雌住雄不􅅏􅀌飛出嶼浦獨宿下滄洲東西從此去影響絶無由學靑靑河邊草春園日應好折花望遠道秋夜苦復長抱枕向空􅇃吹樓下促節不言於此别歌筵掩團扇何時一相見絃絶猶依軫葉落裁下枝即此雖云别方我未成離嘲劉諮議孝綽房櫳㓕夜火窓戶映朝光妖女褰幃出蹀􅉜初下牀雀􅁫横曉鬂蛾眉艶宿粧稍聞玉釧逮猶憐翠被香寧知早朝客差池巳鴈行古意應蕭信武歌王樞朝取飢蚕食夜縫千里衣復聞南陌上日暮採蓮歸靑苔覆寒井紅藥間靑薇人生樂自極良時徒見違何由及新燕双双還共飛至烏林村見採桑者因有贈遥見提筐下翩妍實端妙􅀅去復回身欲語先爲笑閨中初别離不許覔新知空結茱茰帶敢報木蘭枝徐尚書座賦得阿憐紅蓮披早露玉貌映朝霞飛燕啼粧罷顧歩揷餘花溘匝金鈿滿參差繡領斜暮還垂瑶帳香燈照九華秋閨有望􅁃丹耿耿橫天漢飄飄出岫雲月斜樹倒影風至水廻文已泣機中婦復悲堂君上羅襦曉長襞翠被夜徒薰空汲銀牀井誰逢金縷裙所思竟不至持酒清夜分夜夢還家歸飛夢所憶共子汲寒􅄴銅瓶素絲綆綺井白銀牀雀出丰茸樹虫飛玳瑁梁離人不相見爭忍對春光潘岳黃門述哀靑春速天機素秋馳白日美人歸重泉悽愴無終畢殯宮已肅清松柏轉蕭索俯仰未能弭尋念非但一拊衿悼寂寞怳然若有失明月入綺窓髣髴想蕙質消憂非萱草永懷􅀉夢寐夢寐復冥冥何由覿爾形我慙北海術爾無帝女靈願言岀遠山徘徊泣松銘雨絶無還雲華落豈留英日月方代序寢興何時平玉臺新詠卷之五玉臺新詠目錄卷之五江淹四首丘遲二首沈約二十四首柳惲九首江洪四首高爽一首鮑子􅀸二首何子朗三首范倩婦四首何遜一一十首王樞三首􅁃丹二首
