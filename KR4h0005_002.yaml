body:
  text: 魏文帝於清河見挽船士新婚與妻別與君結新婚宿昔當別離涼風動秋草蟋蟀鳴相隨冽冽寒蟬吟蟬吟抱枯枝枯枝時飛揚身體忽遷移不悲身遷移但惜歲月馳歲月無窮極會合安可知願為雙黃鵠比翼戲清池清河方舟戲長水湛淡自浮沉絃歌發中流悲響有餘音音聲入君懷悽愴傷人心心傷安所念但願恩情深願為晨風鳥雙飛翔北林樂府塘上行蒲生我池中其葉何離離傍能行仁義莫若妾自知衆口鑠黃金使君生別離念君去我時獨愁常苦悲想見君顏色感結傷心脾念君常苦悲夜夜不能寐莫以賢豪故棄捐素所愛莫以魚肉賤棄捐葱與薤莫以麻枲賤棄捐菅與蒯出亦復苦愁入亦復苦愁邊地多悲風樹木何修修從君致獨樂延年壽千秋雜詩二首並序王宋者平虜將軍劉勳妻也入門二十年後勳悅山陽司馬氏女以宋無子出之還於道中作詩翩翩床前帳張以蔽光輝昔將爾同去今將爾同歸緘藏篋笥裏當復何時披誰言去婦薄去婦情更重千里不唾井況乃昔所奉遠望未為遙踟蹰不得往雜詩五首明月照高樓流光正徘徊上有愁思婦悲歎有餘哀借問歎者誰言是客子妻君行踰十年孤妾當獨栖君若清路塵妾若濁水泥浮沉各異勢會合何時諧願為西南風長逝入君懷君懷時不開妾心當何依西北有織婦綺縞何繽紛明晨秉機杼日莫不成文太息終長夜悲嘯入青雲妾身守空房良人行從軍自期三年歸今已歷九春孤鳥繞林翔噭噭鳴索群願為南流景馳光見我君微陰翳陽景清風飄我衣遊魚潛淥水翔鳥薄天飛眇眇客行去遙役不得歸始出嚴霜結今夜白露晞遊子歎黍離處者歌式微慷慨對嘉賓悽愴內傷悲攬衣出中閨逍遙步兩楹閒房何寂寞緑草被階庭空室自生風百鳥翔南征春思安可忘憂戚與我并佳人在遠道妾身獨單煢歡會難再遇蘭芝不重榮人皆棄舊愛君豈若平生寄松為女蘿依水如浮萍束身奉襟帶朝夕可墮傾儻願終盻盻永副我中情南國有佳人容華若桃李朝遊江北岸夕宿湘川沚時俗薄朱顏誰為發皓齒俯仰歲將暮榮曜難永恃美女篇美女妖且閒採桑岐路間長條紛冉冉落葉何翩翩攘袖見素手皓腕約金環頭上金雀叉腰珮翠琅玕明珠交玉體珊瑚間木難羅衣何飄飄輕裙隨風還顧盻為光彩長嘯氣若蘭行徒用息駕休者以忘飱借問女安居乃在城南端青樓臨大路高門結重關容華輝朗日誰不希令顏媒氏何所營玉帛不時安佳人慕高義求賢良獨難衆人何嗷嗷安知彼所歡盛年處房室中夜起長歎種葛篇種葛南山下葛蔓自成陰與君初婚時結髮恩義深歡愛在枕席宿昔同衣衾竊慕棠棣篇好樂如瑟琴行年將晚暮佳人懷異心恩絶曠不接我情遂抑沉出門當何顧徘徊步北林下有交頸獸仰見雙栖禽攀枝長歎息淚下沾羅襟良馬知我愁延頸對我吟昔為同池魚今若商與參往古皆歡遇我獨困於今棄置委天命悲愁安可任浮萍篇浮萍寄清水隨風東西流結髮辭嚴親來為君子逑恪勤在朝夕無端獲罪尤在昔蒙恩惠和樂如瑟琴何意今摧頽曠若商與參茱萸自有芳不若桂與蘭新人雖可愛無若故人歡行雲有反期君恩儻中還慊慊仰天嘆愁心將何訴日月不常處人生忽若寓悲風來入懷淚落如垂露小篋造裳衣裁縫紈與素棄婦詩石榴植前庭緑葉搖縹青丹華灼烈烈帷彩有光榮光好曄流離可以處淑靈有鳥飛來集樹翼以悲鳴夫何為丹華丹華實不成拊心長歎息無子當歸寧有子月經天無子若流星天月相終始流星沒無精栖遲失所宜下與瓦石并憂懷從中來歎息通雞鳴返側不能寐逍遙於前庭踟蹰還入房肅肅帷幕聲褰幃更攝帶撫弦彈素箏慷慨有餘音要妙悲且清收淚長歎息何以負神靈招搖待霜露何必春夏成晚穫為良實願君且安寧樂府二首昭昭素明月暉光燭我床憂人不能寐耿耿夜何長微風衝閨闥羅帷自飄揚攬衣曳長帶縱屣下高堂東西安所之徘徊以傍徨春鳥何南飛翩翩獨翱翔悲聲命儔匹哀鳴傷我腸感物懷所思泣涕忽沾裳佇立吐高吟舒憤訴窮蒼種瓜東井上冉冉自踰垣與君新為婚瓜葛相結連寄託不肖軀有如倚太山菟絲無枝株蔓延自登緣萍藻託清流常恐身不全被蒙丘山惠賤妾執拳拳天日昭知之想君亦俱然詠懷詩二首二妃游江濱逍遙從風翔交甫解環佩婉孌有芬芳猗靡情歡愛千載不相忘傾城迷下蔡容好結中腸感激生憂思萱草樹蘭房膏沐為誰施其雨怨朝陽如何金石交一旦更離傷昔日繁華子安陵與龍陽夭夭桃李花灼灼有輝光悅懌若九春磬折似秋霜流眄發媚姿言笑吐芬芳攜手等歡愛宿昔同衾裳願為雙飛鳥比翼共翱翔丹青著明誓永世不相忘樂府七首青青河邊草悠悠萬里道草生在春時遠道還有期春至草不生期盡歎無聲感物懷思心夢想發中情夢君如鴛鴦比翼雲間翔既覺寂無見曠如參與商夢君結同心比翼遊北林既覺寂無見曠如商與參河洛自用固不如中嶽安回流不反反浮雲往自還悲風動思心悠悠誰知者懸景無停居忽如馳駟馬傾耳懷音響轉目淚雙墮生存無會期要君黃泉下苦相篇豫章行苦相身為女卑陋難再陳兒男當門戶墮地自生神雄心志四海萬里望風塵女育無欣愛不為家所珍長大逃深室藏頭羞見人垂淚適他鄉忽如雨絶雲低頭和顏色素頰結朱唇跪拜無復數婢妾如嚴賓情合同雲漢葵藿傾陽春心乖甚水火百惡集其身玉顏隨年變丈夫多好新昔為形與影今為胡與秦胡秦時相見一絶踰參辰艷歌行有女懷芬芳提提步東廂蛾眉分翠羽明目發清揚丹唇翳皓齒秀色若圭璋巧笑露歡靨衆媚不可詳容儀希世出無乃古毛嬙頭安金步搖耳繫明月璫珠環約素腕翠爵垂鮮光文袍綴藻黼玉體映羅裳容華既以艷志節擬秋霜徽音冠青雲聲響流四方妙哉英媛德宜配侯與王靈應萬世合日月時相望媒氏陳束帛羔鴈鳴前堂百兩盈中路起若鸞鳳翔凡夫徒踴躍望絶殊參商朝時篇怨歌行昭昭朝時日皎皎晨明月十五入君門一別終華髮同心忽異離曠如胡與越胡越有會時參辰遼且闊形影雖髣佛音聲寂無達纖絃感促柱觸之哀聲發情思如循環憂來不可遏塗山有餘恨詩人詠采葛蜻蛚吟床下回風起幽闥春榮隨露落芙蓉生木末自傷命不遇良辰永乖別已爾可奈何譬如紈素裂孤雌翔故巢星流光景絶魂神馳萬里甘心要同穴明月篇皎皎明月光灼灼朝日輝昔為春繭絲今為秋女衣丹唇列素歲翠彩發蛾眉嬌子多好言歡合易為姿玉顏盛有時秀色隨年衰常恐新間舊變故興細微浮萍無根本非水將何依憂喜更相接樂極還自悲秋蘭篇秋蘭蔭玉池池水清且芳芙蓉隨風發中有雙鴛鴦雙魚自踴躍兩鳥時回翔君期歷九秋與妾同衣裳西長安行所思兮何在乃在西長安何用存問妾香䙞雙珠環何用重存問羽爵翠琅玕今我兮聞君更有兮異心香亦不可燒環亦不可沉香燒日有歇環沉日自深和班氏詩秋胡納令室三日宦他鄉皎皎潔婦姿泠泠守空房嬿婉不終久別如參與商憂來猶四海易感難可防人言生日短愁者苦夜長百草揚春華攘腕採柔桑素手尋繁枝落葉不盈筐羅衣翳玉體回目流彩章君子倦仕歸車馬如龍驤精誠馳萬里既至兩相忘行人悅令色請息此路傍誘以逢郎喻遂下黃金裝烈烈貞女忿言辭厲秋霜長驅及君室奉金升北堂母立呼婦來歡情樂未央秋胡見此婦惕然懷探湯負心豈不慚永誓非所望清濁自異源鳧鳳不並翔引身赴長流果哉潔婦腸彼夫既不淑此婦亦太剛情詩五首北方有佳人端坐鼓鳴琴終晨撫管絃日夕不成音憂來結不解我思存所欽君子尋時役幽妾懷苦心初為三載別於今久滯淫昔柳生戶牖庭內自成陰翔鳥鳴翠偶草蟲相和吟心悲易感激俯仰淚流襟願託晨風翼束帶侍衣衾明月曜清景曨光照玄墀幽人守靜夜回身入空帷束帶俟將朝廓落晨星稀寐假交精爽覿我佳人姿巧笑媚歡靨聯娟眸與眉寐言增長歎悽然心獨悲清風動帷簾晨月燭幽房佳人處遐遠蘭室無容光襟懷擁虛景輕衾覆空床居歡惜夜促在戚怨宵長撫枕獨吟歎綿綿心內傷君居北海陽妾在江南陰懸邈修途遠山川阻且深承歡注隆愛結分投所欽銜恩守篤義萬里託徵心遊目四野外逍遙獨延佇蘭蕙緣清渠繁華蔭緑墅佳人不在茲取此欲誰與巢居覺風飄穴處識陰雨未曾遠別離安知慕儔侶雜詩二首逍遙遊春宮容與緑流阿白蘋開素葉朱草茂丹華微風搖茝若層波動芰荷榮彩曜中林流馨入綺羅王孫遊不歸修路邈以遐誰與玩遺芳佇立獨咨嗟荏苒日月運寒暑忽流易同好遊不存苕苕遠離析房櫳自來風戶庭無行迹蒹葭生床下蛛蝥網四璧懷思豈不隆感物重鬱積遊鴈比翼翔歸鴻知接翮來哉彼君子無愁徒自隔內顧詩二首靜居懷所歡登城望四澤春草鬱青青桑柘何奕奕芳林振朱榮淥水激素石初征冰未泮忽焉袗絺綌漫漫三千里苕苕遠行客馳情戀朱顏寸陰過盈尺夜愁極清晨朝悲終日夕山川信悠永願言良弗獲引領訊歸雲沉思不可釋獨悲安所慕人生若朝露綿邈寄絶域眷戀想平素爾情既來追我心亦還顧形體隔不達精爽交中路不見山下松隆冬不易故不見陵澗柏歲寒守一度無謂希見疏在遠分彌固悼亡詩二首苒荏冬春謝寒暑忽流易之子歸窮泉重壤永幽隔私懷誰克從淹留亦何益僶俯恭朝命回心返初役望廬思其人入室想所歷幃屏無髣佛翰墨有餘迹流芳未及歇遺挂猶在壁悵恍如或存回遑忡驚惕如彼翰林鳥雙栖一朝隻如彼遊川魚比目中路析春風緣隙來晨霤依簷滴寢息何時忘沉憂日盈積庶幾有時衰莊缶猶可擊皎皎窗中月照我室南端清商應秋至溽暑隨節闌凜凜涼風升始覺夏衾單豈曰無重纊誰與同歲寒歲寒無與同朗月何朧朧展轉眄枕席長簞竟床空床空委清塵室虛來悲風獨無李氏靈倣佛覩爾容撫襟長歎息不覺涕沾胸沾胸安能已悲懷從中起寢興自存形遺音猶在耳上慚東門吳下愧蒙莊子賦詩欲言志零落難具紀命也可奈何長戚自令鄙王昭君辭並序王明君者本為王昭君以觸文帝諱故改胸奴盛請婚於漢元帝詔以後宮良家子明君配焉昔公主嫁烏孫令琵琶馬上作樂以慰其道路之思其送明君亦必爾也其新造之曲多哀聲故敘之於紙云爾我本漢家子將適單于庭辭訣未及終前驅已抗旌僕御涕流離轅馬為悲鳴哀鬱傷五內泣淚沾珠瓔行行日已遠乃造胸奴城延我於穹盧加我閼氏名殊類非所安雖貴非所榮父子見陵辱對之慚且驚熬身良未易默默以苟生苟生亦何聊積思常憤盈願假飛鴻翼棄之以遐征飛鴻不我顧佇立以屏營昔為匣中玉今為糞上英朝華不足歡甘為草秋并傳語後世人遠嫁難為情嬌女詩吾家有嬌女皎皎頗白晳小字為紈素口齒自清歷鬢髮覆廣額雙耳似連璧明朝弄梳臺黛眉類掃跡濃朱衍丹唇黃吻瀾漫赤嬌語若連瑣忿速乃明㦎握筆利彤管篆刻未期益執書愛綈素誦習矜所獲其姊字惠芳兩目燦如畫輕粧喜樓邊臨鏡忘紡績舉觶擬京兆立的成復易玩弄眉頰間劇兼機杼役從容好趙舞延袖像飛翮上下絃柱際文史輒卷襞顧眄屏風畫如見已指擲丹青日塵暗明義為隱賾馳騖翔園林果下皆生摘紅葩掇紫蒂萍實驟抵擲貪華風雨中倏忽數百適務躡霜雪戲重綦常纍積并心注肴饌端坐理盤槅翰墨戢閒按相與數離逖動為爐鉦屈屣履往之適止為荼菽據吹吁對鼎䥶脂膩漫白袖烟熏染珂錫衣被皆重施難與沉水碧任其孺子意羞受長者責瞥聞當與杖掩淚俱向壁
