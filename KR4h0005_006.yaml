body:
  text: 吳均採桑賤妾思不堪採桑渭城南帶減連枝繡髮亂鳳皇篸花舞依長薄蛾飛愛緑潭無由報君信流涕向春蠶妾本倡家女出入魏王宮既得承雕輦亦在更衣中蓮花銜青雀寶粟鈿金蟲猶言不得意流涕憶遼東春草攏可結妾心正斷絶緑鬢愁中改紅顏啼裏滅非獨淚成珠亦見珠成血願為飛鵲鏡翩翩照離別何處報君書隴右五岐路淚研兔枝墨筆染鵝毛素碧浮孟渚水香下洞庭路應歸遂不歸芳草空擲度妾家橫塘北發豔小長干花叉玉腕轉珠繩金絡丸羃䍥懸青鳳逶迤搖白團誰堪久見此含恨不相看胸奴數欲盡僕在玉門關蓮花穿劍鍔秋月掩刀環春機鳴窈窕夏鳥思綿蠻中人坐相望狂夫終未還古意與柳惲相贈答六首黃鸝飛上苑緑芷出河洲日映昆明水春生乾鵲樓飄揚白花舞瀾漫紫萍流書織回文錦無因寄隴頭思君甚瓊樹不見方離憂鳴鞭適大阿聯翩渡漳河燕姬及趙女挾瑟夜經過纖腰曳廣袖半額畫長蛾客本倦游者箕帚在江沱故人不可棄新知空復何離君苦無樂回暮心悽悽要途訪趙使聞君仕執圭杜蘅色已發菖蒲葉未齊羃䍥蠶餌繭差池燕吐泥願逐春風去飄蕩至遼西白日隱城樓徑風掃寒木離杼隔東西執手異涼燠相思咽不言洞房清且肅歲去甚流煙時來如轉軸別鶴千里飛孤雌夜未宿閨房宿已靜落月有餘輝寒蟲隱壁思秋蛾繞燭飛絶雲斷更合離禽去復歸佳人今何在迢遞江之沂一為別鶴棄千里淚沾衣秋雲靜晚天寒夜方綿綿聞君吹急管相思雜採蓮別離未幾日高月三成弦蹀疊黃河浪嘶昌隴頭蟬寄書蘼蕪葉插著叢臺邊擬古四首陌上桑嫋嫋陌上桑蔭陌復垂塘長條映白日細葉隱鸝黃蠶飢妾復思拭淚且提筐故人寧知此離恨煎人腸秦王卷衣咸陽春草芳秦帝卷衣裳玉檢茱萸匣金泥蘇合香初芳薰復帳餘輝曜玉堂當須宴朝罷持此贈華陽採蓮錦帶雜花鈿羅衣垂緑川問子今何去出採江南蓮遼西三千里欲寄無因緣願君早旋返及此荷葉鮮攜手艷裔陽之春攜手清洛濱雞鳴上林花薄暮小平津長裙薄白日廣袖帶芳塵故交一如此新知詎憶人贈杜容成一燕海上來一燕高臺息一朝所逢遇依然舊所識問我來何遲山川幾紆直答言海路長風多飛無力昔別縫羅衣春風初入帷今來夏欲曉桑蛾薄樹飛春詠春從何處來拂衣復驚梅雲障青瑣闥風吹承霧臺美人隔千里羅幃關不開無由得共語空對相思杯去妾贈前夫棄妾在河橋相思復相遼鳳凰簪落髮蓮華帶緩腰腸從別處斷貌在淚中消願君憶疇昔片言時見饒詠小年董生唯巧笑子都信美目百萬市一言千金買相逐不道參差菜詣諭窈窕淑願君捧繡被來就越人宿春怨四時如湍水奔飛競回復夜鳥響嚶嚶朝花照煜煜厭見花成子多看筍為竹萬里斷音書十載異栖宿積愁落芳鬢長啼壞美目君去往榆關妾留住亟谷唯對昔耶房如鬼蜘蛛屋獨喚響相酬還時影自逐象床易氈簟羅衣變單復幾度過風霜猶能保煢獨月夜詠陳南康新有所納二八人如花三五月如鏡開簾一種色當戶兩相映重價出秦韓高名入燕鄭十城屢請笏千金幾爭騁君意自能專妾心本無競見貴者初迎盛姬聊為之詠久想專房麗未見傾城者千金訪繁華一朝遇容冶家本薊門外來戲叢臺下長卿幸未匹文君復新寡與司馬治書同聞鄰婦夜織洞房風已激長廊月復清藹藹夜庭廣飄飄曉帳清雜聞百蟲思偏傷一息聲鳥聲長不息妾心復何極猶恐君無衣夜夜當窗織夜愁簷露滴為珠池冰合成璧萬行朝淚瀉千里夜愁極孤帳閉不開寒膏盡復益誰知心眼亂看朱忽成碧春閨有怨愁來不理鬢春至更攢眉悲看蛺蝶粉泣望蜘蛛絲月映寒蛩褥風吹翡翠帷飛鱗難托意駃翼不綴思搗衣足傷金管處多愴緹光促露團池上紫風飄庭裏緑下機騖西眺鳴砧遽東旭芳汗似蘭湯雕金辟龍燭散度廣陵音摻寫漁陽曲別鶴悲不已離鸞斷更續尺素在魚腸寸心憑鴈足為人述夢工知想成夢未信夢如此皎皎無片非的的一皆是以親芙蓉褥方開合歡被雅步極嫣妍含辭恣委靡如言非倏忽不意成俄爾及寤盡空無方知悉虛詭為人傷近不見嬴女鳳凰樓漢姬柏梁殿詎勝仙將死音容猶可見我有一心人同鄉不異縣異縣不成隔同鄉更脈脈脈脈如牛女何由得一語為何庫部舊姬擬蘼蕪之句出戶望蘭薰褰簾正逢君斂容才一訪新知詎可聞新人含笑近故人含淚隱妾意在寒松君心逐朝槿在王晉安酒席數韻窈窕宋華容但歌有清曲轉盻非無時斜扇還相矚詎減許飛瓊絶勝劉碧玉何因送款款伴飲杯中醁為人有贈碧玉與緑珠張盧復雙女曼聲古難匹長袂世無侶似出鳳凰樓言發瀟湘渚幸有褰衣便含情寄一語何生姬有怨寒樹棲羈此月映風復吹逐臣與棄妾零落心可知寶琴徒七絃蘭燈空柏枝顰容不足效啼粧拭復垂同衾非楚越異國非此離鼓瑟曲有所思夜風吹熠耀朝光照昔耶幾銷蘼蕪葉空見蒲桃花不堪長織素誰能獨浣紗光陰復何極望促反成賖知君亦蕩子奈妾亦倡家為人寵姬有怨可憐獨立樹枝輕根亦搖已為露所浥復為風所飄錦衾襞不臥端坐夜及朝是妾愁成瘦非君重細腰為人自傷自知心裏恨還向影中羞回持昔慊慊變作今悠悠還君與妾珥歸妾奉君裘斷絃猶可續心去最難留秋閨怨斜光隱西壁暮雀上南枝風來秋扇屏月出夜燈吹深心起百際遙淚非一垂徒勞妾辛苦終言君不知相逢行相逢夕陰階獨趨尚冠里高門既如一甲第復相似憑軾日欲昏何處訪公子公子之所在所在良未知青樓出上路漸臺臨曲池堂上撫流徽罍樽朝夕施橘柚分寶葉朱火燎金枝兄弟兩三人冠佩紛陸離朝從禁門出車騎並驅馳金鞍瑪瑙勒聚觀路傍兒入門一顧望鳧鵠有雄雌雄雌各數千相鳴戲羽儀並在東西立群次何離離大婦刺方領中婦抱嬰兒小婦尚嬌稚端坐吹參差丈夫無遽起神鳳且來儀對酒對酒誠可樂此酒復能醇如華良可貴如乳更非珍何以留上客為寄掌中人金尊清復滿玉碗亟來親誰能共遲暮對酒及芳晨君當歌未罷卻坐避梁塵遠期遠期終不歸節物坐將變白露濕單衣秋風息團扇誰能少離別他鄉且異縣浮雲蔽重山相望何時見寄言遠行者空閨淚如霰贈內日暮想青陽躡履出椒房網蟲生錦薦遊塵掩玉床不見可憐影空聞黼帳香彼美情多樂挾瑟坐高堂豈忘離憂者向隅獨心傷聊因一書札以代九回腸對房前桃樹詠佳期贈內相思上北閣徙倚望東家忽有當窗樹兼含映日花芳鮮類紅粉比素若鉛華更使心增意彌令想狹斜無如一路阻脈脈似雲霞嚴城不可越言折代疏麻華觀省中夜聞城外搗衣閶闔下重關丹墀吐明月秋氣城中冷秋砧城外發浮聲繞雀臺飄響度龍闕婉轉何藏摧當從上路來藏摧意未已定自乘軒裏乘軒盡世家佳麗似朝霞圓璫耳上照方繡領間斜衣薰百和屑鬢搖九枝花昨暮庭槐落今朝羅縞薄拂席捲卯央開幔舒龜鶴金波正容與玉步依砧杵紅袖往還縈素腕參差舉徒聞不得見獨夜空愁佇獨夜何窮極懷之在心側階垂玉衡露庭舞松風翼瀝滴流星輝燦爛長河色三冬誠足用五日無糧食揚雲已寂寥今君復弦直和蕭紀室春旦有所思芳樹發春輝蔡子望青衣水逐桃花去春隨楊柳歸楊柳何時歸裊裊復依依已蔭章臺陌復掃長門扉獨知離心者坐惜春光違洛陽遠如日何由見宓妃春郊見美人芳郊拾翠人回袖捲芳春金輝起步搖紅彩發吹輪湯湯蓋項日飄飄馬足塵薄暮高樓下當知妾姓秦詠照鏡晨輝照杏梁飛燕起朝粧留心散廣黛輕手約花黃正叉時念影拂絮且憐香方嫌翠色故乍道玉無光城中皆半額非妾畫眉長和蕭洗馬畫屏風二首陽春發和氣日淨班姬門風輕董賢館卷耳緣家出反舌登牆喚蠶女桂枝鉤遊童蘇合彈拂袖當留客相逢莫相難秋夜涼風起佳人在河內征夫鎮馬邑零露一朝團中夜兩垂泣氣爽床帳冷天寒針縷澀紅顏本暫時君還詎相及採菱妾家五湖口採菱五湖側玉面不關粧雙眉本翠色日斜天欲暮風生浪未息宛在水中央空作兩相憶長門后怨向夕千愁起自悔何嗟及愁思且歸床羅襦方掩泣絳樹搖風軟黃鳥弄聲急金屋貯嬌時不言君不入鼓吹曲二首高巫山巫山光欲晚陽臺色依依彼美岩之曲寧知心是非朝霽觸石起暮雨潤羅衣願解千金佩請逐大王歸有所思上林鳥欲栖長安日行暮所思鬱不見空想丹墀步簾動憶君來雷聲似車度北方佳麗子窈窕能回顧夫君自迷惑非為妾心妬同郭侍郎採桑鴈還高柳北春歸洛水南日照茱萸領風搖翡翠篸桑間視欲暮閨裏遽飢蠶相思君助取相望妾那堪和湘東王班姬長門與長信日暮九重空雷聲聽隱隱車響絶籠籠恩光隨妙舞團扇逐秋風鉛華誰不慕人意自艱終詩二首春閨怨花庭麗景斜蘭牖輕風度落日更新粧開簾對春樹鳴鸝葉中舞戲蝶花間鶩調瑟本要歡心愁不成趣良會誠非遠佳期今不遇欲知幽怨多春閨深且暮詠佳人東家挺奇麗南國擅容輝夜月方神女朝霞喻洛妃還看鏡中色比艷似知非摛辭徒妙好連類頓乖違智夫雖已麗傾城未敢希奉和湘東王教班婕妤寂寂長信晚雀聲哦洞房蜘蛛網高閣駮蘚被長廊虛殿簾帷靜間階花蕊香悠悠視日暮還復拂空床擬古故交不可忘猶如蘭桂芳新知雖可悅不異茱萸香妾有鳳雛曲非為陌上桑薦君君不御抱瑟自悲涼南苑逢美人洛浦疑回雪巫山似旦雲傾城今所見傾國昔曾聞媚眼隨嬌合丹唇逐笑分風卷蒲桃帶日照石榴裙自有狂夫在空持勞使君答唐娘七夕所穿針倡人助漢女靚粧臨月華連針學並蒂縈縷作開花孀閨絶綺羅攬贈自傷嗟雖言未相識聞道出良家曾停霍君騎經過柳惠車無由一共語暫看日升霞吳均梅花落隆冬十二月寒風西北吹獨有梅花落飄蕩不依枝流連逐霜彩散漫下冰澌何當與君日共映芙蓉池閨怨胡笳屢悽斷征蓬未肯還妾坐江之介君戍小長安相去三千里參商書信難四時無人見誰復重羅紈妾安所居賤妾先有寵蛾眉進不遲一從西北麗無復城南期何因暫豔逸豈為乏妍姿徒有黃昏望寧遇青樓時惟惜應門掩方餘永巷悲匡床終不共何由橫自私三婦豔大婦弦初切中婦管方吹少婦多姿態含笑逼清巵佳人勿餘及殷勤妾自知詠歌姬及君高堂還值妾妍妝罷曲房褰錦帳回廊步珠屣玉叉時可挂羅襦詎難解再顧傾城易一笑千金易聽百舌庭樹旦新晴臨鏡出雕楹風吹桃李氣過傳春鳥聲靜寫山陽笛全作洛濱笙注意歡留聽誤令妝不成幸被夕風吹屢得朝光照枝低疑欲舞花開似含笑長夜踏悠悠所思不可召行人早旋返賤妾猶年少採菱曲相攜及嘉月採菱渡北渚微風吹櫂歌日暮相容與采采不能歸望望方延佇倘逢遺珮人預以心相許詠舞紅顏自燕趙妙伎邁陽阿就行齊逐唱赴節暗相和折腰送餘曲斂袖待新歌顰容生翠羽曼睇出橫波雖稱趙飛燕比此詎成多
