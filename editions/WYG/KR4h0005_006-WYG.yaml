body:
  text: 與栁惲相贈答六首嫋嫋陌上桑䕃陌復垂塘長條映白日細葉隱鸝黄蠶飽妾復思拭淚且提筐故人寜知此離恨煎人腸陌上桑咸陽春草芳秦帝巻衣裳玉檢茱萸匣金泥蘇合香初芳薰複帳餘暉曜玉牀當須宴朝罷持此贈華陽秦王巻衣錦帶雜花鈿羅衣垂緑川問子今何去出采江南蓮遼西三千里欲寄無因縁願君早旋反及此荷花鮮来蓮艷裔陽之春攜手清洛濱鷄鳴上林苑薄暮小平津長裾藻白日廣袖帶芳塵故交一如此新知詎憶人攜手擬古四首一鷰海上來一鷰髙臺息一朝所逢遇依然舊相識問我來何遲關山幾迂直答言海路長風多飛無力昔别縫羅衣春風初入帷今來夏欲晩桑蛾薄樹飛贈杜容成一首春從何處來拂衣復驚梅雲障青瑣闥風吹承露臺美人隔千里羅幃閉不開無由得共語空對相思桮春詠棄妾在河橋相思復相遼鳯凰簪落鬢蓮花帶緩腰腸從别處斷貌在淚中消願君憶疇昔片言時見饒去妾贈前夫董生惟巧笑子都信美目百萬市一言千金買相逐不道參差菜誰論窈窕淑願君捧繡被來就越人宿詠少年王僧孺一十七首四時如湍水飛奔競回復夜鳥響嚶嚶朝光照煜煜厭見花成子多看筍為竹萬里斷音書十載異棲宿積愁落芳鬢長嗁壊美目君去在榆關妾留住函谷惟對莫邪房如見蜘蛛屋獨與響相酬還將影自逐象牀易氊簟羅衣變單複幾過度風霜猶能保㷀獨春怨二八人如花三五月如鏡開簾一種色當户兩相映重價出秦韓髙名入燕鄭十城屢請易千金幾爭聘君意自能專妾心本無競月夜詠陳南康新有所納乆想專房麗未見傾城者千金訪繁華一朝遇容冶家本薊門外來戲叢臺下長卿幸未匹文君復新寡見貴者初迎盛姬聊為之詠洞房風已激長廊月復清藹藹夜庭廣飄飄曉帳輕雜聞百蟲思偏傷一息聲鳥聲長不息妾心復何極猶恐君無衣夜夜當忩織與司馬治書同聞隣婦夜織櫩露滴為珠池冰合成璧萬行朝淚瀉千里夜愁極孤帳閉不開寒膏盡復益誰知心眼亂看朱忽成碧夜愁愁來不理鬢春至更攢眉悲看蛺蜨粉泣望蜘蛛絲月映寒蛩褥風吹翡翠帷飛鱗難託意駃翼不銜辭春閨有怨足傷金管處多愴緹光促下機騖西眺鳴砧遽東旭芳汗似蘭湯雕金辟龍燭散度廣陵音操寫漁陽曲别鶴悲不已離鸞斷更續尺素在魚腸寸心憑鴈足擣衣已知想成夢未信夢如此皎皎無片非的的一皆是以親芙蓉褥方開合歡被雅步極嫣妍含辭恣委靡如言非倐忽不意成俄爾及寤盡空無方知悉虚詭為人述夢嬴女鳯凰樓漢姬柏梁殿詎勝仙將死音容猶可見我有一心人同鄉不異縣異縣不成隔同鄉更􅎃􅎃􅎃􅎃如牛女無妨年一語為人傷近不見出户望蘭薰褰簾正逢君歛容纔一訪新知詎可聞新人含笑近故人含淚隱妾意在寒松君心逐朝槿為何庫部舊姬擬蘼蕪之句窈窕宋容華但歌有清曲轉盻非無以斜扇還相矚詎減許飛瓊多勝劉碧玉何因送款款伴飲桮中醁在王晉安酒席散韻碧玉與緑珠張盧復雙女曼聲古難匹長袂世無侣似出鳯凰樓言發瀟湘渚幸有褰裳便含情寄一語為人有贈寒樹棲羈雌月映風復吹逐臣與棄妾零落心可知寶琴徒七絃蘭鐙空百枝顰容不足效嗁妝拭復垂同衾成楚越異國非仳離何生姬人有怨夜風吹熠熠朝光照莫邪幾銷蘼蕪葉空落蒲桃花不堪長織素誰能獨浣紗光陰復何極望促反成賒知君自蕩子柰妾亦倡家鼓瑟曲有所思可憐獨立樹枝輕根易搖已為露所浥復為風所飄錦衾襞不臥端坐夜及朝是妾愁成瘦非君重細腰為人寵姬有怨自知心裏恨還向影中羞回持昔慊慊變作今悠悠還君與妾珥歸妾奉君裘絃斷猶可續心去最難留為人自傷斜光隱西壁暮鵲上南枝風來秋扇屏月出夜鐙吹深心起百際遙淚非一垂徒勞妾辛苦終言君不知秋閨怨張率擬樂府三首相逢夕陰階獨趨尚冠里髙門既如一甲第復相似憑軾日欲昏何處訪公子公子之所在所在良易知青樓出上路漸臺臨曲池堂上撫流徽雷尊朝夕施橘柚芬華實朱火燎金枝兄弟兩三人裾珮紛陸離朝從禁中出車騎並驅馳金鞍瑪瑙勒聚觀路傍兒入門一顧望鳬鵠有雄雌雄雌各數千相鳴戲羽儀並在東西立羣次何離離大婦刺方領中婦抱嬰兒小婦尚嬌稚端坐吹參差丈人無遽起神鳯且來儀相逢行對酒誠可樂此酒復能醇如華良可貴如乳更非珍何以留上客為寄掌中人金尊清復滿玉盌亟來親誰能共遲暮對酒及芳晨君歌當未罷却坐避梁塵對酒逺期終不歸節物坐將變白露愴單棲秋風息團扇誰能乆離别他鄉且異縣浮雲蔽重山相望何時見寄言逺行者空閨淚如霰逺期徐悱詩二首日暮想清陽躡履出椒房網蟲生錦薦遊塵掩玉牀不見可憐影空餘黼帳香彼美情多樂挾瑟坐髙堂豈忘離憂者向隅心獨傷聊因一書札以代九回腸贈内相思上北閣徙倚望東家忽有當軒樹兼含映日花方鮮類紅粉比素若鉛華更使增心憶彌令想狹斜無如一路阻衇衇似雲霞嚴城不可越言折代踈麻對房前桃樹詠佳期贈内費昶一十首閶闔下重關丹墀吐明月秋氣城中冷秋砧城外發浮聲繞雀臺飄響度龍闕婉轉何藏摧當從上路來藏摧意未已定自乘軒裏乘軒盡世家佳麗似朝霞圓璫耳上照方繡領間斜衣薰百和屑鬢搖九枝花昨暮庭槐落今朝羅綺薄拂席巻鴛鴦開縵舒龜鶴金波正容與玉步依砧杵紅袖徃還縈素腕參差舉徒聞不得見獨夜空愁佇獨夜何窮極懐之在心側階垂玉衡露庭舞相風翼􅅹滴流星輝燦爛長河色三冬誠足用五日無糧食揚雲已寂寥今君復弦直華觀省中夜聞城外擣衣芳樹發春暉蔡子望青衣水逐桃花去春隨楊栁歸楊栁何時歸裊裊復依依已蔭章臺陌復掃長門扉獨知離心者坐惜春光違洛陽逺如日何由見宓妃和蕭記室春旦有所思芳郊拾翠人回袖掩芳春金輝起步搖紅彩發吹綸湯湯蓋頂日飄飄馬足塵薄暮髙樓下當知妾姓秦春郊望美人晨暉照杏梁飛鷰起朝妝留心散廣黛輕手約花黄正釵時念影拂絮且憐香方嫌翠色故乍道玉無光城中皆半額非妾畫睂長詠照鏡日淨班姬門風輕董賢館巻耳縁階出反舌登牆喚蠶女桂枝鉤遊童蘇合彈拂袖當留客相逢莫相難陽春發和氣佳人在河内征夫鎮馬邑零露一朝團中夜兩垂泣氣爽牀帳冷天寒針縷澀紅顏本暫時君還詎相及秋夜涼風起和蕭洗馬畫屏風二首妾家五湖口采蔆五湖側玉靣不關妝雙睂本翠色日斜天欲暮風生浪未息宛在水中央空作兩相憶采蔆向夕千愁起自悔何嗟及愁思且歸牀羅襦方掩泣絳樹搖風軟黄鳥弄聲急金屋貯嬌時不言君不入長門后怨巫山光欲晩陽臺色依依彼美巖之曲寧知心是非朝雲觸石起暮雨潤羅衣願解千金珮請逐大王歸巫山髙上林烏欲棲長安日行暮所思鬱不見空想丹墀步簾動憶君來雷聲似車度北方佳麗子窈窕能回顧夫君自迷惑非為妾心妒有所思鼓吹曲二首姚翻詩一首鴈還髙栁北春歸洛水南日照茱萸領風搖翡翠篸桑間視欲暮閨裏遽饑蠶相思君助取相望妾那堪同郭侍郎采桑孔翁歸詩一首長門與長信日暮九重空雷聲聽隠隠車響絶瓏瓏恩光隨妙舞團扇逐秋風鉛華誰不慕人意自難終奉和湘東王教班婕妤徐悱妻劉令嫺詩二首花庭麗景斜蘭牖輕風度落日更新妝開簾對春樹鳴鸝葉中響戲蜨枝邊騖調瑟本要歡心愁不成趣良㑹誠非逺佳期今不遇欲知幽怨多春閨深且暮答外東家挺竒麗南國擅容輝夜月方神女朝霞喻洛妃還看鏡中色比艷自知非摛辭徒妙好連類頓乖違智夫雖已麗傾城未敢希同前何思澄三首寂寂長信晩雀聲哦洞房蜘蛛網髙閣駮蘚被長廊虚殿簾帷静閒階花蘂香悠悠視日暮還復拂空牀奉和湘東王教班婕妤故交不可忘猶如蘭桂芳新知雖可悦不異茱萸香妾有鳯鶵曲非為陌上桑薦君君不御抱瑟自悲涼擬古洛浦疑回雪巫山似旦雲傾城今始見傾國昔曾聞媚服隨嬌合丹唇逐笑分風巻蒲萄帶日照石榴裙自有狂夫在空持勞使君南苑逢美人徐悱一首倡人助漢女靚妝臨月華連針學竝蔕縈縷作開花孀閨絶綺羅攬贈自傷嗟雖言未相識聞道出良家曾停霍君騎經過栁惠車無由一共語蹔看日昇霞答唐孃七夕所穿針玉臺新詠巻六欽定四庫全書玉臺新詠巻七陳徐陵撰梁武帝詩十四首梁簡文帝詩四十三首邵陵王綸詩三首湘東王繹詩七首武陵王紀詩四首
