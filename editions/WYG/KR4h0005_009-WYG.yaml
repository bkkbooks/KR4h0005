body:
  text: 沈約古詩題六首梁武帝歌辭一首東飛伯勞西飛鷰黄姑織女時相見誰家女兒對門居開華發色照里閭南忩北牖挂明光羅帷綺帳脂粉香女兒年㡬十五六窈窕無雙顔如玉三春已暮花從風空留可憐與誰同梁元帝樂府一首河中之水向東流洛陽女兒名莫愁莫愁十三能織綺十四采桑南陌頭十五嫁為盧家婦十六生兒字阿侯盧家蘭室桂為梁中有鬱金蘓合香頭上金釵十二行足下絲履五文章珊瑚挂鏡爛生光平頭奴子提履箱人生冨貴何所望恨不早嫁東家王越人歌一首并序楚鄂君子脩者乗青翰之舟張翠羽之蓋榜拽越人悦之擁檝而越歌以感鄂君歡然舉繡被而覆之其辭曰今夕何夕褰舟中流今日何日與子同舟山有木兮木有枝心悦君兮君不知司馬相如琴歌二首并序司馬相如遊臨卭冨人卓王孫有女文君新寡竊於壁間窺之相如鼓琴歌挑之曰鳯兮鳯兮歸故鄉遨遊四海求其皇時未通遇無所將何悟今夕昇斯堂有豓淑女在此方室邇人遐獨我傷何縁交頸為鴛鴦其一皇兮皇兮從我棲得託字尾永為妃交情通體心和諧中夜相從知者誰雙興俱起翻髙飛無感我心使予悲其二烏孫公主歌詩一首并序漢武元封中以江都王女細君為公主嫁與烏孫昆彌至國而自治宫室歳時一再㑹言語不通公主悲愁自作歌曰吾家之嫁我兮天一方逺託異國兮烏孫王穹廬為室兮氊為牆肉為食兮酪為漿常思漢土兮心内傷願為飛黄鵠兮還故鄉漢成帝時童謠歌二首并序漢成帝趙皇后名飛鷰寵幸冠於後宫常從帝出入時富平侯張放亦稱佞幸為期門之遊故歌云張公子時相見也飛鷰嬌妒成帝無子故云啄皇孫華而不實王莾自云代漢者德土色尚黄故云黄雀飛鷰竟以廢死故為人所憐者也鷰鷰尾涎涎張公子時相見木門倉琅根鷰飛來啄皇孫桂樹華不實黄雀巢其顚昔為人所羨今為人所憐漢桓帝時童謠歌二首大麥青青小麥枯誰當穫者婦與姑丈夫何在西擊胡吏買馬君具車請為諸君鼓嚨胡城上烏尾畢逋公為吏兒為徒一徒死百乗車車班班至河間至河間姹女能數錢錢為室金為堂石上舂􅀈粱􅀈粱之下有懸鼓我欲擊之丞相怒張衡四愁詩四首一思曰我所思兮在泰山欲徃從之梁父間側身東望涕霑翰美人贈我金錯刀何以報之英瓊瑤路逺莫致倚逍遙何為懷憂心煩勞二思曰我所思兮在桂林欲徃從之湘水深側身南望涕霑襟美人贈我金琅玕何以報之雙玉盤路逺莫致倚惆悵何為懷憂心煩怏三思曰我所思兮在漢陽欲徃從之隴阪長側身西望涕霑裳美人贈我貂襜褕何以報之明月珠路逺莫致倚踟蹰何為懷憂心煩紆四思曰我所思兮在鴈門欲徃從之雪紛紛側身北望涕霑巾美人贈我錦繡段何以報之青玉案路逺莫致倚增歎何為懷憂心煩惋秦嘉贈婦詩一首四言曖曖白日引曜西傾啾啾鷄雀羣飛赴楹皎皎明月煌煌列星嚴霜悽愴飛雪覆庭寂寂獨居寥寥空室飄飄帷帳熒熒華燭爾不是居帷帳焉施爾不是照華燭何為魏文帝樂府燕歌行二首秋風蕭瑟天氣涼草木搖落露為霜羣鷰辭歸鴈南翔念君客遊思斷腸慊慊思歸戀故鄉君為淹􅅏寄他方賤妾㷀㷀守空房憂來思君不可忘不覺淚下霑衣裳援琴鳴弦發清商短歌微吟不能長明月皎皎照我牀星漢西流夜未央牽牛織女遙相望爾獨何辜限河梁别日何易㑹日難山川悠悠路漫漫鬱陶思君未敢言寄聲浮雲徃不還涕零雨靣毁容顏誰能懷憂獨不歎展詩清歌聊自寛樂徃哀來摧肺肝耿耿伏枕不能眠披衣出戸步東西仰看星月觀雲間飛鳥晨鳴聲可憐留連顧懷不能存曹植樂府妾薄命行一首六言日月旣逝西藏更㑹蘭室洞房華鐙步障舒光皎若日出扶桑促樽合坐行觴主人起舞􅀢盤能者冗觸别端騰觚飛爵闌干同量等色齊顏任意交屬所歡朱顏發外形蘭袖隨禮容極情妙舞仙仙體輕裳解履遺絶纓俛仰笑喧無呈覽持佳人玉顏齊接金爵翠盤手形羅袖良難腕弱不勝珠環坐者歎息舒顏玉巾裛粉君傍中有霍納都梁鷄舌五味雜香進者何人齊姜恩重愛深難忘召延親好宴私但歌桮來何遲客賦旣醉言歸主人稱露未晞傅𤣥擬北樂府三首厯九秋兮三春分遺貴客兮逺賓顧多君心所親乃命妙妓才人炳若日月星辰其一序金罍兮玉觴賓主遞起鴈行桮若飛電絶光交觴接巵結裳慷慨歡笑萬方其二奏新詩兮夫君爛然虎變龍文渾如天地未分齊謳楚舞紛紛歌聲上激青雲其三窮八音兮異倫竒聲靡靡毎新微笑素齒丹唇逸響飛薄梁塵精爽眇眇入神其四坐咸醉兮沾歡引樽促席臨軒進爵獻壽翻翻千秋要君一言願愛不移若山其五君恩愛兮不竭譬若朝日夕月此景萬里不絶長保初醮結髪何憂坐生胡越其六攜弱手兮金鐶上遊飛閣雲間穆若鴛鳯雙鸞還幸蘭房自安娯心極樂難原其七樂旣極兮多懷盛時忽逝若頽寒暑革御景回春榮隨風飄摧感物動心增哀其八妾受命兮孤虛男兒隨地稱姝女弱難存若無骨肉至親更疏奉事他人託軀其九君如影兮隨形賤妾如水浮萍明月不能常盈誰能無根保榮良時冉冉代征其十顧繡領兮含暉皎日囘光側微朱華忽爾漸衰影欲捨形髙飛誰言徃恩可追其一十薺與麥兮夏零蘭桂踐霜逾馨䘵命懸天難明委心結意丹青何憂君心中傾其二十厯九秋篇董桃行車遙遙兮馬洋洋追思君兮不可忘君安遊兮西入秦願為影兮隨君身君在陰兮影不見君依光兮妾所願車遙遙篇燕人美兮趙女佳其室則邇兮限層崖雲為車兮風為馬玉在山兮蘭在野雲無期兮風有止思心多端兮誰能理燕人美篇傅𤣥擬四愁詩四首并序附盤中詩後昔張平子作四愁詩體小而俗七言類也聊擬而作之名曰擬四愁詩其辭曰我所思兮在瀛洲願為雙鵠戯中流牽牛織女期在秋山髙水深路無由愍余不遘嬰殷憂佳人貽我明月珠何以要之比目魚海廣無舟悵勞劬寄言飛龍天馬駒風起雲披飛龍逝驚波滔天馬不厲何為多念心憂世其一我所思兮在珠崖願為比翼浮清池柔剛合德配二儀形影一絶長别離愍余不遘情如攜佳人貽我蘭蕙草何以要之同心鳥火熱水深憂盈抱申以琬琰夜光寳卞和旣没玉不察存若流光忽電滅何為多念獨藴結其二我所思兮在崑山願為鹿闚虞淵日月囘曜照景天參辰曠隔㑹無縁愍余不遘罹百艱佳人貽我蘇合香何以要之翠鴛鴦懸度弱水川無梁申以錦衣文繡裳三光騁邁景不􅅏鮮矣民生忽如浮何為多念袛自愁其三我所思兮在朔方願為飛鴈俱南翔煥乎人道著三光胡越殊心生異鄉愍余不遘罹百殃佳人貽我羽葆纓何以要之影與形增冰憂結繁華零申以日月指明星星辰有翳日月移駑馬哀鳴慙不馳何為多念徒自虧其四山樹髙鳥鳴悲泉水深鯉魚肥空倉雀常苦飢吏人婦㑹夫希出門望見白衣謂當是而更非還入門中心悲北上堂西入階急機絞杼聲催長歎息當語誰君有行妾念之出有日還無期結巾帶長相思君忘妾天知之妾忘君罪當治妾有行宜知之黄者金白者玉髙者山下者谷姓為蘇字伯玉作人才多智謀足家居長安身在蜀何惜馬嗁歸不數羊肉千斤酒百斛令君馬肥麥與粟今時人智不足與其書不能讀當從中央周四角盤中詩一首張載擬四愁詩四首我所思兮在南巢欲徃從之巫山髙登崖逺望涕泗交我之懷矣心傷勞佳人貽我筒中布何以贈之流黄素願因飄風超逺路終然莫致增想慕我所思兮在朔湄欲徃從之白雪霏登崖永眺涕泗頺我之懷矣心傷悲佳人遺我雲中翮何以贈之連城璧願因歸鴻起遐隔終然莫致增永積我所思兮在隴原欲徃從之隔泰山登崖逺望涕泗連我之懷矣心傷煩佳人遺我雙角端何以贈之雕玉環願因行雲超重巒終然莫致增永歎我所思兮在營州欲徃從之路阻脩登崖逺望涕泗流我之懷矣心傷憂佳人遺我緑綺琴何以贈之雙南金願因流波超重深終然莫致增永吟晉惠帝時童謠歌一首鄴中女子莫千妖前至三月抱胡腰陸機樂府燕歌行一首四時代序逝不追寒風習習落葉飛蟋蟀在堂露盈階念君逺遊常苦悲君何緬然乆不歸賤妾悠悠心無違白日旣没明鐙煇寒禽赴林匹鳥棲雙鳩關關宿河湄憂來感物涕不晞非君之念思為誰别日何早㑹何遲鮑照雜詩八首淮南王好長生服食鍊氣讀仙經琉璃藥盌牙作盤金鼎玉匕合神丹合神丹戯紫房紫房彩女弄明璫鸞歌鳯舞斷君腸朱城九門門九開願逐明月入君懐入君懐結君珮怨君恨君恃君愛築城思堅劒思利同盛同衰莫相棄代淮南王二首朱唇動素腕舉洛陽少年邯鄲女古稱緑水今白紵催弦急管為君舞窮秋九月荷葉黄北風驅鴈天雨霜夜長酒多樂未央春風澹蕩使思多天色淨緑氣妍和桃含紅蕚蘭紫牙朝日灼爍發園花巻櫎結帷羅玉筵齊謳秦吹盧女弦千金顧笑買芳年代白紵歌辭二首中庭五株桃一株先作花陽春妖冶二三月從風簸蕩落西家西家思婦見之惋零淚霑衣撫心歎初送我君出户時何言淹留節回換牀席生塵明鏡垢纎腰瘦削髪蓬亂人生不得常稱意惆悵徙倚至夜半剉蘗染黄絲黄絲厯亂不可治昔我與君始相值爾時自謂可君意結帶與我言死生好惡不相置今日見我顏色衰意中錯漠與先異還君玉釵瑇瑁簪不忍見之益悲思奉君金巵之酒盌瑇瑁玉匣之雕琴七彩芙蓉之羽帳九華蒲萄之錦衾紅顏零落嵗将暮寒花宛轉時欲沈願君裁悲且滅思聽我抵節行路吟不見柏梁銅雀上寜聞古時清吹音璿閨玉墀上椒閣文忩繡戸垂綺幕中有一人字金蘭被服纎羅蕰芳霍春鷰差池風散梅開帷對影弄禽雀含歌攬淚不能言人生幾時得為樂寜作野中雙飛鳬不願雲間别趐鶴行路難四首釋寶月行路難一首君不見孤鴈關外發酸嘶度楊越空城客子心腸斷幽閨思婦氣欲絶凝霜夜下拂羅衣浮雲中斷開明月夜夜遙遙徒相思年年望望情不歇寄我匣中青銅鏡倩人為君除白髪行路難行路難夜聞南城漢使度使我流淚憶長安陸厥李夫人及貴人歌一首屬車挂席塵豹尾香烟滅彤殿向蘼蕪青蒲復委絶坐委絶對蘼蕪臨丹階泣椒塗寡鶴羈雌飛且上雕梁翠壁網踟蛛洞房明月夜對此淚如珠沈約雜詩八詠四首望秋月秋月光如鍊照曜三爵臺徘徊九華殿九華瑇瑁梁華榱與壁璫以兹雕麗色持照明月光凝華入黼帳清暉懸洞房先過飛鷰户却照班姬牀桂宫裊裊落桂枝寒露淒凄凝白露上林晩葉颯颯鳴鴈門早鴻離離度湛秀質兮似規委清光兮如素照愁軒之蓬影映金階之輕步居人臨此笑以歌别客對之傷且慕經衰圃映寒叢凝清夜帶秋風隨庭雪以偕素與池荷而共紅臨玉墀之皎皎含霜靄之濛濛轥天衢而徒步轢長漢而飛空隱巖崖而半出隔帷櫎而纔通散朱庭之奕奕入青瑣而玲瓏閒階悲寡鵠沙州怨别鴻昭姬泣胡殿明君思漢宫余亦何為者淹留此山東望秋月臨春風春風起春樹遊絲曖如網落花雰似霧先泛天淵池還過細栁枝蜨逢飛搖颺鷰值羽差池揚桂斾動芝蓋開燕裾吹趙帶趙帶飛參差燕裾合且離回簪復轉黛顧步惜容儀容儀已炤灼春風復回薄氛氲桃李花青柎含素蕚旣為風所開復為風所落搖緑蔕杭紫莖舞春雪雜流鶯曲房開兮金鋪響金鋪響兮妾思驚梧桐未陰淇川如碧迎行雨於髙唐送歸鴻於碣石經洞房響紈素感幽閨思帷帟想芳園可以遊念蘭翹兮漸堪摘拂明鏡之冬塵解羅衣之秋襞旣鏗鏘以動珮又氛氲而流麝始搖蕩以入閨終徘徊而縁隙鳴珠簾於繡户散芳塵於綺席是時悵思婦安能乆行役佳人不在兹春風為誰惜臨春風蘭葉參差桃半紅飛芳舞縠戯春風翡翠羣飛飛不息願在雲間長比翼春日白紵曲一首白露欲凝草已黄金琯玉柱響洞房雙心一影俱回翔吐情寄君君莫忘秋日白紵曲一首呉均行路難二首君不見上林苑中客冰羅霧縠象牙席盡是得意忘言者探腸見膽無所惜白酒甜鹽甘如乳緑觴皎鏡華如碧少年持名不肯嘗安知白駒應過隙博山鑪中百和香鬱金蘇合及都梁逶迤好氣佳容貎經過青瑣厯紫房已入中山陰后帳復上皇帝班姬牀班姬失寵顏不開奉帝供養長信臺日暮耿耿不能寐秋風切切四靣來玉階行路生細草金鑪香炭變成灰得意失意須臾頃非君方寸逆所裁洞庭水上一株桐經霜觸浪困嚴風昔時㨨心曜白日今旦臥死黄沙中洛陽名工見咨嗟一剪一刻作琵琶白璧規心學明月珊瑚映靣作風花帝王見賞不見忘提攜把握登建章掩抑摧藏張女彈殷勤促柱楚明光年年月月對君子遥遙夜夜宿未央未央彩女弃鳴箎爭見拂拭生光儀茱萸錦衣玉作匣安念昔日枯樹枝不學衡山南嶺桂至今千年猶未知張率雜詩四首長相思乆離别美人之逺如雨絶獨延佇心中結望雲去去逺望鳥飛飛滅空望終若斯珠淚不能雪長相思乆别離所思何在若天垂鬱陶相望不得知玉階月夕映羅帷羅帷風夜吹長思不能寢坐望天河移擬樂府長相思二首歌兒流唱聲欲清舞女趁節體自輕歌舞並妙㑹人情依弦度曲婉盈盈揚蛾為態誰目成妙聲屢唱輕體飛流津染靣散芳菲俱動齊息不相違令彼嘉客澹忘歸時乆翫夜明星稀白紵歌辭二首費昶行路難二首君不見長安客舍門倡家少女名桃根貧窮夜紡無鐙燭何言一朝奉至尊至尊離宫百餘處千門萬户不知曙惟聞啞啞城上烏玉欄金井牽鹿盧丹梁翠柱飛屠蘇香薪桂火炊彫胡當年翻覆無常定薄命為女何必麤君不見人生百年如流電心中埳君不見我昔初入椒房時詎減班姬與飛鷰朝踰金梯上鳯樓暮下瓊鉤息鸞殿柏臺晝夜香錦帳自飄颺笙歌膝上吹琵琶陌上桑過蒙恩所賜餘光曲霑被旣逢陰后不自專復值程姬有所避黄河千年始一清微軀再逢永無議蛾眉偃月徒自妍傳粉施朱欲誰為不如天淵水中鳥雙去雙歸長比翅梁簡文雜題一十二首芙蓉作船絲作䋏北斗横天月將落采蓮渡頭礙黄河郎今欲渡畏風波浮雲似帳月成鈎那能夜夜南陌頭宜城􅀈酒今行熟停鞍繫馬暫棲宿青牛丹轂七香車可憐今夜宿倡家倡家髙樹烏欲棲羅帷翠帳向君低織成屏風銀屈膝朱唇玉靣鐙前出相看氣息望君憐誰能含羞不自前烏棲曲四首雲中亭幛羽檄驚甘泉烽火通夜明貳師將軍新築營嫖姚校尉初出征復有山西將絶世受雄名三門應遁甲五壘學神兵白雲隨陣色蒼山答鼓聲邐迤觀鵝翼參差覩鴈行先平小月陣却滅大宛城善馬還長樂黄金付水衡小婦趙人能鼓瑟侍婢初筓解鄭聲庭前桃花飛已合必應紅妝起見迎雜句從軍行一首别觀蒲萄帶實垂江南荳蔻生連枝無情無意猶如此有心有恨徒别離蜘蛛作絲滿帳中芳草結葉當行路紅臉脉脉一生嗁黄鳥飛飛有時度故人雖故昔經新新人雖新復應故可憐淮水去來潮春隄楊栁覆河橋淚跡未􅏫詎終朝行聞玉珮已相要桃紅李白若朝莊羞持憔悴比新楊不惜暫住君前死愁無西國更生香和蕭侍中子顯春别四首蜨黄花紫鷰相追楊低栁合路塵飛已見垂鉤挂緑樹誠知淇水霑羅衣兩童夾車問不已五馬城南猶未歸鶯嗁春欲駛無為空掩扉雜句春情一首窺紅對鏡歛雙眉含愁拭淚坐相思念人一去許多時眼語笑靨迎來情心懐心想甚分明憶人不忍語銜恨獨吞聲擬古一首朝日斜來照尸春鳥爭飛出林片光片影皆麗一聲一囀煎心上林紛紛花落淇水漠漠苔浮年馳節流易盡何為忍憶含羞倡樓怨節一首湘東王春别應令四首七言昆明夜月光如練上林朝花色如霰花朝月夜動春心誰忍相思不相見試看機上文龍錦還瞻庭裏合歡枝映日通風影朱幔飄花拂葉度金池不聞離人當重合惟悲合罷㑹成離門前楊栁亂如絲直置佳人不自持適言新作裂紈詩誰悟今成織素辭日暮徙倚渭橋西正見涼月與雲齊若使月光無近逺應照離人今夜嗁蕭子顯雜詩七首翻鶯度鷰雙比翼楊栁千條共一色但看陌上攜手歸誰能對此空中憶幽宫積草自芳菲黄鳥芳樹情相依爭風競日常聞響重花叠葉不通飛當知此時動妾思慙使羅袂拂君衣江東大道日華春垂楊挂栁埽輕塵淇水昨送淚霑巾紅妝宿昔已應新銜悲攬涕别心知桃花李色任風吹本知人心不似樹可意人别似花離春别四首握中酒桮瑪瑙鍾裾邉雜珮琥珀龍欲持寄君心不惜共指三星今何夕淚黛紅輕㸃花色還欲令人不相識金壺夜水誰能多莫持賖用比懸河樂府烏棲曲應令二首風光遲舞出青蘋蘭條翠鳥鳴發春洛陽梨花落如雪河邉細草細如茵桐生井底葉交枝今看無端雙鷰離五重飛樓入河漢九華閣道暗清池遙看白馬津上吏傳道黄龍征戍兒明月金光徒照妾浮雲玉葉君不知思君昔去栁依依至今八月避暑歸明珠蠶繭勉登機鬱金香蘤特香衣洛陽城頭鷄欲曙丞相府中烏未飛夜夢征人縫狐貉私憐織婦裁錦緋呉刀鄭綿絡寒閨夜被薄芳年海上水中鳬日暮寒夜空城雀燕歌行王筠行路難一首千門皆閉夜何央百憂俱集斷人腸探揣箱中取刀尺拂拭機上斷流黄情人逐情雖可恨復畏邉逺乏衣裳已繅一繭催衣縷復擣百和裛衣香猶憶去時腰大小不知今日身短長裲襠雙心共一袜衵複兩邉作八襊襻帶雖安不忍縫開孔裁穿猶未逹胷前却月兩相連本照君心不照天願君分明得此意勿復流蕩不如先含悲含怨判不死封情忍思待明年劉孝綽元廣州景仲座見故姬一首留故夫不歭􅡨别待春山上相看采蘼蕪劉孝威擬古應教一首雙棲翡翠兩鴛鴦巫雲落月乍相望誰家妖冶折花枝蛾睂􅝇睇使情移青鋪緑瑣琉璃扉瓊筵玉笥金鏤衣美人年幾可十餘含羞轉笑歛風裾珠丸出彈不可追空畱可憐持與誰徐君蒨别義陽郡二首翔鳯樓遥望與雲浮歌聲臨樹出舞影入江流葉落看邨近天髙應向秋飭靣亭莊成更㸃星頰上紅疑淺睂心黛不青故畱殘粉絮挂看箔簾釘王叔英婦贈答一首妝鉛㸃黛拂輕紅鳴環動珮出房櫳看梅復看栁淚滿春衫中沈約古詩題六首愍衰草衰草無容色憔悴荒徑中寒荄不可識昔時兮春日昔日兮春風含華兮佩實垂緑兮散紅氛氲鳷鵲右照曜望仙東送歸顧暮泣淇水嘉客淹留懐上宫巖陬兮海岸冰多兮霰積爛漫兮客根欑幽兮寓隙布綿宻於寒臯吐纎疎於危石旣惆悵於君子倍傷心於行役露髙枝於初旦霜紅天於始夕彫芳卉之九衢霣靈茅之三脊風急崤道難秋至客衣單旣傷檐下菊復悲池上蘭飄落逐風盡方知嵗早寒流螢暗明燭鴈聲斷纔續萎絶長信宫蕪穢丹墀曲霜奪莖上紫風銷葉中緑山變兮青薇水折兮平葦秋鴻兮疏引寒鳥兮聚飛逕荒寒草合桐長舊巖圍夜漸蘼蕪沒霜露日霑衣願逐晨征鳥薄暮共西歸嵗暮愍衰草悲落桐落桐早霜露鷰至葉未㩅鴻來枝已素本出龍門山長枝仰刺天上峯百丈絶下趾萬尋懸幽根已盤結孤株復危絶初不照光景終年負霜雪自顧無羽儀不願生曲池芬芳本自乏華實無可施匠者特畱眄王孫少見之分取生孤枿徙置北堂垂宿莖㩅晩幹新葉生故枝故枝雖遼逺新葉頗離離春風一朝至榮户坐如斯自惟良菲薄君恩徒照灼顧已非嘉樹空用憑阿閣願作清廟琴為舞雙𤣥鶴薜荔可為裳文杏堪作梁勿言草木賤徒照君末光末光不徒照為君含噭眺陽阿緑水弦陰枝苦寒調厚德非可任敢不虚其心若逢陽春至吐緑照清潯霜來悲落桐聞夜鶴夜鶴呌南池對此孤明月臨風振羽儀伊吾人之菲薄無賦命之天爵抱跼促之長懐隨春冬而哀樂愍海上之驚鳬傷雲間之離鶴離鶴昔未離近發天北垂忽值疾風起暫下昆明池復值冬冰合水宿非所宜欲留不可住欲去飛已疲勢逐疾風舉求温向衡楚復值南飛鴻參差共成侣海上多雲霧蒼􅃼失洲嶼自此别故羣獨向瀟湘渚故羣不離散相依滄海畔夜止羽相切晝飛影相亂刷羽共浮沈湛澹泛清潯旣不得離别安知慕侣心九冬霜雪苦六翮飛不任且養凌雲翅俛仰弄清音所望浮邱子旦夕來見尋夕行聞夜鶴聼曉鴻曉鴻度將旦跨弱水之微瀾發成山之逺岸怵春歸之未幾驚此嵗之云半出海漲之蒼茫入雲塗之杳漫無東西之可辨孰遐邇之能筭微昔見於洲渚赴秋期於江漢集勁風於弱軀負重雪於輕翰寒谿可以飲荒皋可以竄谿水徒自清微容豈足翫秋蓬飛兮未極寒草萎兮無色楚山髙兮杳難度越水深兮不可測美明月之馳光願征禽之騁翼伊余馬之屢懐知吾行之未極夜綿綿而難曉愁參差而盈臆望山川悉無以惟星河猶可識聞鴈夜南飛客淚夜霑衣春鴻思暮反客子方未歸嵗去驩娛盡年來容貌非攬袵形雖是撫臆事多違青蒲雖長復易解白雲誠逺詎難依晨征聽曉鴻去朝市朝市深歸暮辭北纓而南徂浮東川而西顧逢天地之降祥值日月之重光伊當仁之菲薄非余情之信芳充待詔於金馬奉髙宴於柏梁觀鬭獸於虎圈望窅窕於披香遊西園兮登銅爵舉青瑣兮眺重陽講金華兮議宣室晝武帷兮夕文昌佩甘泉兮履五柞贊枍栺兮紱承光託後車兮侍華幄遊勃海兮泛清漳天道有盈缺寒暑遞炎凉一朝賣玉琬眷眷惜餘香曲池無復處桂枝亦銷亡清廟徒肅肅西陵乆茫茫薄暮余多幸嘉運重來昌忝稽郡之南尉曲千里之光貴别北荒於濁河戀横橋於清渭望前軒之早桐對南階之初卉非余情之屢傷寄兹焉兮能慰眷昔日兮懐哉日將暮兮歸去來解珮去朝市守山東山東萬嶺鬱青葱兩谿共一寫水潔望如空岸側青莎被巖間丹桂叢上瞻旣隠軫下睇亦溟濛逺林響咆獸近樹聒鳴蟲路帶若谿右澗吐金華東萬仞倒危石百丈注懸叢掣曵瀉流電奔飛似白虹洞井含清氣漏穴吐飛風玉竇膏滴瀝石乳室空籠峭崿塗彌險崖岨步纔通余捨平生之所愛欻暮年而逢此願一去而不還恨鄒衣之未褫揖林壑之清曠事氓俗之紛詭幸帝德之方升值天網之未毁旣除舊而布新故化民而俗徙播趙俗以南徂扇齊風以東靡乳雉方可馴流蝗庶能弭清心矯世濁儉政革民侈秩滿撫白雲淹留事芝髓被褐守山東玉臺新詠巻九欽定四庫全書
