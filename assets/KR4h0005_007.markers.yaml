  - {type: variant, offset: 4288, length: 292, content: 除月光臨戶駛荷花依浪舒望簷悲雙翼窺沼泣王餘苔生履處沒草合行人疎裂紈傷不盡歸骨恨難袪早知長信別不避後園輿獨處怨獨處恆多怨開幕試臨風彈棋鏡奩上傅粉高樓中自君征馬去音信不曾通只恐金屏掩明年已復空傷美人昔聞倡女別蕩子無歸期今似陳王歎流風難重思翠帶留餘結苔階沒故基圖形更非是夢見反成疑薰爐含好氣庭樹吐華滋香燒日有歇花落無還時雞鳴高樹顛碧玉好名倡夫壻侍中郎桃花全覆井金門半隱堂時欣一來下復比雙鴛鴦雞鳴天尚早東烏定未光春日年還樂應滿春歸思復生桃含可憐紫柳發斷腸青落花隨燕入遊絲帶蝶驚邯鄲歌管地見許欲留情秋夜高秋度幽谷墜露下芳枝綠潭倒雲氣青山銜月眉花心風上轉葉影樹中移外遊獨千里夕歎誰共知和湘東王陽雲, WYG: ''}
