body:
  text: 玉臺新詠總集類提要臣等謹案玉臺新咏十巻陳徐陵撰案劉肅大唐新語曰梁簡文為太子好作艶詩境内化之晩年欲改作追之不及乃令徐陵撰玉臺集以大其體據此則是書作於梁時故簡文稱皇太子元帝稱湘東王今夲題陳尚書左僕射太子少傅東海徐陵撰殆後人之所追改如劉勰文心雕龍夲作於齊而題梁通事舍人也其書前八巻為自漢至梁五言詩第九巻為歌行第十巻為五言二韻之詩雖皆取綺羅脂粉之詞而去古未逺猶有講於温柔敦厚之遺未可概以淫艶斥之其中如曹植棄婦篇庾信七夕詩今夲集皆失載據此可補闕佚又如馮惟訥詩紀載蘇伯玉妻盤中詩作漢人據此知為晋代梅鼎祚詩乗載蘇武妻答外詩據此知為魏文帝作古詩西北有髙樓等九首文選無名氏據此知為枚乗作飲馬長城窟行文選亦無名氏據此知為蔡邕作其有資攷證者亦不一明代刻夲妄有増益故馮舒疑庾信有入北之作江總濫擘牋之什茅元楨夲顛倒改竄更甚此夲為趙宦光家所傳宋刻末有嘉定乙亥永嘉陳玉父重刻跋最為完善間有後人附入之作如武陵王閨妾寄征人詩沈約八詠之六諸篇皆一一註明尤為精審然玉父跋稱初從外家李氏得舊京夲間多錯謬後得石氏所藏録夲以補亡校脱其中如五言詩中入李延年歌一首陳琳飲馬長城窟行一首皆自亂其例七言詩中移東飛伯勞歌於越人歌之前亦乖世次疑石氏夲有所竄亂而玉父因之未察也觀劉克莊後村詩話所引玉臺新詠一一與此本脗合而嚴羽滄浪詩話謂古詩行行重行行篇玉臺新詠以越鳥巢南枝以下另為一首今此本仍聨為一首又謂盤中詩為蘇伯玉妻作見玉臺集今此本乃溷列傅元詩中葢克莊所見即此本羽所見者又一别本是宋刻已有異同非陵之舊矣特不如明人變亂之甚為尚有典型耳乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀玉臺新詠序夫凌雲槩日由余之所未窺萬户千門張衡之所曾賦周王璧臺之上漢帝金屋之中玉樹以珊瑚作枝珠簾以瑇瑁為押其中有麗人焉其人五陵豪族充選掖庭四姓良家馳名永巷亦有潁川新市河間觀津本號嬌娥曾名巧笑楚王宫裏無不推其細腰衛國佳人俱言訝其纎手説詩㪟禮豈東隣之自媒婉約風流異西施之被教弟兄協律生小學歌少長河陽由來能舞琵琶新曲無待石崇箜􅔃雜引非關曹植傳鼓瑟於楊家得吹簫於秦女至若寵聞長樂陳后知而不平畫出天僊閼氏覽而遥妒至如東隣巧笑來侍寢於更衣西子微顰得横陳於甲帳陪遊馺娑騁纖腰於結風長樂鴛鴦奏新聲於度曲妝鳴蟬之薄鬢照墮馬之垂鬟反挿金鈿横抽寶樹南都石黛最發雙蛾北地燕支偏開兩靨亦有嶺上僊童分丸魏帝􅆎中寶鳯授厯軒轅金星將婺女爭華麝月與嫦娥競爽驚鸞冶䄂時飄韓掾之香飛鷰長裾冝結陳王之珮雖非圖畫入甘泉而不分言異神僊戲陽臺而無别真可謂傾國傾城無對無雙者也加以天情開朗逸思雕華妙解文章尤工詩賦瑠璃硯匣終日隨身翡翠筆牀無時離手清文滿篋非惟芍藥之花新製連篇寧止蒲萄之樹九日登高時有縁情之作萬年公主非無累徳之辭其佳麗也如彼其才情也如此旣而椒宫宛轉柘觀陰岑絳鶴晨嚴銅蠡畫静三星未夕不事懐衾五日猶賖誰能理曲優遊少託寂寞多閒厭長樂之踈鐘勞中宫之緩箭纖􅆎無力怯南陽之𢷬衣生長深宫笑扶風之織錦雖復投壺玉女為歡盡於百嬌爭博齊姬心賞窮於六箸無怡神於暇景惟屬意於新詩庶得代彼皋蘇蠲兹愁疾但往世名篇當今巧製分諸麟閣散在鴻都不藉篇章無由披覽於是然脂暝寫弄筆晨書選録豓歌凡為十巻曾無參於雅頌亦靡濫於風人涇渭之間若斯而已於是麗以金箱裝之寶軸三臺妙迹龍伸蠖屈之書五色華箋河北膠東之紙高樓紅粉仍定魚魯之文辟惡生香聊防羽陵之蠹靈飛六甲高擅玉函鴻烈僊方長推丹枕至如青牛帳裏餘曲旣終朱鳥窻前新妝已竟方當開兹縹帙散此縚繩永對翫於書幃長循環於纖手豈如鄧學春秋儒者之功難習竇専黄老金丹之術不成固勝西蜀豪家託情窮於魯殿東儲甲觀流詠止於洞簫孌彼諸姬聊同棄日猗歟彤管無或譏焉陳尚書左僕射太子少傅東海徐陵撰欽定四庫全書玉臺新詠巻
