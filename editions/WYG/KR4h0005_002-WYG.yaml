front:
  text: 於清河見輓船士新婚與妻别一首
  hash: sha256:64c70bce56fd69fa2d7654157e189704899cf0b21369a356ddd2e1bdc1bf15f4
body:
  text: 又於清河作一首又甄皇后樂府塘上行一首劉勲妻王氏雜詩二首并序曹植雜詩五首樂府三首棄婦詩一首魏明帝樂府二首阮籍詠懐詩二首傅𤣥樂府詩七首和班氏詩一首張華情詩五首雜詩二首潘岳内顧詩二首悼亡詩二首石崇王昭君辭一首并序左思嬌女詩一首魏文帝於清河見輓船士新婚與妻别一首與君結新㛰宿昔當别離凉風動秋草蟋蟀鳴相隨冽冽寒蟬吟蟬吟抱枯枝枯枝時飛揚身體忽遷移但惜歳月馳歳月無窮極㑹合安可知願為雙黄鵠比翼戲清池又清河作一首方舟戲長水湛澹自浮沈弦歌發中流悲響有餘音音聲入君懐悽愴傷人心心傷安所念但願恩情深願為鷐風鳥雙飛翔北林又甄皇后樂府塘上行一首蒲生我池中其葉何離離傍能行仁義莫若妾自知衆口鑠黄金使君生别離念君去我時獨愁常苦悲想見君顔色感結傷心脾念君常苦悲夜夜不能寐莫以豪賢故棄捐素所愛莫以魚肉賤棄捐蔥與薤莫以麻枲賤棄捐菅與蒯出亦復苦愁入亦復苦愁邊地多悲風樹木何修修從軍致獨樂延年夀千秋劉勲妻王氏雜詩二首并序王宋者平虜將軍劉勲妻也入門二十餘年後勲恱山陽司馬氏女以宋無子出之還於道中作詩二首翩翩牀前帳張以蔽光煇昔將爾同去今将爾共歸緘藏篋笥裏當復何時披誰言去婦薄去婦情更重千里不唾并况乃昔所奉逺望未為遥歭􅡨不得往曹植雜詩五首明月照髙樓流光正徘徊上有愁思婦悲歎有餘哀借問歎者誰言是客子妻君行踰十年孤妾常獨棲君若清路塵妾若濁水泥浮沉各異勢㑹合何時諧願為西南風長逝入君懐君懐時不開妾心當何依西北有織婦綺縞何繽紛明晨秉機杼日晨不成文大息終長夜悲嘯入青雲妾身守空房良人行從軍自期三年歸今已厯九春孤鳥繞樹翔噭噭鳴索羣願為南流景馳光見我君微隂翳陽景清風飄我衣遊魚潜緑水翔鳥薄天飛眇眇客行士遥役不得歸始出嚴霜結今來白露晞遊子歎黍離處者歌式微慷慨對嘉賔悽愴内傷悲攬衣出中閨逍遥步兩楹閒房何寂寞緑草被階庭空室自生風百鳥翔南征春思安可忘憂戚與我并佳人在逺道妾身獨單焭歡㑹難再遇蘭芝不重榮人皆棄舊愛君豈若平生寄松為女蘿依水如浮萍束身奉衿帶朝夕不墮傾儻願終盼眄永副我中情南國有佳人容華若桃李朝遊江北岸夕宿瀟湘沚時俗薄朱顔誰為發皓齒俛仰歳將暮榮曜難久恃樂府三首美女妖且閑采桑岐路間長條紛冉冉落葉何翩翩攘䄂見素手皓腕約金環頭上金爵釵腰佩翠琅玕明珠交玉體珊瑚間木難羅衣何飄飄輕裾隨風還顧眄遺光彩長嘯氣若蘭行徒用息駕休者以忘餐借問女安居乃在城南端青樓臨大路髙門結重關容華暉朝日誰不希令顔媒氏何所營玉帛不時安佳人慕髙義求賢良獨難衆人何嗷嗷安知彼所歡盛年處房室中夜起長歎美女篇種葛南山下葛蔓自成隂與君初㛰時結髪恩義深歡愛在枕席宿昔同衣衾竊慕棠棣篇好樂和瑟琴行年將晩暮佳人懐異心恩絶曠不接我情遂抑沈出門當何顧徘徊步北林下有交頸獸仰見雙棲禽攀枝長歎息淚下霑羅衿良鳥知我悲延頸對我吟昔為同池魚今若商與參往古皆歡遇我獨困於今棄置委天命愁愁安可任種葛篇浮萍寄清水隨風東西流結髪辭嚴親來為君子仇恪勤在朝夕無端獲罪尤在昔蒙恩恵和樂如瑟琴何意今摧穨曠若商與參茱萸自有芳不若桂與蘭新人雖可愛無若故所歡行雲有反期君恩儻中還慊慊仰天歎愁愁將何愬日月不常處人生忽若遇悲風來入懐淚下如垂露發篋造裳衣裁縫紈與素浮萍篇棄婦詩一首石榴植前庭緑葉摇縹青丹華灼烈烈帷彩有光榮光好曄流離可以戲淑靈有鳥飛來集樹翼以悲鳴悲鳴夫何為丹華實不成拊心長歎息無子當歸寧有子月經天無子若流星天月相終始流星沒無精棲遲失所宜下與瓦石并憂懐從中來歎息通雞鳴反側不能寐逍遥於前庭歭􅡨還入房肅肅帷幕聲褰帷更攝帶撫弦彈素筝慷慨有餘音要妙悲且清收淚長歎息何以負神靈招摇待霜露何必春夏成晩穫為良實願君且安寧魏明帝樂府詩二首昭昭素明月暉光燭我牀憂人不能寐耿耿夜何長微風衝閨闥羅帷自飄颺攬衣曵長帶縱履下髙堂東西安所之徘徊以傍徨春鳥向南飛翩翩獨翺翔悲聲命儔匹哀鳴傷我腸感物懐所思泣涕忽霑裳種瓜東井上冉冉自踰垣與君新為㛰瓜葛相結連寄託不肖軀有如倚太山菟絲無根株蔓延自登縁萍藻託清流常恐身不全感君邱山恵賤妾執拳拳天日照知之想君亦俱然阮籍詠懐詩二首二妃逰江濵逍遥從風翔交甫解環珮婉孌有芬芳猗靡情懽愛千載不相忘傾城迷下蔡容好結中腸感激生憂思萱草樹蘭房膏沐為誰施其雨怨朝陽如何金石交一旦更離傷昔日繁華子安陵與龍陽夭夭桃李花灼灼有暉光恱懌若九春磬折似秋霜流眄發媚姿言笑吐芬芳攜手等懽愛宿昔同衾裳願為雙飛鳥比翼共翺翔丹青著明誓永世不相忘傅𤣥樂府詩七首青青河邊草悠悠萬里道草生在春時逺道還有期春至草不生期盡歎無聲感物懐思心夢想發中情夢君如鴛鴦比翼雲間翔既覺寂無見曠如參與商河洛自用固不如中岳安囘流不及反浮雲往自還悲風動思心悠悠誰知者懸景無停居忽如馳駟馬傾耳懐音響轉目涙雙墮生存無㑹期要君黄泉下青青河邊草篇苦相身為女卑陋難再陳兒男當門户墮地自生神雄心志四海萬里望風塵女育無欣愛不為家所珍長大逃深室藏頭羞見人無淚適他鄉忽如雨絶雲低頭和顔色素齒結朱脣跪拜無復數婢妾如嚴賔情合同雲漢葵藿仰陽春心乖甚水火百惡集其身玉顔隨年變丈夫多好新昔為形與影今為越與秦越秦時相見一絶踰參辰苦相篇豫章行有女懐芬芳媞媞步東箱蛾眉分翠羽明目發清揚丹脣翳皓齒秀色若珪璋巧笑露權靨衆媚不可詳容儀希世出無乃古毛嬙頭安金步摇耳繫明月璫珠環約素腕翠爵垂鮮光文袍綴藻黼玉體映羅裳容華既以豔志節擬秋霜徽音冠青雲聲響流四方妙哉英媛徳宜配侯與王靈應萬世合日月時相望媒氏陳束帛羔鴈鳴前堂百兩盈中路起若鸞鳯翔兄夫徒踴躍望絶殊參商有女篇豔歌行昭昭朝時日皎皎晨明月十五入君門一别終華髪同心忽異離曠如秦與越秦越有㑹時參辰遼且闊形影無髣髴音聲寂無達纎弦感促柱觸之哀聲發情思如循環憂來不可遏塗山有餘恨詩人詠采葛蜻蛚吟牀下囘風起幽闥春榮隨露落芙蓉生木末自傷命不遇良辰永乖别已爾可奈何譬如紈素裂孤雌翔故巢星流光景絶魂神馳萬里甘心要同穴朝時篇怨歌行皎皎明月光灼灼朝日暉昔為春繭絲今為秋女衣丹脣列素齒翠彩發娥眉嬌子多好言歡合易為姿玉顔盛有時秀色隨年衰常恐新間舊變故興細微浮萍無根本非水將何依憂喜更相接樂極自還悲明月篇秋蘭䕃玉池池水清且芳芙蓉隨風發中有雙鴛鴦雙魚自踴躍兩鳥時囘翔君期厯九秋與妾同衣裳秋蘭篇所思兮何在乃在西長安何用存問妾香䙞雙珠環何用重存問羽爵翠琅玕今我兮聞君更有兮異心香亦不可燒環亦不可沈香燒日有歇環沈日自深西長安行和班氏詩一首秋胡納令室三日宦他鄉皎皎潔婦姿泠泠守空房嬿婉不終夕别如參與商憂來猶四海易感難可防人言生日短愁者苦夜長百草揚春華攘腕采柔桑素手尋繁枝落葉不盈筐羅衣翳玉體囘目流彩章君子倦仕歸車馬如龍驤精誠馳萬里既至兩相忘行人恱令顔請息此樹傍誘以逢郎喻遂下黄金裝烈烈貞女忿言辭厲秋霜長驅及居室奉金升北堂母立呼婦來歡情樂未央秋胡見此婦惕然懐探湯負心豈不慙永誓非所望清濁必異源鳬鳯不並翔引身赴長流果哉潔婦腸彼夫既不淑此婦亦大剛張華情詩五首北方有佳人端坐鼔鳴琴終晨撫管弦日夕不成音憂來結不解我思存所欽君子尋時役幽妾懐苦心初為三載别於今久滯滛昔邪生户牖庭内自成林翔鳥鳴翠隅草蟲相和吟心悲易感激俛仰淚流衿願託鷐風翼束帶侍衣衾明月曜清景朧光照𤣥墀幽人守静夜囘身入空帷束帶俟將朝廓落晨星稀寐假交精爽覿我佳人姿巧笑媚權靨聨媚眸與眉寐言增長歎悽然心獨悲清風動帷簾晨月燭幽房佳人處遐逺蘭室無容光衿懐擁虚景輕衾覆空牀居懽惜夜促在慼怨宵長撫枕獨吟歎綿綿心内傷君居北海陽妾在南江隂懸邈修塗逺山川阻且深承驩注隆愛結分投所欽銜思守篤義萬里託微心遊自四野外逍遥獨延佇蘭蕙縁清蕖繁華䕃緑渚佳人不在兹取此欲誰與巢居覺風飄穴處識隂雨未曾逺别離安知慕儔侣雜詩二首逍遥遊春宫容與緑池阿白蘋齊素葉朱草茂丹華微風摇茝若增波動芰荷榮彩曜中林流馨入綺羅王孫遊不歸脩途邈以遐誰與翫遺芳佇立獨咨嗟荏苒日月運寒暑忽流易同好遊不存苕苕逺離析房櫳自來風户庭無行迹蒹葭生牀下蛛蝥網四壁懐思豈不隆感物重鬱積遊鴈比翼翔歸鴻知接翮來哉彼君子無愁徒自隔潘岳内顧詩二首静居懐所歡登城望四澤春草鬱青青桑柘何奕奕芳林振朱榮緑水激素石初征冰未泮忽焉振絺綌漫漫三千里苕苕逺行客馳情戀朱顔寸隂過盈尺夜愁極清晨朝悲終日夕山川信悠永願言良弗獲引領訊歸雲沈思不可釋獨悲安所慕人生若朝露綿邈寄絶域眷戀想平素爾情既來追我心亦還顧形體隔不達精爽交中路不見山上松隆冬不易故不見陵澗柏歳寒守一度無謂希是疎在逺分彌固悼亡詩二首荏苒冬春謝寒暑忽流易之子歸窮泉重壤永幽隔私懐誰克從淹留亦何益僶俛恭朝命囘心反初役望廬思其人入室想所厯幃屏無髣髴翰墨有餘迹流芳未及歇遺挂猶在壁帳幔如或存囘遑忡驚惕如彼翰林鳥雙棲一朝隻如彼遊川魚比目中路析春風縁隙來晨霤依簷滴寢息何時忘沈憂日盈積庶幾有時衰莊缶猶可擊曒曒窓中月照我室南端清商應秋至溽暑隨節闌癝癝凉風升始覺夏衾單豈曰無重纊誰與同嵗寒嵗寒無與同朗月何朧朧展轉眄枕席長簟竟牀空牀空委清塵室虚來悲風獨無李氏靈彷彿覩爾容撫衿長歎息不覺涕霑胷霑胷安能已悲懐從中起寢興自存形遺音猶在耳上慙東門吳下媿蒙莊子賦詩欲言志零落難具紀命也詩奈何長戚自令鄙石崇王昭君辭一首并序王明君者本為王昭君以觸文帝諱故改匈奴盛請㛰於漢元帝以後宫良家女子明君配焉昔公主嫁烏孫令琵琶馬上作樂以慰其道路之思其送明君亦必爾也其造新之曲多哀怨之聲故敘之於紙云爾我本漢家子將適單于庭辭訣未及終前驅已抗旍僕御涕流離轅馬為悲鳴哀鬱傷五内泣淚霑珠瓔行行日已逺乃造匈奴城延我於穹廬加我閼氏名異國非所安雖貴非所榮父子見陵辱對之慙且驚殺身良未易黙黙以苟生苟生亦何聊積思常憤盈願假飛鴻翼棄之以遐征飛鴻不我顧佇立以屏營昔為匣中玉今為糞上英朝華不足歡甘為秋草并傳語後世人逺嫁難為情左思嬌女詩一首吾家有嬌女皎皎頗白晳小字為紈素口齒自清厯鬢髪覆廣額雙耳似連璧明朝弄梳臺黛眉類埽跡濃朱衍丹脣黄吻瀾漫赤嬌語若連瑣忿速乃明㦎握筆利彤管篆刻未期益執書愛綈素誦習矜所獲其姊字恵芳面目􅀈如畫輕莊喜縷邊臨鏡忘紡績舉觶擬京兆立的成復易玩弄眉頰間劇兼機杼役從容好趙舞延袖像飛翮上下弦柱際文史輒巻襞顧眄屏風畫如見已指擿丹青日塵闇明義為隠賾馳騖翔園林菓下皆生摘紅葩掇紫蔕萍實驟扺擲貪華風雨中倐眒數百適務躡霜雪戲重綦常累積并心注肴饌端坐理盤槅翰墨戢函按相與數離逖動為鑪鉦屈屣履任之適止為荼菽據吹吁對鼎䥶脂膩漫白袖烟勲染珂錫衣被皆重池難與次水碧任其孺子意羞受長者責瞥聞當與杖掩淚俱向壁玉臺新詠巻二欽定四庫全書玉臺新詠巻三陳徐陵撰陸機擬古七首為顧彦先贈婦二首周夫人贈車騎一首樂府三首陸雲為顧彦先贈婦往反四首張協雜詩一首楊方合歡詩五首王鑒七夕觀織女詩一首李充嘲友人一首曹毗夜聽𢷬衣一首陶潛擬古詩一首荀昶樂府詩二首王微雜詩二首謝恵連雜詩三首劉鑠雜詩五首陸機
