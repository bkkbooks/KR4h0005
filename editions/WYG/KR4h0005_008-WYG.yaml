body:
  text: 陳徐陵撰蕭子顯樂府二首王筠和呉主簿六首劉孝綽雜詩五首劉遵雜詩二首王訓奉和率爾有詠一首庾肩吾雜詩七首劉孝威雜詩三首徐君蒨雜詩二首鮑泉雜詩二首劉緩雜詩四首鄧鏗雜詩二首甄固奉和世子春情一首庾信雜詩三首劉邈雜詩四首紀少瑜雜詩三首聞人蒨春日一首徐孝穆雜詩四首呉孜雜詩一首湯僧濟雜詩一首徐悱妻雜詩一首王叔英妻雜詩一首蕭子顯樂府二首大明上苕苕陽城射凌霄光照忩中婦絶世同阿嬌明鏡盤龍刻簪羽鳯皇雕逶迤梁家髻冉弱楚宫腰輕紈雜重錦薄縠間飛綃三六前年暮四五今年朝蠶園拾芳繭桑陌采柔條出入東城里上下洛西橋忽逢車馬客飛蓋動襜軺單衣鼠毛織寶劒羊頭銷丈夫疲應對御者輟銜鑣柱間徒脉脉垣上㡬翹翹女夲西家㝛君自上宫要漢馬三萬匹夫壻仕嫖姚鞶囊虎頭綬左珥鳬盧貂横吹龍鐘管奏鼓象牙簫十五張内侍十八賈登朝皆笑顔郎老盡訝董公超日出東南隅行邯鄲蹔輟舞巴姬請罷絃佳人淇洧上艷趙復傾燕繁穠旣為李照水亦成蓮朝沽成都酒暝數河間錢餘光幸未借蘭膏空自煎代樂府美女篇王筠六首和吳主簿日照鴛鴦殿萍生鴈鶩池遊塵隨影入弱柳帶風垂青骹逐黄口獨鶴惨覊雌同衾遠遊說結愛乆生離於今方溘死寜須萱草枝巻葹心未發蘼蕪葉欲齊春蠶方曳緖新鷰正銜泥野雉呼雌雊庭禽挾子棲從君客梁後方晝掩春閨山川隔道里芳草徒萋萋春月二首九重依夜管四壁慘無暉招摇顧西落烏鵲向東飛流螢漸收火絡緯欲催機爾時思錦字特製行人衣所望丹心達嘉客儻能歸露華初泥泥桂枝行梀梀殺氣下重軒輕陰滿四屋别寵增脩夜遠征悲獨㝛愁縈翠羽眉淚滿横波目長門絶來徃含情空杼軸秋夜二首落日照紅妝挾瑟當忩牖寜復歌蘼蕪惟聞歎楊柳結好在同心離别由衆口徒設露葵羮誰酌蘭英酒㑹日杳無期蕣華安得乆相思不安席聊至狹邪東愁眉倣戚里高髻學城中雙眉偏照日獨繠好縈風自陳心所想獻賦甘泉宫傳聞方鼎食詎憶春閨中遊望二首劉孝綽五首河流既浼浼河鳥復關關落花浮浦出飛雉度州還此日倡家女競嬌桃李顏良人惜美珥欲以代芳菅新縑疑故素盛趙蔑衰班曳綃事掩縠摇珮奪鳴環客心空振蕩髙枝不可攀遥見隣舟主人投一物衆姬爭之有客請余為詠桑中始奕奕淇上未湯湯美人要雜珮上客誘明璫月闇人聲静微歩出蘭房露葵不待勸鳴琴無暇張翠釵挂已落羅衣拂更香如何嫁蕩子春夜守空牀不見青絲騎徒勞紅粉妝淇上人戲蕩子婦示行事一首南皮弦吹罷終奕且留賔日下房櫳闇華燭命佳人側光全照局回花半隠身不辭纎手巻羞令夜向晨賦得照棊燭刻五分成鵾弦且輟弄鶴操暫停徽别有嗁烏曲東西相背飛倡人怨獨守蕩子遊未歸若逢生離曲長夜泣羅衣夜聽妓賦得烏夜嗁遺簪雕瑇瑁贈綺織鴛鴦未若華滋樹交枝蕩子房别前秋已落别後春更芳所思不可寄誰憐盈袖香賦得遺所思劉遵雜詩二首可憐周小童微笑摘蘭叢鮮膚勝粉白慢臉若桃紅挾彈雕陵下垂釣蓮葉東腕動飄香麝衣輕任好風幸承拂枕選得奉畫堂中金屏幛翠被藍帊覆薰籠本欲傷輕薄含辭羞自通剪袖恩雖重殘桃愛未終蛾眉詎須嫉新妝遞入宫繁華應令漢水深難渡深潭見水清錦笮繫鳬舸珠竿懸翠旍鳴笳芳樹曲流唱采蓮聲神遊不停駕日暮反連營寜顧空房裏階上緑苔生從頓還城應令王訓一首殿内多仙女從來難比方别有當忩艷復是可憐妝學舞勝飛鷰染粉薄南陽散黄分黛色薰衣雜棗香簡釵新輾翠試履逆塡牆一朝恃容色非復守空房君恩若可恃願作雙鴛鴦奉和率爾有詠庾肩吾雜詩七首佳期竟不歸春物坐芳菲拂匣看離扇開箱見别衣井桐生未合宫槐巻復稀不及銜泥鷰從來相逐飛詠得有所思欲知畫能巧喚取真來映並出似分身相看如照鏡安釵等疎宻著領俱周正不解平城圍誰與丹青競詠美人自看畫應令桂宫連複道黄山開廣路遠聽平陵鐘遥識新豐樹合殿生光彩離宫起烟霧日落歌吹還塵飛車馬度賦得横吹曲長安道春花競玉顏俱折復俱攀細腰宜窄衣長釵巧挾鬟洛橋初度燭青門欲上關中人應有望上客莫前還南苑還看人相逢小苑北停車問苑中梅新雜柳故粉白映綸紅去影背斜日香衣臨上風雪流階漸黒冰開池半通去馬船難駐嗁烏曲未終眷然從此别車西馬復東送别於建興苑相逢征人别未乆年芳復臨牖燭下夜縫衣春寒偏著手願及歸飛鴈因書寄髙柳應令春宵隣雞聲已傳愁人竟不眠月光侵曙後霜明落曉前縈鬟起照鏡誰忍挿花鈿應令冬曉劉孝威雜詩三首鵲飛空繞樹月輪殊未圓常娥望不出桂枝猶隠殘落照移樓影浮光動塹瀾􅌴馬悲羌吹城烏嗁塞寒傳聞機杼妾愁余衣服單當秋絲已脆銜嗁織復難斂眉雖不樂舞劒强為歡請謝函關吏行當泥一丸侍宴賦得龍沙宵月明妾家邊洛城慣識曉鐘聲鐘聲猶未盡漢使報應行天寒硯水凍心悲書不成奉和湘東王應令冬曉妖姬含怨情織素起秋聲度梭環玉動踏躡珮珠鳴經稀疑杼濕緯斷恨絲輕蒲桃始欲罷鴛鴦猶未成雲棟共徘徊紗忩相向開忩疎眉語度紗輕眼笑來曨曨隔淺沙的的見妝華鏤玉同心萬列寶連枝花紅衫向後結金簪臨鬢斜機頂挂流蘇機傍垂結珠青絲引伏兎黄金繞鹿盧艷彩裾邊出芳脂口上渝百城交問道五馬共歭􅡨直為閨中人守故不要新夢嗁漬花枕覺淚濕羅巾獨眠真自難重衾猶覺寒愈憶凝脂暖彌想横陳歡行驅金絡騎歸就城南端城南稍有期想子亦勞思羅襦乆應罷花釵堪更治新妝莫㸃黛余還自畫眉鄀縣遇見人織率爾寄婦徐君蒨雜詩二首歡多情未極賞至莫停桮酒中挑喜子粽裏覓楊梅簾開風入帳燭盡炭成灰勿疑鬢釵重為待曉光來共内人夜坐守歲梳飾多今世衣著一時新草短猶通屧梅香漸著人樹斜牽錦帔風横入紅綸滿酌蘭英酒對此得娛神初春攜内人行戲鮑泉雜詩二首洛陽小苑地車馬盛經過縁溝駐行幰傍栁轉鳴珂履髙含響珮襪輕半隠羅浮雲無處所何用轉横波南苑看遊者妖姬競早春上苑逐名辰苔輕變水色霞濃掩日輪雕甍斜落影畫扇拂遊塵衣香遥已度衫紅遠更新誰家蕩舟妾何處織縑人落日看還劉緩雜詩四首不信巫山女不信洛川神何關别有物還是傾城人經共陳王戲曾與宋家隣未嫁先名玉來時本姓秦粉光猶似靣朱色不勝脣遥見疑花發聞香知異春釵長逐鬟袜小稱腰身夜夜言嬌盡日日態還新工傾荀奉倩能迷石季倫上客徒留目不見正横陳敬酬劉長史詠名士悅傾城别後春池異荷盡欲生冰箱中剪刀冷臺上靣脂凝纎腰轉無力寒衣恐不勝寒閨樓上起秋風絶望秋閨中燭溜花行滿香燃籨欲空徒交兩行淚俱浮妝上紅秋夜不堪寒夜乆夜夜守空牀衣裾逐坐襵釵影近燈長無憐四幅錦何湏辟惡香冬宵雜詠和湘東王三首鄧鏗雜詩二首别離雖未乆遂如長别離叢桂頻銷葉庭樹幾攀枝君言妾貎改妾畏君心移終湏一相見併得兩相知和隂梁州雜怨燭華似明月鬟影勝飛橋妓兒齊鄭舞爭妍學楚腰新歌自作曲舊瑟不須調衆中俱不笑座上莫相撩奉和夜聽妓聲甄固詩一首昨晩褰簾望初逢雙鷰歸今朝見桃李不啻數花飛以愁春欲度無復寄芳菲奉和世子春情庾信雜詩三首洞房花燭明燕餘雙舞輕頓履隨疎節低鬟逐上聲半轉行初進飄衫曲未成回鸞鏡欲滿鵠顧市應傾已曾天上學詎似世中生奉和詠舞牽牛遥映水織女正登車星橋通漢使機石逐仙槎隔河相望近經秋别離賒愁將今夕恨復著明年花七夕紫閤旦朝罷中臺文奏稀無復千金笑徒勞五日歸步檐朝未埽蘭房晝掩扉苔生理曲處網積回文機故瑟餘弦斷歌梁秋鷰飛朝雲雖可望夜帳定難依願憑甘露入方假慧鐙煇寧知洛城晩還淚獨霑衣仰和何僕射還宅懷故劉邈雜詩四首倡妾不勝愁結束下青樓逐伴西蠶路相攜東陌頭葉盡時移樹枝髙乍易鉤絲繩挂且脱金籠寫復收蠶飢日已暮詎為使君留萬山見采桑人纎纎運玉指脈脈正蛾眉振躡開交縷停梭續斷絲檐花照初月洞戸未垂帷弄機行掩淚翻令織素遲見人織聊為之詠螢飛綺忩外妾思霍將軍鐙前量獸錦檐下織花紋墜露如輕雨長河似薄雲秋還百種事衣成未暇薰秋閨髙樓十載别楊栁擢新枝摘葉驚開駛攀條恨乆離年年阻音信月月減容儀春來誰不望相思君自知鼓吹曲折楊栁紀少瑜雜詩三首丹陵抱天邑紫淵更上林銀臺懸百仞玉樹起千尋水流冠蓋影風揚歌吹音歭􅡨憐拾翠顧步惜遺簪日落庭花轉方幰屢移隂終言樂未極不道愛黄金建興苑庭樹發春煇遊人競下機却匣擎歌扇開箱擇舞衣桑萎不復惜看光遽將夕自有專城居空持迷上客擬吳均體應教愁人試出牖春色定無窮參差依網日澹蕩入簾風落花還繞樹輕飛去隠空徒令玉筯迹雙垂明鏡中春日聞人蒨詩一首髙臺動春色清池照日華緑葵向光轉翠栁逐風斜林有驚心鳥園多奪目花相與咸知節歎子獨離家行人今不返何勞空折麻春日徐孝穆雜詩四首此日乍殷勤相嫌不如春今宵花燭淚非是夜迎人舞席秋來巻歌筵無數塵曾經新代故那惡故迎新片月窺花簟輕寒入帔巾秋來應瘦盡偏自著腰身走筆戲書應令十五屬平陽因來入建章主家能教舞城中巧旦妝低鬟向綺席舉袖拂花黄燭送忩邊影衫傳鉿裏香當關好留客故作舞衣長奉和詠舞倡人歌吹罷對鏡覽紅顏拭粉留花稱除釵作小鬟綺鐙停不滅髙扉掩未關良人在何處惟見月光還和王舍人送客未還閨中有望信來贈寶鏡亭亭似圓月鏡乆自踰明人乆情踰歇取鏡挂空臺於今莫復開不見孤鸞鳥亡魂何處來為羊兖州家人答餉鏡吳孜雜詩一首玉關信使斷借問不相諳春光太無意窺忩來見參乆與光音絶忽值日東南栁枝皆嬲鷰桑葉復催蠶物色頓如此孀居自不堪春閨怨湯僧濟雜詩一首昔日倡家女摘花露井邊摘花還自挿照井還自憐窺窺終不罷笑笑自成妍寶釵於此落從來不憶年翠羽成泥去金色尚如先此人今不在此物今空傳詠渫井得金釵徐悱妻雜詩一首日落應門閉愁思百端生况復昭陽近風傳歌吹聲寵移終不恨讒枉太無情只言爭分理非妒舞腰輕和婕妤怨王叔英妻劉氏雜詩一首一生竟何定萬事良難保丹青失舊圖玉匣成秋草相接辭關淚至今猶未燥漢使汝南還殷勤為人道和昭君怨玉臺新詠巻八欽定四庫全書玉臺新詠巻九陳徐陵撰梁武帝歌辭一首梁元帝樂府一首越人歌一首司馬相如琴歌二首烏孫公主歌詩一首漢成帝時童謠歌二首漢桓帝時童謡歌二首張衡四愁詩四首秦嘉四言贈婦詩一首魏文帝樂府燕歌行二首曹植樂府妾薄命行一首傅𤣥雜詩八首張載擬四愁詩四首晉恵帝時童謠歌一首陸機樂府燕歌行一首鮑照雜詩八首釋寳月行路難一首陸厥李夫人及貴人歌一首沈約雜詩八詠四首呉均行路難二首張率雜詩四首費昶行路難二首梁簡文雜題一十二首湘東王繹七言春别應令四首蕭子顯雜詩七首王筠行路難一首劉孝綽元廣州景仲座見故姬一首劉孝威擬古應令一首徐君蒨别義陽郡詩二首王叔英妻贈答一首
