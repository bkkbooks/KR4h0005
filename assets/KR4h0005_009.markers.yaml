  - {type: variant, offset: 6037, length: 3404, content: 古詩題六首藏暮愍衰草愍衰草衰草無容色憔悴荒徑中寒萎不可識昔時兮春日昔時兮春風含華兮佩實垂綠兮散紅氛氳鳷鵲右照曜望仙東送歸顧莫泣淇水嘉客淹留懷上宮岩陣兮海岸冰多兮霧散爛熳兮客根攢幽兮石隙布綿密於寒皋吐纖疏於危石既惆悵於君子倍傷心於行役露高枝於初旦霜紅天於始夕彫芳卉之九衢寶靈茅之三脊風急崤路難秋至客衣單既傷簷下菊復悲池上蘭飄落逐風轉方知歲早寒流螢暗明燭鴈聲斷纔續萎絕長信宮蕪穢丹墀曲霜奪莖上紫風銷葉中綠山奕兮青薇水折兮黃葦秋鴻兮疎引寒鳥兮輕飛逕荒寒草合桐長舊巖圍夜漸蘼蕪沒霜露日沾衣願逐晨征鳥薄暮共西歸霜來悲落桐悲落桐落桐早霜露燕至葉未抽鴻來波已素本出龍門山長枝仰刺天上峰百丈絕下趾萬尋懸幽根已盤結孤枝復為絕初不照光景終年負霜雪自顧無羽儀不願生曲池芬芳本自乏華實無可施匠者時留盻王孫少見之分取生孤卉徙置北堂垂宿莖抽晚榦新葉生故枝故枝雖遼遠新葉頗離離春風一朝至榮啟坐如斯自惟良菲薄君思徒照灼顧已非嘉樹空用憑阿閣願作清廟琴為舞雙玄鶴薜荔可為裳文杏可為梁勿言草木賤徒照君末光朱末光不徒照為君含噭眺陽柯綠冰弦陰枝苦寒調厚德不可任敢不虛其心若逢陽春至吐綠照清潯夕行聞夜鶴聞夜鶴夜鶴叫南池對此孤明月臨風振羽儀伊吾人之菲薄無賦命之天爵抱跼促之長懷隨冬春而哀樂愍海上上之驚鳧傷雲間之離鶴離鶴昔未離近發天北垂忽值疾風起暫下昆明池復值冬冰合水宿非所宜欲留不可住欲去飛已疲勢逐疾風舉求溫向衡楚復值南飛鴻參差共成侶海上多雲霧蒼茫失洲嶼自此別故群獨向瀟湘渚故群不離散相依蒼海畔夜止羽相切晝飛影相亂刷羽共浮沉湛澹泛清潯既不得離別安知慕侶心九冬霜雪苦六翮飛不任且養凌雲翅俛仰弄清音所望浮丘子旦夕來見尋晨征聽曉鴻聽曉鴻曉鴻度將旦跨弱水之微瀾發成山之遠岸怵春歸之未幾驚此歲之云半出海漲之蒼茫入雲途之杳漫無東西之可辨孰遐邇之能筭微昔見於洲渚越秋期於江漢集勁風於弱軀負重雪於輕翰寒溪可以飲荒皋可以竄溪水徒自清微形豈足翫秋蓬萎兮未極寒草衰兮無色楚山高兮杳難度越水深兮不可測美明月之微馳光願征禽之騁翼伊余馬之屨懷知吾行之未極夜綿綿而難曉愁參差而盈臆望山川悉無以唯星河猶可識聞鴈夜南飛客淚夜沾衣春鴻思暮反客子方未歸歲去歡娛盡年來容貌非攬衽形雖是撫臆事多違青蒲雖長復易解白雲誠遠詎難依解珮去朝市去朝市朝市深歸暮辭北纓而南徂浮東川而西顧逢天地之降祥值日月之重光伊當仁之菲薄非余情之信芳充待詔於金馬眷齊宴於柏梁觀鬭獸於虎圈望窅窕於坡香遊西園兮登銅雀舉青璅兮眺重陽講金華兮議宣室晝武帷兮夕文昌佩甘泉兮履五祚贊朽諧兮緩承光託後車兮侍華幄遊勃海兮泛清漳天道有盈缺寒暑遞炎涼一朝賣玉椀春暮惜餘香曲池無復處桂枝亦銷亡清廟徒肅肅西陵久茫茫薄暮余多幸嘉運重來昌忝稽郡之南尉典千里之光貴別北荒之濁河戀橫橋於清渭望前軒之早桐對南階之初卉非余情之屢傷寄茲焉兮能慰眷昔日兮懷哉日將暮兮歸去來披褐守山東守山東山東萬里鬱青葱兩溪共一寫水潔望如空岩側青莎披岩間丹桂叢上瞻既隱隱下睇亦冥濛遠林響包獸近樹聒鳴虫路帶若溪右泉吐金華東萬仞倒危石百丈涇懸叢瀑曳瀉疎電奔飛似白虹洞并含清氣漏穴吐飛風玉竇膏滴瀝石室乳空籠峭崿塗彌險崖岨步纔通余拾平生之所愛歘暮年而逢此願一去而不還恨衣之未褫挹林壑之清曠事泯俗之詭紛幸帝德之方升值天網之未毀既除舊而就新故化民而俗徙播趙俗以徂扇齊風以東靡乳雉方可馴流蝗庶能弭清心矯世濁儉政救民侈滿秩歸白雲淹留事芝體張衡定情歌大火流兮草蟲鳴繁霜降兮草木零秋為期兮時已征思美人兮愁屏營白紵曲遷遷徐動何盈盈玉腕俱凝若雲行佳人舉袖耀清蛾摻摻擢手映鮮羅狀如明月汎雲河體如輕風動流波北風行北風涼雨雪雱洛陽女兒多妍粧遙豔帷中自悲傷沉吟不語若為忘問君前行何當歸苦使妾坐自傷悲慮年去慮顏衰情易復恨難追楚明妃曲瓊臺彩楹桂寢雕甍金閨流耀玉牖含英香芬幽藹珠彩珍榮文羅秋翠紈綺春輕驂駕鸞鶴往來仙靈含姿綿視微笑相迎結蘭枝送目成當年為君榮白紵歌少年窈窕舞君前容華豔豔將欲然為君嬌凝復遷延流目送笑不敢言長袖拂面心自煎願君流光及盛年秋風歌秋風嫋嫋入曲房羅帳含月思心傷蟋蟀夜鳴斷人腸夜長思君心飛揚他人相思君相忘錦衾瑤席為誰芳歌思引秋寒依依風過河白露蕭蕭洞庭波思君末光光已滅眇眇悲望如思何江南弄眾花雜色滿上林舒芳耀綠垂輕陰連手躞蹀舞春心舞春心臨歲腴中人望獨踟躕龍笛曲美人綿眇在雲堂雕金鏤竹眠玉床婉愛寥亮繞紅梁繞紅梁流月臺駐狂風鬱徘徊採菱曲江南稚女珠腕繩金翠搖首紅顏興桂棹容與歌採菱歌採菱心未怡翳羅袖望所思遊女曲氛氳蘭麝體芳滑容色玉耀眉如月珠珮婐㛂戲金闕戲金闕游紫庭舞飛閣歌長生朝雲曲張樂陽臺歌上歇如寢如興芳晻曖容光既豔復還沒復還沒望不來巫山高心徘徊白紵辭二首朱絲玉柱羅象筵飛琯促節舞少年短歌流目未肯前含笑一轉私自憐纖腰嫋嫋不任衣嬌態獨立特為誰赴曲君前未忍歸上聲急調中心飛江南曲枝中水上春併歸