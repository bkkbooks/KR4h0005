seq: 6
front:
  text: 妾思不堪采桑渭城南帶減連枝繡髪亂鳯皇篸花舞衣裳薄蛾飛愛緑潭無由報君子流涕向春蠶其一妾本倡家女出入魏王宫既得承琱輦亦在更衣中蓮花銜青雀寳粟鈿金蟲猶言不得意流涕憶遼東其二春草攏可結妾心正斷絶緑鬢愁中改紅顔嗁裏滅非獨淚成珠亦見珠成血願為飛鵲鏡翩翩照離别其三何處報君書隴右五岐路淚研兎枝墨筆染鵝毛素碧浮孟渚水香下洞庭路應歸遂不歸芳春空擲度其四妾家横塘北發艷小長干花釵玉腕轉珠繩金絡丸羃䍥懸青鳯逶迤揺白團誰堪乆見此含恨不相看其五匈奴數欲盡僕在玉門闗蓮花穿劒鍔秋月掩刀環春機鳴窈窕夏鳥思緜蠻中人坐相望狂夫終未還其六和蕭洗馬子顯古意六首黄鸝飛上苑緑芷出汀洲日映昆明水春生鳷鵲樓飄颺白花舞瀾漫紫萍流畫織回文錦無因寄隴頭思君甚瓊樹不見方離憂鳴鞭適大阿聨翩渡漳河燕姬及趙女挾瑟夜經過纎腰曳廣袖半額畫長蛾客本倦遊者箕帚在江沱故人不可棄新知空復何離君苦無樂向暮心悽悽要途訪趙使聞君仕執珪杜蘅色已發菖蒲葉未齊羃䍥蠶弭繭差池鷰吐泥願逐春風去飄蕩至遼西白日隱城樓勁風掃寒木離析隔西東執手異涼燠相思咽不言洞房清且肅嵗去甚流煙年來如轉軸别鶴千里飛孤雌夜未宿閨房宿已靜落月有餘暉寒蟲隠壁思秋蛾繞燭飛絶雲斷更合離禽去復歸佳人今何在迢遞江之湄一為别鶴弄千里淚霑衣秋雲靜晩天寒夜方綿綿聞君吹急管相思雜采蓮别離未幾日髙月三成弦蹀疊黄河浪嘶喝隴頭蟬寄君蘼蕪葉揷著叢臺邊
