  - {type: variant, offset: 17, length: 0, content: '', WYG: 殆後人之所追改如劉勰文心雕龍夲作於齊而題梁通事舍人也其書前八巻為自漢至梁五言詩第九巻為歌行第十巻為五言二韻之詩雖皆取綺羅脂粉之詞而去古未逺猶有講於温柔敦厚之遺未可概以淫艶斥之其中如曹植棄婦篇庾信七夕詩今夲集皆失載據此可補闕佚又如馮惟訥詩紀載蘇伯玉妻盤中詩作漢人據此知為晋代梅鼎祚詩乗載蘇武妻答外詩據此知為魏文帝作古詩西北有髙樓等九首文選無名氏據此知為枚乗作飲馬長城窟行文選亦無名氏據此知為蔡邕作其有資攷證者亦不一明代刻夲妄有増益故馮舒疑庾信有入北之作江總濫擘牋之什茅元楨夲顛倒改竄更甚此夲為趙宦光家所傳宋刻末有嘉定乙亥永嘉陳玉父重刻跋最為完善間有後人附入之作如武陵王閨妾寄征人詩沈約八詠之六諸篇皆一一註明尤為精審然玉父跋稱初從外家李氏得舊京夲間多錯謬後得石氏所藏録夲以補亡校脱其中如五言詩中入李延年歌一首陳琳飲馬長城窟行一首皆自亂其例七言詩中移東飛伯勞歌於越人歌之前亦乖世次疑石氏夲有所竄亂而玉父因之未察也觀劉克莊後村詩話所引玉臺新詠一一與此本脗合而嚴羽滄浪詩話謂古詩行行重行行篇玉臺新詠以越鳥巢南枝以下另為一首今此本仍聨為一首又謂盤中詩為蘇伯玉妻作見玉臺集今此本乃溷列傅元詩中葢克莊所見即此本羽所見者又一别本是宋刻已有異同非陵之舊矣特不如明人變亂之甚為尚有典型耳乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀玉臺新詠序}
