body:
  text: 鮑昭雜詩九首始見西南樓纎纎如玉鉤末映東北墀娟娟似娥眉娥眉蔽珠櫳玉鉤隔瑣窓三五二八時千里與君同夜移衡漢落徘徊帷戸中歸華先委露别葉早辭風客遊厭辛苦仕子倦飄塵休澣自公日晏慰及私辰蜀琴抽白雪郢曲繞陽春肴乾酒未缺金壺啓夕淪囘軒駐輕蓋留酌待情人翫月城西門鳯樓十二重四户八綺窻繡桷金蓮花桂柱玉盤龍珠簾無隔露羅幌不勝風寳帳三千萬為爾一朝容揚芬紫煙上垂彩緑雲中春吹囘白日霜歌落塞鴻但懼秋塵起盛愛逐衰蓬坐視青苔滿卧對錦筵空琴筑縱横散舞衣不復縫古來皆歇薄君意豈獨濃惟見雙黄鵠千里一相從代京雒篇直如朱絲繩清如玉壺冰何慙宿昔意猜恨坐相仍人情賤恩舊世義逐衰興毫髪一為瑕邱山不可勝食苗實碩鼠㸃白信蒼蠅鳬鵠逺成美薪芻前見凌申黜裒女進班去趙姬昇周王日淪惑漢帝益嗟稱心賞雖難恃貌恭豈易慿古来共如此非君獨撫膺擬樂府白頭吟季春梅始落女工事蠶作采桑淇洧間還戲上宫閣早蒲時結隂晩篁初解籜藹藹霧滿閨融融景盈幕乳燕逐草蟲巢蜂拾花藥是節最暄妍佳服又新爍斂歎對囘塗揚歌弄場藿抽琴試佇思薦珮果誠託承君郢中美服義久心諾衛風古愉􅃩鄭俗舊浮薄虚願悲渡湘空賦笑瀍洛盛明難重來淵意為誰涸君其且調弦桂酒妾行酌采桑詩銜淚出郭門撫劔無人逵沙風闇塞起離心眷鄉畿夜分就孤枕夢想暫言歸孀婦當户笑搔絲復鳴機慊款論久别相將還綺幃靡靡簷下涼朧朧窻裏煇刈蘭争芬芳采菊競葳蕤開匳集香蘇探袖解纓徽寐中長路近覺後大江違驚起空歎息恍忽神魂飛白水漫浩浩髙山壯巍巍波潮異往復風霜改榮衰此土非吾土慷慨當訴誰夢還詩河畔草未黄胡鴈已矯翼秋蛩扶户吟寒婦晨夜織去歳征人還流傳舊相識聞君上壟時東望久歎息宿昔衣帶改旦暮異容色念此憂如何夜長憂向多明鏡塵匣中寳琴生網羅擬古雙燕戲雲崖羽翮始差池出入南閨裏經過北堂垂意欲巢君幕層楹不可窺沈吟芳歳晩徘囘韶景移悲歌辭舊愛銜泥覔新知詠燕寒灰滅更然夕華晨更鮮春冰雖暫解冬冰復還堅佳人捨我去賞愛長絶縁歡至不留時每感輙傷年雙劔將别離先在匣中鳴煙雨交將夕從此遂分形雌沈吳江水雄飛入楚城吳江深無底楚城有崇扃一為天地别豈直阻幽明神物終不隔千祀儻還并贈故人王素學阮步兵體沈情發遐慮紆鬱懐所思髣髴聞簫管鳴鳯接嬴姬聮綿共雲翼嬿婉相攜持寄言芳華士寵利不常期涇渭分清濁視彼谷風詩吳邁逺擬樂府四首可憐雙白鶴雙雙絶塵氛連翩弄光景交頸遊青雲逢羅復逢繳雌雄一旦分哀聲流海曲孤叫出江濆豈不慕前侣為爾不及羣步步一零淚千里猶待君樂哉新相知悲矣生别離恃此百年命共逐寸隂移譬如空山草零落心自知飛來雙白鵠百里望咸陽知是帝京域緑樹揺雲光春城起風色佳人愛景華流靡園塘側妍姿􅃩月映羅衣飄蟬翼宋玉歌陽春巴人長歎息雅鄭不同賞那令君愴惻生平重愛恵私自憐何極陽春曲生離不可聞况復長相思如何與君别當我盛年時􅈍花每揺蕩妾心空自持榮乏草木歡悴極霜露悲富貴身難老貧賤年易衰持此斷君腸君亦宜自疑淮隂有逸將折翮謝翻飛楚亦扛鼎士出門不得歸正為隆準公杖劔入紫微君才定何如白日下争暉長别離晨有行路客依依造門端人馬風塵色知從河塞還時我有同棲結宦遊邯鄲將不異客子分飢復共寒煩君尺帛書寸心從此單遣妾長憔悴豈復歌笑顔簷隠千霜樹庭枯十載蘭經春不舉袖秋落寧復㸔一見願道意君門已九關虞卿棄相印擔簦為同歡閨隂欲早霜何事空盤桓長相思鮑令暉雜詩六首裊裊臨窻竹藹藹垂門桐灼灼青軒女泠泠髙臺中明志逸秋霜玉顔􅃩春紅人生誰不别恨君早從戎鳴弦慙夜月紺黛羞春風擬青青河畔草客從逺方來贈我漆鳴琴木有相思文弦有别離音終身執此調歳寒不改心願作陽春曲宫商長相尋擬客從逺方來自君之出矣臨軒不解顔砧杵夜不發髙門晝常關帳中流熠燿庭前華紫蘭物枯謝節異鴻來知客寒遊用暮冬盡除春待君還題書後寄行人寒鄉無異服衣氈代文練月月望君歸年年不解綖荆揚春早和幽冀猶霜霰北寒妾已知南心君不見誰為道辛苦寄情雙飛燕形迫杼煎絲顔落風催電容華一朝盡惟餘心不變古意贈今人明月何皎皎垂櫎照羅茵若共相思夜知同憂怨晨芳華豈矜皃霜露不憐人君非青雲逝飄迹事咸秦妾持一生淚經秋復度春君子將傜役遺我雙題錦臨當欲去時復留相思枕題用常著心枕以憶同寢行行日已逺轉覺思彌甚代葛沙門妻郭小玉詩丘巨源雜詩二首妙縞貴東夏巧媛出吳闉裁狀白玉璧縫似明月輪表裏鏤七寳中銜駭雞珍畫作景山樹圖為河洛神來延揮握玩入與鐶釧親生風長袖際晞華紅粉津拂眄迎嬌意隐映含歌人時移務忘故節改競存新巻情隨象簟舒心謝錦茵懕歇何足道敬哉先後辰詠七寳扇披衽乏遊術慿軾寡文才蓬門長自寂虚席視生埃貴里臨妝館東隣歌吹臺雲閒嬌響徹風末􅃩聲來飛華瑶翠幄揚芬金碧桮久絶中州美從念尸鄉灰遺情悲近世中山安在哉聽鄰妓王元長雜詩五首遊禽暮知反行人獨不歸坐銷芳草氣空度明月煇嚬容入朝鏡思淚㸃春衣巫山彩雲沒淇上緑條稀待君竟不至秋鴈雙雙飛霜氣下孟津秋風度函谷念君淒已寒當軒巻羅縠纎手廢裁縫曲鬢罷膏沐千里不相聞寸心鬱氛氲况復飛螢夜木葉亂紛紛古意抱月如可明懐風殊復清絲中傳意緒花裏寄春情掩抑有竒態悽鏘多好聲芳袖幸時拂龍門空自生詠琵琶幸得與珠綴羃䍥君之楹月映不辭巻風來輒自輕每聚金鑪氣時駐玉琴聲俱願致尊酒蘭缸當夜明詠幔響像巫山髙薄暮陽臺曲煙霞乍舒巻蘅芳時斷續彼美如可期寤言紛在屬撫然坐相思秋風下庭緑巫山髙謝脁雜詩十二首日落窻中坐紅妝好顔色舞衣襞未縫流黄覆不織蜻蛉草際飛遊蜂花上食一遇長相思願寄連翩翼清吹要碧玉調弦命緑珠輕歌急綺帶含笑解羅襦餘曲詎幾許髙駕且歭􅡨徘徊韶景暮惟有洛城隅贈王主簿掖庭聘絶國長門失歡讌相逢詠蘼蕪辭寵悲團扇花叢亂數蝶風簾入雙燕徒使春帶賒坐惜紅顔變平生一顧重夙昔千金賤故人心尚爾故心人不見和王主簿怨情瓊閨釧響聞瑶席芳塵滿要取洛陽人共命江南管情多舞態遲意傾歌弄緩知君密見親寸心傳玉鋺上客光四座佳麗直千金挂􅁫報纓絶墮珥荅琴心蛾眉已共笑清香復入䘳夜樂夜方静翠帳垂沈沈夜聽妓生平宫閤裏出入侍丹墀開笥方羅縠窺鏡比蛾眉初别意未解去久日生悲顦顇不自識嬌羞餘故姿夢中忽髣髴猶言承讌私詠邯鄲故才人嫁為厮養卒婦秋夜促織鳴南隣𢷬衣急思君隔九重夜夜空佇立北窻輕幔垂西户月光入何知白露下坐視前階濕誰能長分居秋盡冬復及秋夜發翠斜漢裏蓄寳宕山峰抽莖類僊掌銜光似燭龍飛蛾再三繞輕花四五重孤對相思夕空照儛衣縫鐙杏梁賔未散桂宫明欲沈曖色輕帷裏低光照寳琴徘徊雲髻影灼爍綺疎金恨君秋月夜遺我洞房隂燭本生朝夕池落景照參差汀洲蔽杜若幽渚奪江離遇君時采擷玉座奉金巵但願羅衣拂無使素塵彌席玲瓏類丹檻苕亭似𤣥闕對鳯懸清冰垂龍挂明月照粉拂紅妝挿花理雲髪玉顔徒自見常畏君情歇鏡臺新葉初苒苒初繠新霏霏逢君後園讌相隨巧笑歸親勞君玉指摘以贈南威用持挿雲髻翡翠比光煇日暮長零落君恩不可追落梅陸厥中山王孺子妾歌一首如姬寢卧内班妾坐同車洪波陪飲帳林光晏秦餘歳暮寒飈及秋水落芙蕖子瑕矯後駕安陵泣前魚賤妾終已矣君子定焉如施榮泰雜詩趙女修麗姿燕姬正容飾妝成桃毀紅黛起草慙色羅裠數十重猶輕一蟬翼不言縠袖輕專歎風多力鏘珮玉池邊弄笑銀臺側折栁貽目成挿蒲贈心識來時嬌未盡還去媚何極玉臺新詠巻四欽定四庫全書玉臺新詠巻五陳徐陵撰江淹四首丘遲二首沈約二十四首栁惲九首江洪四首髙爽一首鮑子卿二首何子朗三首范靖婦四首何遜十一首王樞三首庾丹二首江淹四首逺
