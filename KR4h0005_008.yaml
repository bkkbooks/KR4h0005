body:
  text: 蕭子顯古樂府日出東南隅行大明上苕苕陽城射凌霄光照窗中婦絶世同阿嬌明鏡盤龍刻簪羽鳳凰雕逶迤梁家髻冉弱楚宮腰輕紈雜重錦薄縠間飛綃三六前年暮四五今年朝蠶園拾芳繭桑陌採柔條出入東城里上下洛西橋忽逢車馬客飛蓋動襜軺單衣鼠毛織寶劍羊頭鞘丈夫疲應對御者輟銜鑣柱間徒脈脈垣上幾翹翹女本西家宿君自上官要漢馬三萬匹夫壻任飄颻鞶囊虎頭綬左珥鳧盧貂橫吹龍鍾管奏鼓象牙簫十五張內侍十八賈登朝皆笑顏郎老盡訝董生超代美女篇邯鄲暫輟舞巴姬請罷絃佳人溱洧上艷趙復傾燕繁穠既為李照水亦成蓮朝沽成都酒暝數河間錢餘光幸未惜蘭膏空自煎和吳主簿六首春月日照鴛鴦殿萍生鴈鶩池遊塵隨影入弱柳帶風垂青鶻逐黃口別鶴慘羈雌同衾遠遊説結愛久生離於今方溘死寧須萱草枝春月卷葹心未發蘼蕪葉欲齋春蠶方曳緒新燕正銜泥野雉呼雌雊庭禽挾子栖從君客梁後方晝掩春閨山川隔道里芳草徒萋萋秋夜二首九重依夜館四壁慘無輝招搖顧西落烏鵲向東飛流螢漸收火絡緯欲催機爾時思錦字持製行人衣所望丹心達嘉客倘能歸露華初泥泥桂枝行方悚悚煞氣下重軒輕陰滿四屋別寵𤛢修夜遠征悲獨宿愁牽翠羽眉淚滿橫波目長門絶往來含情空杼軸遊望二首落日照紅粧挾瑟當窗牖寧復歌蘼蕪唯聞嘆楊柳結好在同心離別由衆口徒設露葵羹誰酌蘭英酒會日杳無期蕣華安得久遊望二首相思不安席聊至狹斜東愁眉倣戚里高髻學城中雙眉偏照日獨蕊好縈胸自知心所愛獻賦甘泉宮博聞方鼎食詎春憶閨容遙見鄰舟主人投一物衆姬爭之有客請余為詠河流既浼浼河鳥復關關落花浮浦出飛雉復流還此日倡家女競嬌桃李顏良人惜美珥欲以代芳菅新縑疑故素盛趙蔑衰班曳綃事掩縠搖珮奪鳴環客心空振蕩高枝不可扳淇上人戲蕩子婦示行事桑中始奕奕淇上未湯湯美人要雜珮上客繡明璫日暗人聲靜微步出蘭房露葵不待勸鳴琴無暇張翠叉挂已落羅衣拂更香如何嫁蕩子春夜守空床不見青絲騎徒勞紅粉粧賦得照棋燭刻五分成南皮絃吹罷終奕且留賓日下房櫳暗華燭命佳人側光金照扃回花半隱身不亂纖手卷羞令夜向晨夜聽妓賦得烏夜啼鵾絃且輟弄鶴操暫停徽別有啼烏曲東西相背飛倡人怨獨守蕩子遊未歸若逢生離曲長夜泣羅衣賦得遺所思遺簪雕玳瑁贈綺織鴛鴦木若華滋樹交枝蕩子房別前秋已落別後春更芳所思不可寄唯憐盈袖香繁華應令可憐周小童微笑摘蘭叢鮮膚如粉白慢臉似桃紅挾彈雕陵下垂釣蓮葉東腕動飄香麝衣輕任好風幸承枕席選得奉畫堂中金屏障翠翡籃帊覆薰籠本欲傷輕薄含辭羞自通剪袖恩雖重殘桃愛未終蛾眉詎須嫉新粧迎入宮頓還城應令漢水深難渡深潭見底清錦笮繫鳧舸珠竿懸翠鈴鳴笳芳樹曲流唱採蓮聲神遊不停駕日暮返連營寧顧空房裏階上緑苔生奉和率爾有詠殿內多仙女從來難比方別有當窗艷復是可憐粧學舞勝飛燕染粉薄南陽散黃分黛色薰衣雜棗香簡叉新輾翠試履逆垣牆一朝恃容色非復守空房君恩若可恃願作雙鴛鴦詠得有所思佳期竟不歸春物坐芳菲拂匣看離扇開箱見別離井梧生未合宮槐卷復稀不及銜泥燕從來相逐飛詠美人自看畫應令欲知畫能巧喚取真來映並出似分身分看如對鏡安叉等疏密著領俱周正不解平城圍誰與丹青競賦得橫吹曲長安道柱宮橫復道黃山開廣路遠聽平陵鍾遙識新豐樹合殿生光采離宮起煙霧日落歌吹還塵飛車馬度南苑還看人春花競玉顏俱折復俱扳細腰宜窄衣長叉巧挾鬟洛橋初度燭青門欲上關中人應有望上客莫前還和湘東王二首相東王春宵應令征人別來久年芳復臨牖燭下夜縫衣春寒偏著手願返歸飛鴈因書寄高柳應令冬曉鄰雞聲已傳愁人竟不眼月光侵曙後霜明落曉前縈鬟起照鏡誰忍插花細送別於建興苑相逢相逢小苑北停車問苑中梅新雜柳故粉白映綸紅去影背斜日香衣臨上風雲消階漸黑冰開池半通去馬船難歸啼烏曲未終眷然從此別車西馬復東侍宴賦得龍沙宵月明鵲飛空繞樹月輪殊未圓姮娥望不出桂枝梢隱殘落照移樓影浮光動塹瀾櫪馬悲笳吹城鳥啼塞寒傳聞機杼妾愁余衣服單當秋終已脆銜啼織復難斂眉雖不樂舞劍強為歡請謝亟關吏行當看一丸奉和湘東王應令冬曉妾家邊洛城慣識曉鍾聲鍾聲猶未絶漢使報應行天寒硯冰凍心悲書不成縣遇見人織率爾歌婦妖姬含怨情織素起秋聲度梭環玉動踏躡珮珠鳴經移疑杼澀緯斷恨絲輕蒲桃始欲罷鴛鴦猶未成雲棟共徘徊紗窗相向開窗疏眉語度紗輕眼笑來曨曨隔淺紗的的見粧華鏤玉同心帶列寶連枝花紅衫向後結金簪臨鬢斜機頂挂流蘇機傍垂結珠青絲引伏兔黃金繞轆轤艷彩裾邊出芳脂口上渝百城交問道五馬共踟蹰真為閨中人守故不要新夢啼漬花枕覺淚濕羅巾獨眠真自難重衾猶覺寒逾憶凝脂暖彌想橫陳歡行驅金絡騎蹄就城南端城南稍有期想子亦勞思羅衣久應罷花叉堪更治新粧莫點黛余還自畫眉共內人夜坐守歲歡多情未極賞至莫停杯酒中挑喜子粽裏覓楊梅簾開風入帳燭盡炭成灰勿疑鬢叉重為待曉光催初春攜內人行戲梳飾多今世衣著一時新草短猶通屧梅香漸著人樹斜牽錦帔風橫入紅綸滿酌蘭英酒對此得娛神南苑看遊者洛陽小苑地車馬盛經過緣溝駐行幰傍柳轉鳴珂履高令響珮襪輕半隱羅浮雲無處所何用轉橫波落日看還妖姬競早春上苑逐名辰苔輕變水色霞濃掩日輪雕甍斜照影畫扇拂遊塵衣香遙已盡袗紅遠更新誰家蕩舟妾何處織縑人敬酬劉長史詠名士悅傾城不信巫山女不信洛川神何關別有物還是傾城人徑共陳王戲曾與宋家鄰未嫁先名玉來時本姓秦粉光猶似面朱色不勝唇遙見凝花發聞香知異春叉長逐鬢髮襪小稱腰身夜夜言嬌盡朝朝態還新工傾荀奉倩能迷石季倫上客徒留目不見正橫陳雜詠湘東王三首冬宵別後春池異荷盡欲生冰箱中剪刀冷臺上面脂凝纖腰轉無力寒衣恐不勝秋夜樓上起秋風絶望秋閨中燭溜花行滿香燃奩欲空徒教兩行淚俱浮粧上紅冬宵不堪寒夜久夜夜守空床衣裾逐坐褶叉影近燈長無憐四幅錦何須辟惡香和陰梁州雜怨別離雖未久遂如長別離叢桂頻銷葉庭樹幾攀枝君言妾貌改妾畏君心移終須一相見併得兩相知奉和夜聽妓聲燭華似明月鬟影勝飛橋妓兒齊鄭樂爭妍學楚腰新歌自作曲舊瑟不須調衆中俱不笑座上莫相撩奉和世子春情昨晚褰簾望初逢雙燕歸今朝見桃李不啻數花飛已愁春欲度無復寄芳菲和詠舞洞房花燭明燕餘雙舞輕頓履隨疏節低鬟逐上聲伴轉行初進飄衫曲未成鸞回鏡欲滿鵠顧市應傾已曾天上學詎似世中生七夕牽牛遙映水織女正登車星橋通漢使機石逐仙槎隔河相望近經秋離別賒愁將今夕恨復著明年花仰和何僕射還宅懷故紫閣旦朝罷中臺夕奏稀無復千金笑徒勞五日歸步簷朝未掃蘭房晝撩扉苔生理曲處網積回文機故瑟餘絃斷歌梁秋燕飛朝雲雖可望夜帳定難依願憑甘露入方假慧燈輝寧知洛城晚還淚獨沾衣萬山見採桑人倡妾不勝愁結束下青樓逐伴西城路相攜東陌頭葉盡時移樹枝高乍易鉤絲繩挂且脫金籠寫復收蠶飢日已暮詎為使君留見人織聊為之詠纖纖運玉指脈脈正蛾眉振躡開交鏤停梭續斷絲簷花照初月洞戶未垂帷弄機行掩淚翻令織素遲秋閨螢飛綺窗外妾思霍將軍燈前量獸錦簷下織花紋墜露如輕雨長河似薄雲秋還百種事衣成未暇薰鼓吹曲折楊柳高樓十載別楊柳擢絲枝摘葉驚開駃攀枝恨別離年年阻音信月月減容儀春來誰不望相思君自知建興苑丹陵抱天邑紫苑更上林銀臺懸百仞玉樹起千尋水流冠蓋影風揚歌吹音踟蹰憐拾翠顧步惜遺金日落庭花轉方幔屢移陰終言樂未極不道愛黃金擬吳均體應教庭樹發春輝遊人競下機卻匣擎歌扇開箱擇舞衣桑萎不復惜看光遽將夕自有專城居空持迷上客春日二首愁人試出牖春色定無窮參差依網日淡蕩入簾風落花還繞樹輕飛去隱空徒令玉筋泣雙垂明鏡中高臺動春色清池照日華緑葵向光轉翠柳逐風斜林有驚心鳥園多奪目花相與咸知節嘆子獨離家人行今不返何勞空折麻走筆戲書應令此日乍殷勤相嫌不如春今宵花獨淚非是夜迎人舞席秋來卷歌筵無數塵曾經新代故那惡故迎新片月窺花簟輕寒入帔巾秋來應瘦盡偏自著腰身奉和詠舞十五屬平陽因來入建章主家能教舞城中且巧粧低鬟向綺席舉袖拂花黃燭送窗邊影衫傳鉿裏香當關好留客故作舞衣長和王舍人送客未還閨中有望倡人歌吹罷對鏡覽紅顏拭粉留花稱除叉作小鬟綺燈停不減高飛掩未關良人在何處光唯見月為羊兗州家人答餉鏡信來贈寶鏡亭亭似團月鏡久自踰明人久情逾歇取鏡挂空臺於今莫復開不見孤鸞鳥香魂何處來春閨怨玉關信使斷借問不相諳春光太無意窺窗來見參分與光音絶忽值日東南柳枝皆嬲燕桑葉復催蠶物色頓如此孀居自不堪詠泄井得金叉昔日倡家女摘花露井邊摘花還自插照井還自憐翠羽成泥去金色尚如先此人今不在此物今空傳和班妤婕日落應門閉愁思百端生況復昭陽近風傳歌吹聲寵移終不恨讒枉太無情只言爭分理非妬舞腰輕和昭君怨一生竟何定萬事良難保丹青笑舊圖玉匣成秋草相妾辭關路至今猶未燥漢使汝南來殷勤為人道蕭子雲春思春風蕩羅帳餘花落鏡奩池荷正捲葉庭柳復垂簷竹柏君自改團扇妾方嫌誰能憐故素終為泣新縑春宵夜夜妾偏棲百花含露低蟲聲繞春岸月色思空閨傳語長安驛宰苦寄遼西春望古意光景斜漢宮橫橋照彩虹春情寄柳色鳥語出梅中氛氳閨裏思逶迤水上風落花徒入戶何解妾床空秋思清波收潦日華林鳴籟初芙蓉露下落楊柳月中疏燕幃湘綺被趙帶流黃裾相思阻音信結夢感離居閨情二首北斗行欲沒東方稍已晞晨雞初振羽曉露方霑衣錦衾徒有設蘭約果相違誰忍開朝鏡羞恨掩空扉月出宵將半星流曉未央空閨易成響虛室自生光嬌羞悅人夢猶言君在傍有所思丹墀生細草紫殿納輕陰曖曖巫山遠悠悠湘水深徒歌鹿廬劍空貽玳瑁簪望君終不見屑淚且長吟三婦艷大婦留芳褥中婦對華燭小婦獨無事當軒理清曲丈人且安臥艷歌方斷續詠鐙擎百華耀九枝鳴鶴映冰池末光本內照丹花復外垂流輝悅嘉客翻影泣生離自銷良不悔明白願君知贈美人巫山薦枕日洛浦獻珠時一遇便如此寧關先有期幸非使君問莫作秦羅辭夜長眠復坐誰知暗斂眉欲寄同花燭為照遙相思古意燕趙多佳麗白日照紅粧蕩子十年別羅衣雙帶長春樓怨難守玉階空自傷對此歸飛燕銜泥繞曲房差池入綺幕上下傍雕梁故居尤可念故人安可忘相思昏望絶宿昔夢容光魂交忽在御轉側定他鄉徒然居枕席誰與同衣裳空使蘭膏夜炯炯對繁霜春宵春宵猶自長春心非一傷月帶園樓影風飄花樹香誰能對雙燕暝暝守空床冬曉冬曉風正寒偏念客衣單臨粧罷鉛黛念淚剪綾紈寄語龍城下詎知書信難三婦艷大婦縫羅裙中婦料繡文惟餘最小婦窈窕舞昭君丈人慎勿去聽我駐浮雲閨怨本無金屋寵長作玉階悲一乖西北麗寧復城南期永巷愁無盡應門閉有時空勞織素巧徒為團扇辭匡床終不共何由橫自私奉和逐涼詩鐘鳴夜未央避暑起倣徨長河似曳素明星若散璫倚巖欣石冷臨池愛水涼月纖張敞畫荷妖韓壽香對此遊清夜何勞娛洞房塘上行苦辛篇蒲生伊何陳曲中多苦辛黃金坐銷鑠白玉遂淄磷裂衣工毀嫡掩袖切讒新嫌成迹易已愛去理難申秦雲猶變色魯日尚回輪妾歌已腸斷君心終未親怨退寵辭金屋見譴斥甘泉枕席秋風起房櫳明月懸燭避窗中影香回爐上煙丹庭斜草徑素壁點苔錢歌起蒲生曲樂奏下山弦新聲昔廣宴餘杯今自傳王嬙向絶漠宗女入祁連雁書猶未返角馬無歸年昭臺省媵御曾坂無棄捐後薪隨復積前魚誰復憐應令詠舞倡女多艷色入選盡華年舉腕嫌衫重回腰覺態妍情繞陽春吹影逐相思弦履度開裾褶鬟轉匝花鈿所愁餘曲罷為欲在君前應令詠舞新粧本絶世妙舞亦如仙傾腰逐韻管斂衽聽張弦袖輕風易入叉重步難前笑態千金重衣香十里傳時持比飛燕定當誰可憐有所思行佳人遠于隔乃在天一方望望江山阻悠悠道路長別前秋葉落別後春花芳雷歎一聲響雨淚忽成行悵望情無極傾心還自傷隴西行借問隴西行何當驅馬征草合前迷路雲濃後暗城寄語幽閨妾羅袖勿空縈和徐主簿望月樓上徘徊月窗中愁思人照雪光偏冷臨花色轉春星流時入暈桂長欲侵輪願以重光曲承君歌扇塵愛妾換馬渥水出騰駒湘川實應圖來從西北道去逐東南隅琴聲悲玉匣山路泣蘼蕪似鹿將含笑千金會不俱詠美人絳樹及西施俱是好容儀非關能結束本自細腰肢鏡前難並照相將映緑池看粧畏水動斂袖避風吹轉手齊裾亂橫簪歷鬢垂曲中人未取誰堪白日移不分他相識惟聽使君知七夕玉匣卷懸衣高樓開夜扉嫦娥隨月落織女逐星移離前忿促夜別後對空機倩語雕陵鵲填河未可飛遠期篇憶別春花飛已見秋葉稀淚粉羞明鏡愁帶減寬衣得書言未反夢見道應歸坐使紅顏歇獨掩青樓扉和湘東王春日新燕始新歸新蝶復新飛新花滿新樹新月麗新暉新光新氣早新望新盈抱新水新緑浮新禽新音好新景自新還新葉復新攀新枝雖可結新愁誰解顏新思獨氛氳新知不可聞新扇如新月新蓋學新雲新落連珠淚新點石榴裙詠薔薇經植宜春館靃靡上蘭宮片舒猶帶紫半卷未全紅葉疏難蔽日花密易傷風佳麗新粧罷含笑折芳叢寒閨詩行人消息斷空閨靜復寒風急朝機燥鏡暗晚粧難從來腰自小衣帶就中寬閨中月夜閨中日已暮樓上月初華樹陰緣砌上窗影向床斜開帷傷隻鳳吹鐙惜落花誰能當此夕獨處類倡家侯司空宅詠妓佳人遍綺席妙曲動鵾弦樓似陽臺上池如洛浦邊鸚啼歌扇後花落舞衫前翠柳將斜日偏照晚粧鮮侍宴賦得竹夾池一叢竹青翠不驚寒葉醞宜城酒皮裁薛縣冠湘川染別淚衡嶺拂仙壇欲見葳蕤色當來兔苑看和樊晉侯傷妾畫梁朝日盡芳樹落花辭忽以千金笑長作九原悲鏡前塵素粉機上網紅絲戶餘雙燕入床有一空帷名香不可得何見反魂時南征閨怨湘水舊言深征客理難尋獨愁無處道長悲不自禁逢人憎解珮幽居懶聽音惟當有夜鵲南飛似妾心班婕好怨柏梁新寵盛長信昔恩傾誰謂詩書巧翻為歌扇輕花月分窗進苔草共階生妾淚衫前滿單眠夢裏鶯可惜逢秋扇何用合歡名賦得蕩子行未歸坐樓愁回望息意不思春無奈園中柳寒時已報人捉梳羞理鬢挑朱懶向脣何當上路晚風吹還騎塵詠雪飄颻千里雪倏忽度龍沙從雲合且散因風卷復斜拂草如連蝶落樹似飛花若贈離居者折以代瑤華金石樂前溪流碧水後渚映清天登臺臨寶鏡開窗對綺錢玉顏光粉色羅袖拂金鈿春風散輕蝶明月映新蓮摘花競時侶催指及芳年閨怨自憐斷帶日偏恨分叉時留步惜餘影含意結離眉徒知今異昔空使怨成思欲以別離意獨向蘼蕪悲昭君辭拭淚辭戚里回顧望昭陽鏡失菱花影叉除卻日梁圍腰無一尺垂淚有千行緑衫承馬汗紅袖拂秋霜別曲真多恨哀弦須更張明君辭斂眉光祿塞遙望夫人城片片紅顏落雙雙淚眼生冰河牽馬渡雪路把鞍行胡風入骨冷漢月照心明方調琴上曲變入胡笳聲結客少年場行結客少年場春風滿路香歌撩李都尉果擲潘河陽折花遙勸酒就水更移床今年喜夫壻新拜羽林郎定知劉碧玉偷嫁汝南王對酒春水望桃花春淵藉芳杜琴從緑珠借酒就文君取牽馬向渭橋日落山頭晡山簡接㒿倒王戎如意舞箏鳴金谷園笛韻平陽塢人生一百年歡笑惟三五何處覓錢刀求為洛陽賈看妓緑珠歌扇薄飛燕舞衫長琴曲隨流水簫聲逐鳳凰膺風蟬鬢亂映日鳳叉光懸知曲不誤無事顧周郎春日題屏風昨夜鳥聲春驚鳴動四鄰今朝花樹下定有詠花人流星浮酒泛粟瑱逐杯脣何勞一片雨喚作陽臺神
