body:
  text: 七夕月下王僧達遠山歛雰祲廣庭揚月波氣往風集隟秋還露泫柯節期旣已孱中宵振綺羅來歡詎終夕收涙泣分河爲織女贈牽牛顏延之婺女儷經星姮娥棲飛月慙無二媛靈託身侍天闕閶闔殊未輝咸池豈沐髪漢隂不夕張長河爲誰越雖有促讌期方須凉風發虚計双曜周空遲三星沒非怨杼軸勞但念芳菲歇秋胡椅梧傾高鳳寒谷待鳴律影響豈不懷自達毎相匹婉彼幽閑女作嬪君子室峻節貫秋霜明艶侔朝日嘉運旣我從欣願自此畢燕居未及歡良人顧有違脫巾千里外結綬登王畿戒徒在昧旦左右來相依驅車出郊郭行路正倭遲存爲久離别沒爲長不歸嗟余怨行役三陟窮晨暮嚴駕越風寒觧鞍犯霜露原隰多悲凉廻飈卷高樹離獸起荒蹊驚鳥縱橫去悲哉逰宦子榮此山川路迢遥行人遠婉轉年運徂良時爲此别日月方向除孰知寒暑積僶俛見榮枯歲暮臨空房凉風起坐隅寢興日巳寒白露生庭蕪勤役從歸願反路遵山河昔辭秋未素今也歲載華蚕月歡時暇桑野多經過佳人從所務窈窕援高柯傾城誰不顧弭節停中阿年徃誠思勞事遠闊音形雖爲五載别相與昧平生捨車遵往路鳧藻馳目成南金豈不重聊自意所輕義心多苦調密比金玉聲高節難久淹朅來空復辭遲遲前途盡依依造門基上堂拜嘉慶入室問何之日暮行採歸物色桑楡時美人望昏至慙嘆前相持有懷誰能己聊用申苦難離居殊年歲一别阻河關春來無時豫秋至應早寒明發動愁心閨中起長歎慘悽歲方晏落日逰子顏高張生絶絃聲急由調起自昔枉光塵結言固終如始何久爲别百行愆諸已君子失時義誰與偕沒齒愧彼行路詩甘之長川汜翫月城西門廨中鮑昭始見西南樓纎纎如玉鈎未映東北墀娟娟似蛾眉蛾眉蔽珠櫳玉鈎隔綺窓三五二八時千里與君同夜移衡漢落徘徊帷幌中歸華先委露别葉早辭風客逰厭辛苦仕子倦飄塵沐瀚自公日宴慰及私辰蜀琴抽白雪郢曲繞陽春肴乾酒未缺金壼啓夕輪廻軒駐輕蓋留酌待情人代京雒篇鳳樓十二重四戶八綺窓繡桷金蓮花桂柱玉盤龍珠簾無隔露羅幌不勝風寳帳三千所爲爾一朝容揚芬紫烟上垂綵綠雲中春吹廻白日霜歌落塞鴻但懼秋塵起盛愛逐衰篷坐視靑苔滿臥對錦筵空琴瑟縱橫散舞衣不復縫古來皆歇薄君意豈獨濃唯見雙黃鵠千里一相從擬樂府白頭吟直如朱絲繩清如玉壼冰何慙宿昔意猜恨坐相仍人情賤恩舊世義逐衰興毫髮一爲瑕丘山不可勝食苗實碩䑕點白信蒼蠅鳧鵠遠成美薪芻前見凌申黜褒女進班去信姬昇周王日淪惑漢帝益嗟稱心賞猶難恃貌恭豈易慿古來共如此非君獨撫膺採桑詩季春梅始落女工事蚕作採桑淇洧間還戯上宮閣早蒲時結隂晚篁初解籜藹藹霧滿閨融融景盈幕乳燕逐草虫巢蜂拾花蕚是節最暄妍佳服又新爍欽歎對逈塗陽歌弄場藿抽琴試佇思薦珮杲誠託承君郢中美服義久心諾衞風古愉艶鄭俗舊浮薄虚願悲渡湘空賦笑瀍洛盛明難重耒淵意爲誰涸君其且調絃桂酒妾行酌夢還詩銜淚出郭門撫劒無人逵沙風闇塞起離心眷鄕畿夜分就孤枕夢想暫言歸孀婦當戶歎繅絲復鳴機慊欵論久别相將還綺幃靡靡簷下凉朧朧窓裏暉刈蘭爭芬芳採菊競葳蕤開奩集香蘇探袖解纓徽寐中長路近覺後大江違驚起空歎息恍惚神魂飛白水漫浩浩高山壯巍巍波潮異徃復風雲改榮衰此土非吾土慷慨當訴誰擬古河畔草未黃胡鷹已矯翼秋虫挾戶吟寒婦晨夜織去歲征人還流傳舊相識聞君上壠時東望久歎息宿昔改衣帶旦暮異容色念此憂如何夜長愁更多明鏡塵匣中寳琴生網羅詠双燕双燕戯雲崖羽翮始差池出入南閨裏經過北堂垂意欲巢君幕層楹不可窺沉吟芳歲晚徘徊韶景移悲歌辭舊愛銜泥覔新知贈故人馬子喬寒灰㓕更然夕華晨更鮮春冰雖暫解冬冰還復堅佳人捨我去賞愛長絶緣歡至不留時毎念輙傷年双劒將别離先在匣中鳴煙雨交将夕從此遂分形雌沉吳江水雄飛入楚城吳江深無底楚闕有崇扃一爲天地别豈直限幽明神物終不隔千祀儻還并學阮歩兵體王素沉情發遐慮紆欝懷所思髣髴聞簫管鳴鳳接嬴姬聯綿共雲翼嬿婉相携持寄言芳華士寵利不常期涇渭分清濁視彼國風詩飛來双白鵠吳邁逺可憐双白鵠雙雙絶塵氛連翩弄光景交頸逰靑雲逢羅復逢繳雌雄一旦分哀聲流海曲孤呌出江濆豈不慕前侶爲爾不及群歩歩一零淚千里猶待君樂哉新相知悲矣生别離持此百年命共逐寸隂移譬如空山草零落心自知陽春曲百里望咸陽知是帝京邑綠樹摇雲光春城起風色佳人愛景華流靡園塘側妍姿艶月映羅衣飄蟬翼宋王歌陽春巴人長歎息雅鄭不同賞那令君愴惻生平重愛惠私自憐何極長别離生離不可聞况復長相思如何與君别當我盛年時蕙花毎摇蕩妾心空自持榮乏草木歡悴極霜露悲富貴身難老貧賤顏易衰持此斷君腸君亦宜自疑淮隂有逸将拆羽謝翻飛楚亦扛鼎士出門不得歸正爲隆凖公杖劒入紫微君才定何如白日下爭暉長相思晨有行路客依依造門端人馬風塵色知從河塞還時我有同栖結官逰邯郸将不異客子分飢復共寒煩君尺帛書寸心從此殫道妾長憔悴豈復歌笑顏簷隠千霜樹庭枯十載蘭經春不舉袖秋落寧復看一見願道意君門巳九關虞卿棄相印檐笠爲同歡閨隂欲早霜何事空盤桓擬青青河畔草鮑令暉褭褭臨窓竹藹藹垂門桐灼灼靑軒女泠泠高堂中眀志逸秋霜玉顏掩春紅人生誰不别恨君早從戎鳴絃慙夜月紺黛羞春風擬客從遠方來客從遠方來贈我漆鳴琴木有相思文絃有别離音終身執此調歲寒不改心願作陽春曲宮商長相尋題書後寄行人自君之出矣臨軒不解顔砧杵夜不發高門晝常關帳中流熠燿庭前華紫蘭楊枯識節異鴻來知客寒逰月暮冬盡除春待君還古意贈今人寒鄕無異服氊褐代文練月月望君歸年年不觧綖荆揚春早和幽冀猶霜霰北寒妾已知南心君不見誰爲道辛苦寄情双飛燕形迫杼煎絲顏落風催電容華一朝改唯餘心不變代葛沙門妻郭小玉詩二首其一明月何皎皎垂幌照羅茵若共相思夜知同憂怨晨芳華豈矜貌霜露不憐人君非靑雲逝飄迹事咸秦妾持一生淚經秋復度春其二君子將徭役遺我雙題錦臨當欲去時復留相思枕題用常著心枕以憶同寢行行日已遠轉覺思彌甚詠七寳扇丘巨源妙縞貴東夏巧媛出吳闉裁狀白玉璧縫似眀月輪表裏鏤七寳中䘖駭雞珍畫作景山樹圖爲河洛神來延揮握玩入與鐶釧親生風長袖際晞華紅粉津拂眄迎嬌意隱映含歌人時移務忘故節改競存新卷情隨象簟舒心謝錦茵厭歇何足道敬哉先後晨聽隣妓披衽乏逰術慿軾寡文才蓬門長自寂虚席視生埃貴里臨倡舘東隣歌吹臺雲間嬌響徹風末艶聲來飛華瑶翠幄揚芬金碧杯久絶中州美從念尸鄕灰遺情悲近世中山安在哉古意元長王氏逰禽暮知返行人獨不歸坐銷芳草氣空度眀月輝嚬容入朝鏡思淚點春衣巫山綵雲沒淇上綠楊稀待君竟不至秋鴈双双飛霜氣下孟津秋風度函谷念君凄己寒當軒卷羅縠纎手廢裁縫曲鬢罷膏沐千里不相聞寸心欝氛氲况復飛螢夜水葉乱紛紛詠琵琶抱月如可眀懷風殊復清絲中傳意緒花裏寄春情掩抑有竒態悽鏘多好聲芳袖幸時拂龍門空自生詠幔幸得與珠綴羃䍥君之楹月映不辭卷風來輙自輕毎聚金罏氣時駐玉琴聲但願置尊酒蘭缸當夜眀巫山高響像巫山高薄暮陽臺曲烟霞乍舒卷蘅芳自斷續彼美如可期寤言紛在屬撫然坐相思秋風下庭綠贈王主簿二首謝眺日落窓中坐紅粧好顏色舞衣襞未縫流黃覆不織蜻蛉草際飛逰蜂花上食一遇長思相願寄連翩翼清吹要碧玉調絃命綠珠輕歌急綺帶含笑解羅襦餘曲詎幾許高駕且踟躕徘徊憐暮景唯有洛城隅同王主簿怨情掖庭娉絶國長門失歡讌相逢詠蘼蕪辭寵悲團扇花叢亂數蝶風簾入双燕徒使春帶賖坐惜紅顏變平生一顧重夙昔千金賤故人心尚爾故心人不見夜聽妓瓊閨釧響聞瑶席芳塵滿要取洛陽人共命江南管情多舞態遲意傾歌弄緩知君密見親寸心傅王鋺上客光四座佳麗直千金掛釵報纓絶墮珥荅琴心蛾眉已共笑清香復入衿歡樂夜方靜翠帳垂沉沉詠邯郸故才人嫁爲廝養卒婦生平宮閤裏出入侍丹墀開笥方羅縠窺鏡比蛾眉初别意未解去久日生悲顦顇不自識嬌羞餘故姿夢中忽髣髴猶言承讌私秋夜秋夜促織鳴南隣擣衣急思君隔九重夜夜空佇立北窓輕幔垂西戶月光入何知白露下坐視前堦濕誰能長分居秋盡冬復及雜詩五首燈發翠斜漢裏蓄寳宕山峯抽莖類仙掌銜光似燭龍飛蛾再三繞輕花四五重孤對相思夕空照舞衣縫燭杏梁賓未散桂宮明欲沈瞹色輕帷裏低光照寳琴徘徊雲髻影灼爍綺疎金恨君秋月夜遺我洞房隂席本生朝夕池落景照參差汀洲蔽杜若幽渚奪江籬遇君時採擷玉座奉金巵但願羅衣拂無使素塵彌鏡臺玲瓏類丹檻苕亭似玄闕對鳳縣清冰垂龍掛明月照粉拂紅粧揷花理雲髮玉顏徒自見常畏君情歇落梅新葉初苒苒初蘂新霏霏逢君後園讌相隨巧笑歸親勞君王指擿以贈南威用持揷雲髻翡翠比光暉日暮長零落君思不可追中山王孺子妾歌陸厥如姬寢臥内班妾坐同車洪波陪飮帳林光宴春餘歲暮寒飈及秋水落芙蕖子瑕矯後駕安陵泣前魚賤妾終已矣君子定焉如雜詩施榮泰趙女脩麗姿燕姬正容飾粧成桃毀紅黛起草慙色羅裙數十重猶輕一蟬翼不言榖袖軟專歎風多力鏘珮玉池邊弄笑銀臺側折柳貽目成採蒲贈心識來時嬌未盡還去媚何極玉臺新詠卷之四玉臺新詠目錄卷之四七夕月下一首王僧達爲織女贈牽牛彦延之秋胡詩九首又雜詩九首鮑昭學阮歩兵體一首王素擬樂府四首吳邁遠雜詩六首鮑令暉雜詩五首丘巨源雜詩五首王元長雜詩十二首謝眺子山王孺中妾歌陸厥雜詩一首施榮泰
