  - {type: variant, offset: 0, length: 4274, content: 卷第十古絕句四首藁砧今何在山上復有山何當大刀頭破鏡飛上天日暮秋雲陰江水清且深何用通音信蓮花玳瑁簪菟絲從長風根莖無斷絕無情尚不離有情安可別南山一桂樹上有雙鴛鴦千年長交頸歡慶不相忘與妻李夫人聯句室中是阿誰歎息聲正悲歎息亦何為但恐大義虧大義同膠漆匪石心不移人誰不慮終日月有合離我心子所達子心我所知若能不食言與君同所宜情人碧玉歌碧玉小家女不敢攀貴德感郎千金意慚無傾城色碧玉破瓜時郎為情顛倒感君不羞難迴身就郎抱情人歌桃葉復桃葉渡江不用楫但渡無所苦我自來迎接情人歌桃葉復桃葉桃葉連桃根相鄰兩樂事獨使我殷勤答扇歌七寶畫團扇粲爛明月光與郎卻暄暑相憶莫相忘答扇歌青青林中竹可作白團扇動搖郎玉手因手託方便團扇復團扇許持自障面憔悴無復理羞與郎相見東陽漢中贈荅可憐誰家婦綠流洗素足明月在雲間迢迢不可得可憐誰家郎綠流乘素舸但問情君為月就雲中墮丁督護歌二首督護征初時儂亦惡聞許願作石尤風四面斷行旅黃河流無極洛陽數千里坎軻我途間何由見歡子擬徐幹詩自君之出矣珠珠闇無精思君如日月廻還晝夜生詠柟榴枕端木生河側因病遂成妍朝將雲髻別夜與娥眉連閨婦荅憐人昔如影與形今如胡與越不知行遠近忘卻離年月寄行人桂吐兩三枝蘭闇四五葉是時君不歸春風徒笑妾近代西曲歌五首石城樂生長石城下開門對城樓城中美少年出入見依投估客樂有客數寄書無信心相憶莫作瓶落井一去無消息烏夜啼歌舞諸年少娉婷無種跡菖蒲花可憐聞名不曾識襄陽樂朝發襄陽城暮至大堤宿大堤諸女兒花艷驚郎目楊叛兒暫出白門前楊柳可藏烏郎作沉木香儂作博山爐近代吳歌九首春歌朝日照北林初花錦綉色誰能春不思獨在機中織夏歌鬱蒸仲暑月長嘯北湖邊芙蓉始結葉拋艷未成連秋歌秋威入窗裏羅帳起飄颺仰頭看月明寄情千里光冬歌淵冰厚三尺素雪覆千里我心如松柏君心復何似前溪黃鳥結蒙朧生在洛溪邊花落逐流去何見逐流還上聲歌新衫繡兩襠迮置羅裳裏微步動輕塵羅裙隨風起歡聞歌遙遙天無柱流漂萍無根單身如螢火持底報郎恩君長樂佳紅羅複斗帳四角垂珠璫玉枕龍鬚席郎眠何處床獨曲柳樹得春風一低復一昂誰能空相憶獨眠度三陽近代雜歌三首潯陽樂稽亭故人去九里新人還送一便迎兩無有暫時閑青陽歌曲青荷蓋綠水芙蓉發紅鮮下有並根藕上有同心蓮蠶絲歌春蠶不應老晝夜常懷思何惜微軀盡纏綿自有時雜詩玉釧色分未衫輕似露腕舉袖欲障羞迴持理髮亂丹陽孟珠歌陽春二三月草與水同色道途遊冶郎恨不早相識錢塘蘇小歌妾乘油璧車郎騎青驄馬何處結同心西陵松柏下擬古花蔕今何在亦是林下生何當垂雙髻團扇雲間明代徐幹自君之出矣金爐香不燃思君如明燭中宵空自煎秋夜秋夜長復長夜長樂未央舞袖拂明燭歌聲繞鳳梁詠火冰容慚遠鑒水質謝明煇是照相思夕早望行人歸玉階怨夕殿下珠簾流螢飛復息長夜縫羅衣思君此何極金谷聚渠椀送佳人玉杯要上客車馬一東西別後思今夕王孫遊綠草漫如絲雜樹紅英發無論君不歸君歸芳已歇同王主簿有所思佳期期未歸望望下鳴機徘徊東陌上月出行人稀玉階怨紫藤拂花樹黃鳥間青枝思君一歎息苦淚應言垂襄陽白銅鞮分手桃林巖送別硯山頭若欲寄音息漢水向東流早行逢故人車中為贈殘朱猶曖曖餘粉尚霏霏昨宵何處宿今晨拂露歸為鄰人有懷不至影逐斜月來香隨遠風入言是定知非欲笑翻成泣詠王昭君垂羅下椒閤舉袖拂胡塵即即撫心歎蛾眉誤殺人詠酌酒人長筵廣未同上客嬌難逼還杯了不顧迴身正顏色贈謝府君覽玉釵空中墮金鈿色行歇獨泣謝春風孤夜傷明月採菱風生綠葉聚波動紫莖開含花復含實正待佳人來白日和清風輕雲雜高樹忽然當此時採菱復相遇水曲潺湲復皎潔輕鮮自可悅橫使有情禽照影遂孤絕水曲塵容不忍飾臨池思客歸誰能取淥水無處浣羅衣秋風孀居憎四時況在秋閨內凄葉流晚暉虛庭吐寒菜北牖風摧榭南籬寒蛩吟庭中無限月思婦夜鳴砧詠美人治粧上車畏不妍顧盻更斜轉大恨畫眉長猶言顏色淺范靜婦王昭君嘆早信丹青巧重貨洛陽師千金買蟬鬢百萬寫蛾眉今朝猶漢地明旦入胡關高堂歌吹遠遊子夢中還映水曲輕鬢學浮雲雙蛾擬初月水澄正落釵萍開理垂髮南苑苑門闢千扇苑戶開萬扉樓殿聞珠履竹樹隔羅衣閨怨閨閤行人斷房櫳月影斜誰能北窗下獨對後園花為人妾思燕戲還簷際花飛落枕前寸心君不見拭淚坐調絃詠春風可聞不可見能重復能輕鏡前飄落粉琴上響餘聲秋閨怨竹葉響南窗月光照東璧誰知夜獨覺枕前雙淚滴雜句畫蟬已傷念夜露復沾衣昔別曾何道今夕螢火飛雜句錦腰連枝滴繡領合歡斜夢中雖不見終成亂眼花蜘蛛簷下掛絡緯井邊啼何當得見子照鏡窗東西泣聽離夕歌悲銜別時酒自從今日去當復相思否春思雪罷枝即青冰開水便綠復聞黃鳥吟今作相思曲為徐僕射妓作日晚應歸去上客強盤桓稍知玉釵重漸見羅襦寒光宅寺長廊欣目送廣殿悅逢迎何當曲房裏幽隱無人聲題甘蕉葉示人夕泣似非踈夢啼太真數唯當夜枕知過此無人覺摘同心梔子贈謝孃因附此詩兩葉雖為贈交情永未因同心處何恨梔子最關人伐陳慶之美人為詠臨粧欲含涕羞畏家人知還待粉中絮擁淚不聽垂夢見故人覺罷方知恨人心定不同誰能對角枕長夜一邊空有期不至黃昏信使斷銜怨心悽悽迴燈向下榻轉面暗中啼代西豐侯美人於今辭宴語方念泣離違無因從朔鴈一向黃河飛邊戍秋月出中天遠近無偏異共照一光煇各懷離別思詠燭堂中綺羅人席上歌舞兒待我光泛灩為君照參差詠筆昔聞蘭蕙月獨是桃李年春心倘未寫為君照情筵詠笛柯亭有奇竹含情復抑揚妙聲發五指龍音響鳳凰詠舞腕弱復低舉身輕由迴縱可謂寫自歡方與心期共聯連句詩傾城非人美十載難重逢雖懷軒中意媿無鬢髮容春歌三首階上歌入懷庭中花照眼春心一如此情來不可限蘭葉始滿地梅花已落枝持此可憐意摘以寄心知朱日光素冰黃花映白雪折梅寄佳人共迎陽春月夏歌江南蓮花開紅光復碧水色同心復同藕異心無異閨中花如綉簾上露如珠欲知有所思停織復踟躕玉盤著朱李金杯盛白酒雖欲持自新復恐不甘口含桃落花日黃鳥營飛時君住馬已疲妾去蠶欲飢秋歌繡帶合歡結錦衣連理文情懷入夜月含笑出朝雲七彩紫金柱九華白玉梁但歌雲不去含吐有餘香吹漏未可停絃斷更當續俱作雙絲引共奏同心曲當信抱梁期莫聽載風音鏡上兩人髻分明無兩心子夜歌持愛如欲進含羞未肯前朱口發艷歌玉指弄嬌絃朝日照綺牋光風動紈羅巧笑蒨兩犀美目揚雙蛾上聲歌花色過桃杏名稱重金瓊名歌非下里含笑作上聲歡聞歌艷艷金樓女心如玉池蓮持底報郎思俱期遊梵天南有相思木含情復同心遊女不可求誰能息空陰團扇歌手中白團扇凈如秋團月清風任動生嬌香承意發碧玉歌杏梁日始照蕙席歡未極碧玉奉金杯綠酒助花色襄陽白銅鞮歌陌頭征人去閨中女下機含情不能言送別沾羅衣草樹非一香花葉百種色寄語故情人知我心相意龍頭紫金鞍翠眊白玉羈照耀雙闕下知是襄陽兒雜題二十一首寒閨被空眠數覺寒重夜風吹羅幃非海水那得度前知行雨本是巫山來無人德容色唯有楚王臣曾言夢相識梁塵依帷濛重翠帶日聚輕紅定為歌聲起非關團扇風華月兔絲生雲夜蛾影出漢時欲傳千里意不照十年悲北斗闌干去夜夜心獨傷月輝橫射枕燈光半隱床從頓還城南暫別兩成凝開簾生舊憶都如未有情更似新相識春江曲客行祇支念路相將度江口誰知堤上人拭淚空搖手新燕新禽應節歸俱向吹樓飛入簾驚釧響來窗礙舞衣彈箏彈箏北窗下夜響清音愁張高絃易斷心傷曲不遒夜遣內人還後舟錦幔扶船冽蘭橈拂浪浮去燭猶文水餘香尚滿舟詠武陵王左右頂分如兩髻簪長驗上頭投杯如欲轉凝殘已復留有所思可歎不可思可思不可見餘絃斷瑟柱殘朱染歌扇有所思寂寂暮簷響黯黯垂簾色唯有瓴甋苔如見蜘蛛織入林看碚春至定無賒何時一可見更得似梅花遊人遊戲長楊苑攜手雲臺間歡樂未窮已白日下洛山絕句贈麗人腰肢本猶絕眉眼特驚人判自無相比還來有洛神遙望散誕垂紅帔斜柯插玉簪可憐無有比恣許直千金愁閨照鏡別來顦顇久他人怪容色只有匣中鏡還持自相識浮雲可憐片雲生暫重復還輕欲使襄王夢應過白帝城寒閨綠葉朝朝黃紅顏日日異譬喻持相比那堪不愁思和人渡水婉娩新上頭湔裾出樂遊帶前結香草鬟邊捍石榴春閨思金羈遊俠子綺機離思妾春度人不歸望花盡成葉詠苑中遊人二月春心動遊望桃花初迴身隱日扇卻步歛風裾遙見美人採荷菱莖時繞釧棹水或沾粧不辭紅袖濕唯憐綠葉香詠小兒採菱採菱非採淥日暮且盈舫踟躕未敢進畏欲比殘桃詠舞曲應令歌聲臨畫閤舞袖出芳林石城定若遠前溪應幾深詠主人少姬應教故年齊總角今春半上頭那知夫婿好能降使君留詠長信宮中草委翠似知節含芳如有情全由履跡少併欲上階生石崇金谷妓蘭堂上客至綺席清絃撫自作明君辭還教綠珠舞蕩婦高樓月空庭高樓月非復三五圓何須照床裏終是一人眠歛容送君別一歛無開時只應待相見還將笑解眉詠織女金鈿已照曜白日未蹉跎欲待黃昏後含嬌渡淺河詠石蓮蓮名堪百萬石姓重千金不解無情物那得解人心和定襄侯初笄合鬟仍昔髮略鬢即前絲從今一梳罷無復更縈時古體雜意朝日大風霜寄事是交傷葉落枝柯淨常自起棊張詠佳麗可憐將可念可念直千金唯言有一恨恨不遂人心和定襄侯楚越衫裁縫在篋笥薰鬢帶餘香開看不忍著一見落千行為徐陵傷妾詩遲遲衫掩淚憫憫恨縈胸無復專房日猶望下山逢詠衵複的的金絃凈離離寶襊分纖腰非學楚寬帶為思君詠殘燈一首殘燈猶未滅將盡更揚輝唯餘一兩燄纔得解羅衣暮寒梅花自爛熳百舌早迎春逾寒衣逾薄未肯惜腰身戴嵩詠歌眠拂枕薰紅帊迴燈復解衣傍邊知夜永不喚定應歸詠繁華可憐宜出眾的的最分明秀媚開雙眼風流著語聲恭自君之山矣自君之出矣笥錦廢不開思君如清風曉夜常徘徊楊花曲深堤下生草高城上入雲春人心生思思心常為君別詩白日山上盡清風松下歇欲識離人愁孤臺見明月少年子聞有東方騎遙見上頭人待君送客返桂釵當自陳陽翟新聲懷春發下蔡含笑發陽城恥為飛雉曲好作鵾雞聲春遊置酒登廣殿開襟望所思春草行已歇何事久佳期思公子綺羅日減帶桃李無顏色思君君未歸君來豈相識春歌花塢蝶雙飛柳堤鳥百舌不見佳人來徒勞心斷絕冬歌四首塞閨動黻帳密筵重錦席賣眼拂長袖含笑留上客別時鳥啼戶今晨雪滿墀過此君不返但恐綠鬢衰果欲結金蘭但看松柏林經霜不墮地歲寒無異心一年漏將盡萬里人未歸君志固有在妾軀乃無依採菱歌菱花落復含桑女罷新蠶桂棹浮星艇徘徊蓮葉南夜夜曲愁人夜獨傷滅燭臥蘭芳祇恐多情月旋來照妾房金閨思二首遊人久不返妾身當何依日移孤影動羞覩燕雙飛自君之出矣不復染膏脂南風送歸燕聊以寄相思昭君辭塞外無春色邊城有風霜誰堪攬明鏡持許照紅粧別詩洛陽城東西長作經時別昔去雪如花今來花如雪擬自君之出矣自君之出矣羅帳咽秋風思君如蔓草連延不可窮登樓曲憑高川陸近望遠阡陌多相思隔重嶺相憶限長河越城曲別怨悽歌響離啼濕舞衣願假烏棲曲翻從南向飛南征曲櫂歌來楊女操舟驚越人圖蛟怯水伯照鷁竦江神陌上桑二首日出秦樓明條垂露尚盈蠶飢心自急開奩粧不成今月開和景處處動春心挂筐須葉滿息倦重枝陰桃花曲但使桃花艷得百美人簪何須論後實怨結子瑕心樹中草幸有青袍色聊因翠幄凋雖間珊瑚帶非是合歡條陌上桑四首鬱鬱陌上桑盈盈道旁女送君上河梁拭淚不能語鬱鬱陌上桑遙遙山下蹊君去戍萬里妾來守空閨鬱鬱陌上桑皎皎雲間月非無巧笑姿皓齒為誰發鬱鬱陌上桑裊裊機頭絲君行亦宜返今夕是何時, WYG: ''}
