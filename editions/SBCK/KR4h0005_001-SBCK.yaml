front:
  text: 玉臺新詠卷之一
  hash: sha256:f1534ea7352826efb563d1aedec29a168bb5d9d07bada5c0600d1f2b8ce4e6d5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0005_SBCK_001-1a}
body:
  text: 古詩八首其一上山採蘼蕪下山逢故夫長跪問故夫新人復何如新人雖言好未若故人姝顏色􅀋相似手爪不相如新人從門入故人從閤去新人工織縑故人工織素織縑日一匹織素五丈餘將縑來比素新人不如故其二懍懍􅀊云暮螻蛄多鳴悲凉風率已厲逰子寒無衣錦衾遺洛浦同袍與我違獨宿累長夜夢想見容輝良人唯古歡枉駕惠前綏願得常巧笑携手同車歸旣來不須􅁷又不䖏重闈諒無晨風翼焉得凌風飛眄睐以適意引領遥相睎徙􅀝懷感傷垂涕沾雙扉其三冉冉􅀌生竹結根泰山阿與君爲新婚菟絲附女蘿莵絲生有時夫婦㑹有宜千里逺結婚悠悠隔山陂思君令人老軒車來何遲傷彼􅈍蘭花含英揚光輝過時而不採捋隨秋草萎君亮報高節賤妾亦何爲其四孟冬寒氣至北風何慘慄愁多知夜長仰觀衆星列三五明月滿四五蟾兔缺客從遠方來遺我一書扎上言長相思下言久離别置書懷袖中三歲字不㓕一心抱區區懼君不識察其五客從遠方來遺我一端綺相去萬餘里故人心尚爾文彩雙鴛鴦裁爲合歡被着以長相思緣以結不解以膠投漆中誰能别離此其六四座且莫諠願聽歌一言請說銅爐器崔嵬象南山上枝似松柏下根據銅盤雕文各異􅀋離婁目相聨誰能爲此器公輸與魯班朱火然其中靑烟颺其間從風入君懷四座且莫歡香風難久居空令蕙草殘其七悲與親友别氣結不能言贈子以自愛道遠㑹見難人生無幾時顚沛在其間念子棄我去新心有所歡結志靑雲上何時復來還其八穆穆清風至吹我羅裳裾靑袍似春草長條隨夙舒朝登津梁山褰裳望所思安得抱柱信皎日以爲期古樂府詩六首日出東南隅行日出東南隅照我秦氏樓秦氏有好女自言名羅敷羅敷善蚕桑採桑城南隅靑絲爲籠繩桂枝爲籠鈎頭上倭隨髻耳中明月珠綠綺爲下裳紫綺爲上襦觀者見羅敷下檐捋髭􅂡少年見羅敷脫巾着幧頭耕者忘其耕鋤者忘其鋤來歸自相喜但坐觀羅敷使君從南來五馬立踟躕使君遣吏徃問此誰家姝荅云秦氏女且言名羅敷羅敷年幾何二十尚未滿十五頗有餘使君謝羅敷寧可共載不羅敷前置辭使君一何愚使君自有婦羅敷自有夫東方千餘􅀐夫壻居上頭何以識夫壻白馬從驪駒素絲繫馬尾黃金絡馬頭腰間鹿慮劒可直千萬餘十五府小吏二十朝大夫三十侍中郎四十專城居爲人潔白晢髯髯頗有􅂡盈盈公府歩冉冉府中趨坐中數千人皆言夫壻殊相逢狹路間與樂府極異爲相逢狹路間道隘不容車如何兩少年挾轂問君家君家誠易知易知復難忘黃金爲君門白玉爲君堂堂上置樽酒使作邯郸娼中庭生桂樹華燭何煌煌兄弟兩三人中子爲侍郎五日一來逰道上自生光黃金絡馬頭觀者滿路傍入門時左顧但見雙鴛鴦鴦鴦七十二羅列自成行音聲何噰噰鶴鳴東西廂大婦織羅綺中婦織流黃小婦無所作挾瑟上高堂丈人且安坐調絲未􅃍央隴西行天上何所有歷歷種白楡桂樹夾道生靑龍對道隅鳳凰鳴啾啾一毋􅀅九鶵顧視世間人爲樂甚獨殊好婦出迎客顏色正敷愉伸腰再拜跪問客平安不請客北堂上坐客氊氍毹清白各異樽酒上正華疏酌酒持與客客言主人持􅁍略再拜跪然後持一杯談笑未及竟左顧勑中厨促令辨麄飯愼莫使稽留廢禮送客出盈盈庭中趨送客亦不遠足不過門樞取婦得如此齊姜亦不如健婦持門戶勝一大丈夫艶歌行翩翩堂前燕冬藏夏來見兄弟兩三人流蕩在他縣故人誰爲補新衣誰當䘺賴得賢主人覽取爲吾綻夫壻從門來斜􅀝西北眄語􅀸且勿眄水清石自見不見何纍纍逺行不如歸皚如山上雪皚如山上雪皎若雲間月聞君有兩意故來相决絶今日斗酒㑹眀旦溝水頭蹀􅞃御溝上溝水東西流凄凄復凄凄嫁娶不須啼願得一心人白頭不相離竹竿何嫋嫋魚尾何蓰蓰男兒重意氣何用錢刀爲双白鵠飛來雙白鵠乃從西北來十十將五五羅列行不齊忽然卒疲病不能飛相隨五里一反顧六里一徘徊吾欲啣汝去口噤不能開吾欲􅀒汝去羽毛曰摧頽樂哉新相知憂耒生别離蜘蹰顧群侶淚落縱橫垂今日樂相樂延年萬歲期雜詩九首枚乘其一西北有高樓上與浮雲齊交䟽結綺窓阿閣三重階上有絃歌聲音響一何悲誰能爲此曲無乃􅂎梁妻清商隨風發中曲正徘徊一彈再三嘆慷􅁣有餘哀不惜歌者苦但傷知音稀願爲双鴻鵠􅁬翅起高飛其二東城高且長逶迤自相屬廻風動地起秋草萋且綠四時更變化􅀊暮一何速晨風懷苦心蟋蟀傷局促蕩滌放情志何爲自結束燕趙多佳人美者顏如玉被服羅衣裳當戶理清曲音響一何悲絃急知柱促馳情整巾帶沉吟聊躑躅思爲雙飛燕啣泥巢君屋其三行行重行行與君生别離相去萬餘里各在天一涯道路阻且長㑹面安可知胡馬嘶北風越鳥巢南枝其四相去日已遠衣帶日已緩浮雲蔽白日逰子不復返思君令人老歲月忽已晚棄􅂢勿復道努力加飱飯其五渉江採芙蓉蘭澤多芳草採之欲遺誰所思在遠道還顧望舊鄕長路漫浩浩同心而離居傷憂以終老其六靑靑河畔草鬱鬱園中柳盈盈樓上女皎皎當窓牖娥娥紅粉粧纎纎出素手昔爲娼家女今爲蕩子婦蕩子行不歸空牀難獨守其七蘭若生春陽渉冬猶盛滋願言追昔愛情欵感四時美人在雲端天路隔無期夜光照玄隂長嘆戀所思誰謂我無憂積念發狂癡庭前有竒樹綠葉發華滋攀條折其榮􅀅以遺所思馨香盈懷袙路遠莫致之此物何足貴但感别經時其八迢迢牽牛星皎皎河漢女纎纎濯素手札札弄機杼終日不成章泣涕零如雨河漢清且淺相去復幾許盈盈一水間脉脉不得語其九明月何皎皎照我羅裳幃憂愁不能寐攬衣起徘徊行客雖云樂不如早旋歸出戶獨彷徨愁思當吿誰引領還入房涙下沾裳衣歌詩一首并序李延年李延年知音善歌舞每爲漢武帝作新歌變曲聞者莫不感動延年侍座上起舞歌曰北方有佳人絶世而獨立一顧傾人城再顧傾人國傾城復傾國佳人難再得詩一首蘇武結髪爲夫婦恩愛兩不疑懽娛在今夕嬿婉及良時征夫懷遠路起視夜何其參辰皆已沒去去從此辭行役在戰塲相見未有期握手一長歎淚爲生别滋努力愛春華莫忘歡樂時生當復來歸死當長相思羽林郎詩辛延年昔有霍家奴姓馮名子都依􅀝將軍勢調笑酒家胡胡􅁎年十五春日獨當罏長裾連理帶廣袖合歡襦頭上藍田玉耳後大秦珠兩鬟何窈窕一世良所無一鬟五百萬兩鬟千萬餘不意金吾子娉婷過我廬銀鞍何煜爚翠蓋空踟躕就我求清酒絲繩提玉壺就我求珍肴金盤鱠鯉魚貽我靑銅鏡結我紅羅裾不惜紅羅裂何論輕賤軀男兒愛後婦女子重前夫人生有新故貴賤不相踰多謝金吾子私愛徒區區怨詩一首并序班婕妤昔漢成帝班婕妤失寵供養於長信宮乃作賦自傷并爲怨詩新製齊紈素鮮潔如霜雪裁爲合歡扇團圓似眀月出入君懷袖動摇微風發常恐秋節至凉飈奪炎熱棄􅂢篋笥中恩情中道絶董嬌饒詩一首宋子侯洛陽城東路桃李生路傍花花自相對葉葉自相當春風東北起花葉正低昂不知誰家子提籠行採桑纎手折其枝花落何飄颺請謝彼姝子何爲見損傷高秋八九月白露變爲霜終年㑹飄墮安得久馨香秋時自零落春月復芬芳何時盛年去歡愛永相忘吾欲竟此曲此曲愁人腸歸來酌美酒挾瑟上高堂漢時童謡歌一首城中好高髻四方高一尺城中好大眉四方皆半額城中好廣袖四方用匹帛同聲詩一首張衡邂逅承際㑹偶得充後房情好新交接恐慄若􅊥湯不才勉自竭賤妾職所當綢繆主中饋奉禮助蒸嘗思爲莞蒻席在下蔽匡牀願爲羅衾幬在上衞風霜洒掃清枕席鞮芬以秋香重戶結金扃高下華燈光解衣巾粉缷列圖陳枕張素女爲我師儀態盈萬方衆夫所希見天老教軒皇樂莫斯夜樂沒齒焉可忘贈婦詩三首并序秦嘉秦嘉字士㑹隴西人也爲郡上􅁺其妻徐淑寢疾還家不􅀗面别贈詩云爾其一人生譬朝露居世多屯蹇憂艱常早至歡㑹常苦晚念當奉時役去爾日遥遠遣車迎子還空徃復空返省書情悽愴臨食不能飰獨坐空房中誰與相勸勉長夜不能眠伏枕獨展轉憂來如尋環匪席不可卷其二皇靈無􅀻親爲善荷天祿傷我與爾身少小罹煢獨旣得結大義歡樂苦不足念當遠離别思念叙欵曲河廣無舟梁道近隔丘陸臨路懷惆悵中駕正躑躅浮雲起高山悲風激深谷良馬不廻鞍輕車不轉轂針藥可屢進愁思難爲數貞士篤終始恩義不可促其三肅肅僕夫征鏘鏘揚和鈴清晨當引邁束帶待雞鳴顧看空室中髣髴想姿形一别懷萬恨起坐爲不寧何用叙我心遺思致欵誠寳􅁫好耀首明鏡可鑒形芳香去垢􅁾素琴有清聲詩人感木瓜乃欲荅瑶瓊愧彼贈我厚慙此往物輕雖知未足報貴用叙我情秦嘉荅妻詩徐淑妾身兮不令嬰疾􅀆來歸沉滯􅀆家門歷時􅀆不差曠廢􅀆侍覲情敬兮有違君今兮奉命遠邇兮京師悠悠兮離别無因兮叙懷瞻望兮踴躍佇立兮徘徊思君兮感結夢想兮容輝君發兮引邁去我兮日乖恨無兮羽翼高飛兮相追長吟兮永歎淚下兮沾衣飲馬長城窟行蔡邕靑靑河邊草綿綿思遠道遠道不可思宿昔夢見之夢見在我旁忽􅁴在他鄕他鄕各異展縣轉不相見枯桑知天風海水知天寒入門各自媚誰肯相爲言客從遠方來潰我雙鯉魚呼兒烹鯉魚中有尺素書長跪讀素書書上竟何如上有加飱食下有長相思飲馬長城窟行陳琳飮馬長城窟水寒傷馬骨請謂長城吏愼莫稽留太原卒官作自有程舉築諧汝聲男兒寧當格闘死何能怫鬱築長城長城何連連連連三千里邊城多健兒内舍多寡婦作書與内舍便嫁莫留住善事新姑嫜時時念我故夫子報書與邊地君今出語一何鄙身在禍難中何爲稽留他家子生男愼莫舉生女哺用脯君獨不見長城下死人骸骨相撑拄結髮行事君慊慊心意間眀知邊地苦賤妾何能久自全雜詩五首徐幹其一沉隂結愁憂愁憂爲誰興念與君相别各在天一方良㑹未有期中心摧且傷不聊憂飡食慊慊常飢空端坐而無爲髣髴君容光其二峨峨高山首悠悠萬里道君去日已逺欝結令人老人生一世間忽若暮春草時不可再得何爲自愁惱毎誦昔鴻恩賤軀焉足保其三浮雲何洋洋願因通我辭飄飄不可􅀉徙􅀝徒相思人離皆復㑹君獨無反期自君之出矣明鏡暗不治思君如流水何有窮已時其四慘慘時節盡蘭華凋復零喟然長歎君息期慰我情展轉不能寐長夜何綿綿躡履起岀戶仰觀三星連自恨志不遂泣涕如涌泉其五思君見巾櫛以益我勞勤安得鴻鸞羽覯此心中人誠心亮不遂搔首立悁悁何言一不見復㑹無因緣故然比目魚今隔如參辰室思人靡不有初想君能終之别來歷年􅀊舊思何可期重新而忘故君子所猶譏􅀉身雖在遠豈忘君湏􅁷旣厚不爲薄想君時見思情詩高殿鬱崇崇廣厦淒泠泠微風起閨闥落日照階庭踟躕雲屋下笑歌􅀝華楹君行殊不返我飾爲誰榮鑪薫闔不用鏡匣上塵生綺羅失常色金翠暗無精嘉肴旣忘御㫖酒亦常停顧瞻空寂寂唯聞燕雀聲憂思連相屬中心如宿酲定情詩䌓欽我出東門逰邂逅承清塵思君即幽房侍寢埶衣巾時無桑中契迫此路側人我旣媚君姿君亦悅我顏何以致拳拳綰臂双金鐶何以致殷勤約指一双銀何以致區區耳中双明珠何以致叩叩香囊繫肘後何以致契闊繞腕雙跳脫何以結恩情美玉綴羅纓何以結中心素縷連双針何以結相投金薄􅀞搔頭何以慰别離耳後玳瑁􅁫何以荅歡悅紈素三條裾何以結愁悲白絹双中衣與我期何所乃期東山隅日旰子不來谷風吹我襦遠望無所見涕泣起踟躕與我期何所乃期山南陽日中兮不來凱風吹我裳逍遥莫誰覩望君愁我腸與我期何所乃期西山側日夕兮不來躑躅長歡息遠望凉風至俯仰正衣服與我期何所乃期山北岑日暮兮不來凄風吹我衿望君不能坐悲苦愁我心愛身以何爲惜我華色時中情旣欵欵然後尅密期褰衣躡茂草謂君不我欺厠此醜陋質徙􅀝無所之自傷失所欲淚下如連絲古詩爲焦仲􅀸妻作并序無名氏漢末建安中廬江府小吏焦仲􅀸妻劉氏爲仲􅀸毋所遣自誓不嫁其家逼之乃沒水而死仲􅀸聞之亦自縊於庭樹時傷之爲詩云爾孔雀東南飛五里一徘徊十三能織素十四學裁衣十五彈箜篌十六誦詩書十七爲君婦心中常苦悲君旣爲府吏守節情不移賤妾留空房相見常自稀彼意常依依雞鳴入機織夜夜不得息三日斷五匹大人故嫌責非爲織作遲君家婦難爲妾不堪驅使徒留無所施便可白公姥及時相遣歸府吏得聞之堂上啓阿母兒已薄祿相幸復得此婦結髮同枕席黃泉共爲友共事三二年始爾未爲久女行無偏斜何意致不厚阿母謂府吏何乃太區區此婦無禮節舉動自專諸吾意久懷忿汝豈得自由東家有賢女自名秦羅敷可憐體無比阿毋爲汝求便可速遣之遣去愼莫留府吏長跪吿伏惟啓阿母今若遣此婦終老不復取阿母得聞之槌牀便大怒小子無所畏何敢助婦語吾已失恩義㑹不相從許府吏黙無聲再拜還入戶舉言謂新婦哽咽不能語我自不驅􅀸逼迫有阿母􅀸但暫還家吾今且報府不久當歸還還必相迎取以此下心意愼勿違吾語新婦謂府吏勿復重紛紜徃昔初陽歲謝家來貴門奉事循公姥進心敢自專晝夜勤作息伶俜縈苦辛謂言無罪過供養卒大恩仍更被驅遣何言復來還妾有繡腰􅃭萎􅅋自生光紅羅復斗帳四角垂香囊箱簾六七十綠碧青絲繩物物各自異種種在其中人賤物亦鄙不足迎後人留待作遺施於今無㑹因時時爲安慰久久莫相忘雞鳴外欲曙新婦起嚴粧着我繡裌裙事事四五通足下躡絲履頭上玳瑁光腰􅀂流紈素耳着眀月璫指如削葱根口如含朱丹纎纎作細歩精妙世無雙上堂拜阿母阿母怒不止昔作女兒時生小出野里本自無教訓兼愧貴家子受毋錢帛多不堪毋驅使今日還家去念母勞家裏􅁍與小姑别淚落連珠子新婦初來時小姑始扶牀今日被驅遣小姑如我長勤心養公姥好自相扶將初七及下九嬉戯莫相忘出門登車去涕落百餘行府吏馬在前新婦車在後隱隱何甸甸俱㑹大道口下馬入車中低頭共耳語誓不相隔鄕且暫歸家去吾今且赴府不久當還歸誓天不相􅀒新婦謂府吏感君區區懷君旣若見錄不久望君來君當作盤石妾當作蒲葦蒲葦紉如絲盤石無轉移我有親父兄性行暴如雷恐不忍我意逆以煎我懷舉手長勞勞二情同依依入門上家堂進退無顏儀阿毋大拊掌不啚子自歸十三教汝織十四能裁衣十五彈箜篌十六知禮儀十七遣汝嫁謂言無誓違汝今何罪過不迎而自歸蘭芝慙阿毋兒實無罪過阿母大悲摧還家十餘日縣令遣媒來云有第三郎窈窕世無双年始十八九便言多令才阿母謂阿女汝可去應之阿女含淚荅蘭芝初還時府吏見丁寧結誓不别離今日違情義恐此事非竒自可斷來信徐徐更謂之阿母白媒人貧賤有此女始適還家門不堪吏人婦豈合令郎君幸可廣問訊不可便相許媒人去數日尋遣丞請還說有蘭家女承籍有宦官云有第五郎嬌逸未有婚遣丞爲媒人主簿通語言直說太守家有此令郎君旣欲結大義故遣來貴門阿母謝媒人女子先有誓老姥豈敢言阿兄得聞之悵然心中煩舉言謂阿妹作計何不量先嫁得府吏後嫁得郎君否泰如天地足以榮汝身不嫁義即體其住欲何云蘭芝仰頭荅理實如兄言謝家事夫壻中道還兄門處分適兄意􅃚得自任專雖與府吏要渠㑹永無緣登即相許和便可作婚姻媒人下牀去諾諾復爾爾還部白府君下官奉使命言談大有緣府君得聞之心中大歡喜視曆復閱書便利此月内六合正相應良吉三十日今已二十七􅀸可去成婚交語速裝束絡繹如浮雲靑雀白鵠舫四角龍子幡婀娜隨風轉金車玉作輪躑躅靑驄馬流蘇金鏤鞍齎錢三百萬皆用靑絲穿雜彩三百匹交廣市鮭珍從人四五百欝鬱登郡門阿母謂阿女適得府君書明日來迎汝何不作衣裳莫令事不舉阿女黙無聲手巾掩口啼淚落便如瀉移我琉璃搨出置前牕下左手持刀尺右手執綾羅朝成繡裌裙晚成單羅衫䁆䁆日欲暝愁思出門啼府吏聞此變因求假暫歸未至二三里摧藏馬悲哀新婦識馬聲躡履相逢迎悵然遥相望知是故人來舉手拍馬鞍嗟嘆使心傷自君别我後人事不可量果不如先願又非君所詳我有親父母逼迫兼弟兄以我應他人君還何所望府吏謂新婦賀􅀸得高遷盤召方且厚可以卒千年蒲葦一時紉便作旦夕間􅀸當日勝貴吾獨向黃泉新婦謂府吏何意出此言同是被迫逼君爾妾亦然黃泉下相見勿違今日言埶手分道去各各還家門生人作死别恨恨􅃚可論念與世間辭千萬不復全府吏還家去上堂拜阿母今日大風寒寒風摧樹木嚴霜結庭蘭兒今日冥冥今母在後單故作不良計勿復怨􅀑神命如南山石四體康且直阿母得聞之零淚􅀿聲落汝是大家子仕宦於臺閣愼勿爲婦死貴賤情可薄東家有賢女窈窕艶城郭阿母爲汝求便復在旦夕府吏再拜還長嘆空房中作計乃爾立轉頭向戶裏漸見愁煎迫其日牛馬嘶新婦入青廬淹淹黃昏後寂寂人定初我命絶今日魂去尸長留攬裙脫絲履舉身赴靑池府吏聞此事心知長别離徘徊顧樹下自掛東南枝兩家求合葬合葬華山傍東西植松柏左右種梧桐枝枝相復蓋葉葉相交通中有雙飛鳥自名爲鴛鴦仰頭相向鳴夜夜達五更行人駐足聽寡婦起傍徨多謝後世人戒之愼勿忘玉臺新詠卷之一玉臺新詠目錄卷之一古詩八首古樂府詩六首枚乘雜詩九首歌詩一首李延年詩一首蘇武羽林郎詩一首辛延年怨詩一首班婕妤董嬌嬈詩一首宋子候漢時童謡歌一首同聲詩一首張衡贈婦詩三首秦嘉秦嘉妻荅一首徐淑飮馬長城窟行一首蔡邕飮馬長城窟行一首陳琳詩五首徐幹室思詩一首又情詩一首又定情詩一首䌓欽古詩爲焦仲􅀸妻作無名氏
