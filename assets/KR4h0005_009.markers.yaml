  - {type: variant, offset: 4003, length: 0, content: '', SBCK: 歲暮愍衰草愍衰草衰草無容色憔悴荒徑中寒萎不可識昔時兮春日昔時兮春風含華􅀆佩實垂綠兮散紅氛氲鳷鵲右照曜望仙東送歸顧莫泣淇水嘉客淹留懷上宮岩陣兮海㟁冰多兮霧散爛熳兮客根攅幽兮石隟布綿密於寒臯吐纎疎於危石旣惆悵於君子倍傷心於行役露高枝於初旦霜紅天於始夕彫芳卉之九衢寳靈茅之三眷風急崤路難秋至客衣單旣傷簷下菊復悲池上蘭飄落逐風轉方知􅀊早寒流螢暗明燭鴈聲斷纔續委紀長信宮蕪􅁾丹墀曲霜奪莖上紫風銷葉中縁山奕兮青薇兮黃葦秋鴻兮疎引寒鳥聚兮輕飛逕荒寒草合桐長舊巖圍夜漸蘼蕪沒箱露日沾衣願逐晨征鳥薄暮共西歸霜來悲落桐悲落桐落桐早霜露燕至葉未抽鴻來波已素本出龍門山長枝仰刺天上峯百丈絶下趾萬尋懸幽根已盤結􅀌株復爲絶初不照光景終年􅀒霜雪自顧無羽儀不願生曲池芬芳本自乏華實無可施匠者時留盻王孫少見之分取生孤卉徒置北堂垂宿莖抽晚榦祈葉生故枝枝雖遼遠新葉頗離離春風一朝至榮啓坐如斯自惟良菲薄君思徒照灼顧已非嘉樹宜用慿阿閣願作清廟琴爲舞雙玄鶴薛荔可爲裳文杏可爲梁勿言草木賤徒照君朱光朱光不徙照爲君含噭眺隂阿綠氷弦隂枝苦寒調厚德不可任敢不虛其􅀂心逢陽春至吐綠照清得夕行聞聞夜鶴鶴呌南池對此孤明月臨風振羽伊吾儀人之薄無菲賦命之天爵抱地跼促之短長懷隨冬春而哀樂愍海未之驚鳧傷雲間之鶴鶴離離昔未離近發天北垂忽値疾風起暫下昆明池復値冬冰合水宿非所宜欲留不可住欲去飛巳疲勢逐疾風舉求溫向衡楚復値􅀯飛鴻參差共成侶海上多雲霧蒼茫失洲嶼自此别故群燭向瀟湘渚故群不離散相依蒼海畔夜止羽相切晝飛影相亂刷羽共浮沉湛澹泛清潯旣不得離别安知慕侶心九冬霜雪苦六翮飛不任且養凌雲翅俛仰弄清音所望浮丘子旦夕來見尋晨征聽曉鴻聽曉鴻曉鴻度􅀅旦跨弱水之微瀾發成山之遠岸牀春歸之未幾驚比歲之云半出海漲之蒼茫入雲途之杳漫無東西之可辨孰遐邇之能筭微昔見於洲渚越秋期於江漢集勁風於弱軀􅀒重雪於輕翰寒溪可以飮荒臯可以竄溪水自清徒形豈足翫秋蓬萎兮未極寒草衰兮無色楚山高兮難杳度越水深兮不可測美明月之馳光願征禽之騁翼伊余馬之屨懷知君行之未極夜綿綿而難曉愁參差而盈臆望山川悉無以唯星河猶可識聞鴈夜􅀯飛客淚夜沾衣春鴻思暮交客子方未歸􅀊去歡娛盡年來客貌非攬衽形雖是撫臆事多違青蒲雖長復易解白雲誠遠詎難依解珮去朝市去朝市朝市深歸暮辭北纓而南徂浮東川而西顧逢天地之降祥値日月之重光伊當仁之菲薄非余情之信芳充待詔於金馬眷齊宴於柏梁觀闘獸於虎圈望窅窕於坡香逰西園兮登銅雀舉靑璅兮眺重陽講金華兮議宣室晝武帷兮夕文昌佩甘泉􅀆履五祚賛朽諧􅀆緩光託後車兮侍華幄逰勃海泛清漳天道有盈缺寒暑逓炎凉一朝賣玉椀春暮惜餘香曲池無復處桂枝亦銷亡清廟徙肅肅四陵久茫茫薄暮余多幸嘉運重來昌忝稽部之南尉典千里之光貴形北荒之濁河惡横橋於清渭望前軒之早桐對南階之初卉非余情之屢傷􅀉玆兮能慰昔日兮懷哉日將暮兮歸去來披褐守山東守山東山東萬里欝靑葱兩漢共一寫水潔望如空巖側靑莎披岩間丹桂叢上瞻旣隱隱下睇亦冥濛遠林響包獸近樹聒鳴虫路帶􅀂溪右泉吐金華東萬仭倒危石百丈涇懸叢瀑曳瀉疎電奔飛似白虹洞升含清氣漏穴吐飛風玉竇膏滴瀝石室乳空籠峭㠋塗彌險豈岨歩􅂊通余拾平生之所愛歘暮年而斯逢此願一去而不還恨邦衣之未禠挹林壑之清曠事泯俗之詭紛幸帝德之方升値天網之未毀旣除舊而就新故化民而俗徙播趙俗以尚徂扇齊風以東靡乳雉方可馴流蝗庶能弭清心矯世濁儉政救民侈滿秩歸白雲淹留事芝體}
