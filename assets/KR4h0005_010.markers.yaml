  - {type: variant, offset: 3920, length: 233, content: 久不返妾身當何依日移孤影動羞覩燕雙飛自君之出矣不復染膏脂南風送歸燕聊以寄相思昭君辭塞外無春色邊城有風霜誰堪攬明鏡持許照紅粧別詩洛陽城東西長作經時別昔去雪如花今來花如雪擬自君之出矣自君之出矣羅帳咽秋風思君如蔓草連延不可窮登樓曲憑高川陸近望遠阡陌多相思隔重嶺相憶限長河越城曲別怨悽歌響離啼濕舞衣願假烏棲曲翻從南向飛南征曲櫂歌來楊女操舟驚越人圖蛟怯水伯照鷁竦江神陌上桑二首日出秦樓明條垂露尚盈蠶飢心自急開奩粧不成今月開和景處處動春心挂筐須葉滿息倦重枝陰桃花曲但使桃花艷得百, SBCK: 遥見}
