body:
  text: 卷第九古詞東飛伯勞歌東飛伯勞西飛燕黃姑織女時相見誰家女兒對門居開顏發艷照里閭南窗北牖挂明光羅幃綺帳脂粉香女兒年幾十五六窈窕無雙顏如玉三春已暮花從風空留可憐誰與同河中之水歌河中之水向東流洛陽女兒名莫愁莫愁十三能織綺十四採桑南陌頭十五嫁為盧家婦十六生兒字阿俟盧家蘭室桂為梁中有鬱金蘇合香頭上金叉十二行足下絲履五文章珊瑚掛鏡爛生光平頭奴子擎履箱人生富貴何所望恨不早嫁東家王越人歌並序楚鄂君子修者乘青翰之舟張翠羽衣蓋榜拽越人悅之擢楫而歌以感鄂君歡然舉繡被而覆之其辭曰今日何日搴洲中流今夕何夕與王子同舟山有木兮木有枝心悅君兮君不知琴歌二首並序司馬相如遊臨邛富人卓王孫有女文君新寡竊於壁間窺之相如鼓琴歌以挑之曰鳳兮鳳兮歸故鄉遊遨四海求其皇時未遇兮無所將何悟今夕兮升斯堂有艷淑女在此方室近人遐獨我傷何緣交頸為鴛鴦頡頡頏頏兮共翱翔鳳兮凰兮從我栖得記孽尾永為妃交情通意心和諧中夜相從知者誰雙翼俱起高翻飛無感我心使余悲詩並序漢武元封中以江都王女細君為公主嫁與烏孫昆彌至國而自治宮室歲時一再會言語不通公主悲愁自作歌曰詩並序吾家嫁我兮天一方遠託異國烏孫王穹廬為室氈為牆以肉為食兮酪為漿常思漢土兮心內傷願為黃鵠歸故鄉漢成帝時童謠歌二首並序漢成帝趙望后名飛燕寵幸冠於後宮常從帝出入時富平侯張放亦稱佞幸為期門之游故歌云張公子時相見也飛燕嬌妬成帝無子故云啄皇孫華而不實王莽自云代漢德者土色尚黃故云黃雀飛燕竟以廢死故為人所憐也燕燕尾涎涎張公子時相見木門倉琅根燕飛來啄皇孫桂樹花不實黃雀巢其顛昔為人所愛今為人所憐漢桓帝時童謠二首小麥青青大麥枯誰當獲者婦與姑丈夫何在西擊胡吏買馬君具車請為諸君鼓龍胡漢桓帝時童謠二首城上烏尾畢逋公為吏兒為徒一徒死百乘車車班班至河間河間河婉女能數錢以錢為室金為堂石上膴膴舂黃梁之下有懸鼓我欲擊之丞相怒張衡四愁詩張衡不樂久處機密陽嘉中出為河間相時國王驕奢不遵法度又多豪右并兼之家衡下車治威嚴能內察屬縣姦猾行巧劫皆密知名下吏收捕盡服擒諸豪俠游客悉惶懼逃出境郡中大治爭訟息獄無繫囚時天下漸弊鬱鬱不得志為四愁詩屈原以美人為君子以珍寶為仁義以水深雪氛為小人思以道術相報貽於時君而懼讒邪不得以通其辭曰我所思兮在太山欲往從之梁甫難側身東望涕沾翰美人贈我金錯刀何以報之英瓊瑤路遠莫致倚逍遙何為懷憂心煩勞我所思兮在桂林我欲從之湘水深側身南望涕沾襟美人贈我金琅玕何以報之雙玉盤路遠莫致倚惆悵何為懷憂心煩傷我所思兮在漢陽欲往從之壠坂長側身西望涕沾裳美人贈我貂襜褕何以報之明月珠路遠莫致倚踟蹰何為懷憂心煩紆我所思兮在鴈門欲往從之雪紛紛側身北望涕沾巾美人贈我錦繡段何以報之青玉案路遠莫致倚增嘆何為懷憂心煩惋贈婦暖暖白日引曜西傾啾啾雞群飛雀赴楹皎皎明月煌煌列星嚴霜悽愴飛雪覆庭寂寂獨居寥寥空室飄飄帷帳熒熒華燭爾不是居帷帳何施爾不是照華燭何為燕歌行秋風蕭瑟天氣涼草木搖落露為霜群燕辭歸鴈南翔念君客遊多思腸慊慊思歸戀故鄉君為淹留寄他方賤妾煢煢守空房憂來思君不可忘不覺淚下沾衣裳援琴鳴絃發清商短歌微吟不能長明月皎皎照我床星漢西流夜未央牽牛織女遙相忘爾獨何辜限河梁燕歌行別日何易會日難山川悠遠路漫漫鬱陶思君未敢言寄聲浮雲往不還沾零兩面毀容顏誰能懷憂獨不嘆展詩清歌聊自寬樂往哀來摧肺肝耿耿伏枕不能眠披衣出戶步東西仰看星月觀雲間飛鶬晨鳴聲可憐留連顧懷不能存妾薄命行六言日月既逝西藏更會蘭室洞房花燈步幛輝皎煌若日出扶桑促樽合坐行觴主人起舞𥁲盤能者冗觸別端騰觚飛爵闌干同量等色齊顏任意交屬所歡朱顏發外形蘭袖隨禮容極情妙舞仙仙體輕裳解履遺絶纓俯仰笑喧無呈覽持佳人玉顏齊接金爵翠盤手形羅袖良難腕弱不勝珠環坐者嘆息舒顏御巾裛粉君傍中有霍納都梁雞舌五味雜香進者何人齊姜恩重愛深難忘召延覓好宴私但歌杯來何遲客賦既醉言歸主人稱露未晞擬北樂府三首歷九秋篇薰桃行歷九秋兮三春分遣客兮遠賓顧多君心所親乃命妙妓才人炳若日月星辰歷九秋篇薰桃行序金罍兮玉觴賓主遞起鴈行杯若飛電絶光交觴接巵結裳慷慨歡笑萬方奏新詩兮夫君爛然虎變龍文渾如天地未分齊謳楚舞紛紛歌聲上激青雲窮八音兮異倫奇聲靡靡每新微笑素齒丹唇逸響飄薄梁塵精爽眇眇入神坐咸醉兮沾歡引樽促席臨軒進爵獻壽翻翻千秋要君一言願愛不移若山君恩愛兮不竭譬若朝日夕月此景萬里不絶長保初醮結髮何憂坐生胡越攜弱手兮金環上遊飛閣雲間穆若鴛鳳雙鸞還幸蘭房自安娛心極樂難原樂既極兮多懷盛時忽逝若頽寒暑革御景回春榮隨風飄摧感物動心增哀妾受命兮孤靈男兒隨地稱殊女弱難存若無骨肉至親更疏奉事他人托軀君如影兮隨形賤妾如水浮萍明月不能常盈誰能無根保榮良時冉冉代征緑繡領兮含輝皎日回光則微朱華忽爾漸衰影欲捨形高飛誰言往恩可追薺與麥兮夏零蘭桂踐霜逾馨祿命緣天難明委心結意丹青何憂君心中傾車遙遙篇車遙遙兮馬洋洋追思君兮不可忘君安遊兮西入秦願為影兮隨君身君在陰兮影不見君依光兮妾所願燕人美篇燕人美兮趙女佳其室則遠兮限層崖雲為車兮風為馬玉在山兮蘭在野雲無期兮風有止思心多端兮誰能理擬四愁詩四首並序張平子作四愁詩體小而俗七言類也聊擬而作之名曰擬四愁詩其辭曰我所思兮在瀛洲願為雙鵠戲中流牽牛織女期在秋山高水深路無由愍余不遘嬰殷憂佳人貽我明月珠何以要之比目魚海廣無舟悵勞劬寄言飛龍天馬駒風起雲披飛龍逝波淹天兮馬不儷何為多念心憂世我所思兮在珠崖願為比翼浮清池剛柔合德配二儀形影一絶長別離愍余不遘情如攜佳人貽我蘭蕙草何以要之同心鳥火熱水深憂盈抱申以琬琰夜光寶卞和既沒玉不察存若流光忽電滅何為多念獨鬱結我所思兮在崑山願為鹿蛩窺虞淵日月回曜照景天參辰曠隔會無緣愍余不遘罹百艱佳人貽我蘇合香何以要之翠鴛鴦懸度弱水川無梁申以錦衣文繡裳三光騁邁景不留鮮以民生忽若浮何為多念祇自愁我所思兮在朔方願為飛燕俱南翔煥乎人道著三光胡越殊心生異鄉愍余不遘罹百殃佳人遺我羽葆纓何以要之影與形增冰憂結繁華零申以日月指明星星辰有翳日月移駑馬哀鳴慚不馳何為多念心自虧盤中詩山樹高烏鳴悲泉水深鯉魚肥空倉鵲常苦飢吏人婦會夫希出門望見白衣謂當是而更非還入門中心悲北上堂西入階急機絞杼聲催長嘆息當語誰君有行妾念之出有日還無期結中帶長相思君忘妾未知之妾忘君罪當治妾有行宜知之黃者金白者玉高者山下者谷姓者蘇字伯玉作人才多智謀足家居長安身在蜀何惜馬蹄歸不數羊肉千斤酒百斛令君馬肥麥與粟今時人智不足與其書不能讀當從中央周四角擬四愁詩我所思兮在南巢欲往從之玉山高登崖遠望涕泗交我之懷矣心傷勞佳人遺我筒中布何以贈之流黃素願因飄風超遠路終然莫致增永慕我所思兮在朔眉欲往從之白雲霏登崖遠望涕泗垂我之懷矣心傷悲佳人遺我雲中翮何以報之連城璧願因歸鴻起遐隔終然莫致增永積我所思恩兮在隴原欲往從之隔太山登崖遠望涕泗連我之懷矣心傷煩佳人遺我雙角端何以贈之雕玉環願因行雲超重巒終然莫致增永嘆我所思兮在營州欲往從之路阻修登崖遠望涕泗流我之懷矣心傷憂佳人遺我緑綺琴何以贈之雙南金願因流波超重深終然莫致增永吟晉惠帝時童謠歌鄴中女子莫千妖前至三月抱胡腰樂府燕歌行四時代序逝不追寒風習習落葉飛蟋蟀在堂露盈墀念君遠遊常苦悲君何緬然久不歸賤妾悠悠心無違白日既沒明燈輝寒禽赴林匹鳥栖雙鳩關關宿河湄憂來感物睇不晞非君之念思為誰別日何早會何遲代淮南王淮南王好長生服食鍊氣讀仙經琉璃作枕牙作盤金鼎玉匕合神丹合神丹戲紫房紫房綵女弄明璫鸞歌鳳舞斷君腸朱城九門門九閨願逐明月入君懷入君懷結君珮怨君恨君恃君愛築城思堅劍思利同盛同衰莫相棄代白紵歌辭朱唇動素袖舉洛陽少年邯鄲女古稱緑水今白紵催絃急管為君舞窮秋九月荷葉黃北風驅鴈天雨霜夜長酒多樂未央春風淡蕩俠思多天色淨緑氣妍和桃含紅萼蘭紫芽朝日灼爍發園葩卷幌結幃盈玉筵齊驅秦吹廬女絃千金顧笑買芳年行路難中庭五株桃一株先作花陽春妖冶二三月從風簸蕩落西家西家思婦見之惋零淚沾衣撫心歎初送我君出戶時何時淹留節回換床席生塵明鏡垢纖腰瘦削髮蓬亂人生不得常稱意惆悵徙倚至夜半銼蘗染黃絲黃絲歷亂不可治昔我與君始相值爾時自謂可君意結帶與我言死生好惡不相置今日見我顏色衰意中索寞與先異還君金叉玳瑁簪不忍見此益愁思奉君金巵之旨酒玳瑁玉匣之雕琴七彩芙蓉之羽帳九華葡萄之錦衾紅顏零落歲將暮寒光宛轉時欲沉願君裁悲且減思聽我折節行路吟不見柏梁銅雀上仍聞古時清吹音璿閨玉墀上椒閣文窗繡戶垂羅幕中有一人字金蘭被服纖羅采芳藿春燕差池風散梅開帷對影弄禽雀含歌攬涕不能言人生幾時得為樂寧作野中之雙鳧不願雲間之別鶴君不見孤鴈關外發酸嘶度揚越空城客子心腸斷幽閨思婦氣欲絶凝霜夜下拂羅衣浮雲中斷開明月夜夜遙遙徒相思年年望望情不歇寄我匣中青銅鏡倩人為君除白髮行路難行路難夜聞南城漢使度使我流淚憶長安李夫人及貴人歌屬車挂席塵豹尾香煙滅形影向蘼蕪青蒲復萎絶坐萎絶對蘼蕪臨丹階泣樹途寡鶴羈雌飛且止雕梁翠壁網蜘蛛洞房明月夜對此淚如珠登臺望秋月望秋月秋月光如練照曜三爵臺徘徊九華殿九華玳瑁梁華榱與璧璫以茲雕麗色特照明月光凝華入黼帳清輝懸洞房先過飛燕戶卻照班姬床桂宮裊裊落桂枝早寒淒淒凝白露上林晚葉颯颯鳴鴈門早鴻離離度湛秀質兮似規委清光兮如素照愁軒之蓬影映金階之微步居人臨此笑以歌別客對之傷且慕經衰圃映寒叢凝清夜帶秋風隨庭雪以比素與池荷而共紅臨玉階之皎皎含雪靄之濛濛轥天衢而徒步轢長潢而飛空隱岩崖而半至隔帷幌而才通散朱庭之奕奕入青瑣而玲瓏間階悲寡鵠沙洲怨別鴻昭姬泣胡殿明君思漢宮余亦何為者淹留此山東會圃臨春風臨春風春風起春樹遊絲暖如煙落花氛似霧先泛天淵池還過細柳枝蝶逢飛搖揚燕值羽差池揚桂旆動芝蓋開燕裙吹趙帶趙帶飛參差燕裙合且回離回簪復轉黛顧步惜容儀容儀已照灼春風復回薄氛氳桃李花青柎含素萼既為風所開復為風所落搖緑帶枕紫莖舞春雪雜流鶯曲房開兮金鋪響金鋪響兮妾思驚梧桐未陰淇川始碧迎行雨於高唐送歸鴻於碣石經洞房響紈素感幽閨思帷奕想芳園兮可以遊念蘭翹兮漸堪摘拂明鏡之冬塵解羅衣之秋襞既鏗鏘以動珮又絪縕而流麝始搖蕩以入閨終徘徊而緣隙鳴珠簾於繡戶散芳塵於綺席是時悵思婦安能久行役佳人不在茲春風為誰惜行路難二首君不見上林苑中客冰羅霧縠象牙席盡是得意忘年者探腸見膽無所惜白酒甜鹽甘如乳緑觴皎鏡華如碧少年持名不肯嘗安知白駒應過隙博山爐中清和香鬱金蘇合及都梁逶迤好氣皆容貌經過青瑣歷紫房已入中山陰后帳復上皇帝班姬床班姬失寵顏不開奉帚供養長信臺日暮耿耿不能寐秋風切切四面來玉階行路生細草金爐香炭變成灰得意失意須臾間非君方寸逆所裁洞庭水上一株桐經霜觸浪困嚴風昔時抽心耀白日今且臥死黃沙中洛陽名工見咨嗟一剪一刻作琵琶白璧規心學明月珊瑚映面作風花帝王見賞不見忘提攜把握登建章掩抑摧藏張女彈殷勤促柱楚明光年年月月對君王遙遙夜夜宿未央未央綵女棄明𥱊爭見拂拭生光儀茱萸錦衣玉作匣安念昔日枯樹枝不學衡山南嶺桂至今載年猶未知擬樂府長相思長相思久離別美人之遠如雨絶獨延佇心中結望雲雲去遠望鳥鳥飛滅空望終若斯珠淚不能雪長相思久別離所思何在若天垂鬱陶相望不得知玉階月夕映羅帷風夜吹思長不能寐坐望天河移白紵歌辭歌兒流唱聲欲清舞女趁節體自輕歌舞並妙會人情依絃度曲婉盈盈揚蛾為態謹自成妙聲屢唱輕體飛流津染面散芳菲舉動齊息不相違令彼佳客淡忘歸時久玩夜明星稀行路難君不見長安客舍門倡家少女名桃根貧窮夜紡無燈燭何言一朝奉至尊至尊離宮百餘處千門萬戶不知曙唯聞啞啞城上烏玉闌金井牽轆轤丹梁翠柱飛屠蘇香薪桂火炊雕胡當年翻覆無常定薄命為女何必粗君不見人生百年如流電心中坎壈君不見我昔初入椒房時詎減班姬與飛燕朝踰金梯上鳳樓暮下瓊鉤息鸞殿柏臺晝夜香錦帳自飛揚笙歌膝上吹琵琶陌上桑過蒙恩所賜餘光曲沾被既逢陰后不自專復值班姬有所避黃河十年始一清微軀再逢永無議蛾眉偃月徒自妍傅粉施朱欲誰為不如天淵水中鳥雙去雙歸長比翅烏栖曲芙蓉作船絲作䋏北斗橫天月將落採蓮渡頭礙黃河郎今欲度畏風波浮雲似帳月成鉤那能夜夜南陌頭宜城醞酒今行熱停鞍繫馬暫栖宿青牛丹轂七香車可憐今夜宿倡家倡家高樹烏欲栖羅幃翠帳向君低織成屏風銀屈膝朱唇玉面燈前出相看氣息望君憐誰能含羞不自前從軍行雲中亭陳羽檄驚甘泉烽火通夜明二師將軍新築營嫖姚校尉初出征復有山西將絶世受雄名三門應遁甲五壘學神兵白雲隨陳色蒼山答鼓聲逶迤觀鵝翼參差覩鴈行先平小月陳卻滅大宛城善馬還長樂黃金付水衡小婦趙人能鼓瑟侍婢初笄解鄭聲庭前桃花飛已合必應紅粧起見迎和蕭侍中子顯春別四首別觀蒲萄帶實垂江南豆蔻生連枝無情無意猶如此有心有恨徒自知蜘蛛作絲滿帳中芳草結葉當行路紅臉脈脈一生啼黃鳥飛飛有時度故人雖故昔經新新人雖新復應故可憐淮水去來潮春堤楊柳覆河橋淚迹未𤍜詎終朝行聞玉佩已相要桃紅李白若朝粧羞持憔悴比新楊不惜暫住君前死愁無西國更生香雜句春情蝶黃花紫燕相追楊低柳合路塵飛已見垂鉤挂緑樹誠知淇水沾羅衣兩童夾車問不已五馬城南猶未歸鶯啼春欲駃無為空掩扉擬古窺紅對鏡斂雙眉含愁拭淚坐相思念人一去許多時眼語笑靨迎來情心懷心想甚分明憶人不忍語銜恨獨吞聲倡樓怨節六言朝日斜來照戶春鳥爭飛出林片光片影皆麗一聲一囀煎心上林紛紛花落淇水漠漠苔浮年馳節流易盡何為忍憶含羞春別應令四首昆明夜月光如練上林朝花色如霰花朝月夜動春心誰忍相思不相見試看機上交龍錦還瞻庭裏合歡枝映日通風影朱幔飄風拂華度金池不聞離人當重合唯悲合罷會成離門前楊柳亂如絲直置佳人不自持適言新作裂紈詩誰悟今成織素辭日暮徙倚渭橋西正見涼月與雲齊若使月光無近遠應照離人今夜啼春別四首翻鶯度燕雙比翼楊柳千條共一色但看陌上攜手歸誰能對此空中憶幽宮積草自芳菲黃鳥著樹情相依爭風競日常聞響重花疊葉不通飛當知此時動妾思慚使羅袂拂君衣江東大道日華春垂楊掛柳掃輕塵淇水昨送淚沾巾紅粧宿昔已應新銜悲覽涕別心知桃花李花任風吹本知人心不似樹可意人別似花離府栖鳥曲應令二首握中酒杯瑪瑙鍾裾邊雜珮琥珀紅欲持寄君心不惜共指三星今何夕樂府栖鳥曲應令二首淚黛紅輕點花色還欲令人不相識金壺夜永誰能多莫持賖用比縣河燕歌行風光遲舞出青蘋蘭苕翠鳥鳴發春洛陽梨花落如雪河邊細草細如茵桐生井底葉交枝今看無端雙燕離五重飛樓入雲漢九華閣道暗清池遙看白馬津上吏傳道黃龍征戍兒明月金光徒照妾浮雲玉葉君不知思君昔去柳依依至今八月避暑歸明珠蠶繭登勉機鬱金香花持香衣洛陽城頭雞欲曙丞相府中烏未飛夜夢征人縫狐貉私憐織婦裁錦緋吳刀鄭綿絡寒閨夜披薄芳年海上水中鳧日暮寒夜空城雀行路難千門皆閉夜何央百憂俱集斷人腸探揣箱中取刀尺拂拭機上斷流黃情人逐情雖可恨復畏邊遠乏衣裳已繅一繭催衣縷復搗百和裛衣香猶憶去時腰大小不知今日身短長裲襠雙心共一袾復兩邊作八襊襻帶雖安不忍縫開孔裁穿猶未達胸前卻月兩相連本照君心不照天願君分明得此意勿復流蕩不如先含悲含怨判不死封情忍思待明年元廣州景仲座見故姬留故夫不踟蹰別待春山上相看採蘼蕪擬古應教雙栖翡翠兩鴛鴦巫雲落月乍相忘誰家妖冶折花枝蛾眉𥊑睇使情移青鋪緑隙流璃扉瓊筵玉笥金鏤衣美人年幾何十餘含羞轉笑斂風裾珠丸出彈不可追空留可憐持與誰別義陽郡翔鳳樓遙望與雲浮歌聲臨樹出舞影入江流葉落看村近天高應向秋飾面亭粧成更點星頰上紅凝淺眉心黛不青故留殘粉絮掛看箔簾釘贈答粧鉛點黛拂輕紅鳴環動珮出房櫳看梅復看柳淚滿春衫中古詩題六首藏暮愍衰草愍衰草衰草無容色憔悴荒徑中寒萎不可識昔時兮春日昔時兮春風含華兮佩實垂緑兮散紅氛氳鳷鵲右照曜望仙東送歸顧莫泣淇水嘉客淹留懷上宮岩陳兮海岸冰多兮霧散爛熳兮客根攢幽兮石隙布綿密於寒皋吐纖疏於危石既惆悵於君子倍傷心於行役露高枝於初旦霜紅天於始夕雕芳卉之九衢寶靈茅之三脊風急崤路難秋至客衣單既傷簷下菊復悲池上蘭飄落逐風轉方知歲早寒流螢暗明燭鴈聲斷才續萎絶長信宮蕪穢丹墀曲霜奪莖上紫風銷葉中緑山奕兮青薇水折兮黃葦秋鴻兮疏引寒鳥兮輕飛徑荒寒草合桐長舊巖圍夜漸蘼蕪沒霜露日沾衣願逐晨征鳥薄暮共西歸霜來悲落桐悲落桐落桐早霜露燕至葉未抽鴻來波已素本出龍門山長枝仰刺天上峰百丈絶下趾萬尋懸幽根已盤結孤枝復為絶初不照光景終年負霜雪自顧無羽儀不願生曲池芬芳本自乏華實無可施匠者時留盻王孫少見之分取生孤卉徙置北堂垂宿莖抽晚幹新葉生故枝故枝雖遼遠新葉頗離離春風一朝至榮啓坐如斯自惟良菲薄君思徒照灼顧已非嘉樹空用憑阿閣願作清廟琴為舞雙玄鶴薜荔可為裳文杏可為梁勿言草木賤徒照君末光朱末光不徒照為君含噭眺陽柯緑冰弦陰枝苦寒調厚德不可任敢不虛其心若逢陽春至吐緑照清潯夕行聞夜鶴聞夜鶴夜鶴叫南池對此孤明月臨風振羽儀伊吾人之菲薄無賦命之天爵抱局促之長懷隨冬春而哀樂愍海上上之驚鳧傷雲間之離鶴離鶴昔未離近發天北垂忽值疾風起暫下昆明池復值冬冰合水宿非所宜欲留不可住欲去飛已疲勢逐疾風舉求溫向衡楚復值南飛鴻參差共成侶海上多雲霧蒼茫失洲嶼自此別故群獨向瀟湘渚故群不離散相依蒼海畔夜止羽相切晝飛影相亂刷羽共浮沉湛淡泛清潯既不得離別安知慕侶心九冬霜雪苦六翮飛不任且養凌雲翅俯仰弄清音所望浮丘子旦夕來見尋晨征聽曉鴻聽曉鴻曉鴻度將旦跨弱水之微瀾發成山之遠岸怵春歸之未幾驚此歲之云半出海漲之蒼茫入雲途之杳漫無東西之可辨孰遐邇之能算微昔見於洲渚越秋期於江漢集徑風於弱軀負重雪於輕翰寒溪可以飲荒皋可以竄溪水徒自清微形豈足玩秋蓬萎兮未極寒草衰兮無色楚山高兮杳難度越水深兮不可測美明月之微馳光願征禽之騁翼伊余馬之屨懷知吾行之未極夜綿綿而難曉愁參差而盈臆望山川悉無以唯星河猶可識聞鴈夜南飛客淚夜沾衣春鴻思暮反客子方未歸歲去歡娛盡年來容貌非攬衽形雖是撫臆事多違青蒲雖長復易解白雲誠遠詎難依解珮去朝市去朝市朝市深歸暮辭北纓而南徂浮東川而西顧逢天地之降祥值日月之重光伊當仁之菲薄非余情之信芳充待詔於金馬眷齊宴於柏梁觀鬭獸於虎圈望窅窕於坡香遊西園兮登銅雀舉青璅兮眺重陽講金華兮議宣室晝武帷兮夕文昌佩甘泉兮履五祚贊朽諧兮緩承光託後車兮侍華幄遊勃海兮泛清漳天道有盈缺寒暑遞炎涼一朝賣玉碗春暮惜餘香曲池無復處桂枝亦銷亡清廟徒肅肅西陵久茫茫薄暮余多幸嘉運重來昌忝稽郡之南尉典千里之光貴別北荒之濁河戀橫橋於清渭望前軒之早桐對南階之初卉非余情之屢傷寄茲焉兮能慰眷昔日兮懷哉日將暮兮歸去來披褐守山東守山東山東萬里鬱青葱兩溪共一寫水潔望如空岩側青莎披岩間丹桂叢上瞻既隱隱下睇亦冥濛遠林響包獸近樹聒鳴蟲路帶若溪右泉吐金華東萬仞倒危石百丈涇懸叢瀑曳瀉疏電奔飛似白虹洞并含清氣漏穴吐飛風玉竇膏滴瀝石室乳空籠峭崿塗彌險崖岨步才通余拾平生之所愛歘暮年而逢此願一去而不還恨衣之未褫挹林壑之清曠事泯俗之詭紛幸帝德之方升值天網之未毀既除舊而就新故化民而俗徙播趙俗以徂扇齊風以東靡乳雉方可馴流蝗庶能弭清心矯世濁儉政救民侈滿秩歸白雲淹留事芝體張衡定情歌大火流兮草蟲鳴繁霜降兮草木零秋為期兮時已征思美人兮愁屏營白紵曲遷遷徐動何盈盈玉腕俱凝若雲行佳人舉袖耀清蛾摻摻擢手映鮮羅狀如明月泛雲河體如輕風動流波北風行北風涼雨雪雱洛陽女兒多妍粧遙豔帷中自悲傷沉吟不語若為忘問君前行何當歸苦使妾坐自傷悲慮年去慮顏衰情易復恨難追楚明妃曲瓊臺彩楹桂寢雕甍金閨流耀玉牖含英香芬幽藹珠彩珍榮文羅秋翠紈綺春輕驂駕鸞鶴往來仙靈含姿綿視微笑相迎結蘭枝送目成當年為君榮白紵歌少年窈窕舞君前容華豔豔將欲然為君嬌凝復遷延流目送笑不敢言長袖拂面心自煎願君流光及盛年秋風歌秋風嫋嫋入曲房羅帳含月思心傷蟋蟀夜鳴斷人腸夜長思君心飛揚他人相思君相忘錦衾瑤席為誰芳歌思引秋寒依依風過河白露蕭蕭洞庭波思君末光光已滅眇眇悲望如思何江南弄衆花雜色滿上林舒芳耀緑垂輕陰連手躞蹀舞春心舞春心臨歲腴中人望獨踟蹰龍笛曲美人綿眇在雲堂雕金鏤竹眠玉床婉愛寥亮繞紅梁繞紅梁流月臺駐狂風鬱徘徊採菱曲江南稚女珠腕繩金翠搖首紅顏興桂棹容與歌採菱歌採菱心未怡翳羅袖望所思遊女曲氛氳蘭麝體芳滑容色玉耀眉如月珠珮婐㛂戲金闕戲金闕游紫庭舞飛閣歌長生朝雲曲張樂陽臺歌上歇如寢如興芳暗曖容光既豔復還沒復還沒望不來巫山高心徘徊白紵辭二首朱絲玉柱羅象筵飛琯促節舞少年短歌流目未肯前含笑一轉私自憐纖腰嫋嫋不任衣嬌態獨立特為誰赴曲君前未忍歸上聲急調中心飛江南曲枝中水上春併歸長楊掃地桃花飛清風吹人光照衣光照衣景將夕擲黃金留上客龍笛曲金門玉堂臨水居一嚬一笑千萬餘遊子去還願莫疏願莫疏意何極雙鴛鴦兩相憶採蓮曲桂楫蘭橈浮碧水江花玉面兩相似蓮疏藕折香風起香風起白日低採蓮曲使君迷東飛伯勞歌二首翻階蛺蝶戀花情容華飛燕相逢迎誰家總角歧路陰裁紅點翠愁人心天窗綺井曖徘徊珠簾玉匣明鏡臺可憐年幾十三四工歌巧舞入人意白日西傾楊柳垂含情弄態兩相知西飛迷雀東羈雉倡樓秦女乍相值誰家妖麗鄰中止輕粧薄粉光閭里網戶珠綴曲瓊鉤芳茵翠被香氣流少年年幾方三六含嬌聚態傾人目餘香落蕊坐相催可憐絶世為誰媒燕歌行燕趙佳人本自多遼東少婦學春歌黃龍戍北花如錦元菟城前月似蛾如何此時別夫壻金羈翠眊往交河還聞入漢去燕營怨妾心中百恨生漫漫悠悠天未曉遙遙夜夜聽寒更自從異縣同心別偏恨同時成異節橫波滿臉萬行啼翠眉漸斂千重結并海連天合不開那堪春日上春臺惟見遠舟如落葉復看遙舸似行杯沙汀野鶴嘯羈雌妾心無趣坐傷離翻嗟漢使音塵斷空傷賤妾燕南陲烏栖曲四首沙棠作船桂為楫夜渡江南採蓮葉復值西施新浣紗共泛江干瞻月華月華似碧星如珮流影燈明玉堂內邯鄆九投朝始成金巵銀碗共君傾交龍成錦鬭鳳紋芙蓉為帶石榴裙日下城南兩相忘月沒參橫掩羅帳七彩隨珠九華玉蛺蝶為歌明星曲蘭房椒閣夜方開那知步步香風逐別詩二首別罷花枝不共攀別後書信不相關欲覓行人寄消息衣帶潮水暝應還三月桃花含面脂五月新油好煎澤莫復臨時不寄人漫道江巾無估客趙瑟曲邯鄲奇弄出文梓縈絃急調切流徵元鶴徘徊白雲起白雲起鬱披香離復合曲未央秦箏曲羅袖飄纚拂雕桐促柱高張散輕宮迎歌度舞遏歸風遏歸風止流月壽萬春歡無歇陽春曲楊柳垂地燕差池緘情忍思落容儀絃傷曲怨心自知心自知人不見動羅裙拂珠殿晨風行理楫令舟人停艫息旅薄河津念君劬勞冒風塵臨路揮袂淚沾巾飆流徑潤逝若飛山高帆急絶音徽留子句句獨言歸中心煢煢將依誰風彌葉落永離索神往形返情錯漠循帶易緩愁難卻心之憂兮頗銷鑠白紵歌辭三首秋風蕭條露垂葉空閨光盡坐愁妾獨向長夜淚承睫山高水遠路難涉望君光景何時接日暮搴門望所思風吹庭樹月入帷涼陰既滿草蟲悲誰能離別長夜時流歎不寢淚如絲與君之別終何如愁來夜遲猶歎息撫枕思君終反仄金翠叉鐶稍不飾霧縠流黃不能織但坐空閨思何極欲以短書寄飛翼烏栖曲芳樹歸飛聚儔匹猶有殘光半山日莫憚褰裳不相求漢皋遊女習風流燕歌行代北雲氣晝夜昏千里飛蓬無復根寒雁嗈嗈渡遼水桑葉紛紛落薊門晉陽山頭無箭竹疏勒城中乏水源屬國征戍久離居陽關音信絶復疏願得魯連飛一箭持寄思歸燕將書渡遼本自有將軍寒風蕭蕭生水紋妾驚甘泉足烽火君訝漁陽少陳雲自從將軍出細柳蕩子空床難獨守盤龍明鏡餉秦嘉辟惡生香寄韓壽春分燕來能幾日二月蠶眠不能久洛陽遊絲百丈連黃河春冰千片穿桃花顏色好如馬榆莢新開巧似錢葡萄一杯千日醉無事九轉學神仙定取金丹作幾服能令華表得千年烏夜啼促柱繁絃非子夜歌聲舞態異前溪御史府中何處宿洛陽城頭那得栖彈琴蜀郡卓家女織錦秦川竇氏妻詎不自驚長淚落到道啼烏恆夜啼怨詩家住金陵縣前嫁得長安少年回頭望鄉淚落不知何處天邊胡塵幾日應盡漢月何時更圓為君能歌此曲不覺心隨斷絃舞媚娘朝來戶前照鏡含笑盈盈自看眉心濃黛直點額角輕黃細安祗疑落花謾去復道春風不還少年惟有歡樂飲酒那得留錢烏栖曲繡帳羅帷隱鐙燭一夜千年猶不足惟憎無賴汝南雞天河未落猶爭啼雜曲傾城得意已無儔洞房連閣未消愁宮中本造鴛鴦殿為誰新起鳳凰樓緑黛紅顏兩相發千嬌百念情無歇舞衫回袖向春風歌扇當窗似秋月碧玉宮妓自翩妍絳樹新聲自可憐張星舊在天河上從來張姓本連天二八年時不憂度旁邊得寵誰相妬立春歷日自當新正月春幡底須故流蘇錦帳挂香囊織成羅幌隱鐙光只應私將琥珀枕暝暝來上珊瑚床春日白紵曲蘭葉參差桃半紅飛芳無縠戲春風翡翠群飛飛不息願在雲間長比翼秋日白紵曲白露欲凝草已黃金琯玉柱響洞房雙心一影俱回翔吐情寄君君莫忘
