front:
  text: 詩九首椅梧傾髙鳯寒谷待鳴律影響豈不懐自逺每相匹婉彼幽閑女作嬪君子室峻節貫秋霜明豔侔朝日嘉運既我從欣願自此畢其一燕居未及好良人顧有違脫巾千里外結綬登王畿戒徒在昧旦左右來相依驅車出郊郭行路正威遲存為久離别没為長不歸其二嗟余怨行役三陟窮晨暮嚴駕越風寒解鞍犯霜露原隰多悲凉囘飈巻髙樹離獸起荒蹊驚鳥縱横去悲哉遊宦子勞此山川路其三迢遥行人逺婉轉年運徂良時為此别日月方向除孰知寒暑積僶俛見榮枯歳暮臨空房凉風起坐隅寢興日已寒白露生庭蕪其四勤役從歸願反路遵山河昔辭秋未素今也歳載華蠶月觀時暇桑野多經過佳人從所務窈窕援髙柯傾城誰不顧弭節停中阿其五年往誠思勞事逺闊音形雖為五載别相與昧平生捨車遵往路鳬藻馳目成南金豈不重聊自意所輕義心多苦調密此金玉聲其六髙節難久淹朅來空復辭遲遲前塗盡依依造門基上堂拜嘉慶入室問何之日暮行采歸物色桑榆時美人望昬至慙歎前相持其七有懐誰能已聊用申苦難離居殊年歳一别阻河關春來無時豫秋至恒早寒明發動愁心閨中起長歎慘悽歳方晏日落遊子顔其八髙張生絶弦聲急由調起自昔枉光塵結言固終始如何久為别百行愆諸已君子失明義誰與偕沒齒媿彼行露詩甘之長川汜其九
  hash: sha256:e455e8bd55b54eaffc657badc035f2009dd0d7aceca902e178b39d2702bfc49f
