front:
  text: 玉臺新詠集序
  hash: sha256:9deea5686a878ed50a96451b0778f26b3b8b244cd11de191d2c7e7eca1d295bd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0005_SBCK_000-1a}
body:
  text: 陳尚書左僕射太子少傅東海徐陵孝穆撰夫凌雲槩日由余之所未窺千門萬戶張衡之所曽賦周王璧臺之上漢帝金屋之中玉樹以珊瑚作枝珠簾以玳瑁爲柙其中有麗人焉其人五陵豪族充選掖庭四姓良家馳名永巷亦有潁川新市河間觀津本號嬌娥魯名巧笑楚王宮裏無不推其細腰衞國佳人俱言訝其纎手閱詩敦禮豈東鄰之自媒婉約風流異西施之被教弟兄協律少小學歌長生河陽由來能舞琵琶新曲無待石崇箜篌雜引非關曹植傳鼓瑟於楊家得吹簫於秦女至若寵聞長樂陳后知而不平畫出天仙閼氏覽而遥妬至如東鄰巧笑來侍寢於更衣西子微嚬得橫陳於甲帳陪逰馺娑騁纎腰於結風長樂鴛鴦奏新聲於度曲粧鳴蟬之薄鬂照墮馬之垂鬟反揷金鈿橫抽瑶樹南都石黛最發雙蛾北地燕支偏開兩靨亦有嶺上仙童分丸魏帝腰中寳鳳授曆軒轅金星将婺女爭華麝月與姮娥兢爽驚鸞冶袖時飄韓掾之香飛燕長裾宜結陳王之佩雖非圖畫入甘泉而不分言異神仙戯陽臺無别眞可謂傾國傾城無對無雙者也加以天時開朗逸思雕華妙解文章尤工詩賦琉璃硯匣終日隨身翡翠筆牀無時離手清文滿篋非唯芍藥之花新製連篇寧止葡萄之樹九日登高時有緣情之作萬年公主非無累德之辭其佳麗也如彼其才情也如此旣而椒宮宛轉柘觀隂岑絳鶴晨嚴銅蠡晝靜三星未夕不事懷衾五日猶賖誰能理曲優逰少託寂寞多閒厭長樂之疎鍾勞中宮之緩箭纎腰無力怯南陽之擣衣生長深宮笑扶風之織錦雖復投壺玉女爲歡盡於百嬌爭博齊姬心賞窮於六箸無怡神於暇景唯屬意於新詩庶得代彼臯蘇蠲玆愁疾但徃世名篇當今巧製分諸麟閣散在鴻都不籍篇章無由披覽於是然脂暝寫弄筆晨書選錄艶歌凡爲十卷曽無叅於雅頌亦靡濫於風人涇渭之間若斯而已於是麗以金箱裝之瑶軸三臺妙迹龍伸蠖屈之書五色花牋河北膠東之紙高樓紅粉仍定魚魯之文辟惡生香聊防羽陵之蠹靈飛太甲高擅玉函鴻烈仙方長推丹枕至如靑牛帳裏餘曲旣終朱鳥窓前新粧已竟方當開玆縹帙散此縚繩永對翫於書幃長循環於纎手豈如鄧學春秋儒者之功難習竇專黃老金丹之術不成固勝西蜀豪家託情窮於魯殿東儲甲觀流詠止於洞簫孌彼諸姬聊同棄日猗歟彤管無或譏焉玉臺新詠集序
