front:
  text: 玉臺新詠卷第十
  hash: sha256:e76d3f9ea1f0f5ab28aa9bde813a740d9c991f8db9a394772a304cf184b8894c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0005_SBCK_010-1a}
body:
  text: 古絶句四首藁砧今何在山上復有山何當大刀頭破鏡飛上天日暮秋雲隂江水清且深何用通音信蓮花玳瑁簮菟絲從長風根莖無斷絶無情尚不離有情安可别南山一樹桂上有双鴛鴦千年長交頸歡慶不相忘與妻李夫人聯句賈充室中是阿誰難息聲正悲難息亦何爲但恐大義虧大義同膠漆匪石心不移人誰不慮終日月有合離我心子所達子心我所知若能不食言與君同所宜情人碧玉歌孫綽碧玉小家女不敢攀貴德感郎千金意慙無傾城色碧玉破瓜時郎爲情顚倒感君不羞報廻身就郎抱情人歌王獻之桃葉復桃葉渡江不用檝但渡無所苦我自來迎接桃葉復桃葉桃葉連桃根相隣兩樂事獨使我殷勤荅扇欹七寳􅀞團扇粲爛明月光與郎􅁍暄暑相憶莫相忘靑靑林中竹可作白團扇動摇郎玉手因手託方便􅇛扇復扇許持自障面憔悴無復理羞與郎相見東陽漢中贈荅謝靈運可憐誰家婦綠流洗素足明月在雲間迢迢不可得可憐誰家郎綠流乘素舸但問情君爲月就雲中墮丁督護歌二首宋孝武督護征初時儂亦惡聞許願作石尤風四面斷行旅黃河流無極洛陽數千里坎軻我途間何由見歡子擬徐幹詩一首自君之出矣珠翠闇無精思君如日月廻環晝夜生詠袡榴枕端木生河側因病遂成妍朝將雲髻别夜與蛾眉連閨婦荅憐人昔如影與形今如胡與越不知行遠近忘􅁍離年月􅀉行人桂吐兩三枝蘭闇四五葉是時君不歸春風從笑妾近代西曲歌五首石城樂生長石城下開門對城樓城中美少年出入見依投估客樂有客數􅀉書無信心相憶莫作瓶落井一去無消息烏夜啼歌舞諸年少娉婷無種跡菖蒲花可憐聞君不曽織襄陽朝發襄陽城暮至大堤宿大堤諸女兒花艶驚郎目楊叛兒暫出白門前楊柳可藏烏郎作沉木香儂作博山爐近代吳歌九首春歌朝日照北林初花錦綉色誰能春不思獨在機中織夏歌欝蒸仲暑月長嘯北湖邊芙蓉始結葉抛艶未成蓮秋歌秋威入窓裏羅帳起飄颺仰頭看月明􅀉情千里光冬歌淵冰厚三尺素雪覆千里我心如松柏君心復何似前溪黃鳥結􅀩朧生在洛溪邊花落隨流去何見逐流還上聲歌新衫繡兩襠追置羅裳裏微歩動輕塵羅裙隨風起歡聞歌遥遥天無柱流漂萍無根單身如螢火持底報郎君長樂佳紅羅複斗帳四角垂珠璫玉枕龍鬚席郎眠何䖏牀獨曲柳樹得春風一低復一昂誰能空相憶獨眠度三陽近代雜歌五首潯陽樂稽亭故人去九里新人還送一便迎兩無有暫時閑靑陽歌曲靑荷蓋綠水芙蓉發紅鮮下有並根藕上有同心蓮蚕絲歌春蚕不􅀿老晝夜常懷思何惜微軀盡􅆞綿自有時雜詩玉釧色分未衫輕似露腕舉袖欲障羞迴持理髮亂丹陽孟珠歌陽春二三月草與水同色道途逰冶郎恨不早相識錢塘蘇小歌妾乘油璧車郎􅀐靑驄馬何處紅同心西陵松柏下擬古王元長花蔕今何在亦是林下生何當垂双髻團扇雲間明徐幹代自君之出矣金爐香不燃思君如明燭中宵空自煎秋夜秋夜長復長夜長樂未央舞袖拂明燭歌聲繞鳳梁詠火冰容慙遠鑒水質謝明輝是照相思夕早望行人歸玉階怨謝眺夕殿下珠簾流螢飛復息長夜縫羅衣思君此何極金谷聚渠椀送佳人玉杯要上客車馬一東西别後思今夕王孫逰綠草漫如絲雜樹紅英發無論君不歸君歸芳已歇同王主簿有所思佳期期未歸望望下鳴機徘徊東陌上月出行人稀玉階怨虞炎紫藤拂花樹黃鳥間靑枝思君一歎息苦淚􅀿言垂襄陽白銅鞮沈約分手桃林巖送别硯山頭􅀂欲􅀉普息漢水向東流早行逢故人車中爲贈殘朱猶曖曖餘粉尚霏霏昨宵何處宿今晨拂露歸爲隣人有懷不至影逐斜月來香隨遠風入言是定知非欲笑翻成泣詠王昭君施榮泰垂羅下椒閤舉袖拂胡塵即即撫心歎蛾眉誤殺人詠酌酒人高爽長筵廣未同上客嬌難逼還杯了不顧廻身正顏色吳興妖神贈謝府君覽玉􅁫空中墮金鈿色行歇獨泣謝春風孤夜傷明月採菱江洪風生綠葉聚波動紫莖開含花復含實正待佳人來白日和清風輕雲雜高樹忽然當此時採菱復相遇水曲潺湲復皎潔輕鮮自可悅橫使有情禽照影遂孤絶塵容不忍􅅚臨池思客歸誰能取渌水無處浣羅衣秋風孀居憎四時况在秋閨内凄葉流晚暉虛庭吐寒菜北牖風摧榭南籬寒蛩吟庭中無限月思婦夜鳴砧詠美人治粧上車畏不妍顧盻更斜轉大恨􅀞眉長猶言顏色淺王昭君嘆范靜婦早信丹靑巧重貨洛陽師千金買蟬鬂百萬寫蛾眉今朝猶漢地明旦入胡關高堂歌吹送逰子夢中還映水曲輕鬂學浮雲雙蛾擬初月水澄正落􅁫萍開理垂髮南苑何遜苑門闢千扇苑戸開萬扉樓殿聞珠履竹樹隔羅衣閨怨閨閤行人斷房櫳月影斜誰能北窓下獨對後園花爲人妾思燕戯還簷際花飛落枕前寸心見不見拭淚坐調絃詠春風可聞不可見能重復能輕鏡前飄落粉琴上響餘聲秋閨怨竹葉響􅀯窓月光照東璧誰知夜獨􅁴枕前双淚滴雜句吳均畫蟬已傷念夜露復沾衣昔别曽何道今夕螢光飛錦腰連枝滴繡領合觀斜夢中雖不見終成亂眠花蜘蛛簷下掛絡緯井邊啼何曾得見子照鏡窓東西泣聽離夕歌悲䘖别時酒自從今日去當復相思否春思王僧孺雪罷枝即靑冰開水便綠復聞黃鳥吟今作相思曲爲徐僕射妓作日晚應歸去上客強盤桓稍知玉􅁫重漸見羅襦寒光宅寺徐悱婦長廊欣目送廣殿悅逢迎何當曲房裏幽隱無人聲題甘蕉葉示人夕泣似非疎夢啼太真數唯當夜枕知過此無人斍摘同心梔子贈謝娘因附此詩兩葉雖爲贈交情永未因同心處何恨梔子最關人代陳慶之美人爲詠臨粧欲含涕羞畏家人知還待粉中絮擁淚不聽垂夢見故人斍罷方知恨人心定不同誰能對角枕長夜一邊空有期不至黃昬信使斷御怨心悽悽廻燈向下榻轉面暗中啼代西豐侯美人王環於今辭宴語方念泣離違無因從朔鴈一向黃河飛邊戍梁武帝秋月出中天遠近無偏異共照一光輝各懷離别思詠燭堂中綺羅人席上歌舞兒待我光泛灔爲君照參差詠筆昔聞蘭蕙月獨是桃李年春心倘未寫爲君照情筵詠笛柯亭有竒竹含情復抑揚妙聲發五指龍音響鳳凰詠舞腕弱復低舉身輕由廻縱可謂冩自歡方與心期共聯句詩傾城非人美十載難重逢雖懷軒中意愧無鬂髮容春歌階上歌入懷庭中花照眼春心一如此情來不可限蘭葉始滿地梅花巳落枝持此可憐意摘以􅀉心知朱日光素冰黃花映白雪拆梅􅀉佳人共迎陽春月夏歌江南蓮花開紅光復碧水色同心復同藕異心無異閨中花如綉簾上露如珠欲知有所思停織復踟蹰玉盤着朱李金杯盛白酒雖欲持自新五恐不甘口含桃落花日黄鳥營飛時君住馬已疲妾去蚕欲飢秋歌繡帶合歡結錦衣連理文情懷入夜月含笑出朝雲七米紫金桂九華白玉梁但歌雲不去含吐有餘香吹漏未可停絃斷更當續俱作雙絲引共奏同心曲當信抱梁期莫聽廻風音鏡上兩人髻分明無兩心子夜歌持愛如欲進含羞未肯前朱口發艶歌玉指弄嬌絃朝日照綺牋光風動紈羅巧笑舊兩犀美目揚双蛾上聲歌花色過桃杏名稱重金瓊名垂非下里含笑作上聲歡聞歌艶艶金樓女心如玉池蓮持底報郎思俱期逰梵天南有相思木合清復同心逰女不可求詎能息空隂團扇歌手中白團扇凈如秋團月清風任動生嬌香承意發碧玉歌杏梁日始照蕙席歡未極碧玉奉金杯綠酒􅂇花色襄陽白銅鞮歌陌頭征人去閨中女下機含情不能言送别沾羅衣草樹非一香花葉百種色􅀉語故情人知我心相意龍頭紫金鞍翠肫白玉覊照耀双闕下知是襄陽兒皇太予二十一首被空眠數􅁴寒重夜風吹罷幃非海水􅃚得度前知行雨本自巫山來無人覩容色唯有楚王臣曽言夢相識梁塵依帷濛重翠帶日聚輕紅定爲歌聲起非關團扇風華月兔絲生雲夜蛾影出漢時欲傳千里意不照十年悲夜夜曲北斗欄干去夜夜心獨傷月輝橫射枕燈光半隱牀從頓還城􅀯暫别兩成凝開簾生舊憶都知未有情更似新相識春江曲客行支念路相􅀅度江口誰知堤上人拭淚空摇手新燕新禽􅀿節歸俱向吹樓飛入簾驚釧響來窓礙舞衣彈箏彈箏北窓下夜響清音愁張高絃易斷心傷曲不遒夜遣内人還後舟錦幔扶船冽蘭橈拂浪浮去燭猶文水餘香尚滿舟詠武陵王左右頂分如兩髻簮長驗上頭投杯如欲轉凝殘已復􅅏有所思可歎不可思可思不可見餘絃斷瑟柱殘朱染歌扇寂寂暮簷響黯黯垂簾色唯有瓴甋苔如見蜘蛛織入林看碚􅓓春至定無賖何時一可見更得似梅花逰人逰戯長楊苑携手雲臺間歡樂未窮已白日下洛山贈麗人腰肢夲猶絶眉􅂇特驚人判自無相比還來有洛神遥望散誕垂紅帔斜柯揷玉簪可憐無有比恣許􅀡千金愁閨照鏡别來顦顇久他人怪容色只有匣中鏡還持自相識浮雲可憐片雲生暫重復還輕欲使襄王夢應過白帝城寒閨綠葉朝朝黃紅顏日日異譬喩持相比那堪不愁思和人渡水婉娩新上頭湔裾出樂逰帶前結香草鬟邊捍石榴春閨思蕭子顯金覉逰俠子綺機離思妾春度人不歸望花盡成葉詠苑中逰人二月春心動逰望桃花初廻身隱日扇􅁍歩歛風裾遥見美人採荷劉孝綽菱莖時繞釧棹水或沾粧不辭紅袖濕唯憐綠葉香詠小兒採採菱非採渌日暮且盈舫踟躕未敢進畏欲比殘桃詠舞曲應令歌聲臨盡閤舞袖出芳林石城定􅀂遠前溪應幾深詠主人少􅁎􅀿教故年齊總角今春半上頭􅃚知夫壻好能降使君留詠長信宮中草委翠似知節含芳如有情全由履迹少併欲上階生石崇金谷妓蘭堂上客至綺席清絃撫自作明君辭還赦綠珠舞蕩婦高樓月王臺􅀸空庭高樓月非復三五圓何湏照林裏終是一人眠􅀯浦别佳人歛容送君别一歛無開時只應待相見還􅀅笑觧眉詠織女劉孝儀金鈿巳照曜白日未蹉跎欲待黃昏後含嬌渡淺河詠石蓮蓮名堪百萬石姓重千金不解無情物􅃚得解人心和定襄候初笄劉孝威合鬟仍昔髮略鬂即前絲從今一梳罷無復更縈時古體雜意朝日大風霜􅀉事是交傷葉落枝柯凈常自起某張詠佳麗可憐􅀅可念可念􅀡千金唯言有一恨恨不遂人心和定襄侯楚越衫裁縫在篋笥薰鬂帶餘香開看不忍着一見落千行爲徐陵傷妾何曼才遲遲衫掩淚憫憫恨縈胷無復專房日猶望下山逢詠袙複蕭驎的的金絃凈離離寳撮分纎腰非學楚寛帶爲思君詠殘燈紀少喩殘燈猶未㓕將盡更揚輝唯餘一兩􅆋纔得解羅衣暮寒王叔英婦梅花自爛熳百舌早迎春逾寒衣逾薄未肯惜腰身詠歌眠戴嵩拂枕薰紅帊廻燈復解衣傍邊知夜永不喚定應歸詠繁華劉泓可憐宜出衆的的最分眀秀眉開雙眼風流右語聲玉臺新詠卷之十玉臺新詠目錄卷之十古絶句四首欣妻李夫聯首句賈充情人碧玉歌孫綽情人桃葉歌王献之荅􅇛扇歌桃葉東陽漢中贈靈運謝丁都護歌宋孝武擬徐幹詩一首許瑶詠袡榴枕閨婦荅隣人􅀉行人鮑令輝石城樂估客樂烏夜啼襄陽樂楊叛兒春歌夏歌秋歌冬歌前溪上聲歡聞歌長樂佳獨曲潯陽樂靑陽歌曲蚕絲歌雜詩丹陽孟珠歌錢塘蘇小歌擬古王元長代徐幹秋夜詠火玉階怨金谷聚謝眺王孫逰同王主簿有所思玉階怨虞炎襄陽白鞮銅沈約早行逢故人車中爲贈爲隣人有懷不至詠王昭君施榮泰詠酌酒人高爽吳興妖神謝贈府君覽採菱江洪渌水曲秋風詠美人治粧王昭君嘆范靜婦映水曲􅀯院何遜閨怨爲人妾思詠春風秋閨怨雜句吳均春思王僧孺爲徐僕射妓作徐悱婦光宅寺題甘蕉葉作示人摘同心梔子贈娘附此詩代陳慶之美人爲詠夢見故人有期不至代西豐侯美人王環邊戍梁武帝詠燭筆笛舞聯句詩春歌夏歌秋歌子夜歌上聲歌歡聞歌團扇歌碧玉歌襄陽白銅鞮歌皇太子雜詠行雨梁塵華月夜夜曲從頓還城􅀯春江曲新燕彈箏夜遣内人還舟詠武陵王左右五傳杯有所思逰人贈麗人遥望愁閨照鏡浮雲寒閨和人渡水春閨思蕭子顯詠苑中逰人遥見美人採荷劉孝綽詠小兒採菱詠舞曲應令廋肩吾詠主人少􅁎應教詠長信宮中草石崇金谷妓蕩婦高樓月王臺􅀸南浦别佳人詠織女劉孝儀石蓮和定襄候初笄劉孝威古體雜意佳麗和定襄候楚越衫江伯瑶爲徐陵傷妾何曼才袙複䔥驎殘燈紀少喩暮寒王叔英婦歌眼戴嵩繁華劉泓
