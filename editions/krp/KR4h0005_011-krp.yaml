front:
  text: 玉臺新詠集後序右玉臺新詠集十卷㓜時至外家李氏於廢書中得之舊京夲也宋失一葉間復多錯謬版亦時有刻者欲求他本是正多不獲嘉定乙亥在㑹稽始從人借得豫章刻本財五卷蓋至刻者中徙故弗畢也又聞有得石氏所藏録本者復求觀之以補亡校脫於是其書復全可繕寫夫詩者情之發也征戍之勞苦室家之怨思動於中而形於言先王不能禁也豈惟不能禁且逆探其情而著之東山枤杜之詩是矣若其他變風化雅豈謂無膏沐誰適爲容終朝采綠不盈一掬之類以此集揆之語意未大異也顧其發乎情則同而止乎禮義者蓋鮮矣然其間僅合者亦一二焉其措詞託興高古要非後世樂府所能及自唐花間集己不足道而况近代狹邪之說號爲以筆墨動淫者乎又自漢魏以來作者皆在焉多蕭統文選所不載覽者可以覩歷世文章盛衰之變云是歲十月旦日書其後永嘉陳玉父
  hash: sha256:92393d03d9533fe8207782d69cd3273adddec56d175ec28477d57eaea32ba9bf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0005_SBCK_011-1a}
body:
  text: 右陳徐陵纂唐李康成云昔陵在梁世父子俱事東朝特見優遇時承平好文雅尚宮體故采西漢以來詞人所著樂府艶詩以備諷覽見讀書志玉臺新詠後序
  hash: sha256:99b9d250d843cedf4e345578c61bce090f07df44c24422c1484236da6a7b27cd
