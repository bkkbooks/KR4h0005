  - {type: variant, offset: 3291, length: 398, content: 雜詩五首沉陰結愁憂愁憂為誰興念與君相別各在天一方良會未有期中心摧且傷不聊憂飡食慊慊常飢空端坐而無為髣髴君容光峨峨高山首悠悠萬里道君去日已遠鬱結令人老人生一世間忽若暮春草時不可再得何為自愁惱每誦昔鴻恩賤軀焉足保浮雲何洋洋願因通我辭飄颻不可寄徙倚徒相思人離皆復會君獨無反期自君之出矣明鏡暗不治思君如流水何有窮已時慘慘時節盡蘭華凋復零喟然長歎息君期慰我情展轉不能寐長夜何綿綿躡履起出戶仰觀三星連自恨志不遂泣涕如涌泉思君見巾櫛以益我勞勤安得鴻鸞羽覯此心中人誠心亮不遂搔首立悁悁何言一不見復會無因緣故然比目魚今隔如參辰室思人靡不有初想君能終之別來歷年歲舊思何可期重新而忘故君子所猶譏寄身雖在遠豈忘君須臾既厚不為薄想君時見思情詩高殿鬱崇崇廣廈淒泠泠微風起閨闥落日照階庭踟躕雲屋下笑歌倚華楹君行殊不返我飾為誰榮鑪薰闔不用鏡匣上塵生綺羅失常色金翠暗無精嘉希既忘御旨酒亦常停顧瞻空寂寂唯聞燕雀聲憂思連相屬中心如宿酲, WYG: 繁欽}
