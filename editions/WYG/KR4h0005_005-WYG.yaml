seq: 5
front:
  text: 與君别者乃至鴈門關黄雲蔽千里遊子何時還送君如昨日檐前露已團不惜􅈍草晩所悲道里寒君子在天涯妾心久别離願一見顔色不異瓊樹枝兎絲及水萍所寄終不移
  hash: sha256:e2e4e85656cd80f463165f1a258a722e290e44002915405305cd8a0741ba32e9
body:
  text: 古體綾扇如團月出自機中素畫作秦王女乗鸞向煙霧彩色世所重雖新不代故竊悲凉風至吹我玉階樹君子恩未畢零落在中路班婕妤秋月映簾櫳懸光入丹墀佳人撫鳴琴清夜守空帷蘭徑少行迹玉臺生網絲夜樹發紅彩閨草含碧滋羅綺為君整萬里贈所思願垂湛露恵信我皎日期張司空離情西北秋風至楚客心悠哉日暮碧雲合佳人殊未來露彩方泛􅃩月華始徘徊寳書為君掩瑶琴詎能開相思巫山渚悵望雲陽臺金鑪絶沈燎綺席徧浮埃桂水日千里因之平生懐休上人怨别丘遲二首清歌自言妍雅舞空仙仙耳中解明月頭上落金鈿雀飛且近逺暮入綺窻前魚戲雖南北終還荷葉邊惟見君行久新年非故年敬詶栁僕射征怨丈夫吐然諾受命本遺家糟糠且棄置蓬首亂如麻側聞洛陽客金蓋翼髙車謁帝時來下光景不可奢幽房一洞啓二八盡芬華羅裾有長短翠鬢無低斜長眉横玉臉皓腕巻輕紗俱㸔依井蝶共取落檐花何言征戍苦抱膝空咨嗟荅徐侍中為人贈婦沈約二十四首登髙眺京洛街巷紛漠漠囘首望長安城闕鬱盤桓日出照鈿黛風過動羅紈齊童躡朱履趙女揚翠翰春風揺雜樹葳蕤緑且丹寳瑟玫瑰柱金覊瑇瑁鞍淹留宿下蔡置酒過上蘭解眉還復斂方知巧笑難佳期空靡靡含睇未成歡嘉客不可見因君寄長歎登髙望春朝發披香殿夕濟汾隂河於兹懐九逝自此斂雙蛾沾莊疑湛露繞臆狀流波日見奔沙起稍覺轉蓬多寒風犯肌骨非直傷綺羅銜涕試南望闗山鬱嵯峨始作陽春曲終成苦寒歌惟有三五夜明月蹔經過昭君辭山隂栁家女莫言出田墅丰容好姿顔便僻工言語腰肢既軟弱衣服亦華楚紅輪映早寒畫扇迎初暑錦履並花紋繡帶同心苣羅襦金薄厠雲鬢花􅁫舉我情已鬱紆何用表﨑嶇託意眉間黛申心口上朱莫争三春價坐喪千金軀盈尺青銅鏡徑寸合浦珠無因達往意欲寄雙飛鳬裾開見玉趾衫薄映凝膚羞言趙飛燕笑殺秦羅敷自顧雖悴薄冠蓋曜城隅髙門列騶駕廣路從驪駒何慚鹿盧劔詎减府中趨還家問鄉里詎堪持作夫少年新婚為之詠捨轡下彫輅更衣奉玉牀斜簪映秋水開鏡比春妝所畏紅顔促君恩不可長雞冠且容裔豈吝桂枝亡攜手曲西征登隴首東望不見家關樹㨨紫葉塞草發青牙昆明當欲滿蒲萄應作花流淚對漢使因書寄狹邪有所思河漢縱且横北斗横復直星漢空如此寧知心有憶孤鐙曖不明寒機曉猶織零淚向誰道鷄鳴徒歎息夜夜曲楊桞亂如絲綺羅不自持春草青復緑客心傷此時翠苔已結洧碧水復盈淇日華照趙瑟風心動燕姬䘳中萬行淚故是一相思春詠風來吹葉動風去畏花傷紅英已照灼況復含日光歌童暗理曲游女夜縫裳詎减當春淚能斷思人腸詠桃月華臨静夜夜静滅氛埃方暉竟户入圓影隙中來髙樓切思婦西園游上才網軒映珠綴應門照緑苔洞房殊未曉清光信悠哉詠月輕隂拂建章夾道連未央因風結復解霑露柔且長楚妃思欲絶班女淚成行流人未應去為此歸故鄉詠桞江南簫管地妙響發孫枝殷勤寄玉指含情舉復垂彫梁再三繞輕塵四五移曲中有深意丹誠君詎知詠篪憶來時的的上階墀勤勤敘離别慊慊道相思相看常不足相見乃忘飢憶坐時㸃㸃羅帳前或歌四五曲或弄兩三弦笑時應無比嗔時更可憐憶食時臨盤動容色欲坐復羞坐欲食復羞食含情如不飢擎甌似無力憶眠時人眠彊未眠解羅不待勸就枕更須牽復恐傍人見嬌羞在燭前四憶纎手製新竒刺作可憐儀縈絲飛鳯子結縷坐花兒不聲如動吹無風自裊移麗色儻未歇聊承雲鬢垂領邊繡丹墀上颯沓玉殿下趨鏘逆轉珠珮響先表繡袿香裾開臨舞席拂袖繞歌堂所歎忘懐妾見委入羅牀脚下履漠漠牀上塵中心憶故人故人不可憶中夜長歎息歎息想容儀不欲長别離别離稍已久空牀寄桮酒擬青青河邊草大婦埽玉墀中婦結羅帷小婦獨無事對鏡畫蛾眉良人且安卧夜長方自私擬三婦挾瑟叢臺下徙倚愛容光佇立日已暮戚戚苦人腸露葵已堪擿湛水未霑裳錦衾無獨煖羅衣空自香明月雖外照寧知心内傷古意夜聞長歎息知君心有憶果自閶闔開魂交覩容色既薦巫山枕又奉齊眉食立望復横陳忽覺非在側那惡神傷者潺湲淚霑臆夢見美人可憐桂樹枝單雄憶故雌歳暮異棲宿春至猶别離山河隔長路路逺絶容儀豈云無我匹寸心終不移效古扶道覔陽春佳人共攜手草色猶自非林中都未有無事逐梅花空中信楊桞且復歸去來含情寄桮酒初春去秋三五月今秋還照房今春蘭􅈍草來春復吐芳悲哉人道異一謝永銷亡屏筵空有設帷席更施張遊塵掩虚座孤帳覆空牀萬事無不盡徒令存者傷悼亡桞惲九首孤衾引思緒獨枕愴憂端深庭秋草緑髙門白露寒思君起清夜促柱奏幽蘭不怨飛蓬苦徒傷􅈍草殘其一行役滯風波遊人淹不歸亭臯木葉下壟首秋雲飛寒園夕鳥集思牖草蟲悲嗟矣當春服安見禦冬衣其二鶴鳴勞永歎采菉傷時暮念君方逺徭望妾理紈素秋風吹緑潭明月懸髙樹佳人飾淨容招攜從所務其三步欄杳不極離家肅已扃軒髙夕杵散氣爽夜砧鳴瑶華隨步響幽蘭逐袂生歭􅡨理金翠容與納宵清其四泛􅃩囘煙彩淵旋龜鶴文淒淒合歡袖苒苒蘭麝芬不怨杼軸苦所悲千里分垂泣送行李傾首遲歸雲其五𢷬衣詩别島望風臺天淵臨水殿芳草生未積春花落如霰出從張公子還過趙飛燕奉帚長信宫誰知獨不見獨不見少長倡家女出入燕南垂惟持徳自美本以容見知舊聞關山遠何事總金羈妾心日已亂秋風鳴細枝度關山雲輕色轉暖草緑晨芳歸山墟罷寒晦園澤潤朝暉春心多感動覩物情復悲自君之出矣蘭堂罷鳴機徒知游宦是不念别離非雜詩玉壺夜愔愔應門重且深秋風動桂樹流月揺輕隂綺檐清露溽網户思蟲吟歎息下蘭閤含愁奏雅琴何由鳴曉珮復得抱宵衾無復金屋念豈照長門心長門怨汀州采白蘋日落江南春洞庭有歸客瀟湘逢故人故人何不返春華復應晩不道新知樂且言行路逺江南曲城南斷車騎閣道覆清埃露華光翠網月影入蘭臺洞房且莫掩應門或復開䬃䬃秋桂響非君起夜來起夜來黛馬秋不歸緇紈無復緒迎寒理夜縫映月㨨纎縷的皪愁睇光連娟思眉聚清露下羅衣秋風吹玉柱流隂稍已多餘光欲難取七夕穿針照日汀州際揺風緑潭側雖無獨繭輕幸有青袍色羅袖少輕塵象牀多麗飾願君蘭夜飲佳人時宴息詠席江洪四首寳鑷間珠花分明靚莊㸃薄鬢約微黄輕紅澹鉛臉發言芳已馳復加蘭􅈍染浮聲易傷歎沈唱安而險孤轉忽徘徊雙蛾乍舒斂不持全示人半用輕紗掩詠歌姬腰纎蔑楚媛體輕非趙姬映䘳闐寳粟縁肘挂珠絲發袖已成態動足復含姿斜睛若不眄當轉復遲疑何慙雲鶴起詎減鳯鸞時舞女雜彩何足竒惟紅偏作可灼爍類蕖開輕明似霞破鏤質巻芳脂栽花承百和且傳别離心復是相思裹不值情幸人豈識風流座詠紅箋當户種薔薇枝葉太葳蕤不揺香已亂無風花自飛春閨不能静開匣對明妃曲池浮采采斜岸列依依或聞好音度時見銜泥歸且對清觴湛其餘任是非詠薔薇髙爽一首初上鳯皇墀此鏡照蛾眉言照長相守不照長相思虚心㑹不采貞明空自欺無言故此物更復對新期詠鏡鮑子卿二首細絲本自輕弱彩何足眄直為發紅顔謬成握中扇乍奉長門泣時承柏梁宴思莊開已掩歌容隠而見但畫雙黄鶴莫作孤飛燕詠畫扇玉階已夸麗復得臨紫微北户接翠幄南路低金扉重疊通日影參差藏月煇輕苔染珠履微澱拂羅衣獨笑崑山曲空見青鳬飛詠玉階何子朗三首桂臺清霞拂銅陛落花沾美人紅妝罷攀鉤巻細簾思君擊促織玉指何纎纎未應為此别無故坐相嫌學謝體美人弄白日灼灼當春牖清鏡對蛾眉新花映玉手燕下拾池泥風來吹細桞君子何時歸與我酌尊酒和虞記室騫古意清夜未云疲細簾聊可發玲玲玉潭水映見蛾眉月靡靡露方垂煇煇光稍沒佳人復千里餘影徒揮忽和繆郎視月范靖婦四首珠華縈翡翠寳葉間金瓊剪荷不似製為花如自生低枝拂繡領微步動瑶瑛但令雲髻挿蛾眉本易成詠步揺花明珠翠羽帳金薄緑綃帷因風時蹔舉想象見芳姿清晨挿步揺向晩解羅衣託意風流子佳情詎肯私戲蕭孃可憐潤霜質纎剖復毫分織作囘風苣製為縈綺文含芳出珠被曜彩接緗裠徒嗟金麗飾豈念昔凌雲詠五彩竹火籠綺筵日已暮羅帷月未歸開花散鵠彩含光出九微風軒動丹熖冰宇澹清暉不吝輕蛾繞惟恐曉蠅飛詠鐙何遜十一首湓城帶湓水湓水縈如帶日夕望髙城耿耿青雲外城中多宴賞絲竹常繁㑹管聲已流恱弦聲復悽切歌黛慘如愁舞腰疑欲絶仲秋黄葉下長風正騷屑早鴈出雲歸故燕辭檐别晝悲在異縣夜夢還洛汭洛汭何悠悠起望登西樓的的颿向浦團團日隠州誰能一羽化輕舉逐飛浮日夕望江贈魚司馬城東美少年重身輕萬億柘彈隨珠丸白馬黄金飾長安九逵上青槐䕃道植轂擊晨已喧肩排暗不息走狗通西望牽牛亘南直相期百戲傍去來三市側象牀沓繡被玉盤傳綺食倡女掩扇歌小婦開簾織相㸔獨隠笑見人還斂色黄鶴悲故羣山枝詠初識烏飛過客盡雀聚行龍匿酌羽前厭厭此時歡未極擬輕薄篇珠簾旦初捲綺機朝未織玉匣開鑒形寳臺臨浄飾對影獨含笑㸔花空轉側聊為出繭眉試染夭桃色羽􅁫如可閒金鈿長相逼蕩子行未歸嗁妝坐霑臆詠照鏡曉河沒髙棟斜月半空庭窓中度落葉簾外隔飛螢含情下翠帳掩涕閉金屏昔期今未反春草寒復青思君無轉易何異北辰星閨怨僊車駐七襄鳯駕出天潢月映九微火風吹百和香來歡蹔巧笑還淚已嗁妝依稀猶洛汭倐忽似髙唐别離不得見河漢漸湯湯詠七夕管清羅薦合弦驚雪袖遲逐唱囘纎手聽曲動蛾眉凝睛盼墮珥微睇託含辭日暮留嘉客相㸔愛此時詠舞妓霧夕蓮出水霞朝日照梁何如花燭夜輕扇掩紅妝良人復灼灼席上自生光所悲髙駕動環珮出長廊㸔新婦皎皎髙樓暮華燭帳前明羅帷雀􅁫影寶瑟鳯鶵聲夜花枝上發新月霧中生誰念當窻牖相望獨盈盈詠倡家可憐雙白鷗朝夕水上游何言異棲息雌住雄不留孤飛出嶼浦獨宿下滄州東西從此去影響絶無由詠白鷗嘲别者春園日應好折花望逺道秋夜苦復長抱枕向空牀吹樓下促節不言於此别歌筵掩團扇何時一相見弦絶猶依軫葉落裁下枝即此雖云别方我未成離學青青河邊草房櫳滅夜火窻户映朝光妖女褰帷出蹀􅉜初下牀雀􅁫横曉鬢蛾眉􅃩宿妝稍聞玉環逺猶憐翠被香寧知早朝客差池已鴈行嘲劉孝綽王樞三首朝取飢蠶食夜縫千里衣復聞南陌上日暮采蓮歸青苔覆寒井紅藥間青微人生樂自極良時徒見違何由及新燕雙雙還共飛古意應蕭信武教遥見提筐下翩妍實端妙將去復囘身欲語先為笑閨中初别離不許覔新知空結茱萸帶敢報木蘭枝至烏林村見采桑者聊以贈之紅蓮披早露玉貌映朝霞飛燕嗁妝罷顧步挿餘花溘帀金鈿滿參差繡領斜暮還垂瑶帳香鐙照九華徐尚書座賦得可憐庾丹二首耿耿横天漢飄飄出岫雲月斜樹倒影風至水囘文已泣機中婦復悲牀上君羅襦曉長襞翠被夜徒薰空汲銀牀井誰縫金縷裠所思竟不至空持清夜分秋閨有望歸飛夢所憶共子汲寒漿銅瓶素絲綆綺井白銀牀雀出丰茸樹蟲飛瑇瑁梁離人不相見難忍對春光夜夢還家玉臺新詠巻五欽定四庫全書玉臺新詠巻六陳徐陵撰呉均二十首王僧孺一十七首張率擬樂府三首徐悱詩二首費昶一十首姚翻同郭侍郎采桑一首孔翁歸和湘東王班姬一首徐悱妻劉令嫺答外二首何思澄三首徐悱答唐孃七夕所穿針一首呉均二十首賤
