  - {type: variant, offset: 3636, length: 2, content: 劉鑠, WYG: 謝眺雜詩十二首陸厥中山王孺子妾歌一首施榮泰雜詩一首王僧達七夕月下一首逺山斂雰祲廣庭揚月波氣往風集隙秋還露泫柯節期既已孱中霄振綺羅來歡詎終夕收淚泣分河顔延之為織女贈牽牛七夕一首婺女儷經星常娥棲飛月慙無二媛靈託身侍天闕閶闔殊未暉咸池豈沐髪隡隂不久張長河為誰越雖有促讌期方須凉風發虛計雙曜周空遲三星沒非怨杼軸勞但念芳菲歇秋胡}
