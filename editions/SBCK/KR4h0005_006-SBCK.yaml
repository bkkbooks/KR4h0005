front:
  text: 玉臺新詠卷第六
  hash: sha256:603e30597c805957cc419ff227fd2683514ec0e013d702569e3e9c80ddb3e9ef
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0005_SBCK_006-1a}
body:
  text: 古意吳均匈奴數欲盡僕在玉門關蓮花穿劒鍔秋月掩刀環春機鳴窈窕夏鳥思綿蠻中人坐相望狂夫終未還採桑賤妾思不堪採桑渭城南帶减連枝綉髮亂鳳皇篸花舞依長薄蛾飛愛綠潭無由報君信流涕向春蚕梅花落終冬十二月寒風西北吹獨有梅花落飄蕩不依枝流連逐霜彩散漫下冰澌何當與君日共映芙蓉池與柳惲相贈荅六首黃􅕢飛上苑綠芷出河洲日映昆明水春生乾鵲樓飄颺白花舞瀾漫紫萍流書織廻文錦無因􅀉隴頭思君甚瓊樹不見方離憂鳴鞭適大阿聯翩渡漳渏燕􅁎及趙女挾瑟夜經過纎腰曵廣袖半額􅀞長蛾客本倦㳺者箕箒在江沱故人不可棄新知空復何離君苦無樂回暮心悽悽要途訪趙使聞君仕執珪杜蘅色己發菖蒲葉未齊羃䍥蚕餌蠒差池燕吐泥願遂東風去飄蕩至遼西白日隱城樓勁風掃寒木離杼隔東西埶手異凉燠相思咽不言洞房清且肅歲去甚流烟時來如轉軸别鶴千里飛􅀌雌夜未宿閨房宿巳靜落月有餘輝寒虫隱壁思秋蛾繞燭飛絶雲斷更合離鴻去復歸佳人今何在迢逓江之沂一爲别鶴棄千里淚沾衣秋雲靜晚天寒夜方綿綿聞君吹急管相思雜採蓮别離未幾日高月三成弦蹀疉黃河浪嘶昌隴頭蟬􅀉書蘼蕪葉揷着叢臺邊擬古四首陌上桑嫋嫋陌上桑䕃陌復垂塘長條映白日細葉隱鸝黃蚕飢妾復思拭涙且提筐故人寧知此離恨煎人腸秦王卷衣咸陽春草芳秦帝卷衣裳玉檢茱茰匣金泥蘇合香初芳薫複帳餘輝曜玉堂當湏宴朝罷持此贈華陽採蓮錦帶雜花鈿羅衣垂緑川問子今何去出採江南蓮遼西三千里欲􅀉無因縁願君早旋返及此荷葉鮮携手艶裔陽之春携手清洛濵雞鳴上林花薄暮小平津長裙薄白日廣袖葉芳塵故交一如此新知詎憶人贈杜容成一燕海上來一燕高臺息一朝所逢過依然舊所識問我來何遲山川幾紆􅀡荅言海路長風多飛無力昔别縫羅春衣風初入帷今來夏欲曉桑蛾薄樹飛春詠春從何處來拂衣復驚梅雲障靑􅃈闥風吹承霧臺美人隔千里羅幃關不開無由得共語空對相思杯去妾贈前夫棄妾在河橋相思復相遼鳳凰簮落髮蓮花帶緩腰腸從别䖏斷貌在淚中消願君憶疇昔片言時見饒詠小年董生唯巧笑子都信美目百萬市一言千金買相逐不道參差菜詣諭窈窕淑願君捧繡被來就越人宿春怨四時如湍水奔飛競廻復夜鳥響嚶嚶朝花照煜煜厭見花成子多看筍成竹萬里斷音書十載異栖宿積愁落芳鬂長啼壞美目君去徃楡關妾留住亟谷唯對昔耶房如􅀑蜘蛛屋獨喚響相酬還時影自逐象牀易氊簟羅衣變單複幾度過風霜猶能保焭獨月夜詠陳南康新有所納二八人如花三五月如鏡開簾一種色當戶兩相映重價出秦韓高名入燕鄭十城屢請笏千金幾爭騁君意自能專妾心本無競見貴者初迎盛􅁎聊爲之詠久想專房麗未見傾城者千金訪繁華一朝遇容冶家夲薊門外來戯叢臺下長􅀸幸未匹文君復新寡與司馬治書同聞隣婦夜織洞房風已激長廊月復清藹藹夜庭廣飄飄曉帳清雜聞百虫思偏傷一息聲鳥聲長不息妾心復何極猶恐君無衣夜夜當窓織夜愁簷露滴爲珠池水合成璧萬行朝涙瀉千里夜愁極􅀌帳閉不開寒膏盡復益誰知心眼亂看朱忽成碧春閨有怨愁耒不理鬂春至更攅眉悲看蛺蝶粉泣望蜘蛛絲月映寒蛩褥風吹翡翠帷飛鱗難托意駃翼不綴思擣衣足傷金管處多愴緹光促下機騖西眺鳴砧􅃍東旭芳汗似蘭湯彫金辟龍燭散度廣陵音槮寫漁陽曲别鶴悲不已離鸞斷更續尺素在魚腸寸心慿鴈足爲人傷近不見嬴女鳳凰樓漢􅁎柏梁殿詎􅀅勝仙死音容猶可見我有一心人同鄕不異縣異縣不成隔同鄕更脉脉脉脉如牛女何由得一語爲何庫部舊􅁎擬蘼蕪之句出戶望蘭薫褰簾正逢君歛容纔一訪新知詎可聞新人含笑近故人含淚隱妾意在寒松君心逐朝槿在王􅀳安酒席數韻窈窕宋華容但歌有清曲轉盻非無時斜扇逺相矚詎减許飛瓊絶勝劉碧玉何因送欵欵伴飮杯中醁爲人有贈碧玉與緣珠張盧復雙女曼聲古難匹長袂世無侶似出鳳凰樓言發瀟湘渚幸有褰衣便含情􅀉一語何生􅁎有怨寒樹栭覉此月映風復吹逐臣與棄妾零落心可知寳琴徒七絃蘭燈空柏枝顰容不足効啼粧拭復垂同衾非楚越異國非此離鼓瑟曲有所思夜風吹熠熠朝光照昔耶幾銷蘼蕪葉空見蒲桃花不堪長織素誰能獨浣玅光隂復何極望促反成賖知君亦蕩子柰妾自倡家爲人寵􅁎有怨可憐獨立樹枝輕根亦摇已爲露所浥復爲風所飄錦衾襞不開端坐夜及朝是妾愁成瘦非君重細腰爲人自傷自知心裏恨還向影中羞廻持昔慊慊變作今悠悠還君與妾珥歸妾奉君裘斷絃猶可續心去最難留秋閨怨斜光隱西壁暮雀上南枝風來秋扇屏月出夜燈吹深心起百際遥淚非一垂徒勞妾辛苦終言君不知相逢行張率相逢夕隂階獨趨向冠里高門旣如一甲第復相似慿軾日欲昏何處訪公子公子之所在所在良未知靑樓出上路漸臺臨曲池堂上撫流徽罍樽朝夕施橘柚分寳葉朱火燎金枝兄弟兩三人冠佩紛陸離朝從禁門出車􅀐並驅馳金鞍瑪瑙勒聚觀路傍兒入門一顧望鳧鵠有雄雌雄雌各數千相鳴戯羽儀並在東西立群次何離離大婦刺方領中婦抱嬰兒小婦尚嬌稚端坐吹叅差丈夫無遽起神鳳且來儀對酒對酒誠可樂此酒復能醇如華良可貴如浮更非珍何以留上客爲􅀉掌中人金尊清復滿玉椀亟來親誰能共遲暮對酒及芳晨君當歌未罷􅁍座避梁塵遠期遠期終不歸節物坐􅀅變白露濕單衣秋風息團扇誰能少離别他鄕且異縣浮雲蔽重山相望何時見􅀉言遠行者空閨淚如霰贈内徐悱日暮想靑陽躡履出椒房綱虫生錦薦逰塵掩玉牀不見可憐影空聞黼帳香彼美情多樂挾瑟坐高堂豈忘離憂者向隅獨心傷聊因一書札以代九廻腸對房前桃樹詠佳期贈内相思上北閣徙􅀝望東家忽有當窓樹兼含映日花芳鮮􅀋紅粉北素若鉛華更使心増意彌令想狹斜無如一路阻脉脉似雲霞嚴城不可越言折伐疎麻華觀省中夜聞城外擣衣閶闔下重關丹墀吐明月秋氣城中令秋砧城外發浮聲繞臺雀飄響度龍闕婉轉何藏摧當佳上路來藏摧意未巳定自乘軒裏乗軒盡世家從麗似朝霞圓璫耳上照方繡領間斜衣薫百和屑􅁂揺九枝花昨暮庭槐落今朝羅縞薄拂席捲夗央開幔舒亀鶴金波正容與玉歩依砧杵紅袖徃還縈素腕參差舉徒聞不得見獨夜空愁佇獨夜何窮極懷之在心側階垂玉衡露庭舞松風翼瀝滴流星輝燦爛長河色三冬誠足用五日無粮食揚雲已寂寥今君復弦直和蕭紀室春旦有所思芳樹發春輝蔡子望青衣水逐桃花去春隨楊柳歸楊柳何時歸裊裊復依依已䕃章臺陌復掃長門扉獨知離心者坐惜春光違洛陽逺如日何由見宓妃春郊見美人芳郊拾翠人廻袖捲芳春金輝起歩摇紅米發吹輪湯湯蓋項日飄飄馬足塵薄暮高樓下當知妾姓秦詠照鏡晨輝照杏梁飛燕起朝粧留心散廣黛輕手約花黄正􅁫時念影拂絮且憐香方嫌翠色故乍道王無光城中皆半額非妾􅀞眉長陽春發和氣日凈班􅁎門風輕董賢舘卷耳縁家出反舌登牆喚蚕女桂枝鈎逰童蘇合彈拂袖當留客相逢莫相難秋夜凉風起佳人在河内征夫鎭馬邑零露一朝團中夜雨垂泣氣爽牀帳冷天寒針縷澁紅顔本暫時君還詎相及採菱妾家五湖口採菱五湖側王面不關粧雙眉本翠色日斜夭欲暮風生浪未息宛在水中央空作兩相憶鼓吹曲二首高巫山巫山光欲晚陽臺色依依彼美岩之曲寜知心是非朝霽觸石起暮雨潤羅衣願解千金佩請逐大王歸有所思上林鳥欲栖長安日行暮所思欝不見空想丹墀歩簾動憶君來雷聲似車度北方佳麗子窈窕能廻顧夫君自迷感非爲妾心妬同郭侍郎採桑姚翻鴈還高柳北春歸洛水南日照茱茰領風摇翡翠篸桑間視欲暮閨裏􅃍飢蚕相思君肋取相望妾那堪孔翁歸和湘東王班􅁎一首長門與長信日暮九重空雷聲隱聽隱車響絶籠籠恩光隨妙舞團扇逐秋風鈆華誰不慕人意自艱終劉令􅈺詩二首徐悱妻花庭麗景斜蘭牖輕風度落日更新粧開簾對春樹鳴􅕢葉中舞戯蝶花間騖調瑟本要歡心愁不成趣良㑹誠非遠佳期今不遇欲知幽怨多春閨深且暮東家挺竒麗南國擅容輝夜月方神女朝霞喩洛妃還看鏡中色比艶似知非摛辭徒妙好連􅀋頓乖違智夫雖巳麗傾城未敢希何思澄三首寂寂長信晚雀聲哦洞房蜘蛛綱高閣駮蘚被長廊虛殿簾帷靜閑階花蘂香悠悠視日暮還復拂空牀擬古故交不可忘猶如蘭桂芳新知雖可悅不異茱茰香妾有鳳雛曲非爲陌上桑薦君君不御抱瑟自悲凉南苑逢美人洛浦疑廻雪巫山似旦雲傾城今所見傾國昔曽聞婿服隨嬌合舟唇逐笑分風卷蒲桃帶日照石榴裙自有狂夫在空持勞使君荅唐娘七夕所穿針徐悱倡人助漢女靚粧臨月華連針學並蒂縈縷作開花孀閨絶綺羅攬贈自傷嗟雖言未相識聞道出良家曾停霍君􅀐經過柳惠車無由一共語暫看日升霞玉臺新詠卷之六玉臺新詠目綠卷之六吳均三十四首張率三首徐悱三首費㫤十首姚翻二首劉令􅈺二首何思澄三首
