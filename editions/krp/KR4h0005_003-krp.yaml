front:
  text: 玉臺新詠卷之三
  hash: sha256:f03127ce93c785c3aa15a18f14e026310ceafa2ef4314deb35d95dc759483e51
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0005_SBCK_003-1a}
body:
  text: 擬古七首陸機擬西北有高樓高樓一何峻迢迢峻而安綺窓出塵冥飛階躡雲端佳人撫琴瑟纎手清且閒芳草隨風結哀響馥若蘭玉容誰能顧傾城在一彈佇立望日昃躑躅再三歎不怨佇立久但願歌者歡思駕歸鴻羽比翼双飛翰擬東城高且長西山何其峻層曲鬱崔嵬零露彌天墜蕙葉慿林衰寒暑相因襲時逝忽如遺三閭結飛轡太耊悲落暉曷爲牽世務中心悵有違京雒多妖麗玉顏侔瓊蕤閑夜撫鳴琴惠音清且悲長歌赴促節哀響遂高徽一唱萬夫歡再唱梁塵飛思爲河曲鳥双逰灃水湄擬蘭若生春陽嘉樹生朝陽凝霜封其條執心守時信歲寒不敢凋美人何其曠灼灼在雲霄隆想彌年時長嘯入風飄引領望天末譬彼向陽翹擬迢迢牽牛星炤炤天漢輝粲粲光天歩牽牛西北廻織女東南顧華容一何綺揮手如振素怨彼河無梁悲此年歲暮跂彼無良緣皖焉不得度引領望大川双涕如沾露擬庭中有竒樹歡交蘭時往迢迢匿音徽虞淵引絶景四節逝若飛芳草久已茂佳人竟不歸躑躅遵林渚惠風入我懷感物戀所歡採此欲貽誰擬靑靑河畔草靡靡江籬草熠熠生河側皎皎彼姝女阿那當軒織粲粲妖容姿灼灼華美色良人逰不歸偏栖獨隻翼空房來悲風中夜起歎息擬渉江採芙蓉上山採瓊蘂穹谷饒芳蘭采采不盈掬悠悠懷所歡故鄕一何曠山川阻且難沉思鍾萬里躑躅獨吟歎爲顧彦先贈婦二首陸雲其一辭家遠行逰悠悠三千里京洛多風塵素衣化爲緇修身悼憂苦感念同懷子隆思亂心曲沈權滯不起歡沈難克興心亂誰爲理願假歸鴻翼飜飛浙江汜其二東南有思歸長歎充幽闥借問歎何爲佳人眇天末逰宦久不歸山川脩且闊形影參商乖音息曠不達離合非有常譬彼絃與筈願保金石志慰妾長飢渴贈車騎一首周夫人碎碎細織練當爲君作襦君行豈有顧憶君是妾夫昔者得君書聞君在高平今時得君書聞君在京城京城華麗鄕璀粲多異端男兒多逺志豈知妾念君昔者與君别歲律薄将暮日月一何速素秋墜湛露湛露何冉冉思君隨歲晚對食不能飱臨觴不能飲樂府三首艶歌行扶桑升朝輝照此高樓端高堂多艶麗洞房出清顏淑貌耀皎日惠心清且閒美目揚玉澤蛾眉象翠翰鮮膚一何潤秀色若可飡窈窕多容儀婉美巧笑言暮春春服成粲粲綺與紈金雀垂藻翹瓊珮結瑶璠方駕揚清塵濯足洛水瀾藹藹風雲㑹佳人一何繁南崖充羅幕北渚盈軿軒清川含藻景高岸被華丹馥馥芳袖揮泠泠纎指彈悲歌吐清音雅舞播幽蘭丹唇含九秋妍迹凌七盤赴曲迅驚鴻蹈節如集鵉綺態隨顏變沈姿無定源俯仰紛阿那顧歩咸可歡遺芳結飛飈浮景映清湍冶容不足詠春逰良可歎前緩聲歌逰仙聚靈族高㑹曽城阿長風萬里舉慶雲鬱嵯峨宓妃興洛浦王韓起泰華北徵瑶臺女南要湘川娥肅肅宵駕動翩翩翠蓋羅羽旗栖瓊鸞玉衡吐鳴和太容揮高絃洪崖發清歌獻酬旣已周輕軒垂紫霞搃轡扶桑枝濯足湯谷波清輝溢天門垂慶惠皇家塘上行江蘺生幽渚微芳不足宣被蒙風雨㑹移君華池邊發藻玉臺下垂影滄浪淵沾潤旣己渥結根奥且堅四節逰不處華繁難久鮮淑氣與時殞餘芳隨風捐天道有遷易人理無常全男歡智傾愚女愛衰避妍不惜微軀退但歎蒼蠅前願君廣末光照妾薄暮年爲顧彦先贈婦往反四首陸雲其一我在三川陽子居五湖隂山海一何曠譬彼飛與沉目想清惠姿耳存淑媚音獨寐多遠念寢言撫空衿彼美同懷子非爾誰爲心其二悠悠君行邁煢煢妾獨止山河安可踰永隔路萬里京室多妖冶粲粲都人子雅歩嫋纎腰巧笑發皓齒佳麗良可羨衰賤焉足紀遠蒙眷顧言䘖恩非望始其三翩翩飛蓬征郁郁寒木榮逰止固殊性浮沈豈一情隆愛結在昔信誓貫三靈秉心金石固豈從時俗傾笑目逝不顧纎腰徒盈盈何用結中欵仰指北辰星其四浮海難爲水逰林難爲觀容色貴及時朝華忘日晏皎皎彼姝子灼灼懷春粲西城善雅舞總章饒清彈鳴簧發丹唇朱絃繞素腕輕裙猶電揮雙袂如霞散華容溢藻幄哀響入雲漢知音世所希非君誰能讃棄置北辰星聞此玄龍煥時暮勿復言華落理必賤雜詩一首楊方秋夜凉風起清氣蕩暄濁蜻蜊吟堦下飛蛾拂眀燭君子從逺役佳人守煢獨離居幾何時鑚燧忽改木房櫳無行跡庭草萋已綠靑苔依空牆蜘蛛綱四屋感好多所懷沈憂結心曲合歡詩五首其一虎嘯谷風起龍躍景雲浮同聲好相應同氣自相求我情與子親譬如影追軀食共並根穗飮共連理杯衣用双絲絹寢共無縫綯居願接膝坐行願擕手趨子靖我不動子逰我無留齊彼同心鳥譬此比目魚情至斷金石膠漆未爲牢但願長無别合形作一軀生爲併身物死爲同槨灰秦氏自言至我情不可儔其二磁石招長針陽燧下炎煙宮商聲相和心同自相親我情與子合亦如影追身寢共織成被絮用同功綿暑摇比翼扇寒坐併肩氊子笑我必哂子慼我無歡來與子共迹去與子同塵齊彼蛩蛩獸舉動不相捐唯願長無别合形作一身生有同室好死成併棺民徐氏自言至我情不可陳其三獨坐空室中愁有數千端悲響荅愁歎哀涕應苦言彷徨四顧望白日入西山不覩佳人來但見飛鳥還飛鳥亦何樂夕宿自作群其四飛黃䘖長轡翼翼回輕輪俯渉渌水澗仰過九層山脩途曲且險秋草生兩邊黃華如沓金白華如散銀青敷羅翠采絳葩象赤雲爰有承露枝紫榮合素芬扶疎垂清藻布翹芳且鮮目爲艶彩廻心爲竒色旋撫心悼孤客俯仰還自憐踟躕向壁歎攬筆作此文其五南林有竒樹承春挺素華豐翹被長條綠葉蔽朱柯因風吐徽音芳氣入紫霞我心羨此木願徙着余家夕得逰其下朝得弄其葩爾根深且堅余宅淺且洿移植無良期歎息將如何七夕觀織女詩一首王鑒牽牛悲殊舘織女怨離家一稔期一宵此期良可嘉赫奕玄門開飛閣欝嵯峨隱隱驅千乘闐闐越星河六龍奮瑶轡文螭負瓊車火丹乘瑰燭素女執瓊華絳旗若吐電朱蓋如振霞雲韶何嘈嗷靈鼓鳴相和亭軒佇高眄眷予在岌峨澤因芳露沾恩附蘭風加明發相從逰翩翩鸞鷟羅同逰不同觀念子憂怨多敬因三祝末以爾屬皇娥嘲友人一首李充同好齊歡愛纏緜一何深子旣識我情我亦知子心嬿婉歷年歲和樂如瑟琴良辰不我俱中濶似商參爾隔北山陽我分南川隂嘉㑹罔克從積思安可任目想妍麗姿耳存清媚音脩晝興永念遥夜獨悲吟逝將尋行役言别涕沾襟願爾降王趾一顧重千金夜聽擣衣一首曹毗寒興御紈素佳人理衣衾冬夜清且永皓月照堂隂纎手疉輕素朗杵叩鳴砧清風流䌓節廻飈灑微吟嗟此徃運速悼彼幽滯心二物感余懷豈但聲與音擬古詩一首陶潛日暮天無雲春風扇微和佳人美清夜達曙酣且歌歌竟長歎息持此感人多眀明雲間月灼灼葉中花豈無一時好不久當如何樂府詩二首荀㫤擬相逢狹路間朝發邯郸邑暮宿井陘間井陘一何狹車馬不得旋邂逅相逢值﨑嶇交一言一言不容多伏軾問君家君家誠難知難知復易博南面平原居北趣相如閣飛樓臨夕都通門枕華郭入門無所見但見雙栖鶴栖鶴數十双鴛鴦群相追大兄弭金璫中兄振纓綉伏臘一來歸鄰里生光輝小弟無所作闘雞東陌逵大婦織紈綺中婦縫羅衣小婦無所作挾瑟弄音徽丈人且却坐梁塵將欲飛擬靑靑河邊草熒熒山上火迢迢隔隴左隴左不可至精爽通寤寐寤寐衾幃同忽覺在他邦他邦各異邑相遂不相及迷墟在望烟木落知冰堅升朝冬自進誰肯相攀牽客從北方來遺我端弋綈命僕開弋綈中有隱起珪長跪讀隱珪辭苦聲亦悽上言各努力下言長相懷雜詩二首其一王微桑妾獨何懷傾筐未盈把自言悲苦多排却不肯捨妾悲四陳訴塡憂不銷冶寒鴈歸所從半塗失慿假壯情忭驅馳猛氣捍朝社常懷雪漢慙常欲復周雅重名好銘勒輕軀願圖寫萬里度沙漠懸師蹈朔野傳聞兵失利不見來歸者奚䖏埋旍摩何處喪車馬拊心悼恭人零淚覆面下徒謂久别離不見長孤寡寂寂揜高門寥寥空廣厦待君竟不歸收顏今就價其二思婦臨高臺長想慿華軒弄絃不成曲哀歌若送言箕箒留江介良人處鴈門詎憶無夜苦但和狐白温日暗牛羊下野雀滿空園孟冬寒風起東壁正中昏朱火獨照人抱景自愁怨誰知心曲亂所思不可論雜詩三首謝惠連七月七日詠牛女落日隱簷楹升月照房櫳團團滿葉露浙浙振條風蹀足循廣塗瞬目曬曽穹雲漢有靈匹彌年闕相從遐川阻暱愛脩渚曠清容弄杼不成采聳轡驚前蹤昔離秋已兩今聚夕無雙傾河易廻幹欵顏難久悰沃若靈駕旋寂寥雲幄空留情顧華寢遥心遂奔龍沈吟爲爾感情深意彌重擣衣衡紀無淹度晷運倐如催白露滋園菊秋風落庭槐肅肅莎雞羽烈烈寒螿啼夕隂結空幙宵月皓中閨美人成常服端飭相招携簪玉岀北方鳴金歩南階欄高砧響發楹長杵聲哀微芳起兩袖輕汗染双題紈素旣已成君子行未歸裁用笥中刀縫爲萬里衣盈篋自予手幽緘俟君開腰帶准疇昔不知今是非代古客從遠方來贈我鵠文綾貯以相思筴緘以同心繩裁爲親身服着以俱寢興别來經年歲歡心不可凌寫酒置井中誰能辯斗升合如杯中水誰能判淄澠代行行重行行劉鑠眇眇凌長道遥遥行遠之廻車背京邑揮手從此辭堂上流塵生庭中綠草滋寒螿翔水曲秋兔依山基芳年有華月佳人無還期日夕凉風起對酒長相思悲發江南調憂委子衿詩臥看明燈晦坐見輕紈緇淚容不可飾幽鏡難復持願垂薄暮景照妾桑榆時代明月何皎皎落宿半遥城浮雲藹曽闕玉宇來清風羅帳延秋月結思想伊人沉憂懷明發誰謂行客逰屢見芳流歇河廣川無梁山高路難越代孟冬寒氣至白露秋風始秋風明月初眀月照高樓白露皎玄除迨及凉風起行見寒林疎客從逺方至贈我千里書先叙懷舊愛末陳夕離居一章意不盡三復情有餘願遂平生志無使甘言虚代靑青河邊草凄凄含露臺肅肅迎風舘思女御櫺軒哀心徹雲漢端撫悲絃泣獨對明燈嘆良人久徭役耿分終昏旦楚楚秋水歌依依授菱彈詠牛女秋動清氛扇火移炎氣歇廣欄含夜隂高軒通夕月安歩巡芳林傾望極雲闕組幕縈漢陳龍駕凌霄發誰云長河遥頗覺促筵悅沉情未申寫飛光已飄忽來對眇難期今歡自玆沒玉臺新詠卷之三玉臺新詠目錄卷之三擬古七首陸機爲顧彦先贈婦二首陸雲贈車騎一首周夫人樂府三首爲顧彦先贈婦往反四首陸云雜詩一首楊方合歡詩五首七夕觀織女詩一首鑒王嘲友人一首李充夜聽擣衣一首曹毗擬古詩一首陶潛樂府詩二首荀㫤雜詩二首王微雜詩三首謝惠連雜詩五首劉鑠
