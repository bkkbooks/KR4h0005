  - {type: variant, offset: 4306, length: 1288, content: 方望望江山阻悠悠道路長別前秋葉落別後春花芳雷歎一聲響雨淚忽成行悵望情無極傾心還自傷隴西行借問隴西行何當驅馬征草合前迷路雲濃後闇城寄語幽閨妾羅袖勿空縈和徐主簿望月樓上徘徊月窗中愁思人照雪光偏冷臨花色轉春星流時入暈桂長欲侵輪願以重光曲承君歌扇塵愛妾換馬渥水出騰駒湘川實應圖來從西北道去逐東南隅琴聲悲玉匣山路泣蘼蕪似鹿將含笑千金會不俱詠美人絳樹及西施俱是好容儀非關能結束本自細腰肢鏡前難並照相將映綠池看粧畏水動歛袖避風吹轉手齊裾亂橫簪歷鬢垂曲中人未取誰堪白日移不分他相識惟聽使君知七夕玉匣卷懸衣高樓開夜扉嫦娥隨月落織女逐星移離前忿促夜別後對空機倩語雕陵鵲填河未可飛遠期篇憶別春花飛已見秋葉稀淚粉羞明鏡愁帶減寬衣得書言未反夢見道應歸坐使紅顏歇獨掩青樓扉和湘東王春日新燕始新歸新蝶復新飛新花滿新樹新月麗新暉新光新氣早新望新盈抱新水新綠浮新禽新音好新景自新還新葉復新攀新枝雖可結新愁誰解顏新思獨氛氳新知不可聞新扇如新月新蓋學新雲新落連珠淚新點石榴裙詠薔薇經植宜春館靃靡上蘭宮片舒猶帶紫半卷未全紅葉疎難蔽日花密易傷風佳麗新粧罷含笑折芳叢寒閨詩行人消息斷空閨靜復寒風急朝機燥鏡闇晚粧難從來腰自小衣帶就中寬閨中月夜閨中日已暮樓上月初華樹陰緣砌上窗影向床斜開帷傷隻鳳吹鐙惜落花誰能當此夕獨處類倡家侯司空宅詠妓佳人徧綺席妙曲動鵾弦樓似陽臺上池如洛浦邊鸚啼歌扇後花落舞衫前翠柳將斜日偏照晚粧鮮侍宴賦得竹夾池一叢竹青翠不驚寒葉醞宜城酒皮裁薛縣冠湘川染別淚衡嶺拂仙壇欲見葳蕤色當來兔苑看和樊晉侯傷妾畫梁朝日盡芳樹落花辭忽以千金笑長作九原悲鏡前塵素粉機上網紅絲戶餘雙燕入床有一空帷名香不可得何見反魂時南征閨怨湘水舊言深征客理難尋獨愁無處道長悲不自禁逢人憎解珮幽居懶聽音惟當有夜鵲南飛似妾心班婕好怨柏梁新寵盛長信昔恩傾誰謂詩書巧翻為歌扇輕花月分窗進苔草共階生妾淚衫前滿單眠夢裏鶯可惜逢秋扇何用合歡名賦得蕩子行未歸坐樓愁回望息意不思春無奈園中柳寒時已報人捉梳羞理鬢挑朱懶向脣何當上路晚風吹還騎塵詠雪飄颻千里雪倏忽度龍沙從雲合且散因風卷復斜拂草如連蝶落樹似飛花若贈離居者折以代瑤華金石樂前溪流碧水後渚映清天登臺臨寶鏡開窗對綺錢玉顏光粉色羅袖拂金鈿春風散輕蝶明月映新蓮摘花競時侶催指及芳年閨怨自憐斷帶日偏恨分釵時留步惜餘影含意結離眉徒知今異昔空使怨成思欲以別離意獨向蘼蕪悲昭君辭拭淚辭戚里回顧望昭陽鏡失菱花影釵除卻日梁圍腰無一尺垂淚有千行綠衫承馬汗紅袖拂秋霜別曲真多恨哀弦須更張明君辭斂眉光祿塞遙望夫人城片片紅顏落雙雙淚眼生冰河牽馬渡雪路把鞍行胡風入骨冷漢月照心明方調琴上曲變入胡笳聲結客少年場行結客少年場春風滿路香歌撩李都尉果擲潘河陽折花遙勸酒就水更移床今年喜夫壻新拜羽林郎定知劉碧玉偷嫁汝南王對酒春水望桃花春淵藉芳杜琴從綠珠借酒就文君取牽馬向渭橋日落山頭晡山簡接䍦倒王戎如意舞箏鳴金谷園笛韻平陽塢人生一百年歡笑惟三五何處覓錢刀求為洛陽賈看妓綠珠歌扇薄飛燕舞衫長琴曲隨流水簫聲逐鳳凰膺風蟬鬢亂映日鳳釵光懸知曲不誤無事顧周郎春日題屏風昨夜鳥聲春驚鳴動四鄰今朝花樹下定有詠花人流星浮酒泛粟瑱逐杯脣何勞一片雨喚作陽臺神, SBCK: 首}
