  - {type: variant, offset: 3391, length: 410, content: 雜詩五首徐幹其一沉隂結愁憂愁憂爲誰興念與君相别各在天一方良㑹未有期中心摧且傷不聊憂飡食慊慊常飢空端坐而無爲髣髴君容光其二峨峨高山首悠悠萬里道君去日已逺欝結令人老人生一世間忽若暮春草時不可再得何爲自愁惱毎誦昔鴻恩賤軀焉足保其三浮雲何洋洋願因通我辭飄飄不可寄徙倚徒相思人離皆復㑹君獨無反期自君之出矣明鏡暗不治思君如流水何有窮已時其四慘慘時節盡蘭華凋復零喟然長歎君息期慰我情展轉不能寐長夜何綿綿躡履起岀戶仰觀三星連自恨志不遂泣涕如涌泉其五思君見巾櫛以益我勞勤安得鴻鸞羽覯此心中人誠心亮不遂搔首立悁悁何言一不見復㑹無因緣故然比目魚今隔如參辰室思人靡不有初想君能終之别來歷年歲舊思何可期重新而忘故君子所猶譏寄身雖在遠豈忘君湏臾旣厚不爲薄想君時見思情詩高殿鬱崇崇廣厦淒泠泠微風起閨闥落日照階庭踟躕雲屋下笑歌倚華楹君行殊不返我飾爲誰榮鑪薫闔不用鏡匣上塵生綺羅失常色金翠暗無精嘉肴旣忘御㫖酒亦常停顧瞻空寂寂唯聞燕雀聲憂思連相屬中心如宿酲, WYG: 繁欽}
