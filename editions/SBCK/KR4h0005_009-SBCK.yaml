front:
  text: 玉臺新詠卷之九
  hash: sha256:df7c4a2b34e470599c1b5e7591ff63c7a1436518ce9fbb861ce7e7c595215def
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0005_SBCK_009-1a}
body:
  text: 古詞東飛伯勞歌東飛伯勞西飛燕黃姑織女時相見誰家女兒對門居開顏發艶照里閭南窓北牖挂明光羅幃綺帳脂粉香女兒年幾十五六窈窕無雙顏如玉三春已暮花從風空留可憐誰與同梁武帝河中之水歌河中之水向東流洛陽女兒名莫愁莫愁十三能織綺十四採桑􅀯陌頭十五嫁與盧家婦十六生兒字阿俟盧家蘭室桂爲梁中有欝金蘇合香頭上金􅁫十二行足下絲履五文章珊瑚掛鏡爛生光平頭奴子擎履箱人生富貴何所望恨不早嫁東家王古詞一首越人歌楚鄂君子修者乗靑翰之舟張翠羽衣蓋榜拽越人悅之擢檝而歌以感鄂君歡然舉繡被而覆之其辭曰今日何日搴洲中流今夕何夕與王子同舟山有木兮木有枝心悅君兮君不知琴歌并序司馬相如司馬相如逰臨邛富人卓王孫有女文君新寡竊於壁間窺之如相鼓琴歌以挑之曰鳳兮鳳兮歸故鄕逰遨四海求其皇時未遇兮無所將何悟今夕􅀆昇斯堂有艶淑女在此方室近人遐獨我傷何緣交頸爲鴛鴦頡頡頏頏兮共翶翔鳳兮凰􅀆從我栖得記孳尾永爲妃交情通意心和諧中夜相從知者誰双翼俱起高翻飛無感我心使余悲詩一首并序漢武元封中以江都王女細君爲公主嫁與烏孫昆彌至國而自治宮室􅀊時一再㑹言語不通公主悲愁自作歌曰吾家嫁我兮天一方遠託異國烏孫王穹廬爲室氊爲牆以肉爲食兮酪爲􅄴常思漢土兮心内傷願爲黃鵠歸故鄕漢成帝時童謡二首并序漢成帝趙望后名飛燕寵幸冠於後宮常從帝出時富平侯張放亦稱佞幸爲期門之㳺故歌云張公子時相見也飛燕嬌妬成帝無子故云啄皇孫華而不實王莽自云代漢德者七色尚黄故云黃雀飛燕竟以廢死故爲人所憐也燕燕尾涎涎張公子時相見木門倉琅根燕飛來啄皇孫桂樹花不實黃雀巢其顚昔爲人所愛今爲人所憐漢桓帝時童謡二首小麥靑青大麥枯誰當􅀗者婦與姑丈夫何在西擊胡吏買馬君具車請爲諸君鼓龍胡城上烏尾畢逋公爲吏兒爲徒一徒死百乘車車班班至河間河間河婉女能數錢以錢爲室金爲堂石上膴膴舂黃梁之下有懸皷我欲擊之丞相怒四愁詩張衡我所思􅀆在太山欲徃從之梁甫難側身東望涕沾翰美人贈我金錯刀何以報之英瓊瑶路遠莫致􅀝逍遥何爲懷憂心煩勞我所思􅀆在桂林我欲從之湘水深側身南望涕沾襟美人贈我金琅玕何以報之双玉盤路逺莫致􅀝惆悵何爲懷憂心煩傷我所思兮在漢陽欲徃從之壠坂長側身西望涕沾裳美人贈我貂襜褕何以報之眀月珠路遠莫致􅀝踟蹰何爲懷憂心煩紆我所思兮在鴈門欲往從之雪紛紛側身北望涕沾巾美人贈我錦綉段何以報之靑玉案路遠莫致􅀝増嘆何爲懷憂心煩惋贈婦秦嘉曖暖白日引曜西傾啾啾雞群飛雀赴楹皎皎明月煌煌列星嚴霜悽愴飛雪覆庭寂寂獨居寥寥空室飄飄桂帳熒熒華燭爾不是居帷帳何施爾不是照華燭何爲燕歌行魏文帝秋風蕭瑟天氣凉草木摇落露爲霜群燕亂歸鴈南翔念君客逰多思腸慊慊思歸戀故鄕君爲淹留􅀉他方賤妾焭焭守空房憂來思君不可忘不􅁴淚下沾衣裳授琴鳴絃發清商短歌微吟不能長明月皎皎照我牀星漢西流夜未央牽牛織女遥相忘爾獨何辜限河梁别日何易㑹日難山川悠遠路漫漫欝陶思君未敢言􅀉聲浮雲徃不還沾零兩面毀容顏誰能懷憂獨不嘆展詩清歌聊自寛樂往哀來摧肺肝耿耿伏枕不能眠披衣出戸歩東西仰看星月觀雲間飛鶬晨鳴聲可憐留連顧懷不能存妾薄命行六言曹植日月旣逝西藏更㑹蘭室洞房花燭歩幛輝皎煌􅀂日岀扶桑促尊合坐行觴主人起舞盤能者穴觸别端騰觚飛欝䦨干同量等色齊顏任意交屬所歡朱顏發外形蘭袖隨礼客極情妙舞仙仙體輕裳觧履遺絶纓俛仰咲喧無呈覽持佳人玉顔齊接金鬱翠盤手形羅袖良難腕弱不勝珠環坐者嘆息舒顔御巾裛粉君傍中有霍納都梁雞舌五味雜香進者何人齊姜恩重愛深難忘召延覔好宴私但歌杯來何遲客賦旣醉言歸主人稱露未晞歷九秋篇薰桃行傅玄緣繡領兮含輝皎日廻光則微朱華忽爾漸衰影欲捨形高飛誰言往恩可追薺與麥兮夏零蘭桂踐霜逾馨祿命縁天難明委心結意丹靑何憂君心中傾車遥遥篇車遥遥兮馬洋洋追思君􅀆不可忘君安逰兮西入秦願爲影兮隨君身君在隂兮影不見君依光兮妾所願燕人美篇燕人美兮趙女佳其室則遠兮限層崖雲爲車兮風爲馬玉在山兮蘭在野雲無期兮風有止思心多端兮誰能理擬四愁詩四首并序張平子作四愁詩體小而俗七言􅀋也聊擬而作之名曰擬四愁詩其辭曰我所思􅀆在􅌡洲願爲雙鵠戯中流牽牛織女期在秋山高水深路無由愍余不遘嬰殷憂佳人貽我明月珠何以要之比目魚海廣無舟悵勞劬􅀉言飛龍大馬駒風起雲披飛龍逝波滔天􅀆馬不麗何爲多念心憂世我所思􅀆在珠崖願爲比翼浮清池剛柔合德配二儀形影一絶長別離愍余不遘情如攜佳人貽我蘭蕙草何以要之同心鳥火􅀬水深憂盈抱申以琬琰夜光寳卞和旣沒玉不察存若流光忽電㓕何爲多念獨鬱結我所思兮在崐山願爲鹿蛩闚虞淵日月廻曜照景天參辰曠隔㑹無緣愍余不遘罹百艱佳人貽我蘇合香何以要之翠鴛鴦懸度弱水川無梁申以錦衣文綉裳三光騁邁景不留鮮以民生忽􅀂浮何爲多念祇自愁我所思􅀆在朔方願爲飛燕俱南翔煥乎人道著三光胡越殊心生異鄕愍余不遘罹可殃佳人遺我羽葆纓何以要之影與形增冰憂結繁華零申以日月指明星星辰有翳日月移駑馬哀鳴慙不馳何爲多念心自虧盤中詩山樹高烏鳴悲泉水深鯉魚肥空倉鵲常苦飢吏人婦㑹夫希出門望見白衣謂當是而更非還入門中心悲北上堂西入階急機絞杼聲催長嘆息當語誰君有行妾念之岀有曰還無期結中帶長相思君忘妾未知之妾忘君罪當治妾有行宜知之黃者金白者玉高者山下者谷姓者蘇字伯玉作人才多智謀足家居長安身在蜀何惜馬蹄歸不數羊肉千斤酒百斛令君馬肥麥與粟今時人智四足與其書不能讀當從中央周不角擬四愁詩張載我所思兮在􅀯巢欲往從之玉山高登崖遠望涕泗交我之懷矣心傷勞佳人遺我筒中布何以贈之流黃素願因飄風超遠路終然莫致增永慕我所思兮在朔眉欲往從之白雲扉登崖遠望涕泗垂我之懷矣心傷悲佳人遺我雲中翮何以報之連城璧願因歸鴻超遐隔終然莫致増永積我所思兮在龍原欲往從之隔太山登崖遠望涕泗連我之懷矣心傷煩佳人遺我双角端何以贈之雕玉環願因行雲超重巒終然莫致增永嘆我所思兮在營州欲徃從之路阻脩登崖遠望涕泗流我之懷矣心傷憂佳人遺我綠綺琴何以贈之雙南金願因流波超重深終然莫致增永吟􅀳惠帝時童謡鄴中女子莫千妖前至三月抱胡腰樂府燕歌行陸機四時代序逝不追春風習習落葉飛蟋蟀在堂露盈墀念君逺逰常苦悲君何緬然久不歸賤妾悠悠心無違白日旣沒明燈輝寒禽赴林匹鳥栖双鴻闗關宿河湄憂來感物睇不晞非君之念思爲誰别日何早㑹何遲代淮南王鮑照淮南王好長生服食鍊氣讀仙經琉璃作枕牙作盤金鼎玉七合神丹戯紫房紫房綵女弄明璫鸞歌鳳舞斷君腸朱城九門門九閨願逐明月入君懷入君懷結君珮怨君恨君恃君愛築城思堅劒思利同盛同衰莫相棄代白紵歌辭朱唇動素袖舉洛陽少年邯郸女古稱綠水今白紵催絃急管爲君舞窮秋九月黃葉黄北風驅鴈天雨霜夜長酒多樂未央春風澹蕩俠思多天色凈綠氣妍和桃含紅蕚蘭紫芽朝日灼爍發園葩卷幌結幃盈玉筵齋驅秦吹廬女絃千金顧笑買芳年行路難中庭五株桃一株先作花陽春妖冶二三月從風簸蕩落西家西家思婦見之惋零淚沾衣撫心歎初送我君出戸時何時淹留節廻換牀席生塵明鏡垢纎腰瘦削髮􅅾亂人生不得常稱意惆悵徙􅀝至夜半剉蘖染黃絲黃絲歷亂不可治昔我與君始相値爾時自謂可君意結帶與我言死生好惡不相置今日見我顔色衰意中索寞與先異還君金􅁫玳瑁簪不忍見此益愁思斷幽閨思婦氣欲絶凝霜夜下拂羅衣浮雲中斷開明月夜夜遥遥徒相思年年望望情不歇􅀉我匣中靑銅鏡倩人爲君除白髮行路難行路難夜聞南城漢使度使我流涙憶長安李夫人及貴人歌陸厥屬車桂席塵豹尾香烟㓕形影向蘼蕪青蒲復萎絶坐萎絶對蘼蕪臨丹階泣樹途寡鶴覊雌飛且止雕梁翠壁網蜘蛛洞房明月夜對此淚如珠登臺望秋月沈約望秋月秋月光如練照曜三爵臺徘徊九華殿九華玳瑁梁華榱與璧璫以玆雕麗色特照明月光凝華入黼帳清輝懸洞房先過飛燕戶􅁍照班􅁎牀桂宮褭褭落桂枝早寒凄凄凝白露上林晚葉颯鳴颯鴈門早鴻離離度湛秀質兮似規委清光兮如素照愁軒之蓬影映金堦之微歩居人臨此笑以歌别客對之傷且慕經衰圃映寒叢凝清夜帶秋風隨庭雪以比素與池荷而共紅臨玉階之皎皎含雪靄之濛濛轥天衢而徒走䁻長潢而飛空隱岩崖而半至隔帷幌而纔通散朱庭之奕奕入青􅃈而玲瓏閑堦悲寡鵠沙洲怨别鴻昭􅁎泣殿明君思漢宮余亦何爲者淹留此山東㑹圃臨春風臨春風春風起春樹逰絲暖如烟落花雰似霧先泛天淵池還過細柳枝蝶逢飛揺颺燕値羽差池揚桂斾動芝蓋開燕裙吹趙帶趙帶飛參差燕裙合且廻離簪復轉黛顧歩惜容儀儀巳炤灼春風復廻薄氛氲桃李花靑祚含素蕚旣爲風所開復爲風所落摇綠帶枕紫莖舞春雪雜流鶯曲房開兮金鋪響金鋪響兮妾思驚梧桐未隂淇川始碧迎行雨於高唐送歸鴻於碣石經洞房響紈素感幽閨思帷奕想芳園兮可以逰念蘭翹兮漸堪摘拂明鏡之冬塵羅衣之秋襞觧旣鏗鏘以動珮又絪緼而流麝摇始蕩以入閨終徘徊而緣􅂩鳴珠􅄕於繡戶散芳塵於綺席是悵時思婦安能久行役佳人不在玆春風與誰惜歲暮愍衰草愍衰草衰草無容色憔悴荒徑中寒萎不可識昔時兮春日昔時兮春風含華􅀆佩實垂綠兮散紅氛氲鳷鵲右照曜望仙東送歸顧莫泣淇水嘉客淹留懷上宮岩陣兮海㟁冰多兮霧散爛熳兮客根攅幽兮石隟布綿密於寒臯吐纎疎於危石旣惆悵於君子倍傷心於行役露高枝於初旦霜紅天於始夕彫芳卉之九衢寳靈茅之三眷風急崤路難秋至客衣單旣傷簷下菊復悲池上蘭飄落逐風轉方知􅀊早寒流螢暗明燭鴈聲斷纔續委紀長信宮蕪􅁾丹墀曲霜奪莖上紫風銷葉中縁山奕兮青薇兮黃葦秋鴻兮疎引寒鳥聚兮輕飛逕荒寒草合桐長舊巖圍夜漸蘼蕪沒箱露日沾衣願逐晨征鳥薄暮共西歸霜來悲落桐悲落桐落桐早霜露燕至葉未抽鴻來波已素本出龍門山長枝仰刺天上峯百丈絶下趾萬尋懸幽根已盤結􅀌株復爲絶初不照光景終年􅀒霜雪自顧無羽儀不願生曲池芬芳本自乏華實無可施匠者時留盻王孫少見之分取生孤卉徒置北堂垂宿莖抽晚榦祈葉生故枝枝雖遼遠新葉頗離離春風一朝至榮啓坐如斯自惟良菲薄君思徒照灼顧已非嘉樹宜用慿阿閣願作清廟琴爲舞雙玄鶴薛荔可爲裳文杏可爲梁勿言草木賤徒照君朱光朱光不徙照爲君含噭眺隂阿綠氷弦隂枝苦寒調厚德不可任敢不虛其􅀂心逢陽春至吐綠照清得夕行聞聞夜鶴鶴呌南池對此孤明月臨風振羽伊吾儀人之薄無菲賦命之天爵抱地跼促之短長懷隨冬春而哀樂愍海未之驚鳧傷雲間之鶴鶴離離昔未離近發天北垂忽値疾風起暫下昆明池復値冬冰合水宿非所宜欲留不可住欲去飛巳疲勢逐疾風舉求溫向衡楚復値􅀯飛鴻參差共成侶海上多雲霧蒼茫失洲嶼自此别故群燭向瀟湘渚故群不離散相依蒼海畔夜止羽相切晝飛影相亂刷羽共浮沉湛澹泛清潯旣不得離别安知慕侶心九冬霜雪苦六翮飛不任且養凌雲翅俛仰弄清音所望浮丘子旦夕來見尋晨征聽曉鴻聽曉鴻曉鴻度􅀅旦跨弱水之微瀾發成山之遠岸牀春歸之未幾驚比歲之云半出海漲之蒼茫入雲途之杳漫無東西之可辨孰遐邇之能筭微昔見於洲渚越秋期於江漢集勁風於弱軀􅀒重雪於輕翰寒溪可以飮荒臯可以竄溪水自清徒形豈足翫秋蓬萎兮未極寒草衰兮無色楚山高兮難杳度越水深兮不可測美明月之馳光願征禽之騁翼伊余馬之屨懷知君行之未極夜綿綿而難曉愁參差而盈臆望山川悉無以唯星河猶可識聞鴈夜􅀯飛客淚夜沾衣春鴻思暮交客子方未歸􅀊去歡娛盡年來客貌非攬衽形雖是撫臆事多違青蒲雖長復易解白雲誠遠詎難依解珮去朝市去朝市朝市深歸暮辭北纓而南徂浮東川而西顧逢天地之降祥値日月之重光伊當仁之菲薄非余情之信芳充待詔於金馬眷齊宴於柏梁觀闘獸於虎圈望窅窕於坡香逰西園兮登銅雀舉靑璅兮眺重陽講金華兮議宣室晝武帷兮夕文昌佩甘泉􅀆履五祚賛朽諧􅀆緩光託後車兮侍華幄逰勃海泛清漳天道有盈缺寒暑逓炎凉一朝賣玉椀春暮惜餘香曲池無復處桂枝亦銷亡清廟徙肅肅四陵久茫茫薄暮余多幸嘉運重來昌忝稽部之南尉典千里之光貴形北荒之濁河惡横橋於清渭望前軒之早桐對南階之初卉非余情之屢傷􅀉玆兮能慰昔日兮懷哉日將暮兮歸去來披褐守山東守山東山東萬里欝靑葱兩漢共一寫水潔望如空巖側靑莎披岩間丹桂叢上瞻旣隱隱下睇亦冥濛遠林響包獸近樹聒鳴虫路帶􅀂溪右泉吐金華東萬仭倒危石百丈涇懸叢瀑曳瀉疎電奔飛似白虹洞升含清氣漏穴吐飛風玉竇膏滴瀝石室乳空籠峭㠋塗彌險豈岨歩􅂊通余拾平生之所愛歘暮年而斯逢此願一去而不還恨邦衣之未禠挹林壑之清曠事泯俗之詭紛幸帝德之方升値天網之未毀旣除舊而就新故化民而俗徙播趙俗以尚徂扇齊風以東靡乳雉方可馴流蝗庶能弭清心矯世濁儉政救民侈滿秩歸白雲淹留事芝體行路難二首吳筠君不見上林苑中客冰羅霧縠象牙席盡是得意忘年者􅊥腸見膽無所惜白酒甜塩甘如乳綠觴皎鏡華如碧少年持名不肯嘗安知白駒應過隟博山爐中清和香欝金蘇合及都梁逶迤好氣皆容貌經過青􅃈歷紫房巳入中山隂后帳復上皇帝班􅁎牀班􅁎失寵顔不開奉帚供養長信臺日暮耿耿不能寐秋風切切四面來玉階行路生細草金爐香炭變成􅁅得意失意湏􅁷間非君方寸逆所裁洞庭水上一株桐經霜觸浪困嚴風昔時抽心燿白日今且臥死黃沙中洛陽名工見咨嗟一剪一刻作琵琶白璧規心學明月珊瑚映面作風花帝王見賞不見忘提携把握登建章掩抑摧藏張女彈殷勤促柱楚明光年年月月對君王遥遥夜夜宿未央未央綵女棄明箎爭見拂拭生光儀茱茰錦衣玉作匣安念昔日枯樹枝不學御山南嶺桂至今載年猶未知擬樂府長相思張牽長相思名離别美人之遠如雨絶獨延佇心中結望雲雲去逺望鳥鳥飛㓕空望終􅀂斯珠淚不能雪長相思久别離所思何在􅀂天垂鬱陶相望不得知玉階月夕映羅帷風夜吹思長不能寐坐望天河移白紵歌辭歌兒流唱聲欲清舞女趂節體自輕歌舞並妙㑹人情依絃度曲婉盈盈揚蛾爲態謹自成妙聲屢唱輕体飛流津染面散芳菲舉動齊息不相違令彼佳客澹忘歸時久翫夜月星稀行路難費昶君不見長安客舍門倡家少女名桃根貧窮夜紡無燈燭何言一朝奉至尊至尊離宮百餘處千門萬戶不知曙唯聞啞啞城上烏玉闌金井牽轆轤丹梁翠柱飛屠蘇香薪桂火炊雕胡當年翻覆無黄河郎今欲度畏風波浮雲似帳月成鈎那能夜夜南陌頭宜城醖酒今行熱停鞍繫馬暫栖宿靑牛丹轂七香車可憐今夜宿倡家倡家高樹烏欲栖羅幃翠帳向君低織成屏風金屈􅂰朱唇玉面燈前出相看氣息望君憐誰能含羞不自前從軍行雲中停陣羽檄驚甘泉烽火通夜明二師􅀅軍新築營嫖姚校尉初山征復有山西將絶世受雄名三門應遁甲五壘學神兵白雲隨陣色蒼山荅皷聲逶迤觀鵞翼參差覩鴈行先平小月陣􅁍㓕大宛城善馬還長樂黃金付水衡小婦趙人能鼓瑟侍婢初笄觧鄭聲庭前桃花飛巳合必應紅粧起見迎和蕭侍中子顯春别四首别觀蒲萄帶實垂江南豆䓻生連枝無情無意猶如此有心有恨徒自知蜘蛛作絲滿帳中芳草結葉當行路紅臉脉脉一生啼黃鳥飛飛有時度故人雖故昔經新新人雖新復應故可憐淮水去來潮春堤楊柳覆河橋淚迹未慘詎終朝行聞玉佩已相要桃紅李白􅀂朝粧羞持顦顇比新楊不惜暫住君前死愁無西國更生香雜詩歷九秋兮三春分遣貴客兮遠賓顧多君心所親乃命妙妓才人炳􅀂日月星辰序金罍􅀆玉觴賓主逓起鴈行杯若飛電絶光交觴接巵結裳慷􅁣歡笑萬方春新詩􅀆夫君爛然虎變龍文渾如天地未分齊謳楚舞紛紛歌聲上噭青雲窮八音􅀆異倫竒聲靡靡毎新㣲咲素齒丹唇逸響飄薄梁塵精美􅆌􅆌入神坐咸醉兮沾歡引樽促席臨軒進爵献壽翻翻千秋要君一言願愛不移若山君恩愛兮不竭譬􅀂朝日夕月此景萬里不絶長保初醮結髮何憂生生胡越携弱手兮登環上逰飛閣雲間穆􅀂鴛鳳双鵉還幸蘭房自安娛心極樂難原樂旣極兮多懷盛時忽逝若頽寒暑草御景廻春榮隨風飄摧感物動心増哀妾受命兮􅀌靈男兒隨地稱殊女弱難存若無骨肉至親更疎奉事他人托軀君如影兮隨形賤妾如水浮萍明月不能常盈誰能無根保榮良時冉冉代征雜句春情一首蝶黃花紫燕相追楊低柳合路塵飛已見垂鈎挂綠樹誠知其水沾羅衣兩童夾車問不已五馬城南猶未歸鶯啼春欲駃無爲空掩扉擬古一首窺紅對鏡歛双眉含愁拭涙坐相思念人一去許多時服語笑靨迎來情心懷心想甚分明憶人不忍語御恨獨吞聲倡樓怨節六言朝日斜來照戶春鳥爭飛出林片光片影皆麗一聲一囀煎心上林紛紛花落淇水漠漠苔浮年馳節流易盡何爲忍憶含羞湘東三春别應令四首昆明夜月光如練上林朝花色如霰花朝月夜動春心誰忍相思不相見試看機上交龍錦還瞻庭裏合歡枝映日通風影朱幔飄風摇華度金池不聞離人當重合唯悲合罷㑹成離門前楊柳亂如絲􅀡置佳人不自持適言新作裂紈詩誰悟今成織素辭日暮徙􅀝渭橋西正月凉月與雲齊􅀂使月光無近遠應照離人今夜啼春别四首蕭子顯飜鶯度燕双比翼楊柳千條共一色但看陌上携手歸誰能對此空中憶幽宮積草自芳菲黃鳥着樹情相依爭風競日常聞響重花疉葉不通飛當知此時動妾思慙使羅袂拂君衣江東大道日華春垂楊掛栁掃輕塵淇水昨送淚沾巾紅粧宿昔巳􅀿新御悲覽涕别心知桃花李花仁風吹本知人心不似樹可意人别似花離府栖鳥曲􅀿令二首握中酒杯碼碯鍾裾邊雜珮琥珀紅欲持􅀉君心不惜共指三星今何夕淚黛紅輕􅀧花色還欲令人不相識金壺夜永誰能多莫持賖用比懸河燕歌行風光遲舞出靑蘋蘭苕翠鳥鳴發春洛陽梨花落如雪河邊細草細如茵桐生井底葉交枝今看無端雙燕離五重飛樓入雲漢九華閣道暗清池遥看白馬津上吏傅道黄龍征戍兒明月金光徒照妾浮雲玉葉君不知思君昔去柳依依至今八月避暑歸明珠蚕蠒登勉機欝金香蘤持香衣落陽城頭雞欲曙丞相府中烏未飛夜夢征人縫􅈢貉私憐織婦裁錦緋吳刀鄭綿絡寒閨夜披薄芳年海上水中鳧日暮寒夜空城雀行路難王筠干門皆閉夜何央百憂俱集斷人腸探揣箱中取刀尺拂拭機上斷流黃情人逐情可恨傷畏邊路遠乏衣裳已繩一爾催衣縷復擣百和裛衣香猶憶去時腰大小不知今日身短長栭襠双心共一祩袙複兩邊作八襊襻帶雖安孔穿開栽逢忍不猶未達􅅐前􅁍月兩相連本照君心不照天願君分明得此意勿復流蕩不如先含悲含怨刋不死封情忍思待明年元廣州景仲座見故􅁎一首右劉孝綽留故夫不踟躕别待春山上相看採蘼蕪詩擬古應教劉孝威双栖翡翠兩鴦鴛巫雲落月乍相忘誰家妖冶折花枝蛾眉􅝇睇使情移靑鋪綠隟流璃扉瓊筵玉笥金縷衣美年人幾何十餘含羞轉笑歛風裾珠丸出彈可追空留可憐持與誰别義陽郡徐君倩翔鳳樓遥望與雲浮歌聲臨樹出舞影入江流葉落看村近天高應向秋飾面亭粧成更􅀧星頰上紅凝淺眉心黛不靑故留殘粉絮掛看箔簾釘王叔英婦贈荅一首粧鈆􅀧黛拂輕紅鳴環動珮出房櫳看梅復看柳淚滿春衫中日白紵曲沈約蘭葉參差桃半紅飛芳舞縠戯春風翡翠群飛飛不息願在雲間長比翼秋日白紵曲白露欲凝草色黃金琯玉桂響洞房双心一影俱廻翔吐情􅀉君君莫忘玉臺新詠目錄卷之九歌辭二首越人歌一首司馬相如烏孫公主漢成帝時童謡二首漢桓帝時童謡二首張衡四首秦嘉一首魏文帝二首曹植首一傅玄八首張載四首􅀳時童謡一首陸機一首鮑昭八首釋寳月一首陸厥一首沈約八首吳筠二首張率四首費昶二首皇太子一十五首湘東王繹四首蕭子顯六首王筠一首劉孝綽一首劉孝威一首徐君蒨二首王叔英妻一首沈約二首
