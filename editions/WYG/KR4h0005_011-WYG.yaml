body:
  text: 玉臺新詠總集類提要臣等謹案玉臺新咏十巻陳徐陵撰案劉肅大唐新語曰梁簡文為太子好作艶詩境内化之晩年欲改作追之不及乃令徐陵撰玉臺集以大其體據此則是書作於梁時故簡文稱皇太子元帝稱湘東王今夲題陳尚書左僕射太子少傅東海徐陵撰殆後人之所追改如劉勰文心雕龍夲作於齊而題梁通事舍人也其書前八巻為自漢至梁五言詩第九巻為歌行第十巻為五言二韻之詩雖皆取綺羅脂粉之詞而去古未逺猶有講於温柔敦厚之遺未可概以淫艶斥之其中如曹植棄婦篇庾信七夕詩今夲集皆失載據此可補闕佚又如馮惟訥詩紀載蘇伯玉妻盤中詩作漢人據此知為晋代梅鼎祚詩乗載蘇武妻答外詩據此知為魏文帝作古詩西北有髙樓等九首文選無名氏據此知為枚乗作飲馬長城窟行文選亦無名氏據此知為蔡邕作其有資攷證者亦不一明代刻夲妄有増益故馮舒疑庾信有入北之作江總濫擘牋之什茅元楨夲顛倒改竄更甚此夲為趙宦光家所傳宋刻末有嘉定乙亥永嘉陳玉父重刻跋最為完善間有後人附入之作如武陵王閨妾寄征人詩沈約八詠之六諸篇皆一一註明尤為精審然玉父跋稱初從外家李氏得舊京夲間多錯謬後得石氏所藏録夲以補亡校脱其中如五言詩中入李延年歌一首陳琳飲馬長城窟行一首皆自亂其例七言詩中移東飛伯勞歌於越人歌之前亦乖世次疑石氏夲有所竄亂而玉父因之未察也觀劉克莊後村詩話所引玉臺新詠一一與此本脗合而嚴羽滄浪詩話謂古詩行行重行行篇玉臺新詠以越鳥巢南枝以下另為一首今此本仍聨為一首又謂盤中詩為蘇伯玉妻作見玉臺集今此本乃溷列傅元詩中葢克莊所見即此本羽所見者又一别本是宋刻已有異同非陵之舊矣特不如明人變亂之甚為尚有典型耳乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀玉臺新詠序夫凌雲槩日由余之所未窺萬户千門張衡之所曾賦周王璧臺之上漢帝金屋之中玉樹以珊瑚作枝珠簾以瑇瑁為押其中有麗人焉其人五陵豪族充選掖庭四姓良家馳名永巷亦有潁川新市河間觀津本號嬌娥曾名巧笑楚王宫裏無不推其細腰衛國佳人俱言訝其纎手説詩㪟禮豈東隣之自媒婉約風流異西施之被教弟兄協律生小學歌少長河陽由來能舞琵琶新曲無待石崇箜􅔃雜引非關曹植傳鼓瑟於楊家得吹簫於秦女至若寵聞長樂陳后知而不平畫出天僊閼氏覽而遥妒至如東隣巧笑來侍寢於更衣西子微顰得横陳於甲帳陪遊馺娑騁纖腰於結風長樂鴛鴦奏新聲於度曲妝鳴蟬之薄鬢照墮馬之垂鬟反挿金鈿横抽寶樹南都石黛最發雙蛾北地燕支偏開兩靨亦有嶺上僊童分丸魏帝􅆎中寶鳯授厯軒轅金星將婺女爭華麝月與嫦娥競爽驚鸞冶䄂時飄韓掾之香飛鷰長裾冝結陳王之珮雖非圖畫入甘泉而不分言異神僊戲陽臺而無别真可謂傾國傾城無對無雙者也加以天情開朗逸思雕華妙解文章尤工詩賦瑠璃硯匣終日隨身翡翠筆牀無時離手清文滿篋非惟芍藥之花新製連篇寧止蒲萄之樹九日登高時有縁情之作萬年公主非無累徳之辭其佳麗也如彼其才情也如此旣而椒宫宛轉柘觀陰岑絳鶴晨嚴銅蠡畫静三星未夕不事懐衾五日猶賖誰能理曲優遊少託寂寞多閒厭長樂之踈鐘勞中宫之緩箭纖􅆎無力怯南陽之𢷬衣生長深宫笑扶風之織錦雖復投壺玉女為歡盡於百嬌爭博齊姬心賞窮於六箸無怡神於暇景惟屬意於新詩庶得代彼皋蘇蠲兹愁疾但往世名篇當今巧製分諸麟閣散在鴻都不藉篇章無由披覽於是然脂暝寫弄筆晨書選録豓歌凡為十巻曾無參於雅頌亦靡濫於風人涇渭之間若斯而已於是麗以金箱裝之寶軸三臺妙迹龍伸蠖屈之書五色華箋河北膠東之紙高樓紅粉仍定魚魯之文辟惡生香聊防羽陵之蠹靈飛六甲高擅玉函鴻烈僊方長推丹枕至如青牛帳裏餘曲旣終朱鳥窻前新妝已竟方當開兹縹帙散此縚繩永對翫於書幃長循環於纖手豈如鄧學春秋儒者之功難習竇専黄老金丹之術不成固勝西蜀豪家託情窮於魯殿東儲甲觀流詠止於洞簫孌彼諸姬聊同棄日猗歟彤管無或譏焉陳尚書左僕射太子少傅東海徐陵撰欽定四庫全書玉臺新詠巻一陳徐陵撰古詩八首古樂府詩六首枚乗雜詩九首李延年歌詩一首并序蘇武詩一首辛延年羽林郎詩一首班婕妤怨詩一首并序宋子侯董嬌嬈詩一首漢時童謡歌一首張衡同聲歌一首秦嘉贈婦詩三首并序秦嘉妻徐淑荅詩一首蔡邕飲馬長城窟行一首陳琳飲馬長城窟行一首徐幹詩二首繁欽定情詩一首古詩無人名為焦仲卿妻作并序古詩八首上山采蘼蕪下山逢故夫長跪問故夫新人復何如新人雖言好未若故人姝顔色類相似手爪不相如新人從門入故人從閤去新人工織縑故人工織素織縑日一疋織素五丈餘將縑來比素新人不如故凛凛嵗云暮螻蛄多鳴悲凉風率已厲遊子寒無衣錦衾遺洛浦同袍與我違獨宿累長夜夢想見容煇良人惟古歡枉駕恵前綏願得常巧笑攜手同車歸既來不須臾又不處重闈諒無鷐風翼焉得凌風飛眄睞以適意引領遥相睎徙倚懐感傷垂涕霑雙扉冉冉孤生竹結根泰山阿與君為新婚菟絲附女蘿莵絲生有時夫婦㑹有宜千里逺結婚悠悠隔山陂思君令人老軒車來何遲傷彼蕙蘭花含英揚光煇過時而不采將隨秋草萎君亮執髙節賤妾亦何為孟冬寒氣至北風何慘􅀈愁多知夜長仰觀衆星列三五明月滿四五蟾兎缺客從逺方來遺我一書札上言長相思下言久離别置書懐袖中三嵗字不滅一心抱區區懼君不識察客從逺方來遺我一端綺相去萬餘里故人心尚爾文彩雙鴛鴦裁為合歡被著以長相思縁以結不解以膠投漆中誰能别離此四坐且莫諠願聽歌一言請說銅鑪器崔嵬象南山上枝似松柏下根據銅盤彫文各異類離婁自相聫誰能為此器公輸與魯班朱火然其中青煙颺其間從風入君懐四坐莫不歎香風難久居空令蕙草殘悲與親友别氣結不能言贈子以自愛道逺㑹見難人生無幾時顛沛在其間念子棄我去新心有所歡結志青雲上何時復來還穆穆清風至吹我羅裳裾青袍似春草長條隨風舒朝登津梁山褰裳望所思安得抱柱信皎日以為期古樂府詩六首日出東南隅照我秦氏樓秦氏有好女自言名羅敷羅敷善蠶桑采桑城南隅青絲為籠繩桂枝為籠鉤頭上倭墮髻耳中明月珠緑綺為下裾紫綺為上襦觀者見羅敷下擔捋髭鬚少年見羅敷脫巾著帩頭耕者忘其耕鋤者忘其鋤來歸相怨怒但坐觀羅敷使君從南來五馬立歭􅡨使君遣吏往問此誰家姝秦氏有好女自名為羅敷羅敷年幾何二十尚未滿十五頗有餘使君謝羅敷寧可共載不羅敷前置辭使君一何愚使君自有婦羅敷自有夫東方千餘騎夫壻居上頭何以識夫壻白馬從驪駒青絲繫馬尾黄金駱馬頭腰間鹿盧劒可直千萬餘十五府小吏二十朝大夫三十侍中郎四十專城居為人潔白晳髯髯頗有鬚盈盈公府步冉冉府中趨坐中數千人皆言夫壻殊日出東南隅行相逢狹路間道隘不容車如何兩少年挾轂問君家君家誠易知易知復難忘黄金為君門白玉為君堂堂上置樽酒使作邯鄲倡中庭生桂樹華鐙何煌煌兄弟兩三人中子為侍郎五日一來歸道上自生光黄金駱馬頭觀者滿路傍入門時左顧但見雙鴛鴦鴛鴦七十二羅列自成行音聲何噰噰鶴鳴東西廂大婦織羅綺中婦織流黄小婦無所作挾瑟上髙堂丈人且安坐調絲未遽央相逢狹路間天上何所有厯厯種白榆桂樹夾道生青龍對道隅鳯皇鳴啾啾一母將九鶵顧視世間人為樂甚獨殊好婦出迎客顔色正敷愉伸腰再拜跪問客平安不請客北堂上坐客氈氍毹清白各異樽酒上正華疏酌酒持與客客言主人持却略再拜跪然後持一桮談笑未及竟左顧勅中厨促令辦粗飯慎莫使稽留廢禮送客出盈盈府中趨送客亦不逺足不過門樞取婦得如此齊姜亦不如健婦持門户勝一大丈夫隴西行翩翩堂前燕冬藏夏來見兄弟兩三人流蕩在他縣故衣誰當補新衣誰當綻賴得賢主人覽取為吾綻夫壻從門來斜柯西北眄語卿且勿眄水清石自見石見何纍纍遠行不如歸艶歌行皚如山上雪皎若雲間月聞君有兩意故來相决絶今日斗酒㑹明旦溝水頭􅉜蹀御溝上溝水東西流淒淒復淒淒嫁娶不須嗁願得一心人白頭不相離竹竿何嫋嫋魚尾何蓰蓰男兒重意氣何用錢刀為山上雪飛來雙白鵠乃從西北來十十將五五羅列行不齊忽然卒疲病不能飛相隨五里一反顧六里一徘徊吾欲銜汝去口噤不能開吾欲負汝去羽毛日摧頽樂哉新相知憂來生别離歭􅡨顧羣侣淚落縱横催今日樂相樂延年萬歳期雙白鵠枚乗雜詩九首西北有高樓上與浮雲齊交疏結綺窓阿閣三重階上有弦歌聲音響一何悲誰能為此曲無乃杞梁妻清商隨風發中曲正徘徊一彈再三歎慷慨有餘哀不惜歌者苦但傷知音稀願為雙鴻鵠奮翅起髙飛東城髙且長逶迤自相屬囘風動地起秋草萋已緑四時更變化歳暮一何速鷐風懐苦心蟋蟀傷局促蕩滌放情志何為自結束燕趙多佳人美者顔如玉被服羅裳衣當户理清曲音響一何悲弦急知柱促馳情整中帶沈吟聊躑躅思為雙飛燕銜泥巢君屋行行重行行與君生别離相去萬餘里各在天一涯道路阻且長㑹面安可知胡馬嘶北風越鳥巢南枝相去日已逺衣帶日已緩浮雲蔽白日遊子不顧反思君令人老嵗月忽已晩棄捐勿復道努力加飱飯涉江采芙蓉蘭澤多芳草采之欲遺誰所思在遠道還顧望舊鄉長路漫浩浩同心而離居傷憂以終老青青河畔草鬱鬱園中桞盈盈樓上女皎皎當窓牖娥娥紅粉妝纎纎出素手昔為倡家女今為蕩子婦蕩子行不歸空牀難獨守蘭若生春陽涉冬猶盛滋願言追昔愛情款感四時美人在雲端天路隔無期夜光照𤣥隂長歎戀所思誰謂我無憂積念發狂癡庭前有竒樹緑葉發華滋攀條折其榮將以遺所思馨香盈懐袖路逺莫致之此物何足貴但感别經時迢迢牽牛星皎皎河漢女纎纎擢素手札札弄機杼終日不成章泣涕零如雨河漢清且淺相去復幾許盈盈一水間脉脉不得語明月何皎皎照我羅牀帷憂愁不能寐覽衣起徘徊客行雖云樂不如早旋歸出户獨彷徨愁思當告誰引領還入房淚下霑裳衣李延年歌詩一首并序李延年知音善歌舞每為漢武帝作新歌變曲聞者莫不感動延年侍上坐起舞歌曰北方有佳人絶世而獨立一顧傾人城再顧傾人國傾城復傾國佳人難再得蘇武詩一首結髪為夫婦恩愛兩不疑懽娛在今夕嬿婉及良時征夫懐逺路起視夜何其參辰皆已沒去去從此辭征役在戰塲相見未有期握手一長歎淚為生别滋努力愛春華莫忘歡樂時生當復來歸死當長相思辛延年羽林郎詩一首昔有霍家姝姓馮名子都依倚將軍勢調笑酒家胡胡姬年十五春日獨當鑪長裾連理帶廣袖合歡襦頭上藍田玉耳後大秦珠兩鬟何窕窕一世良所無一鬟五百萬兩鬟千萬餘不意金吾子娉婷過我廬銀鞍何昱爚翠蓋何歭􅡨就我求清酒絲繩提玉壺就我求珍肴金盤膾鯉魚貽我青銅鏡結我紅羅裾不惜紅羅裂何論輕賤軀男兒愛後婦女子重前夫人生有新故貴賤不相渝多謝金吾子私愛徒區區班婕妤怨詩一首并序昔漢成帝班婕妤失寵供養於長信宫乃作賦自傷并為怨詩一首新裂齊紈素鮮潔如霜雪裁為合歡扇團團似明月出入君懐袖動摇微風發常恐秋節至凉風奪炎熱棄捐篋笥中恩情中道絶宋子侯董嬌嬈詩一首洛陽城東路桃李生路傍花花自相對葉葉自相當春風東北起花葉正低昂不知誰家子提籠行采桑纎手折其枝花落何飄颺請謝彼姝子何為見損傷髙秋八九月白露變為霜終年㑹飄墮安得久馨香秋時自零落春月復芬芳何時盛年去懽愛永相忘吾欲竟此曲此曲愁人腸歸來酌美酒挾瑟上髙堂漢時童謡歌一首城中好髙髻四方髙一尺城中好大眉四方眉半額城中好廣袖四方用匹帛張衡同聲歌一首邂逅承際㑹偶得充後房情好新交接恐㬓若探湯不才勉自竭賤妾職所當綢繆主中饋奉禮助蒸嘗思為苑蒻席在下蔽匡牀願為羅衾幬在上衛風霜洒埽清枕席鞮芬以狄香重户結金扃髙下華鐙光衣解巾粉御列圖陳枕張素女為我師儀態盈萬方衆夫所希見天老教軒皇樂莫斯夜樂没齒焉可忘秦嘉贈婦詩三首并序秦嘉字士㑹隴西人也為郡上掾其妻徐淑寢疾還家不獲面别贈詩云爾人生譬朝露居世多屯蹇憂艱常早至懽㑹常苦晩念當奉時役去爾日遥逺遣車迎子還空往復空返省書情悽愴臨食不能飯獨坐空房中誰與相勸勉長夜不能眠伏枕獨展轉憂來如尋環匪席不可捲皇靈無私親為善荷天祿傷我與爾身少小罹㷀獨既得結大義懽樂若不足念當逺離别思念叙款曲河廣無舟梁道近隔邱陸臨陸懐惆悵中駕正躑躅浮雲起髙山悲風激深谷良馬不囘鞍輕車不轉轂針藥可屢進愁思難為數貞士篤終始恩義不可屬肅肅僕夫征鏘鏘揚和鈴清晨當引邁束帶待鷄鳴顧㸔空室中髣髴想姿形一别懐萬恨起坐為不寧何用敘我心遺思致款誠寶釵可耀首明鏡可鑒形芳香去垢穢素琴有清聲詩人感木瓜乃欲荅瑶瓊媿彼贈我厚慙此往物輕雖知未足報貴用敘我情秦嘉妻徐淑荅詩一首妾身兮不令嬰疾兮來歸沈滯兮家門厯時兮不差曠廢兮侍覲情敬兮有違君今兮奉命逺適兮京師悠悠兮離别無因兮敘懐瞻望兮踴躍佇立兮徘徊思君兮感結夢想兮容煇君發兮引邁去我兮日乖恨無兮羽翼髙飛兮相追長吟兮永歎淚下兮霑衣蔡邕飲馬長城窟行一首青青河邊草綿綿思遠道遠道不可思宿昔夢見之夢見在我傍忽覺在他鄉他鄉各異縣展轉不相見枯桑知天風海水知天寒入門各自媚誰肯相為言客從逺方來遺我雙鯉魚呼兒烹鯉魚中有尺素書長跪讀素書書上竟何如上有加飱食下有長相憶陳琳飲馬長城窟行一首飲馬長城窟水寒傷馬骨往謂長城吏慎莫稽留太原卒官作自有程舉築諧汝聲男兒寧當格鬭死何能怫鬱築長城長城何連連連連三千里邊城多健少内舍多寡婦作書與内舍便嫁莫留住善事新姑嫜時時念我故夫子報書往邊地君今出語一何鄙身在禍難中何為稽留他家子生男慎莫舉生女哺用脯君獨不見長城下死人骸骨相撐拄結髪行事君慊慊心意關邊地苦賤妾何能久自全繁欽定情詩一首我出東門遊邂逅承清塵思君即幽房侍寢執衣巾時無桑中契迫此路側人我即媚君姿君亦恱我顔何以致拳拳綰臂雙金鐶何以致殷勤約指一雙銀何以致區區耳中雙明珠何以致叩叩香囊繫肘後何以致契闊繞腕雙跳脫何以結恩情珮玉綴羅纓何以結中心素縷連雙針何以結相於金薄畫搔頭何以慰别離耳後瑇瑁釵何以荅歡恱紈素三條裾何以結愁悲白絹雙中衣與我期何所乃期東山隅日旰兮不至谷風吹我襦逺望無所見涕泣起歭􅡨與我期何所乃期山南陽日中兮不來凱風吹我裳逍遥莫誰覩望君愁我膓與我期何所乃期西山側日夕兮不來躑躅長歎息遠望凉風至俯仰正衣服與我期何所乃期山北岑日暮兮不來淒風吹我衿望君不能坐悲苦愁我心愛身以何為惜我華色時中情既款款然後尅密期褰衣躡茂草謂君不我欺厠此醜陋質徙倚無所之自傷失所欲淚下如連絲古詩無名人為焦仲卿妻作并序漢末建安中廬江府小吏焦仲卿妻劉氏為仲卿母所遣自誓不嫁其家逼之乃没水而死仲卿聞之亦自縊於庭樹時傷之為詩云爾孔雀東南飛五里一徘徊十三能織素十四學裁衣十五彈箜篌十六誦詩書十七為君婦心中常苦悲君既為府吏守節情不移鷄鳴入機織夜夜不得息三日斷五疋大人故嫌遲非為織作遲君家婦難為妾不堪驅使徒留無所施便可白公姥及時相遣歸府吏得聞之堂上啓阿母兒已薄祿相幸復得此婦結髪同枕席黄泉共為友共事二三年始爾未為久女行無偏斜何意致不厚阿母謂府吏何乃太區區此婦無禮節舉動自專由吾意久懐忿汝豈得自由東家有賢女自名秦羅敷可憐體無比阿母為汝求便可速遣之遣之慎莫留府吏長跪荅伏惟啓阿母今若遣此婦終老不復取阿母得聞之搥牀便大怒小子無所畏何敢助婦語吾已失恩義㑹不相從許府吏黙無聲再拜還入户舉言謂新婦哽咽不能語我自不驅卿逼迫有阿母卿但暫還家吾今且報府不久當歸還還必相迎取以此下心意慎勿違吾語新婦謂府吏勿復重紛紜往昔初陽嵗謝家來貴門奉事循公姥進止敢自專晝夜勤作息伶俜縈苦辛謂言無罪過供養卒大恩仍更被驅遣何言復來還妾有繡腰襦萎蕤自生光紅羅複斗帳四角垂香囊箱簾六七十緑碧青絲繩物物各自異種種在其中人賤物亦鄙不足迎後人留待作遺施於今無㑹因時時為安慰久久莫相忘雞鳴外欲曙新婦起嚴妝著我繡裌裠事事四五通足下躡絲履頭上瑇瑁光腰若流紈素耳著明月璫指如削蔥根口如含朱丹纎纎作細步精妙世無雙上堂拜阿母母聽去不止昔作女兒時生小出野里本自無教訓兼媿貴家子受母錢帛多不堪母驅使今日還家去念母勞家裏却與小姑别淚落連珠子新婦初來時小姑如我長勤心養公姥好自相扶將初七及下九嬉戲莫相忘出門登車去涕落百餘行府吏馬在前新婦車在後隠隠何甸甸俱㑹大道口下馬入車中低頭共耳語誓不相隔鄉且暫還家去吾今且赴府不久當還歸誓天不相負新婦謂府吏感君區區懐君既若見錄不久望君來君當作盤石妾當作蒲葦蒲葦紉如絲盤石無轉移我有親父兄性行暴如雷恐不任我意逆以煎我懐舉手長勞勞二情同依依入門上家堂進退無顔儀阿母大拊掌不圖子自歸十三教汝織十四能裁衣十五彈箜篌十六知禮儀十七遣汝嫁謂言無誓違汝今無罪過不迎而自歸蘭芝慙阿母兒實無罪過阿母大悲摧還家十餘日縣令遣媒來云有第三郎窈窕世無雙年始十八九便言多令才阿母謂阿女汝可去應之阿女銜淚荅蘭芝初還時府吏見丁寧結誓不别離今日違情義恐此事非竒自可斷來信徐徐更謂之阿母白媒人貧賤有此女始適還家門不堪吏人婦豈合令郎君幸可廣問訊不得便相許媒人去數日尋遣丞請還說有蘭家女承籍有宦官云有第五郎嬌逸未有婚遣丞為媒人主簿通語言直說太守家有此令郎君既欲結大義故遣來貴門阿母謝媒人女子先有誓老姥豈敢言阿兄得聞之悵然心中煩舉言為阿妹作計何不量先嫁得府吏後嫁得郎君否泰如天地足以榮汝身不嫁義郎體其往欲何云蘭芝仰頭荅理實如兄言謝家事夫壻中道還兄門處分適兄意那得自任専雖與府吏要渠㑹永無縁登即相許和便可結㛰姻媒人下牀去諾諾復爾爾還部白府君下官奉使命言談大有縁府君得聞之心中大歡喜視厯復開書便利此月内六合正相應良吉三十日今已二十七卿可去成婚交語速裝束駱驛如浮雲青雀白鵠舫四角龍子幡婀娜隨風轉金車玉作輪躑躅青驄馬流蘇金鏤鞍齎錢三百萬皆用青絲穿雜綵三百匹交廣市鮭珍從人四五百鬱鬱登郡門阿母謂阿女適得府君書明日來迎汝何不作衣裳莫令事不舉阿女黙無聲手巾掩口嗁淚落便如瀉移我瑠璃榻出置前窓下左手持刀尺右手執綾羅朝成繡裌裠晩成單羅衫晻晻日欲暝愁思出門嗁府吏聞此變因求假暫歸未至二三里催藏馬悲哀新婦識馬聲躡履相逢迎悵然遥相望知是故人來舉手柏馬鞍嗟嘆使心傷自君别我後人事不可量果不如先願又非君所詳我有親父母逼迫兼弟兄以我應他人君還何所望府吏謂新婦賀卿得髙遷盤石方且厚可以卒千年蒲葦一時紉便作旦夕間卿當日勝貴吾獨向黄泉新婦謂府吏何意出此言同是被逼迫君爾妾亦然黄泉下相見勿違今日言執手分道去各各還家門生人作死别恨恨那可論念與世間辭千萬不復全府吏還家去上堂拜阿母今日大風寒寒風摧樹木嚴霜結庭蘭兒今日冥冥令母在後單故作不良計勿復怨鬼神命如南山石四體康且直阿母得聞之零淚應聲落汝是大家子仕宦於臺閣慎勿為婦死貴賤情何薄東家有賢女窈窕豔城郭阿母為汝求便復在旦夕府吏再拜還長嘆空房中作計乃爾立轉頭向户裏漸見愁煎迫其日牛馬嘶新婦入青廬菴菴黄昏後寂寂人定初我命絶今日魂去尸長留攬裠脫絲履舉身赴青池府吏聞此事心知長别離徘徊庭樹下自挂東南枝兩家求合葬合葬華山傍東西植松柏左右種梧桐枝枝相覆葢葉葉相交通中有雙飛鳥自名為鴛鴦仰頭相向鳴夜夜達五更行人駐足聽寡婦起傍徨多謝後世人戒之慎勿忘玉臺新詠巻一欽定四庫全書玉臺新詠巻二陳徐陵撰魏文帝於清河見輓船士新婚與妻别一首又於清河作一首又甄皇后樂府塘上行一首劉勲妻王氏雜詩二首并序曹植雜詩五首樂府三首棄婦詩一首魏明帝樂府二首阮籍詠懐詩二首傅𤣥樂府詩七首和班氏詩一首張華情詩五首雜詩二首潘岳内顧詩二首悼亡詩二首石崇王昭君辭一首并序左思嬌女詩一首魏文帝於清河見輓船士新婚與妻别一首與君結新㛰宿昔當别離凉風動秋草蟋蟀鳴相隨冽冽寒蟬吟蟬吟抱枯枝枯枝時飛揚身體忽遷移但惜歳月馳歳月無窮極㑹合安可知願為雙黄鵠比翼戲清池又清河作一首方舟戲長水湛澹自浮沈弦歌發中流悲響有餘音音聲入君懐悽愴傷人心心傷安所念但願恩情深願為鷐風鳥雙飛翔北林又甄皇后樂府塘上行一首蒲生我池中其葉何離離傍能行仁義莫若妾自知衆口鑠黄金使君生别離念君去我時獨愁常苦悲想見君顔色感結傷心脾念君常苦悲夜夜不能寐莫以豪賢故棄捐素所愛莫以魚肉賤棄捐蔥與薤莫以麻枲賤棄捐菅與蒯出亦復苦愁入亦復苦愁邊地多悲風樹木何修修從軍致獨樂延年夀千秋劉勲妻王氏雜詩二首并序王宋者平虜將軍劉勲妻也入門二十餘年後勲恱山陽司馬氏女以宋無子出之還於道中作詩二首翩翩牀前帳張以蔽光煇昔將爾同去今将爾共歸緘藏篋笥裏當復何時披誰言去婦薄去婦情更重千里不唾并况乃昔所奉逺望未為遥歭􅡨不得往曹植雜詩五首明月照髙樓流光正徘徊上有愁思婦悲歎有餘哀借問歎者誰言是客子妻君行踰十年孤妾常獨棲君若清路塵妾若濁水泥浮沉各異勢㑹合何時諧願為西南風長逝入君懐君懐時不開妾心當何依西北有織婦綺縞何繽紛明晨秉機杼日晨不成文大息終長夜悲嘯入青雲妾身守空房良人行從軍自期三年歸今已厯九春孤鳥繞樹翔噭噭鳴索羣願為南流景馳光見我君微隂翳陽景清風飄我衣遊魚潜緑水翔鳥薄天飛眇眇客行士遥役不得歸始出嚴霜結今來白露晞遊子歎黍離處者歌式微慷慨對嘉賔悽愴内傷悲攬衣出中閨逍遥步兩楹閒房何寂寞緑草被階庭空室自生風百鳥翔南征春思安可忘憂戚與我并佳人在逺道妾身獨單焭歡㑹難再遇蘭芝不重榮人皆棄舊愛君豈若平生寄松為女蘿依水如浮萍束身奉衿帶朝夕不墮傾儻願終盼眄永副我中情南國有佳人容華若桃李朝遊江北岸夕宿瀟湘沚時俗薄朱顔誰為發皓齒俛仰歳將暮榮曜難久恃樂府三首美女妖且閑采桑岐路間長條紛冉冉落葉何翩翩攘䄂見素手皓腕約金環頭上金爵釵腰佩翠琅玕明珠交玉體珊瑚間木難羅衣何飄飄輕裾隨風還顧眄遺光彩長嘯氣若蘭行徒用息駕休者以忘餐借問女安居乃在城南端青樓臨大路髙門結重關容華暉朝日誰不希令顔媒氏何所營玉帛不時安佳人慕髙義求賢良獨難衆人何嗷嗷安知彼所歡盛年處房室中夜起長歎美女篇種葛南山下葛蔓自成隂與君初㛰時結髪恩義深歡愛在枕席宿昔同衣衾竊慕棠棣篇好樂和瑟琴行年將晩暮佳人懐異心恩絶曠不接我情遂抑沈出門當何顧徘徊步北林下有交頸獸仰見雙棲禽攀枝長歎息淚下霑羅衿良鳥知我悲延頸對我吟昔為同池魚今若商與參往古皆歡遇我獨困於今棄置委天命愁愁安可任種葛篇浮萍寄清水隨風東西流結髪辭嚴親來為君子仇恪勤在朝夕無端獲罪尤在昔蒙恩恵和樂如瑟琴何意今摧穨曠若商與參茱萸自有芳不若桂與蘭新人雖可愛無若故所歡行雲有反期君恩儻中還慊慊仰天歎愁愁將何愬日月不常處人生忽若遇悲風來入懐淚下如垂露發篋造裳衣裁縫紈與素浮萍篇棄婦詩一首石榴植前庭緑葉摇縹青丹華灼烈烈帷彩有光榮光好曄流離可以戲淑靈有鳥飛來集樹翼以悲鳴悲鳴夫何為丹華實不成拊心長歎息無子當歸寧有子月經天無子若流星天月相終始流星沒無精棲遲失所宜下與瓦石并憂懐從中來歎息通雞鳴反側不能寐逍遥於前庭歭􅡨還入房肅肅帷幕聲褰帷更攝帶撫弦彈素筝慷慨有餘音要妙悲且清收淚長歎息何以負神靈招摇待霜露何必春夏成晩穫為良實願君且安寧魏明帝樂府詩二首昭昭素明月暉光燭我牀憂人不能寐耿耿夜何長微風衝閨闥羅帷自飄颺攬衣曵長帶縱履下髙堂東西安所之徘徊以傍徨春鳥向南飛翩翩獨翺翔悲聲命儔匹哀鳴傷我腸感物懐所思泣涕忽霑裳種瓜東井上冉冉自踰垣與君新為㛰瓜葛相結連寄託不肖軀有如倚太山菟絲無根株蔓延自登縁萍藻託清流常恐身不全感君邱山恵賤妾執拳拳天日照知之想君亦俱然阮籍詠懐詩二首二妃逰江濵逍遥從風翔交甫解環珮婉孌有芬芳猗靡情懽愛千載不相忘傾城迷下蔡容好結中腸感激生憂思萱草樹蘭房膏沐為誰施其雨怨朝陽如何金石交一旦更離傷昔日繁華子安陵與龍陽夭夭桃李花灼灼有暉光恱懌若九春磬折似秋霜流眄發媚姿言笑吐芬芳攜手等懽愛宿昔同衾裳願為雙飛鳥比翼共翺翔丹青著明誓永世不相忘傅𤣥樂府詩七首青青河邊草悠悠萬里道草生在春時逺道還有期春至草不生期盡歎無聲感物懐思心夢想發中情夢君如鴛鴦比翼雲間翔既覺寂無見曠如參與商河洛自用固不如中岳安囘流不及反浮雲往自還悲風動思心悠悠誰知者懸景無停居忽如馳駟馬傾耳懐音響轉目涙雙墮生存無㑹期要君黄泉下青青河邊草篇苦相身為女卑陋難再陳兒男當門户墮地自生神雄心志四海萬里望風塵女育無欣愛不為家所珍長大逃深室藏頭羞見人無淚適他鄉忽如雨絶雲低頭和顔色素齒結朱脣跪拜無復數婢妾如嚴賔情合同雲漢葵藿仰陽春心乖甚水火百惡集其身玉顔隨年變丈夫多好新昔為形與影今為越與秦越秦時相見一絶踰參辰苦相篇豫章行有女懐芬芳媞媞步東箱蛾眉分翠羽明目發清揚丹脣翳皓齒秀色若珪璋巧笑露權靨衆媚不可詳容儀希世出無乃古毛嬙頭安金步摇耳繫明月璫珠環約素腕翠爵垂鮮光文袍綴藻黼玉體映羅裳容華既以豔志節擬秋霜徽音冠青雲聲響流四方妙哉英媛徳宜配侯與王靈應萬世合日月時相望媒氏陳束帛羔鴈鳴前堂百兩盈中路起若鸞鳯翔兄夫徒踴躍望絶殊參商有女篇豔歌行昭昭朝時日皎皎晨明月十五入君門一别終華髪同心忽異離曠如秦與越秦越有㑹時參辰遼且闊形影無髣髴音聲寂無達纎弦感促柱觸之哀聲發情思如循環憂來不可遏塗山有餘恨詩人詠采葛蜻蛚吟牀下囘風起幽闥春榮隨露落芙蓉生木末自傷命不遇良辰永乖别已爾可奈何譬如紈素裂孤雌翔故巢星流光景絶魂神馳萬里甘心要同穴朝時篇怨歌行皎皎明月光灼灼朝日暉昔為春繭絲今為秋女衣丹脣列素齒翠彩發娥眉嬌子多好言歡合易為姿玉顔盛有時秀色隨年衰常恐新間舊變故興細微浮萍無根本非水將何依憂喜更相接樂極自還悲明月篇秋蘭䕃玉池池水清且芳芙蓉隨風發中有雙鴛鴦雙魚自踴躍兩鳥時囘翔君期厯九秋與妾同衣裳秋蘭篇所思兮何在乃在西長安何用存問妾香䙞雙珠環何用重存問羽爵翠琅玕今我兮聞君更有兮異心香亦不可燒環亦不可沈香燒日有歇環沈日自深西長安行和班氏詩一首秋胡納令室三日宦他鄉皎皎潔婦姿泠泠守空房嬿婉不終夕别如參與商憂來猶四海易感難可防人言生日短愁者苦夜長百草揚春華攘腕采柔桑素手尋繁枝落葉不盈筐羅衣翳玉體囘目流彩章君子倦仕歸車馬如龍驤精誠馳萬里既至兩相忘行人恱令顔請息此樹傍誘以逢郎喻遂下黄金裝烈烈貞女忿言辭厲秋霜長驅及居室奉金升北堂母立呼婦來歡情樂未央秋胡見此婦惕然懐探湯負心豈不慙永誓非所望清濁必異源鳬鳯不並翔引身赴長流果哉潔婦腸彼夫既不淑此婦亦大剛張華情詩五首北方有佳人端坐鼔鳴琴終晨撫管弦日夕不成音憂來結不解我思存所欽君子尋時役幽妾懐苦心初為三載别於今久滯滛昔邪生户牖庭内自成林翔鳥鳴翠隅草蟲相和吟心悲易感激俛仰淚流衿願託鷐風翼束帶侍衣衾明月曜清景朧光照𤣥墀幽人守静夜囘身入空帷束帶俟將朝廓落晨星稀寐假交精爽覿我佳人姿巧笑媚權靨聨媚眸與眉寐言增長歎悽然心獨悲清風動帷簾晨月燭幽房佳人處遐逺蘭室無容光衿懐擁虚景輕衾覆空牀居懽惜夜促在慼怨宵長撫枕獨吟歎綿綿心内傷君居北海陽妾在南江隂懸邈修塗逺山川阻且深承驩注隆愛結分投所欽銜思守篤義萬里託微心遊自四野外逍遥獨延佇蘭蕙縁清蕖繁華䕃緑渚佳人不在兹取此欲誰與巢居覺風飄穴處識隂雨未曾逺别離安知慕儔侣雜詩二首逍遥遊春宫容與緑池阿白蘋齊素葉朱草茂丹華微風摇茝若增波動芰荷榮彩曜中林流馨入綺羅王孫遊不歸脩途邈以遐誰與翫遺芳佇立獨咨嗟荏苒日月運寒暑忽流易同好遊不存苕苕逺離析房櫳自來風户庭無行迹蒹葭生牀下蛛蝥網四壁懐思豈不隆感物重鬱積遊鴈比翼翔歸鴻知接翮來哉彼君子無愁徒自隔潘岳内顧詩二首静居懐所歡登城望四澤春草鬱青青桑柘何奕奕芳林振朱榮緑水激素石初征冰未泮忽焉振絺綌漫漫三千里苕苕逺行客馳情戀朱顔寸隂過盈尺夜愁極清晨朝悲終日夕山川信悠永願言良弗獲引領訊歸雲沈思不可釋獨悲安所慕人生若朝露綿邈寄絶域眷戀想平素爾情既來追我心亦還顧形體隔不達精爽交中路不見山上松隆冬不易故不見陵澗柏歳寒守一度無謂希是疎在逺分彌固悼亡詩二首荏苒冬春謝寒暑忽流易之子歸窮泉重壤永幽隔私懐誰克從淹留亦何益僶俛恭朝命囘心反初役望廬思其人入室想所厯幃屏無髣髴翰墨有餘迹流芳未及歇遺挂猶在壁帳幔如或存囘遑忡驚惕如彼翰林鳥雙棲一朝隻如彼遊川魚比目中路析春風縁隙來晨霤依簷滴寢息何時忘沈憂日盈積庶幾有時衰莊缶猶可擊曒曒窓中月照我室南端清商應秋至溽暑隨節闌癝癝凉風升始覺夏衾單豈曰無重纊誰與同嵗寒嵗寒無與同朗月何朧朧展轉眄枕席長簟竟牀空牀空委清塵室虚來悲風獨無李氏靈彷彿覩爾容撫衿長歎息不覺涕霑胷霑胷安能已悲懐從中起寢興自存形遺音猶在耳上慙東門吳下媿蒙莊子賦詩欲言志零落難具紀命也詩奈何長戚自令鄙石崇王昭君辭一首并序王明君者本為王昭君以觸文帝諱故改匈奴盛請㛰於漢元帝以後宫良家女子明君配焉昔公主嫁烏孫令琵琶馬上作樂以慰其道路之思其送明君亦必爾也其造新之曲多哀怨之聲故敘之於紙云爾我本漢家子將適單于庭辭訣未及終前驅已抗旍僕御涕流離轅馬為悲鳴哀鬱傷五内泣淚霑珠瓔行行日已逺乃造匈奴城延我於穹廬加我閼氏名異國非所安雖貴非所榮父子見陵辱對之慙且驚殺身良未易黙黙以苟生苟生亦何聊積思常憤盈願假飛鴻翼棄之以遐征飛鴻不我顧佇立以屏營昔為匣中玉今為糞上英朝華不足歡甘為秋草并傳語後世人逺嫁難為情左思嬌女詩一首吾家有嬌女皎皎頗白晳小字為紈素口齒自清厯鬢髪覆廣額雙耳似連璧明朝弄梳臺黛眉類埽跡濃朱衍丹脣黄吻瀾漫赤嬌語若連瑣忿速乃明㦎握筆利彤管篆刻未期益執書愛綈素誦習矜所獲其姊字恵芳面目􅀈如畫輕莊喜縷邊臨鏡忘紡績舉觶擬京兆立的成復易玩弄眉頰間劇兼機杼役從容好趙舞延袖像飛翮上下弦柱際文史輒巻襞顧眄屏風畫如見已指擿丹青日塵闇明義為隠賾馳騖翔園林菓下皆生摘紅葩掇紫蔕萍實驟扺擲貪華風雨中倐眒數百適務躡霜雪戲重綦常累積并心注肴饌端坐理盤槅翰墨戢函按相與數離逖動為鑪鉦屈屣履任之適止為荼菽據吹吁對鼎䥶脂膩漫白袖烟勲染珂錫衣被皆重池難與次水碧任其孺子意羞受長者責瞥聞當與杖掩淚俱向壁玉臺新詠巻二欽定四庫全書玉臺新詠巻三陳徐陵撰陸機擬古七首為顧彦先贈婦二首周夫人贈車騎一首樂府三首陸雲為顧彦先贈婦往反四首張協雜詩一首楊方合歡詩五首王鑒七夕觀織女詩一首李充嘲友人一首曹毗夜聽𢷬衣一首陶潛擬古詩一首荀昶樂府詩二首王微雜詩二首謝恵連雜詩三首劉鑠雜詩五首陸機擬古七首髙樓一何峻苕苕峻而安綺窓出塵冥飛階躡雲端佳人撫琴瑟纎手清且閑芳草隨風結哀響馥若蘭玉容誰能顧傾城在一彈佇立望日昃躑躅再三歎不怨佇立久但願歌者歡思駕歸鴻羽比翼雙飛翰擬西北有髙樓西山何其峻曾曲鬱崔嵬零露彌天墜蕙葉慿林衰寒暑相因襲時逝忽如遺三閭結飛轡大耋悲落暉曷為牽世務中心悵有違京雒多妖麗玉顔侔瓊蕤閒夜撫鳴琴恵音清且悲長歌赴促節哀響逐髙徽一唱萬夫歡再唱梁塵飛思為河曲鳥雙遊豐水湄擬東城髙且長嘉樹生朝陽凝霜封其條執心守時信嵗寒不敢凋美人何其曠灼灼在雲霄隆想彌年時長嘯入風飄引領望天末譬彼向陽翹擬蘭若生春陽炤炤天漢暉粲粲光天步牽牛西北囘織女東南顧華容一何綺揮手如振素怨彼河無梁悲此年歳暮跂彼無良縁睨焉不得度引領望大川雙涕如沾露擬苕苕牽牛星靡靡江離草熠燿生河側皎皎彼姝女阿那當軒織粲粲妖容姿灼灼華美色良人遊不歸偏棲獨隻翼空房來悲風中夜起歎息擬青青河畔草歡友蘭時往苕苕匿音徽虞淵引絶景四節遊若飛芳草久已茂佳人竟不歸躑躅遵林渚恵風入我懐感物戀所歡采此欲貽誰擬庭中有竒樹上山采瓊繠穹谷饒芳蘭采采不盈掬悠悠懐所歡故鄉一何曠山川阻且難沈思鐘萬里躑躅獨吟歎擬涉江采芙蓉為顧彦先贈婦二首辭家逺行遊悠悠三千里京洛多風塵素衣化為緇循身悼憂苦感念同懐子隆思亂心曲沈歡滯不起歡沈難克興心亂誰為理願假歸鴻翼翻飛浙江汜東南有思婦長歎充幽闥借問歎何為佳人眇天末遊宦久不歸山川修且闊