front:
  text: 玉臺新詠卷之八
  hash: sha256:17b4468e6b7832d7eeb506c717cd59b6335d7e28ac2a7bb21d9bece11f55ee7b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0005_SBCK_008-1a}
body:
  text: 古樂府蕭子顯大明上苕苕陽城射凌霄光照窓中婦絶世同阿嬌眀鏡盤龍簪刻羽鳳凰彫逶迤梁家髻冉弱楚宮腰輕紈拂重錦薄縠間飛綃三六前年暮四五今年朝蚕園拾芳繭桑陌採柔條岀入東城里上下洛西橋忽逢車馬客飛蓋動襜軺单衣䑕毛織寳劒羊頭鞘丈夫疲􅀿對御者輟䘖鑣桂間徒脉脉垣上幾翹翹女本西家宿君自上官要漢馬三萬匹夫婿任飄颻鞶嚢虎頭綬左珥鳧盧貂横吹龍鍾管奏鼓象牙簫十五張内侍十八賈登朝皆笑顏郎老盡訝董生超代美女篇邯郸暫輟舞巴􅁎請罷絃佳人溱洧上艶趙復傾燕繁穠旣爲李照水亦成蓮朝沽成都酒暝數河間錢餘光幸未惜蘭膏空自煎春月王筠日照鴛鴦殿萍生鴈􅕽池逰塵隨影入弱柳帶風垂靑鶻逐黃口别鶴慘覉雌同衾遠逰說結愛久生離於今方溘死寧湏萱草枝卷葹心未發蘼蕪葉欲齋春蚕方曳緒新燕正􅋦泥野雉呼雌雊庭禽挾子栖從君客梁後方晝掩春閨山川隔道里芳草徒萋萋秋夜二首九重依夜管四壁慘無輝招揺顧西落烏鵲向東飛流螢漸􅀵火絡緯欲催機爾時思錦字持製行人衣所望丹心達嘉客倘能歸露華初泥泥桂枝方悚悚煞氣下重軒輕隂滿四屋别寵增脩夜遠征悲獨宿愁牽翠羽眉淚滿横波目長門絶往來含情空杼軸逰望二首落日照紅粧挾瑟當囱牖寧復歌蘼蕪唯聞嘆楊柳結好在同心離别由衆口徒設露葵􅅅誰酌蘭英酒㑹日杳無期橓華安得久相思不安席聊至狹斜東愁眉倣歲里高髻學城中隻眉偏照日獨蕋好縈􅅐自知心所愛獻賦甘泉宮博聞方鼎食詎春憶閨容遥見鄰舟主人投一物衆姬爭之有客請余爲詠劉孝綽河流旣浼浼河鳥復關關落花浮浦出飛雉復流還此日倡家女競嬌桃李顏良人惜美珥欲以代芳管新縑疑故素盛趙蔑衰班曵綃事掩縠摇珮奪鳴環客心空振蕩高枝不可扳淇上人戯蕩子婦示行事桑中始奕奕淇上未湯湯美人要雜珮上客綉明璫日闇人聲靜微歩出蘭房露葵不待勸鳴瑟無暇張翠􅁫掛巳落羅衣拂更香如何嫁蕩子春夜守空牀不見靑絲􅀐徙勞紅粉粧賦得照棊燭刻五分成南皮絃吹罷終奕且留賓日下房櫳閉華燭命佳人側光金照扃廻花半隱身不亂纎手卷羞令夜向晨夜聴妓賦得烏夜啼鵾絃且輟弄鶴操暫停徽别有啼烏曲柬西相背飛倡人怨獨守蕩子逰未歸􅀂逢生離曲長夜泣羅衣賦得遺所思遺簮彫玳瑁贈綺織鴛鴦木􅀂華滋樹交枝蕩子房别前秋已落别後春更芳所思不可􅀉唯憐盈袖香繁華應令劉遵可憐周小童微笑摘蘭叢鮮膚如粉白慢臉似桃紅挾彈雕陵下垂鈎蓮葉東腕轉飄香麝衣輕任好風幸承枕席選得奉􅀞堂中金屏障翠翡籃帊覆薫籠本欲傷輕薄含亂羞自通剪袖恩雖重殘桃愛未終蛾眉詎湏嫉新粧迎入宮頓還城應令漢水深難渡深潭見底清錦苲繫鳧舸珠竿懸翠鈴鳴笳芳樹曲流唱採蓮聲神逰不停駕日暮返連營寧顧重房重階上綠苔生奉和率爾有詠王訓殿内多仙女從來難比方别有當窓艶復是可憐粧學舞勝飛燕染粉簿南陽散黃分黛色薰衣雜􅀥香簡􅁫新輾翠試履逆垣牆一朝恃容色非復守空房君恩􅀂可恃願作双鴛鴂有所思廋肩吾佳期竟不歸春物坐芳菲拂匣看離扇開箱見别離井梧生未合宮槐卷復稀不及啣泥燕從來相逐飛詠美人自看􅀞應令欲知􅀞能巧喚取真來映並岀似分身分看如對鏡安􅁫等疎密着領俱周正不觧平城圍誰與丹后競賦得橫吹曲長安道柱宮横複道黃山開廣路遠聽平陵鍾遥識新豐樹合殿生光采離宮起煙霧日落歌吹還塵飛車馬度南苑還看人春花競玉顏俱折復俱扳細腰宜窄衣長􅁫巧挾鬟洛橋初度燭青門欲上關中人應有望上客莫前還相東王春宵􅀿令征人别來久年芳復臨牖燭下夜逢衣春寒偏著手願返歸飛鴈因書􅀉高柳送别於建興苑相逢相逢小苑北停車問苑中梅新雜柳故粉白映綸紅去影背斜日香衣臨上風雪消階漸黑冰開池半通去馬船難歸啼烏曲未終眷然從此别車西馬復東侍宴賦得龍沙宵月明劉孝威􅍎飛空繞樹月輪殊未圓姮娥望不出桂枝梢隱殘落照移樓影浮光動塹瀾櫪馬悲笳吹城鳥啼塞寒傳聞機杼妾愁余衣服單當秋終已脆㗸啼織復難歛眉雖不樂舞劒強爲歡請謝亟關吏行當看一丸奉和湘東王應令冬曉妾家邊洛城慣識曉鍾聲鍾聲猶未絶漢使報應行天寒硯冰凍心悲書不成都縣遇見人織率爾歌婦妖􅁎含怨情織素起秋聲度梭環玉動􅂿躡珮珠鳴經移疑杼澁緯斷恨絲輕蒲桃始欲罷鴛鴦猶未成雲棟共徘徊紗窓相向開囱疎眉語度紗輕眼咲來曨曨隔淺紗的的見粧華鏤玉同心帶列寳連枝花紅衫向後結金簪臨鬂斜機頂挂流蘇機傍垂結珠靑絲伏引兎黄金繞轆轤艶彩裾邊出芳脂口上渝百城交問道五馬共踟蹰真爲閨中人守故不要新夢啼漬花枕􅁴涙濕羅巾獨眠真自難重衾猶斍寒逾憶凝脂暖彌想橫陳歡行驅金絡􅀐蹄就􅀯城端城􅀯稍有期想子亦勞思羅衣久應罷花􅁫堪更治新粧莫􅀧黛余還自畫眉共内人夜坐守歲徐君舊歡多情未極賞至莫停杯酒中挑喜子粽裏覔楊梅簾開風入帳燭盡炭成􅁅勿疑鬂􅁫重爲待曉光催初春携内人行戯梳飾多今世不著一時新草短猶通屧梅香漸著人樹斜牽錦帔風橫入紅綸滿酌蘭英酒對此得娛神南苑看逰者鮑泉洛陽小苑地車馬盛經過縁溝駐行􅎻傍柳轉鳴珂履高令響珮襪輕半隱羅浮雲無處所何用轉横波落日看還妖􅁎競早春上苑逐名辰苔輕變水色霞濃掩日輪雕甍斜落照􅀞扇拂逰塵衣香遥已盡衫紅遠更新誰家蕩舟妾何䖏織縑人敬酬劉長史詠名士悅傾城不信巫山女不信洛川神何關别有物别還是傾城人徑共陳王戯曽與宋家隣未嫁先名王來時夲姓秦粉光猶似面朱色不勝唇遥見凝花發聞香知異春􅁫長逐鬂髪祩小稱腰身夜夜言嬌盡朝朝態還新工傾荀奉倩能迷石季倫上客徒留目不見正橫陳雜詠湘東王三首别後春池異荷盡欲生冰箱中剪刀冷臺上面脂凝纎腰轉無力寒衣恐不勝右冬宵樓上起秋風絶望秋閨中燭溜花行滿香燃奩欲空從教兩行涙俱浮粧上紅右秋夜不堪寒夜久夜夜守空牀衣裾逐坐襵􅁫影近燈長無憐四幅錦何湏辟惡香右寒閨和隂梁州雜怨鄧鏗别離雖未久遂如長别離叢桂頻銷葉庭樹幾攀枝君言妾貌改妾畏君心移終湏一相見併得兩相知奉和夜聽妓聲又燭華似明月鬟影勝飛橋妓兒齊鄭樂爭妍學楚腰新歌自作曲舊瑟不須調衆中俱不笑座上莫相撩奉和世子春情甄固昨晚褰􅄕望初逢雙燕歸今朝見桃李不啻數花飛以愁春欲度無復􅀉芳菲和詠舞洞房花燭眀燕餘双舞輕頓履隨疎節低鬟逐上聲伴轉行初進飄衫曲未成廻鸞鏡欲滿鵠顧市應傾已曽天上學詎似世中生和何僕射還宅懷故紫閣旦朝罷中臺夕奏稀無復千金笑徒勞五日歸歩簷朝未掃蘭房晝撩扉苔生理曲處綱積廻文機故瑟餘絃斷歌梁秋燕飛朝雲雖可望夜帳定難依願慿甘露入方假慧燈輝寧知洛城晚還淚獨沾衣萬山見採桑人劉邈倡妾不勝愁結束下靑樓逐伴西城路相携東陌頭葉盡時移樹枝高乍易鈎絲繩掛且脫金籠寫復收蚕飢日已暮詎爲使君留見人織聊爲之詠纎纎運玉指脉脉正蛾眉振躡開交鏤停梭續斷絲簷花照初月洞戸未垂帷弄機行掩涙翻令織素遲秋閨螢飛綺窓外妾思霍􅀅軍燈前量獸錦簷下織花紋墜露如輕雨長河似薄雲秋還百種事衣成未暇薰鼓吹曲折楊柳高樓十載别楊柳擢絲枝摘葉驚開駃攀枝恨别離年年阻音信月月减容儀春來誰不望相思君自知逮興苑紀少瑜丹陵抱天邑紫苑更上林銀臺懸百仭王樹起千尋水流冠蓋影風揚歌吹音踟躕憐拾翠顧歩惜遺金日落庭花轉方幔屢移隂終言樂未極不道愛黃金擬吳筠體應教庭樹發春輝逰人競下機􅁍匣擎歌扇開箱擇舞衣桑萎不復惜看花遽將夕自有專城居空持迷上客春日二首愁人試出牖春色定無窮參差依網日淡蕩入簾風落花還繞樹輕飛去隱空徒令玉筋泣双垂明鏡中高臺動春色清池照日華綠葵向光轉翠柳逐風斜林有驚心鳥園多奪目花相與咸知節嘆子獨離家人行今不返何勞空折麻走筆戯書應令徐孝穆此日乍殷勤相嫌不如春今宵花獨涙非是夜迎人舞席秋來卷歌筵無數塵曾經新代故那惡故迎新片月窺花簟輕寒入帔巾秋來􅀿瘦盡偏自著腰身奉和詠舞十五屬平陽因來入建章主家能教舞城中且巧粧低鬟向綺席舉袖拂花黃燭送窓邊影衫傳鉿裏香當關好留客故作舞衣長和王舍人送客未還閨中有望倡人歌吹罷對鏡覽紅顏拭粉留花稱除􅁫作小鬟綺燈停不減高扉掩未關良人在何處光唯見月還爲羊兗州家人荅餉鏡信來贈寳鏡亭亭似團月鏡久自踰明人久情逾歇取鏡挂空臺於今莫復開不見􅀌鸞鳥香魂何處來春閨怨吳孜王關信使斷借問不相諳春光太無意窺窓來見參分與光音絶忽値日東南柳枝皆嬲燕桑葉復催蚕物色頓如此孀居自不堪渫井得金􅁫湯僧濟昔日倡家女摘花露井邊摘花還自揷照井還自憐翠羽成泥去金􅁫尚如先此人今不在此物今空傅和班妤婕徐悱妻劉氏日落應門閉愁思百端生况復昭陽近風傳歌吹聲寵移終不恨讒枉太無情只言爭分理非妬舞腰輕和昭君怨王叔英妻劉氏一生竟何定萬事良難保丹靑笑舊啚玉匣成秋草想妾辭關路至今猶未燥漢使汝南來殷勤爲人道玉臺新詠卷之八玉臺新詠目錄卷之八蕭子顯二首王筠六首劉孝綽五首劉遵二首王訓一首􅁃肩吾六首劉孝威三首徐君蒨二首鮑泉二首劉緩四首鄧鏗二首甄固一首􅁃信劉邈四首紀少瑜三首聞人蒨一首徐孝穆四首吳孜一首湯僧齊一首劉令􅈺一首王叔英妻一首
