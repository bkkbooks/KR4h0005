body:
  text: 陸機擬古七首擬西北有高樓高樓一何峻迢迢峻而安綺窗出塵冥飛階躡雲端佳人撫琴瑟纖手清且閒芳草隨風結哀響馥若蘭玉容誰能顧傾城在一彈佇立望日昃躑躅再三歎不怨佇立久但願歌者歡思駕歸鴻羽比翼雙飛翰擬東城高且長西山何其峻層曲鬱崔嵬零露彌天墜蕙葉憑林衰寒暑相因襲時逝忽如遺三閭結飛轡太耋悲落暉曷為牽世務中心悵有違京雒多妖麗玉顏侔瓊蕤閑夜撫鳴琴惠音清且悲長歌赴促節哀響逐高徽一唱萬夫歡再唱梁塵飛思為河曲鳥雙遊灃水湄擬蘭若生春陽嘉樹生朝陽凝霜封其條執心守時信歲寒不敢彫美人何其曠灼灼在雲霄隆想彌年時長嘯入風飃引領望天末譬彼向陽翹擬迢迢牽牛星炤炤天漢輝粲粲光天步牽牛西北迴織女東南顧華容一何綺揮手如振素怨彼河無梁悲此年歲暮跂彼無良緣皖焉不得度引領望大川雙涕如沾露擬庭中有奇樹歡交蘭時往迢迢匿音徽虞淵引絕景四節逝若飛芳草久已茂佳人竟不歸躑躅遵林渚惠風入我懷感物戀所歡採此欲貽誰擬青青河畔草靡靡江蘺草熠熠生河側皎皎彼姝女阿那當軒織粲粲妖容姿灼灼華美色良人遊不歸偏栖獨隻翼空房來悲風中夜起歎息擬涉江採芙蓉上山採瓊蕊穹谷饒芳蘭采采不盈掬悠悠懷所歡故鄉一何曠山川阻且難沉思鍾萬里躑躅獨吟歎為顧彥先贈婦二首辭家遠行遊悠悠三千里京洛多風塵素衣化為緇修身悼憂苦感念同懷子隆思亂心曲沉歡滯不起歡沉難克興心亂誰為理願假歸鴻翼翻飛浙江汜東南有思婦長歎充幽闥借問歎何為佳人眇天末遊宦久不歸山川脩且闊形影參商乖音息曠不達離合非有常譬彼絃與筈願保金石志慰妾長飢渴為周夫人贈車騎碎碎細織練當為君作襦君行豈有顧憶君是妾夫昔者得君書聞君在高平今時得君書聞君在京城京城華麗鄉璀粲多異端男兒多遠志豈知妾念君昔者與君別歲律薄將暮日月一何速素秋墜湛露湛露何冉冉思君隨歲晚對食不能飱臨觴不能飲樂府三首艷歌行扶桑升朝輝照此高樓端高堂多艷麗洞房出清顏淑貌耀皎日惠心清且閒美目揚玉澤蛾眉象翠翰鮮膚一何潤秀色若可餐窈窕多容儀婉美巧笑言暮春春服成粲粲綺與紈金雀垂藻翹瓊珮結瑤璠方駕揚清塵濯足洛水瀾藹藹風雲會佳人一何繁南崖充羅幕北渚盈軿軒清川含藻景高岸被華丹馥馥芳袖揮泠泠纖指彈悲歌吐清音雅舞播幽蘭丹唇含九秋妍迹凌七盤赴曲迅驚鴻蹈節如集鸞綺態隨顏變沈姿無定源俯仰紛阿那顧步咸可歡遺芳結飛飆浮景映清湍冶容不足詠春遊良可歎前緩聲歌遊仙聚靈族高會曾城阿長風萬里舉慶雲鬱嵯峨宓妃興洛浦王韓起泰華北徵瑤臺女南要湘川娥肅肅霄駕動翩翩翠蓋羅羽旗栖瓊鸞玉衡吐鳴和太容揮高絃洪崖發清歌獻酬既已周輕軒垂紫霞總轡扶桑枝濯足湯谷波清輝溢天門垂慶惠皇家塘上行江蘺生幽渚微芳不足宣被蒙風雨會移君華池邊發藻玉臺下垂影滄浪淵沾潤既已渥結根奧且堅四節遊不處繁華難久鮮淑氣與時殞餘芳隨風捐天道有遷易人理無常全男歡智傾愚女愛衰避妍不惜微軀退但歎蒼蠅前願君廣末光照妾薄暮年為顧彥先贈婦往反四首我在三川陽子居五湖陰山海一何曠譬彼飛與沈目想清惠姿耳存淑媚音獨寐多遠念寢言撫空衿彼美同懷子非爾誰為心悠悠君行邁煢煢妾獨止山河安可踰永隔路萬里京室多妖冶粲粲都人子雅步嫋纖腰巧笑發皓齒佳麗良可羨衰賤焉足紀遠蒙眷顧言銜恩非望始翩翩飛蓬征郁郁寒木榮遊止固殊性浮沉豈一情隆愛結在昔信誓貫三靈秉心金石固豈從時俗傾笑目逝不顧纖腰徒盈盈何用結中款仰指北辰星浮海難為水遊林難為觀容色貴及時朝華忘日晏皎皎彼姝子灼灼懷春粲西城善雅舞總章饒清彈鳴簧發丹唇朱絃繞素腕輕裙猶電揮雙袂如霞散華容溢藻幄哀響入雲漢知音世所希非君誰能讚棄置北辰星問此玄龍煥時暮勿復言華落理必賤雜詩秋夜涼風起清氣蕩暄濁蜻蛚吟階下飛蛾拂明燭君子從遠役佳人守煢獨離居幾何時鑽燧忽改木房櫳無行跡庭草萋已綠青苔依空牆蜘蛛網四屋感物多所懷沉憂結心曲合歡詩五首虎嘯谷風起龍躍景雲浮同聲好相應同氣自相求我情與子親譬如影追軀食共並根穗飲共連理杯衣用雙絲絹寢共無縫綯居願接膝坐行願攜手趨子靖我不動子遊我無留齊彼同心鳥譬此比目魚情至斷金石膠漆未為牢但願長無別合形作一軀生為併身物死為同棺灰秦氏自言至我情不可儔磁石招長針陽燧下炎煙宮商聲相和心同自相親我情與子合亦如影追身寢共織成被絮用同功綿暑搖比翼扇寒坐併肩氈子笑我必哂子慼我無歡來與子共迹去與子同塵齊彼蛩蛩獸舉動不相捐唯願長無別合形作一身生有同室好死成併棺民徐氏自言至我情不可陳獨坐空室中愁有數千端悲響荅愁歎哀涕應苦言彷徨四顧望白日入西山不覩佳人來但見飛鳥還飛鳥亦何樂夕宿自作群飛黃銜長轡翼翼回輕輪俯涉淥水澗仰過九層山脩途曲且險秋草生兩邊黃華如沓金白華如散銀青敷羅翠采絳葩象赤雲爰有承露枝紫榮合素芬扶疎垂清藻布翹芳且鮮目為艷彩迴心為奇色旋撫心悼孤客俯仰還自憐踟躕向壁歎攬筆作此文南林有奇樹承春挺素華豐翹被長條綠葉蔽朱柯因風吐徽音芳氣入紫霞我心羨此木願徙著余家夕得遊其下朝得弄其葩爾根深且堅余宅淺且洿移植良無期歎息將如何七夕觀纖女詩牽牛悲殊館織女怨離家一稔期一宵此期良可嘉赫奕玄門開飛閣鬱嵯峨隱隱驅千乘闐闐越星河六龍奮瑤轡文螭負瓊車火丹秉瑰燭素女執瓊華絳旗若吐電朱蓋如振霞雲韶何嘈嗷靈鼓鳴相和亭軒佇高眄眷予在岌峨澤因芳露沾恩附蘭風加明發相從遊翩翩鸞鷟羅同遊不同觀念子憂怨多敬因三祝末以爾屬皇娥嘲友人同好齊歡愛纏緜一何深子既識我情我亦知子心嬿婉歷年歲和樂如瑟琴良辰不我俱中闊似商參爾隔北山陽我分南川陰嘉會罔克從積思安可任目想妍麗姿耳存清媚音脩晝興永念遙夜獨悲吟逝將尋行役言別涕沾襟願爾降玉趾一顧重千金夜聽擣衣寒興御紈素佳人理衣衾冬夜清且永皓月照堂陰纖手疊輕素朗杵叩鳴砧清風流繁節迴飆灑微吟嗟此往運速悼彼幽滯心二物感余懷豈但聲與音擬古詩日暮天無雲春風扇微和佳人美清夜達曙酣且歌歌竟長歎息持此感人多明明雲間月灼灼葉中花豈無一時好不久當如何樂府詩二首擬相逢狹路間朝發邯鄲邑暮宿井陘間井陘一何狹車馬不得旋邂逅相逢值崎嶇交一言一言不容多伏軾問君家君家誠難知難知復易博南面平原居北趣相如閣飛樓臨夕都通門枕華郭入門無所見但見雙栖鶴栖鶴數十雙鴛鴦群相追大兄弭金璫中兄振纓緌伏臘一來歸鄰里生光輝小弟無所作鬭雞東陌逵大婦織紈綺中婦縫羅衣小婦無所作挾瑟弄音徽丈人且卻坐梁塵將欲飛擬青青河邊草熒熒山上火迢迢隔隴左隴左不可至精爽通寤寐寤寐衾幃同忽覺在他邦他邦各異邑相逐不相及迷墟在望煙木落知冰堅升朝各自進誰肯相攀牽客從北方來遺我端弋綈命僕開弋綈中有隱起珪長跪讀隱珪辭苦聲亦悽上言各努力下言長相懷雜詩二首桑妾獨何懷傾筐未盈把自言悲苦多排卻不肯捨妾悲四陳訴填憂不銷冶寒鴈歸所從半塗失憑假壯情忭驅馳猛氣捍朝社常懷雪漢慚常欲復周雅重名好銘勒輕軀願圖寫萬里度沙漠懸師蹈朔野傳聞兵失利不見來歸者奚處埋旍摩何處喪車馬拊心悼恭人零淚覆面下徒謂久別離不見長孤寡寂寂揜高門寥寥空廣廈待君竟不歸收顏今就檟思婦臨高臺長想憑華軒弄絃不成曲哀歌若送言箕帚留江介良人處鴈門詎憶無夜苦但知狐白溫日暗牛羊下野雀滿空園孟冬寒風起東壁正中昏朱火獨照人抱景自愁怨誰知心曲亂所思不可論雜詩三首七月七日詠牛女落日隱簷楹升月照房櫳團團滿葉露浙浙振條風蹀足循廣塗瞬目曬曾穹雲漢有靈匹彌年闕相從遐川阻暱愛脩渚曠清容弄杼不成采聳轡驚前蹤昔離秋已兩今聚夕無雙傾河易迴幹款顏難久悰沃若靈駕旋寂寥雲幄空留情顧華寢遙心逐奔龍沉吟為爾感情深意彌重擣衣衡紀無淹度晷運倏如摧白露滋園菊秋風落庭槐肅肅莎雞羽烈烈寒螿啼夕陰結空幕宵月皓中閨美人戒常服端飭相招攜簪玉出北方鳴金步南階欄高砧響發楹長杵聲哀微芳起兩袖輕汗染雙題紈素既已成君子行未歸裁用笥中刀縫為萬里衣盈篋自予手幽緘俟君開腰帶准疇昔不知今是非代古客從遠方來贈我鵠文綾貯以相思筴緘以同心繩裁為親身服著以俱寢興別來經年歲歡心不可凌瀉酒置井中誰能辯斗升合如杯中水誰能判淄澠代行行重行行眇眇凌長道遙遙行遠之迴車背京邑揮手於此辭堂上流塵生庭中綠草滋寒螿翔水曲秋兔依山基芳年有華月佳人無還期日夕涼風起對酒長相思悲發江南調憂委子衿詩臥看明燈晦坐見輕紈緇淚容曠不飭幽鏡難復持願垂薄暮景照妾桑榆時代明月何皎皎落宿半遙城浮雲藹曾闕玉宇來清風羅帳延秋月結思想伊人沉憂懷明發誰謂行客遊屢見芳流歇河廣川無梁山高路難越代孟冬寒氣至白露秋風始秋風明月初明月照高樓白露皎玄除迨及涼風起行見寒林疎客從遠方至贈我千里書先敘懷舊愛末陳夕離居一章意不盡三復情有餘願遂平生眷無使甘言虛代青青河畔草凄凄含露臺肅肅迎風館思女御櫺軒哀心徹雲漢端撫悲絃泣獨對明燈嘆良人久徭役耿介終昏旦楚楚秋水歌依依採菱彈詠牛女秋動清氛扇火移炎氣歇廣欄含夜陰高軒通夕月安步巡芳林傾望極雲闕組幕縈漢陳龍駕凌霄發誰云長河遙頗覺促筵悅沉情未申寫飛光已飄忽來對眇難期今歡自茲沒陸機悠悠行邁遠戚戚憂思深此思亦何思思君徽與音音徽日夜離緬邈若飛沉王鮪懷河岫晨風悲北林遊子眇天末還期不可尋驚飆褰反信歸雲難寄音佇立想萬里沉憂萃我心攬衣有餘帶循形不盈襟去去遺情累安處撫清琴擬明月何皎皎安寢北堂上明月入我牖照之有餘輝攬之不盈手涼風繞曲房寒蟬鳴高柳踟躕感節物我行永已久遊宦會無成離思難獨守
