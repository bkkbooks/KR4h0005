front:
  text: 玉臺新詠卷之七
  hash: sha256:719f79913116a79776250b6d114ef71bd7bbb75fb3a586f2115cbf3a14dc4851
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0005_SBCK_007-1a}
body:
  text: 擣衣梁武帝駕言易水北送别河之陽沉思慘行鑣結夢在空牀旣窹丹綠謬始知紈素傷中洲木葉下邊城應早霜隂虫日慘烈庭草復云黃金風但清夜眀月縣洞房嫋嫋同宮女助我理衣裳參差夕杵引哀怨秋砧揚輕羅飛玉腕弱翠低紅粧朱顏日巳興盻睇色増光擣以一匪石文成双夗央制握斷金刀薫用如蘭房佳期久不歸持此􅀉寒鄕妾身誰與容思君苦人腸擬長安有狹斜十韻洛陽有曲陌陌曲不通驛忽逢一少童扶轡問君宅君宅邯郸右易憶復可知大息組絪緼中息珮陸離小息尚靑綺總轡逰南皮三息俱入門家臣拜門垂三息俱升堂㫖酒盈千巵三息俱入戸戸内有光儀大婦理金翠中婦事玉觹少婦獨閑暇調笙逰曲池丈夫少徘徊鳳吹方參差擬明月照高樓圓魄當虛闥清光流思筵筵思對孤影悽怨還自憐臺鏡旱生塵匣琴又無絃悲慕屢傷節離憂亟華年君如東扶景妾似西柳煙相去旣路逈眀晦亦殊懸願爲銅鐵轡以感長樂前擬靑靑河邊草幕幕綉戶絲悠悠懷昔期昔期久不歸鄕國曠音輝音輝空結遲半寢􅁴知至旣窹了無形與君隔死生月似雲掩光葉似霜催老當途競自容莫肯與妾道代蘇屬國婦良人與我期不謂當過時秋風忽送節白露凝前基愴愴獨凉枕搔搔􅀌月帷或聽西北鴈似從寒海湄果啣萬里書中有生離辭惟言長别矣不復道相思胡羊久剽奪漢節故支持帛上看未終臉下淚如絲空懷之死誓遠勞同穴詩古意飛鳥起離離驚散怱差池嗷嘈遶樹上翩翾集寒枝旣悲征役久偏傷壠上兒􅀉言閨中愛此心詎能知不見松蘿上葉落根不移芳樹綠樹始摇芳芳生非一葉一葉度春風芳華自相接雜色亂參差衆花紛重疉重疉不可思思此誰能愜臨高臺高臺半行雲望望高不極草樹無參差山河同一色髣髴洛陽道道遠難别識玉階故情人情來共相憶有所思誰言生離久適意與君别衣上芳猶在握裏書未㓕腰間雙綺帶夢爲同心結常恐所思露瑶花未忍折古意當春有一草綠花復垂枝云是忘憂物生在北堂垂飛飛双蛺蝶低低兩差池差池低復起此芳性不移飛蝶双復隻此心人莫知紫蘭始萌種蘭玉臺下氣暖蘭始萌芬芳與時發婉轉迎節生獨使金翠矯偏動紅綺情二逰何足瓌一顧非傾城羞將苓芝侶豈畏鶗鴂鳴織婦送别出南軒離思沈幽室調梭輟寒夜鳴機罷秋月良人在萬里誰與共成匹願得一廻光照此憂與疾君情倘未忘妾心長自畢七夕白露月下團秋風枝上鮮瑶臺生碧霧瓊幕亟紫煙綺㑹非妙節佳期乃良年玉壺承夜急蘭油依曉煎昔時悲難越今傷何易旋怨咽双念斷淒切兩情懸戯作宓妃生洛浦逰女出漢陽妖閑逾下蔡神妙絶高唐錦駒且變俗玉豹復移鄕况玆集靈異豈得無方將長袂必留客清哇咸繞梁燕趙羞容正西姐慙芬芳徒聞殊可弄定自之明璫樂府三首皇太子艶歌篇十八韻凌晨光景麗倡女鳳樓中前瞻削成小傍望春旌空分粧間淺壓繞臉傅斜紅張瑟末調軫飮吹不全終自知心所愛出入仕秦宮誰言連伊屈更是莫敖通輕軺綴皂蓋飛轡轢雲驄金鞍隨繫尾䘖璅映􅄤駿戈鏤荆山玉劒飾丹陽銅左把蘇合彈傍持犬屈弓控弦因鵲血挽強用牛螉弋獵多登隴酣歌毎八豐暉暉隱落日冉冉還房櫳燈生陽燧火塵散鯉魚風流蘇時下帳象簟復韜筒霧暗窓前栁寒疎井上桐女蘿托松際瓜蔓甘井東拳拳恃君愛歲莫望無窮蜀國弦歌十韻銅梁望絶國劒道望中區通星上分野作固爲下都雅歌因良守妙舞自巴渝陽城嬉樂所劒􅀐欝相趨五婦行難至百兩好㳺娛牲祈望帝祀酒酹蜀俟姝江妃納重娉卓女愛􅀅雛停絃時繫爪息吹治脣朱春衫湔錦浪廻扇避陽魚聞君旌節返賤妾下城隅妾薄命篇十韻名都多麗質本自恃容姿蕩子行未至秋胡無定期玉貌歇紅臉長顰串翠眉奩鏡迷朝色縫針脆故絲本異搖舟咎何關竊席疑生離誰撫肓溘死詎成遲毛嬙貌夲絶踉蹌入氊帷盧􅁎嫁日晩非復好年時轉山猶可逐烏白望難追妾心徒自苦傍人㑹見􅅓代樂府三首新成安樂宮遥看雲霧中耿耿映丹紅珠􅄕通曉日金花拂夜風欲知聲管處來過安樂宮雙桐生空井季月双桐井新枝復舊株晚葉藏栖鳳朝花拂曙烏還看西子照銀牀牽轆轤楚妃歎幽閨情脉脉漏長宵寂寂草螢飛夜戶絲虫繞秋壁簿笑未爲欣微歎還成戚金簮鬢下垂玉筯衣前滴和湘東王橫吹曲三首洛陽道洛陽佳麗所大道滿春光㳺童初挾彈蚕妾始提筐金鞍照龍馬羅袂拂春桑王車爭晚入潘果溢高箱折楊柳楊柳亂成絲攀折上春時葉密鳥飛礙風輕花落遲城高短簫發林空􅀞角悲曲中無别意併爲久思相騮紫馬賤妾朝下機正値良人歸青絲懸玉鐙朱汗染香衣驟急珂彌響􅘠多塵乱飛雕胡幸可薦故心君莫違雍州曲三首南湖南湖荇葉浮復有佳期逰銀綸翡翠鈎玉管芙蓉舟荷香亂衣麝枕聲隨急流北渚岸隂垂柳葉平江含粉蝶好値城傍人多逢蕩舟妾綠水濺長袖浮苔染輕檝大堤宜城斷中道行旅極流連出姜工織素妖􅁎慣數錢炊彫留吐客貰酒逐神仙同􅁃肩吾四詠二首蓮舟買荷度採蓮前岓隈舟子屢徘徊披衣可織風疎荷香不來欲知當度䖏當看荷葉開照流看落􅁫相隨照綠水意欲重凉風梳揺粧影壞􅁫落鬂花空佳期在何許徒傷心不同和湘東王三韻二首春宵花樹含春叢羅夜幃長空風聲隨篠韻月色與池同綵牋徒自襞無信徃雲中冬曉冬朝日照梁含怨下前牀帳褰竹葉帶鏡轉菱花光㑹是無人見何用早紅粧戯作謝惠連體十三韻雜蘂映南庭庭中光景媚可憐枝上花早得春風意春風復有情拂幔且開楹盈盈開碧煙拂幔拂垂蓮徧使紅花散飄揚落眼前眼亦多無况參差欝相望珠繩翡翠帷綺幕芙蓉帳香烟出窓裏落月斜階上日影去遲遲節花咸在玆桃枝紅若􅀧柳葉亂如絲絲條轉暮光影落暮光長春燕双双舞春心處處揚酒滿心聊足萱枝愁不忘倡婦怨情十二韻綺窓臨􅀞閣飛閣繞長廊風散同心草月散可憐光髣髴􅄕中出妖麗特非常恥學秦羅髻羞爲樓上粧散誕披紅帔生情新約黃斜燈入錦帳微煙出玉房六安双玳瑁八幅兩鴛鴦猶是别時許留値觧心傷含情生度日俄頃變炎凉玉關驅夜雪金氣落嚴霜飛􅈢驛使斷交河川路長蕩子無消息朱唇徒自傷和徐錄事見内人作臥具密房寒日晩落照度窓邊紅簾遥不隔輕帷半捲懸方知纎手製詎减縫裳妍龍刀横脉脉􅀞尺墮衣前熨斗金塗色簪管白牙􅄤衣裁合歡攝文作鴛鴦連針用双縫縷絮是八蚕綿香和麗丘密麝吐中臺烟已入琉璃帳兼雜太華氊且句彫爐煖非同團扇捐更恐從軍别空牀徒自憐戯贈麗人麗姬與妖嬙共拂可憐粧同安鬟裏撥異作額間黃羅裙宜細簡􅀞屧重高墻含羞來上砌微笑出長廊取花爭問色扳枝念蘂香但歌聊一曲鳴絃未息張自矜心所愛三十侍中郎秋閨夜思非關長信别詎是良人征九重忽不見萬恨滿心生夕門掩魚鑰宵牀悲􅀞屏廻月臨窓度吟虫繞砌鳴初霜霣細葉秋風驅亂螢故粧酒累日新衣襞未成欲知妾不寐城外擣衣聲和湘東王士名悅傾城美人稱絶世麗色譬花叢雖居李城北住在宋家東教歌公主第學舞漢成宮多㳺淇水上好在鳳樓中履高疑上砌裾開特畏風衫輕見跳脫珠槪雜靑虫垂絲遶帷幔落日度房櫳粧窓隔柳色井水照桃紅非憐江浦珮羞使春閨空從頓暫還城漢渚水初綠江南草復黃日暖蒲心發風吹梅蕋香征艫艤湯塹歸􅀐息金隍舞觀依裳襞歌臺絃未張特此橫行去誰念守空牀詠人去妾昔時嬌玉歩含羞花燭邊豈言心愛斷㗸啼􅀻自憐常見歡成怨非闗醜易妍獨鵠罷中路􅀌鴛鸞鏡前執筆戯書舞女及燕􅁎倡樓復蕩婦參差大戾發摇曵小垂手釣竿蜀國彈新城折楊柳玉按西王桃蠡杯石榴酒甲乙羅帳異辛壬房戶暉夜夜有眀月時時憐更衣艶歌曲雲楣桂成戸飛棟杏爲梁斜窓通蘂氣細隟引塵光裁衣魏后尺汲水淮南牀靑驪暮當返預使羅裙香怨秋風與白團本自不相安新人反故愛意氣豈能寛黃金肘後印白玉案前盤誰堪空對此還成無歲寒擬沈隠俟夜夜曲藹藹夜中霜何闗向曉光枕啼當帶粉身眠不着牀蘭膏斷更益薰爐㓕復香但問愁多少便知夜短長七夕秋期此時夫長夜從河靈紫煙凌鳳羽奔光隨玉軿洛湯疑劒氣成都怪客星天梭織來久方逢今夜停同劉諮議詠春雪晚霞飛銀礫浮雲暗未開入池消不積因風墮復來思婦流黃素溫􅁎玉鏡臺看花言可揷定有非春梅晚景出行細樹含殘影春閨散晚香輕花鬂邊墮微汗粉中光飛鳧初罷曲啼鳥忽度行羞令白日暮車􅀐欝相望賦樂府得大垂手垂手忽苕苕飛燕掌中嬌羅衣恣風引輕帶任情摇詎似長沙地促舞不廻腰賦樂名得箜篌捩遲初挑吹弄急時催舞釧響逐絃鳴私廻半障柱欲知心不平君看黛眉聚詠舞可憐初二八逐節似飛鴻懸勝河陽妓闇與淮陽同入行看履進轉而望鬟空腕動苕華王袖隨如意風上客何湏起啼烏曲未終春閨情楊柳葉纎纎佳人懶織縑正衣還向鏡迎春試捲簾摘梅多繞樹覔燕好窺簷只言逐花草計較應非嫌又三韻珠簾向暮下妖姿不可追花風暗裏􅁴蘭燭帳中飛何時玉窓裏夜夜更縫衣率爾成詠借聞仙將􅀞詎有此佳人傾城且傾國如雨復如神漢后憐名燕周王重姓申挾瑟㑹㳺趙吹簫屢入秦玉階偏望樹長廊毎逐春約黃岀意巧􅆞絃用去新迎風時引神避日暫披巾疎花映髻揷紬佩逸衫身誰知口欲薄含差不自陳美人晨粧北向窓朝鏡錦帳復斜縈嬌羞不肯出猶言粧未成散黛隨眉廣燕脂逐臉生試􅀅持出衆定得可憐名賦得當爐十五正團圓流光滿上蘭當爐設夜酒宿客觧金鞍迎來挾瑟易送别但歌難詎知心恨意翻令衣帶寛林下妓炎光向夕歛促宴臨前池泉聲影相得花與面相宜管聲長鳥哢舞扶寫風枝歡樂不知醉千秋長􅀂斯擬落日窓中坐開杏梁斜日照餘輝映美人開亟脱寳釧向鏡理紈巾㳺魚動池葉舞鶴散階塵空嗟千歲久願得及陽春美人觀􅀞殿上啚神女宮裏出佳人可憐俱是􅀞誰能辨偽眞分明凈眉目一種細腰身所有特爲異長有好精神代秋胡婦閨怨邵陵王綸蕩子從㳺宦思妾守房櫳塵鏡朝朝掩寒衾夜夜空􅀂非新有悅何事久西東知人相憶不淚盡夢啼中車中見美人關情出眉眼軟媚着腰肢語笑能嬌媄行歩絶逶迤空中自迷惑渠傍㑹不知懸念猶如此得應時􅀂爲代舊􅁎有怨寧爲萬里别乍此生别離那堪眼前見故愛逐所移未展春光落􅃍起秋風吹怨黛愁還歛啼粧拭更垂誰能巧爲賦黄金妾自貲登顏園故閣湘東王繹高樓三五夜流影入丹墀先時留上客夫壻芙蓉姿粧成理蟬鬂笑罷歛蛾眉衣香知歩近釧動斍行遲如何舞舘樂翻見歌梁悲猶懸北窓幌未捲南軒帷寂寂空郊暮非復少年時戯作艶詩入堂値小婦岀門逢故夫含辭未反吐絞袖且踟躕摇玆扇似月掩此淚如珠今懷同無已故情今有餘夜逰柏齋燭暗行人靜簾開雲影入風細雨聲遲夜短更籌急能下班姬淚復使倡樓泣况此客逰人中宵空停立和劉上黃新鶯隱葉囀新燕向窓飛柳絮時依酒梅花乍入衣玉珂輕風度金鞍映日暉無令春色晚獨望行人歸詠晚栖鳥日暮連翻翼俱向上林栖風多前鳥駛雲暗後群迷路逺聲難徹飛斜行未齊應從故􅀸返幾過入蘭閨借問倡樓妾何如蕩子妻寒宵烏鵲夜南飛良人行未歸池水浮眀月寒風送擣衣願織廻文錦因君􅀉武威秋夜秋夜九重空蕩子怨房櫳燈光入綺帷簾影進屏風金徹調玉軫玆夜撫離鴻同蕭長史看妓武陵王燕􅁎秦妙舞鄭女發清歌廻羞出幔臉送態入嚬哦寧殊値行雨詎减見凌波想君愁日暮應羨魯陽戈和湘東王夜夢應令昨夜夢君歸賤妾下鳴機意知君意薄不著去時衣故言如夢裏賴得鴈書飛曉色晨禽爭學囀朝花亂欲開爐烟入斗帳屏風隱鏡臺紅粧隨淚盡蕩子何時廻閨妾􅀉征歛色金星聚縈悲玉筯流願君看海氣憶妾上高樓玉臺新詠目錄卷之七擣衣梁武帝擬長安有狹斜十韻又擬明月照高樓又擬青靑河邊草代蘇屬國婦古意臨高臺芳樹有思所古意紫蘭始萌織婦七夕戯作樂府三首皇太子製艶歌篇蜀國絃歌十韻妾命薄篇十韻代樂府三首新成安樂宮雙梧生空井楚妃嘆和湘東王横吹曲四首洛陽道折楊柳紫騮馬南湖北渚太堤蓮舟買荷度照流看落􅁫春宵冬曉韻戯作謝惠連體十三倡婦怨情十二韻和徐錄事見内人作臥具戯贈麗人秋閨夜思和湘東王名士悅傾城從頓暫還城詠人棄妾執筆戯書艶歌曲怨擬沈隱俟夜夜曲七夕同劉諮議詠春雪晚景出行賦樂府得大垂手賦樂器得箜篌詠舞春閨情又三韻率爾成詠美人晨粧賦得當爐林下妓擬落日窓中坐美人觀􅀞孌童代秋胡婦閨怨邵陵王綸車中見美人代舊􅁎有怨登顏園故閣湘東王繹戯作艶詩夜逰柏齋和劉上黄寒宵詠晚栖烏詠秋夜同蕭長史看妓和湘東王夜夢應令曉色閨妾􅀉征玉臺新詠目錄卷之七
