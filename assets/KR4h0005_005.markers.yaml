  - {type: variant, offset: 3948, length: 399, content: 范雲巫山高不極白日隱光輝靄靄朝雲去冥冥暮雨歸巖懸獸無跡林暗鳥疑飛枕席竟誰薦相望徒依依望織女盈盈一水邊夜夜空自憐不辭精衛苦河流未可填寸情百重結一心萬處懸願作雙青鳥共舒明鏡前思歸春草醉春煙春閨人獨眠積恨顏將老相思心欲然幾回明月夜飛夢到郎邊送別東風柳線長送郎上河梁未盡樽前酒妾淚已千行不愁書難寄但恐鬢將霜空懷白首約江上早歸航征怨蕩子從征久鳳樓簫管閑獨枕凋雲鬢孤鐙損玉顏何日邊塵靜庭前征馬還詠美人春遊江南二月春東風轉綠蘋不知誰家子看花桃李津白雪凝瓊貌問珠點絳脣行人咸息駕爭擬洛川神西洲曲憶梅下西洲折梅寄江北單衫杏子紅雙鬢雅鶵色西洲在何處兩槳橋頭渡日暮伯勞飛風吹鳥桕樹樹下即門前門中露翠鈿開門郎不至出門採紅蓮採蓮南塘秋蓮花過人頭低頭弄蓮子蓮子清如水置蓮懷袖中蓮心徹底紅憶郎郎不至仰首望飛鴻鴻飛滿西洲望郎上青樓樓高望不見盡日欄杆頭欄杆十二曲垂手明如玉卷簾天自高海水搖空綠海水夢悠悠君愁我亦愁南風知我意吹夢到西洲, SBCK: ''}
  - {type: variant, offset: 3948, length: 21, content: 范雲巫山高不極白日隱光輝靄靄朝雲去冥冥暮雨, WYG: 夜夢還家玉臺新詠巻五欽定四庫全書玉臺新詠巻六陳徐陵撰呉均二十首王僧孺一十七首張率擬樂府三首徐悱詩二首費昶一十首姚翻同郭侍郎采桑一首孔翁}
