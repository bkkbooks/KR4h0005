body:
  text: 梁武帝搗衣駕言易水北送別河之陽沉思慘行鑣結夢在空床既寤丹緑謬始知紈素傷中州木葉下邊城應早霜陰蟲日慘烈庭草復云黃金風但清夜明月縣洞房嫋嫋同宮女助我理衣裳參差夕杵引哀怨秋砧揚輕羅飛玉腕弱翠低紅粧朱顏日已興盻睇色增光搗以一匪石文成雙卯央制握斷金刀薰用如蘭芳佳期久不歸持此寄寒鄉妾身誰與容思君苦人腸擬長安有狹斜十韻洛陽有曲陌陌曲不通驛忽逢一少童扶轡問君宅君宅邯鄲右易憶復可知大息組絪縕中息珮陸離小息尚青綺總轡遊南皮三息俱入門家臣拜門垂三息俱升堂旨酒盈千巵三息俱入戶戶內有光儀大婦理金翠中婦事玉觿少婦獨間暇調笙遊曲池丈夫少徘徊鳳吹方參差擬明月照高樓圓魄當虛闥清光流思筵筵思對孤影悽怨還自憐臺鏡旱生塵匣琴又無絃悲慕屢傷節離憂亟華年君如東扶景妾似西柳煙相去既路迥明晦亦殊懸願為銅鐵轡以感長樂前擬青青河邊草幕幕繡戶絲悠悠懷昔期昔期久不歸鄉國曠音輝音輝空結遲半寢覺知至既寤了無形與君隔死生月以雲掩光葉似霜催老當途競自容莫肯與妾道代蘇屬國婦良人與我期不謂當過時秋風忽送節白露凝前基愴愴獨涼枕搔搔孤月帷或聽西北鴈似從寒海湄果銜萬里書中有生離辭惟言長別矣不復道相思胡羊久剽奪漢節故支持帛上看未終臉下淚如絲空懷之死誓遠勞同穴詩古意飛鳥起離離驚散忽差池嗷嘈繞樹上翩翾集寒枝既悲征役久偏傷壠上兒寄言閨中愛此心詎能知不見松蘿上葉落根不移芳樹緑樹始搖芳芳生非一葉一葉度春風芳華自相接雜色亂參差衆花紛重疊重疊不可思思此誰能愜臨高臺高臺半行雲望望高不極草樹無參差山河同一色髣佛洛陽道道遠難別識玉階故情人情來共相憶有所思誰言生離久適意與君別衣上芳猶在握裏書未滅腰間雙綺帶夢為同心結常恐所思露瑤花未忍折古意當春有一草緑花復垂枝云是忘憂物生在北堂垂飛飛雙蛺蝶低低兩差池差池低復起此芳性不移飛蝶雙復隻此心人莫知紫蘭始萌種蘭玉臺下氣暖蘭始萌芬芳與時發婉轉迎節生獨使金翠嬌偏動紅綺情二遊何足瓌一顧非傾城羞將苓芝侶豈畏鶗鴂鳴織婦送別出南軒離思沉幽室調梭輟寒夜鳴機罷秋月良人在萬里誰與共成匹願得一回光照此憂與疾君情倘未忘妾心長自畢七夕白露月下團秋風枝上鮮瑤臺生碧霧瓊幕亟紫煙綺會非妙節佳期乃良年玉壺承夜急蘭油依曉煎昔時悲難越今傷何易旋怨咽雙念斷淒切兩情懸戲作宓妃生洛浦遊女出漢陽妖間逾下蔡神妙絶高唐錦駒且變俗玉豹復移鄉況茲集靈異豈得無方將長袂必留客清哇咸繞梁燕趙羞容止西妲慚芬芳徒聞殊可弄定自乏明璫聖製樂府三首艷歌篇十八韻凌晨光景麗倡女鳳樓中前瞻削成小傍望春旌空分粧間淺靨繞臉傅斜紅張瑟未調軫飲吹不全終自知心所愛出入仕秦宮誰言連伊屈更是莫敖通輕軺綴皂蓋飛轡轢雲驄金鞍隨繫尾銜璅映躔駿戈鏤荊山玉劍飾丹陽銅左把蘇合彈傍持大屈弓控弦因鵲血挽強用牛螉弋獵多登隴酣歌每入豐暉暉隱落日冉冉還房隴燈生陽燧火塵散鯉魚風流蘇時下帳象簟復韜筒霧暗窗前柳寒疏井上桐女蘿託松際瓜蔓甘井東拳拳恃君愛歲莫望無窮銅梁望絶國劍道望中區通星上分野作固為下都雅歌因良守妙舞自巴渝陽城嬉樂所劍騎鬱相趨五婦行難至百兩好游娛牲祈望帝祀酒酹蜀俟姝江妃納重娉卓女愛將雛停絃時繫爪息吹治脣朱春衫湔錦浪回扇避陽魚聞君旌節返賤妾下城隅妾薄命篇十韻名都多麗質本自恃容姿蕩子行未至秋胡無定期玉貌歇紅臉長顰串翠眉奩鏡迷朝色縫針脆故絲本異搖舟咎何關竊席疑生離誰撫背溘死詎成遲毛嬙貌本絶踉蹌入氈帷盧姬嫁日晚非復好年時轉山猶可逐烏白望難追妾心徒自苦傍人會見嗤代樂府三首新成安樂宮遙看雲霧中耿耿映丹紅珠簾通曉日金花拂夜風欲知聲管處來過安樂宮雙桐生空井季月雙桐井新枝復舊株晚葉藏栖鳳朝花拂曙烏還看西子照銀床牽轆轤楚妃歎幽閨情脈脈漏長宵寂寂草螢飛夜戶絲蟲繞秋壁薄笑未為欣微歎還成戚金簪鬢下垂玉筯衣前滴和湘東王橫吹曲三首洛陽道陽佳麗所大道滿春光游童初挾彈蠶妾始提筐金鞍照龍馬羅袂拂春桑玉車爭晚入潘果溢高箱折楊柳楊柳亂成絲攀折上春時葉密鳥飛礙風輕花落遲城高短簫發林空畫角悲曲中無別意併為久相思紫騮馬賤妾朝下機正值良人歸青絲懸玉鐙朱汗染香衣驟急珂彌響𨁏多塵亂飛雕胡幸可薦故心君莫違雍州曲三首南湖南湖荇葉浮復有佳期遊銀綸翡翠鉤玉管芙蓉舟荷香亂衣麝橈聲隨急流北渚岸陰垂柳葉平江含粉蝶好值城傍人多逢蕩舟妾緑水濺長袖浮苔染輕楫大堤宜城斷中道行旅極流連出妻工織素妖姬慣數錢炊雕留吐客貰酒逐神仙同庾肩吾四詠二首蓮舟買荷度採蓮前岸隈舟子屢徘徊披衣可織風踈荷香不來欲知當度處當看荷葉開照流看落叉相隨照緑水意欲重涼風梳搖粧影壞叉落鬢花空佳期在何許徒傷心不同和湘東王三韻二首春宵花樹含春叢羅幃夜長空風聲隨篠韻月色與池同綵箋徒自襞無信往雲中冬曉冬朝日照梁含怨下前床帳褰竹葉帶鏡轉菱花光會是無人見何用早紅粧戲作謝惠連體十三韻雜蕊映南庭庭中光景媚可憐枝上花早得春風意春風復有情拂幔且開楹盈盈開碧煙拂幔拂垂蓮遍使紅花散飄揚落眼前眼亦多無況參差鬱相望珠繩翡翠帷綺幕芙蓉帳香煙出窗裏落月斜階上日影去遲遲節花咸在茲桃枝紅若點柳葉亂如絲絲條轉暮光影落暮光長春燕雙雙舞春心處處揚酒滿心聊足萱枝愁不忘倡婦怨情十二韻綺窗臨畫閣飛閣繞長廊風散同心草月散可憐光髣佛簾中出妖麗特非常恥學秦羅髻羞為樓上粧散誕披紅帔生情新約黃斜燈入錦帳微煙出玉房六安雙玳瑁八幅兩鴛鴦猶是別時許留值解心傷含情坐度日俄頃變炎涼玉關驅夜雪金氣落嚴霜飛狐驛使斷交河川路長蕩子無消息朱唇徒自傷和徐録事見內人作臥具密房寒日晚落照度窗邊紅簾遙不隔輕帷半捲懸方知纖手製詎減縫裳妍龍刀橫脈脈畫尺墮衣前尉斗金塗色簪管白牙躔衣裁合歡攝文作鴛鴦連針用雙縫縷絮是八蠶綿香和麗丘蜜麝吐中臺烟已入琉璃帳兼雜太華氈且句雕爐暖非同團扇捐更恐從軍別空床徒自憐戲贈麗人麗姬與妖嬙共拂可憐粧同安鬟裏撥異作額間黃羅裙宜細簡畫屧重高牆含羞來上砌微笑出長廊取花爭問色扳枝念蕊香但歌聊一曲鳴絃未息張自矜心所愛三十侍中郎秋閨夜思非關長信別詎是良人征九重忽不見萬恨滿心生夕門掩魚鑰宵床悲畫屏回月臨窗度吟蟲繞砌鳴初霜霣細葉秋風驅亂螢故粧酒纍日新衣襞未成欲知妾不寐城外搗衣聲和湘東王名士悅傾城美人稱絶世麗色譬花叢雖居李城北住在宋家東教歌公主第學舞漢成宮多游淇水上好在鳳樓中履高疑上砌裾開特畏風衫輕見跳脫珠概雜青蟲垂絲繞帷幔落日度房櫳粧窗隔柳色井水照桃紅非憐江浦珮羞使春閨空從頓暫還城漢渚水初緑江南草復黃日暖蒲心發風吹梅蕊香征艫艤湯塹歸騎息金隍舞觀依裳襞歌臺絃未張特此橫行去誰念守空床詠人去妾昔時嬌玉步含羞花燭邊豈言心愛斷銜啼私自憐常見歡成怨非關醜易妍獨鵠罷中路孤鴛鸞鏡前執筆戲書舞女及燕姬倡樓復蕩婦參差大戾發搖曳小垂手釣竿蜀國彈新城折楊柳玉按西王桃蠡杯石榴酒甲乙羅帳異辛壬房戶暉夜夜有明月時時憐更衣雲楣桂成戶飛棟杏為梁斜窗通蕊氣細隙引塵光裁衣魏后尺汲水淮南床青驪暮當返預使羅裙香怨詩秋風與白團本自不相安新人反故愛意氣豈能寬黃金肘後印白玉案前盤誰堪空對此還成無歲寒擬沈隱俟夜夜曲藹藹夜中霜何關向曉光枕啼當帶粉身眠不著床蘭膏斷更益薰爐滅復香但問愁多少便知夜短長七夕秋期此時浹長夜從河靈紫煙凌鳳羽奔光隨玉軿洛陽疑劍氣成都怪客星天梭織來久方逢今夜停同劉咨議詠春雪晚霞飛銀礫浮雲暗未開入池消不積因風墮復來思婦流黃素溫姬玉鏡臺看花言可插定自非春梅晚景出行細樹含殘影春閨散晚香輕花鬢邊墮微汗粉中光飛鳧初罷曲啼鳥忽度行羞令白日暮車騎鬱相望賦樂府得大垂手垂手忽苕苕飛燕掌中嬌羅衣恣風引輕帶任情搖詎似長沙地促舞不回腰賦樂名得箜篌捩遲初挑吹弄急時催舞釧響逐絃鳴私回半障柱欲知心不平君看黛眉聚詠舞可憐初二八逐節似飛鴻懸勝河陽妓暗與淮陽同入行看履進轉面望鬟空腕動苕華玉袖隨如意風上客何須起啼烏曲未終春閨情楊柳葉纖纖佳人懶織縑正衣還向鏡迎春試捲簾摘梅多繞樹覓燕好窺簷只言逐花草計校應非嫌又三韻珠簾向暮下妖姿不可追花風暗裏覺蘭燭帳中飛何時玉窗裏夜夜更縫衣率爾成詠借聞仙將畫詎有此佳人傾城且傾國如雨復如神漢后憐名燕周王重姓申挾瑟曾遊趙吹簫屢入秦玉階偏望樹長廊每逐春約黃出意巧纏絃用法新迎風時引袖避日暫披巾疏花映髻插紬佩逸衫身誰知日欲薄含羞不自陳美人晨粧北向窗朝鏡錦帳復斜縈嬌羞不肯出猶言粧未成散黛隨眉廣燕脂逐臉生將試將持出衆定得可憐名賦得當爐十五正團圓流光滿上蘭當爐設夜酒宿客解金鞍迎來挾瑟易送別但歌難詎知心恨意翻令衣帶寬林下妓炎光向夕斂促宴臨前池泉聲影相得花與面相宜管聲長鳥哢舞袂寫風枝歡樂不知醉千秋長若斯擬落日窗中坐開杏梁斜日照餘輝映美人開亟脫寶釧向鏡理紈巾游魚動池葉舞鶴散階塵空嗟千歲久願得及陽春美人觀畫殿上圖神女宮裏出佳人可憐俱是畫誰能辨僞真分明淨眉目一種細腰身所有特為異長有好精神孌童孌童嬌麗質踐董復超瑕羽帳晨香滿珠簾夕漏賖翠被含鴛色雕床鏤象牙妙年同小史姝貌比朝霞袖裁連璧錦箋織細橦花攬袴輕紅出回頭雙鬢斜懶眼時含笑玉手乍攀花懷猜非後釣密愛似前車足使燕姬妬彌令鄭女嗟代秋胡婦閨怨蕩子從游宦思妾守房櫳塵鏡朝朝掩寒衾夜夜空若非新有悅何事久西東知人相憶不淚盡夢啼中車中見美人關情出眉眼軟媚著腰肢語笑能嬌𡡐行步絶逶迤空中自迷惑渠傍會不知懸念猶如此得應時若為代舊姬有怨寧為萬里別乍此生別離那堪眼前見故愛逐所移未展春光落遽起秋風吹怨黛愁還斂啼粧拭更垂誰能巧為賦黃金妾自資登顏園故閣高樓三五夜流影入丹墀先時留上客夫壻芙蓉姿粧成理蟬鬢笑罷斂蛾眉衣香知步近釧動覺行遲如何舞館樂翻見歌梁悲猶懸北窗幌未捲南軒帷寂寂空郊暮非復少年時戲作艷詩入堂值小婦出門逢故夫含辭未反吐絞袖且踟蹰搖茲扇似月掩此淚如珠今懷固無已故情今有餘夜遊柏齊燭暗行人靜簾開雲影入風細雨聲遲夜短更籌急能下班姬淚復使倡樓泣況此客遊人中宵空停立和劉上黃新鶯隱葉囀新燕向窗飛柳絮時依酒梅花乍入衣玉珂輕風度金鞍映日暉無令春色晚獨望行人歸詠晚栖鳥日暮連翩翼俱向上林栖風多前鳥駛雲暗後群迷路遠聲難徹飛斜行未齊應從故鄉返幾過入蘭閨借問倡樓妾何如蕩子妻寒宵烏鵲夜南飛良人行未歸池水浮明月寒風送搗衣願織回文錦因君寄武威秋夜秋夜九重空蕩子怨房櫳燈光入綺帷簾影進屏風金徽調玉軫茲夜撫離鴻同蕭長史看妓燕姬奏妙舞鄭女發清歌回羞出幔臉送態入嚬哦寧殊值行雨詎減見凌波想君愁日暮應羡魯陽戈和湘東王夜夢應令昨夜夢君歸賤妾下鳴機懸知君意薄不著去時衣故言如夢裏賴得鴈書飛曉思晨禽爭學囀朝花亂欲開爐烟入斗帳屏風隱鏡臺紅粧隨淚盡蕩子何時回閨妾寄征人斂色金星聚縈悲玉筋流願君看海氣憶妾上高樓昭明太子長相思相思無終極長夜起歎息徒見貌嬋娟寧知心有憶寸心無以因願附歸飛翼美女篇佳麗盡關情風流最有名約黃能效月裁金巧作星粉光勝玉靚衫薄擬蟬輕密態隨羞臉嬌歌逐軟聲朱顏半已醉微笑隱香屏怨歌行十五頗有餘日照杏梁初蛾眉本多嫉掩鼻特成虛持此傾城貌翻為不肖軀秋風吹海水寒霜依玉除月光臨戶駛荷花依浪舒望簷悲雙翼窺沼泣王餘苔生履處沒草合行人疏裂紈傷不盡歸骨恨難袪早知長信別不避後園輿獨處怨獨處恆多怨開幕試臨風彈棋鏡奩上傅粉高樓中自君征馬去音信不曾通只恐金屏掩明年已復空傷美人昔聞倡女別蕩子無歸期今似陳王歎流風難重思翠帶留餘結苔階沒故基圖形更非是夢見反成疑薰爐含好氣庭樹吐華滋香燒日有歇花落無還時雞鳴高樹顛碧玉好名倡夫壻侍中郎桃花全覆井金門半隱堂時欣一來下復比雙鴛鴦雞鳴天尚早東烏定未光春日年還樂應滿春歸思復生桃含可憐紫柳發斷腸青落花隨燕入遊絲帶蝶驚邯鄲歌管地見許欲留情秋夜高秋度幽谷墜露下芳枝緑潭倒雲氣青山銜月眉花心風上轉葉影樹中移外遊獨千里夕歎誰共知和湘東王陽雲臺簷柳曖曖陽雲臺春柳發新梅柳枝無極軟春風隨意來潭池青帷閉玲瓏朱扇開佳人有所望車聲非是雷聽夜妓合歡蠲忿葉萱草忘憂條何如明月夜流風拂舞腰朱脣隨吹動玉釧逐弦搖留賓惜殘弄負態動餘嬌詠內人晝眠北窗聊就枕南簷日未斜攀鉤落綺障插捩舉琵琶夢笑開嬌靨眠鬟壓落花簟文生玉腕香汗浸紅紗夫壻恆相伴莫誤是倡家詠中婦織流黃翻花滿階砌愁人獨上機浮雲西北起孔雀東南飛調絲時繞腕易鑷乍牽衣鳴梭逐動釧紅妝映落暉櫂歌行妾家住湘川菱歌本自便風生解刺浪水深能捉船葉亂由牽荇絲飄為折蓮濺妝疑薄汗霑衣似故湔浣紗流暫濁汰錦色還鮮參同趙飛燕借問李延年從來入弦管誰在櫂歌前和人以妾換馬功名幸多種何事苦生離誰言似白玉定是愧青驪必取匣中釧回作飾金羈真成恨不已願得路旁兒詠舞戚里多妖麗重聘蔑燕餘逐節工新舞嬌態似凌虛納花承褶概垂翠逐璫舒扇開衫影亂巾度履行疏徒勞交甫憶自有專城居採蓮晚日照空磯採蓮承晚暉風起湖難渡蓮多摘未稀櫂動芙蓉落船移白鷺飛荷絲傍繞腕菱角遠牽衣常聞蕖可愛採擷欲為裙葉滑不留綖心忙無假薰千春誰與樂惟有妾隨君採桑春色映空來先發院邊梅細萍重疊長新花歷亂開連珂往淇上接幰至叢臺叢臺可憐妾當窗望飛蝶忌跌行衫領尉斗成褫褶下床著珠珮捉鏡安花鑷薄晚畏蠶飢競採春桑葉寄語採桑伴訝今春日短枝高攀不及葉細籠難滿年年將使君歷亂遣相聞欲知琴裏意還贈錦中文何當照梁日還作入山雲重門皆已閉方知客留袂可憐黃金絡復以青絲繫必也為人時誰令畏夫壻半路溪相逢半路溪隔溪猶不渡望望判知是翩翩識行步摘贈蘭澤芳欲表同心句先持動舊情恐君疑妾妬小垂手舞女出西秦躡影舞陽春且復小垂手廣袖拂紅塵折腰應兩笛頓足轉雙巾蛾眉與慢臉見此空愁人傷別離朝望青波道夜上白登臺月中含桂樹流影自徘徊寒沙逐風起春花犯雪開夜長無與悟衣單為誰裁蛾眉漸成光燕姬戲小堂朝舞開春閣鈴盤出步廊起龍調節奏卻鳳點笙簧樹交臨舞席荷生夾妓航竹密無分影花疏有異香舉杯聊轉笑歡茲樂未央詠風樓上起朝妝風花下砌傍入鏡先飄粉翻衫好染香度舞飛長袖傳歌共繞梁欲因吹少女還將拂大王看摘薔薇倡女倦春閨迎風戲玉除近叢看影密隔樹望叉疏橫枝斜綰袖嫩葉下牽裾牆高舉不及花新摘未舒莫疑插鬢少分人猶有餘洛陽道洛陽開大道城北達城西青槐隨幔拂緑柳逐風低玉珂鳴戰馬金爪鬭場雞桑萎日行暮多逢秦氏妻折楊柳山高巫峽長垂柳復垂楊同心且同折故人懷故鄉山似蓮花豔流如明月光寒夜猿聲徹遊子淚霑裳金樂歌啼烏怨別偶曙鳥憶離家石闕題書字金鐙飄落花東方曉星沒西山晚日斜縠衫回廣袖團扇掩輕紗暫借青驄馬來送黃牛車古意妾在成都縣願作高唐雲樽中石榴酒機上葡萄裙停梭還斂色何時勸使君春日春還春節美春日春風過春心日日異春情處處多處處春芳動日日春禽變春意春已繁春人春不見不見懷春人徒望春光新春愁春自結春結誰能申欲道春園趣復憶春時人春人竟何在空爽上春期獨念春花落還似昔春時見姬人春來不復賒入苑駐行車比來妝點異今世撥鬟斜卻扇承枝影舒衫受落花狂夫不妬妾隨意晚還家
