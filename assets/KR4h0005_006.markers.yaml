  - {type: variant, offset: 3409, length: 335, content: 千里參商書信難四時無人見誰復重羅紈妾安所居賤妾先有寵蛾眉進不遲一從西北麗無復城南期何因暫豔逸豈為乏妍姿徒有黃昏望寧遇青樓時惟惜應門掩方餘永巷悲匡床終不共何由橫自私三婦豔大婦弦初切中婦管方吹少婦多姿態含笑逼清巵佳人勿餘及慇懃妾自知詠歌姬及君高堂還值妾妍妝罷曲房褰錦帳迴廊步珠屣玉釵時可挂羅襦詎難解再顧傾城易一笑千金易聽百舌庭樹旦新晴臨鏡出雕楹風吹桃李氣過傳春鳥聲靜寫山陽笛全作洛濱笙注意懽留聽誤令妝不成幸被夕風吹屢得朝光照枝低疑欲舞花開似含笑長夜踏悠悠所思不可召行人早旋返賤妾猶年少採菱曲相攜及嘉月採蔆渡北渚微風吹櫂歌日暮相容與采采不能歸望望方延佇倘逢遺珮人預以心相許詠舞紅顏自燕趙妙伎邁陽阿就行齊逐唱赴節闇相和折腰送餘曲斂袖待新歌顰容生翠羽曼睇出橫波雖稱趙飛燕比此詎成多, SBCK: 首}
  - {type: variant, offset: 3409, length: 7, content: 千里參商書信難, WYG: 首邵陵王綸詩三首湘東王繹詩七首武陵王紀詩}
