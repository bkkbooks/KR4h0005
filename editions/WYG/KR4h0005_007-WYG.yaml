body:
  text: 梁武帝詩十四首駕言易水北送别河之陽沈思慘行鑣結夢在空牀既寤丹緑謬始知紈素傷中州木葉下邊城應早霜隂蟲日慘烈庭草復云黄冷風但清夜明月懸洞房嫋嫋同宫女助我理衣裳參差夕杵引哀怨秋砧揚輕羅飛玉腕弱翠低紅妝朱顔色已興眄睇目増光擣以一匪石文成雙鴛鴦制握斷金刀薰用如蘭芳佳期乆不歸持此寄寒鄉妾身誰為容思君苦人腸擣衣洛陽有曲陌陌曲不通驛忽逢二少童扶轡問君宅君宅邯鄲右易憶復可知大息組緼絪中息珮陸離小息尚青綺總丱遊南皮三息俱入門家臣拜門垂三息俱升堂㫖酒盈千巵三息俱入户户内有光儀大婦理金翠中婦事么觿小婦獨閒暇調笙遊曲池丈人少徘徊鳯吹方參差擬長安有狹斜十韻圓魄當虚闥清光流思筵筵思照孤影悽怨還自憐臺鏡早生塵匣琴又無絃悲慕屢傷節離憂亟華年君如東榑景妾似西栁煙相去旣路迥明晦亦殊懸願為銅鐡轡以感長樂前擬明月照髙樓幕幕繡户絲悠悠懐音期昔期乆不歸鄉國曠音煇音煇空結遲半寢覺如至旣寤了無形與君隔平生月以雲掩光葉以霜摧老當途競自容莫肯為妾道擬青青河邊草良人與我期不謂當過時秋風忽送節白露凝前基愴愴獨涼枕搔搔孤月帷或聽西北鴈似從寒海湄果銜萬里書中有生離詞惟言長别矣不復道相思胡羊乆剽奪漢節故支持帛上看未終臉下淚如絲空懐之死誓逺勞同穴詩代蘇屬國婦飛鳥起離離驚散忽差池嗷嘈繞樹上翩翻集寒枝旣悲征役乆偏傷壟上兒寄言閨中愛此心詎能知不見松上蘿葉落根不移當春有一草緑花復重枝云是忘憂物生在北堂垂飛飛雙蛺蜨低低兩差池差池低復起此芳性不移飛蜨雙復隻此心人莫知古意二首緑樹始搖芳芳生非一葉一葉度春風芳芳自相接色雜亂參差衆花紛重疊重疊不可思思此誰能愜芳樹髙臺半行雲望望髙不極草樹無參差山河同一色髣髴洛陽道道逺難别識玉階故情人情來共相憶臨髙臺誰言生離乆適意與君别衣上芳猶在握裏書未滅腰中雙綺帶夢為同心結常恐所思露瑤華未忍折有所思種蘭玉臺下氣暖蘭始萌芬芳與時發婉轉迎節生獨使金翠嬌偏動紅綺情二遊何足壊一顧非傾城羞將苓芝侣豈畏鶗鴂鳴紫蘭始萌送别出南軒離思沈幽室調梭輟寒夜鳴機罷秋日良人在萬里誰與共成匹願得一回光照此憂與疾君情儻未忘妾心長自畢織婦白露月下圓秋風枝上鮮瑤臺函碧霧瓊幕生紫煙妙㑹非綺節佳期乃良年玉壺承夜急蘭膏依曉煎昔時悲難越今傷何易旋怨咽雙念斷悽草兩情懸七夕宓妃生洛浦遊女出漢陽妖閑逾下蔡神妙絶髙唐緜駒且變俗王豹復移鄉況兹集靈異豈得無方將長袂必留客清哇咸繞梁燕趙羞容止西妲慙芬芳徒聞珠可弄定自乏明璫戲作梁簡文帝詩四十三首凌晨光景麗倡女鳯樓中前瞻削成小傍望巻旌空分妝開淺靨繞臉傅斜紅張琴未調軫飲吹不全終自知心所愛出入仕秦宫誰言連伊屈更是莫敖通輕軺綴皂蓋飛轡轢雲驄金鞍隨繫尾銜瑣映纒騣戈鏤荆山玉劒餙丹陽銅左把蘇合彈傍持大屈弓控弦因鵲血挽强用牛螉弋獵多登隴酣歌毎入豐暉暉隱落日冉冉還房櫳鐙生陽燧火塵散鯉魚風流蘇時下帳象簟復韜筒霧暗忩前栁寒踈井上桐女蘿託松際甘瓜蔓井東拳拳持君寵嵗暮望無窮艷歌篇十八韻銅梁指斜谷劒道望中區通星上分野作固為下都雅歌因良守妙舞自巴渝陽城嬉樂所劒騎鬱相趨五婦行難至百兩好游娛牲祈望帝祀酒酹蜀侯誅江妃納重聘卓女受將鶵停弦時繫爪息吹更治朱春衫湔錦浪回扇避陽烏聞君握節反賤妾下城隅蜀國絃歌篇十韻名都多麗質本自恃容姿蕩子行未至秋胡無定期玉貌歇紅臉長顰串翠睂籨鏡迷朝色縫針脆故絲本異摇舟咎何關竊席疑生離誰撫背溘死詎成遲毛嬙貌本絶踉蹌入氊帷盧姬嫁日晩非復好年時傳山猶可逐烏白望難期妾心徒自苦傍人㑹見嗤妾薄命篇十韻樂府三首遙看雲霧中刻桷映丹紅珠簾通曉日金花拂夜風欲知聲管處來過安樂宫新成安樂宫季月雙桐井新枝雜舊株晩葉藏棲鳯朝花拂曙烏還看西子照銀牀牽鹿盧雙桐生空井閨閑漏永永漏長宵寂寂草螢飛夜户絲蟲繞秋壁薄笑未為欣微歎還成戚金簪鬢下垂玉箸衣前滴楚妃歎代樂府三首洛陽佳麗所大道滿春光遊童初挾彈蠶妾始提筐金鞍照龍馬羅袂拂春桑玉車争晩入潘果溢髙箱洛陽道楊栁亂成絲攀折上春時葉宻鳥飛礙風輕花落遲城髙短簫發林空畫角悲曲中無别意併為乆相思折楊栁賤妾朝下機正值良人歸青絲懸玉磴朱汗染香衣驟急珍珂響􅘠多塵亂飛雕胡幸可薦故心君莫違紫騮馬和湘東王横吹曲三首南湖荇葉浮復有佳期遊銀綸翡翠釣玉舳芙蓉舟荷香亂衣麝橈聲隨急流南湖岸陰垂栁葉平湖含粉堞好値城傍人多逢蕩舟妾緑水濺長袖浮苔染輕檝北渚宜城斷中道行旅亟流連山妻工織素妖姬慣數錢吹彫留上客貰酒逐神仙大隄雍州十曲抄三首采蓮前岸隈舟子屢徘􅆦荷披衣可識風疎香不來欲知船渡處當看荷葉開蓮舟買荷度相隨照緑水意欲重涼風流搖妝影壊釵落鬢華空佳期在何許徒傷心不同照流看落釵同庾肩吾四詠二首花樹含春叢羅幃夜長空風聲隨篠韻月色與池同彩箋徒自襞無信徃雲中春宵冬朝日照梁含怨下前牀帳褰竹葉帶鏡轉蔆花光㑹是無人見何用早紅妝冬曉和湘東王三韻二首雜蕊映南庭庭中光景媚可憐枝上花早得春風意春風復有情拂幔且開楹開楹開碧煙拂幔拂垂蓮偏使紅花散飄颺落眼前眼亦多無況參差鬱可望珠繩翡翠帷綺幕芙蓉帳香煙出忩裏落日斜階上日影去遲遲節華咸在兹桃花紅若㸃栁葉亂如絲絲條轉暮光影落暮陰長春鷰雙雙舞春心處處傷酒滿心聊足萱枝愁不忘戲作謝惠連體十三韻綺忩臨畫閣飛閣繞長廊風散同心草月送可憐光髣髴簾中出妖麗特非常恥學秦羅髻羞為樓上妝散誕披紅帔生情新約黄斜鐙入錦帳微煙出玉牀六安雙瑇瑁八幅兩鴛鴦猶是别時許留致解心傷含涕坐度日俄頃變炎涼玉關驅夜雪金氣落嚴霜飛狐驛使斷交河川路長蕩子無消息朱唇徒自香倡婦怨情十二韻宻房寒日晩落照度忩邊紅簾遙不隔輕帷半巻懸方知纎手製詎減縫裳妍龍刀横膝上畫尺墮衣前熨斗金塗色簪管白牙纒衣裁合歡襵文作鴛鴦連縫用雙針縷絮是八蠶綿香和麗邱蜜麝吐中臺烟已入琉璃帳兼雜太華氊且共雕鑪暖非同團扇捐更恐從軍别空牀徒自憐和徐録事見内人作臥具麗妲與妖嬙共拂可憐妝同安鬟裏撥異作額間黄羅裙宜細􅂤畫􅓏重髙牆含羞未上砌微笑出長廊取花爭閒鑷攀枝念蕊香但歌聊一曲鳴絃未息張自矜心所愛三十侍中郎戲贈麗人非關長信别詎是良人征九重忽不見萬恨滿心生夕門掩魚鑰宵牀悲畫屏迥月臨忩度吟蟲繞砌鳴初霜霣細葉秋風驅亂螢故妝猶累日新衣襞未成欲知妾不寐城外擣衣聲秋閨夜思美人稱絶世麗色譬花叢雖居李城北住在宋家東教歌公主第學舞漢成宫多遊淇水上好在鳯樓中履髙疑上砌裾開持畏風衫輕見跳脱珠概雜青蟲垂絲繞帷幔落日度房櫳妝忩隔栁色井水照桃紅非憐江浦珮羞使春閨空和湘東王名士悦傾城漢渚水初緑江南草復黄日照蒲心暖風吹梅蕊香征艫艤湯塹歸騎息金隍舞觀衣常襞歌臺絃未張持此横行去誰念守空牀從頓蹔還城昔時嬌玉步含羞花燭邊豈言心愛斷銜嗁私自憐常見歡成怨非關醜易妍獨鵠罷中路孤鸞死鏡前詠人棄妾舞女及燕姬倡樓復蕩婦參差大戾發搖曳小垂手釣竿蜀國彈新城折楊栁玉案西王桃蠡桮石榴酒甲乙羅帳異辛壬房戶暉夜夜有明月時時憐更衣執筆戲書雲楣桂成戶飛棟杏為梁斜忩通蕊氣細隙引塵光裁衣魏后尺汲水淮南牀青驪暮當反預使羅裙香艷歌曲秋風與白團本自不相安新人及故愛意氣豈能寛黄金肘後鈴白玉案前盤誰堪空對此還成無嵗寒怨靄靄夜中霜何關向曉光枕嗁常帶粉身眠不著牀蘭膏盡更益薰鑪滅復香但問愁多少便知夜短長擬沈隱侯夜夜曲秋期此時浹長夜徙河靈紫烟凌鳯羽奔光隨玉軿洛陽疑劒氣成都怪客星天梭織來乆方逢今夜停七夕晩霰飛銀礫浮雲暗未開入池消不積因風墜復來思婦流黄素温姬玉鏡臺看花言可挿定自非春梅同劉諮議詠春雪細樹含殘影春閨散晩香輕花鬢邊墮微汗粉中光飛鳬初罷曲嗁烏忽度行羞令白日暮車馬鬱相望晩景出行垂手忽苕苕飛鷰掌中嬌羅衣恣風引輕帶任情摇詎似長沙地促舞不回腰賦樂府得大垂手捩遲初挑吹弄急時催舞釧響逐弦鳴私回半障柱欲知心不平君看黛睂聚賦樂器名得箜篌可憐初二八逐節似飛鴻懸勝河陽妓闇與淮南同入行看履進轉靣望鬟空腕動苕華玉袖隨如意風上客何須起嗁烏曲未終詠舞楊栁葉纎纎佳人􅈸織縑正衣還向鏡迎春試舉簾摘梅多繞樹覓鷰好窺檐只言逐花草計校應非嫌春閨情珠簾向暮下妖姿不可追花風暗裏覺蘭燭帳中飛何時玉忩裏夜夜更縫衣又三韻借問仙將畫詎有此佳人傾城且傾國如雨復如神漢后憐名鷰周王重姓申挾瑟曾遊趙吹簫屢入秦玉階偏望樹長廊毎逐春約黄出意巧纒弦用法新迎風時引袖避日暫披巾疎花映鬟揷細珮繞衫身誰知日欲暮含羞不自陳率爾為詠北忩向朝鏡錦帳復斜縈嬌羞不肯出猶言妝未成散黛隨眉廣燕脂逐臉生試將持出衆定得可憐名美人晨妝十五正團團流光滿上闌當鑪設夜酒宿客解金鞍迎來挾瑟易送别但歌難詎知心恨急翻令衣帶寛賦得詠當鑪炎光向夕斂促宴臨前池泉深影相得花與靣相宜篪聲如鳥哢舞袂寫風枝歡樂不知醉千秋長若斯林下妓杏梁斜日照餘暉映美人開函脱寶釧向鏡理紈巾游魚動池葉舞鶴散階塵空嗟千嵗久願得及陽春擬落日窻中坐殿上圖神女宫裏出佳人可憐俱是畫誰能辨偽眞分明淨睂眼一種細腰身所可持為異長有好精神美人觀畫孌童嬌麗質賤董復超瑕羽帳晨香滿珠簾夕漏賒翠被含鴛色雕牀鏤象牙妙年同小史姝貌比朝霞袖裁連璧錦箋織細橦花攬袴輕紅出回頭雙鬢斜嬾眼時含笑玉手乍攀花懐猜非後釣密愛似前車足使燕姬妒彌令鄭女嗟孌童邵陵王綸詩三首蕩子從遊宦思妾守房櫳塵鏡朝朝掩寒牀夜夜空若非新有悦何事久西東知人相憶否淚盡夢嗁中代秋胡婦閨怨關情出睂眼軟媚著腰支語笑能嬌媄行步絶逶迤空中自迷惑渠傍㑹不知懸念猶如此得時應若為車中見美人寜為萬里别乍此死生離那堪眼前見故愛逐新移未展春光落遽被秋風吹怨黛舒還歛嗁妝拭更垂誰能巧為賦黄金妾自貲代舊姬有怨湘東王繹詩七首髙樓三五夜流影入丹墀先時留上客夫婿美容姿妝成理蟬鬢笑罷斂娥眉衣香知步近釧動覺行遲如何舞舘樂翻見歌梁悲猶懸北窻櫎未巻南軒帷寂寂空郊暮非復少年時登顏園故閣入堂值小婦出門逢故夫含辭未及吐絞袖且峙􅡨搖兹扇似月掩此淚如珠今懐固無已故情今有餘戲作艷詩燭暗行人靜簾開雲影入風細雨聲遲夜短更籌急能下班姬淚復使倡樓泣况此客遊人中宵空佇立夜遊栢齋新鶯隠葉囀新鷰向窻飛栁絮時依酒梅花乍入衣玉珂逐風度金鞍映日暉無令春色晩獨望行人歸和劉上黄日暮連翩翼俱向上林棲風多前歸駛雲暗後羣迷路逺聲難徹飛斜行未齊應從故鄉返幾過入蘭閨借問倡樓妾何如蕩子妻詠晩棲烏鳥鵲夜南飛良人行未歸池水浮明月寒風送擣衣願織回文錦因君寄武威寒宵三韻秋夜九重空蕩子怨房櫳鐙光入綺帷簾影進屏風金徽調玉軫兹夜撫離鴻詠秋夜武陵王紀詩四首燕姬奏妙舞鄭女發清歌回羞出慢臉送態入嚬蛾寜殊值行雨詎減見凌波想君愁日暮應羡魯陽戈同蕭長史看妓昨夜夢君歸賤妾下鳴機懸知君意薄不著去時衣故言如夢裏賴得雁書飛和湘東王夜夢應令晨禽爭學囀朝花亂欲開鑪烟入斗帳屏風隱鏡臺紅妝隨淚盡蕩子何時回曉思歛色金星聚縈悲玉筯流願君看海氣憶妾上髙樓閨妾寄征人玉臺新詠巻七欽定四庫全書玉臺新詠巻
