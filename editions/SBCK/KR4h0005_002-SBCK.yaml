front:
  text: 玉臺新詠卷之二
  hash: sha256:3091bfc4b922e3f3d26a39713bd7bd4822fb9e615e5607d81383b058e66ad41b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0005_SBCK_002-1a}
body:
  text: 於清河見輓船士新婚别妻魏文帝與君結新婚宿昔當别離凉風動秋草蟋蟀鳴相隨冽冽寒蟬吟蟬吟抱枯枝枯枝時飛揚身體忽遷移不悲身遷移但惜歲月馳歲月無窮極㑹合安可知願爲双黃鵠比翼戯清池清河一首方舟戯長水湛淡自浮沉絃歌發中流悲響有餘音音聲入君懷悽愴傷人心心傷安所念但願恩情深願爲晨風鳥双飛翔北林塘上行甄皇后蒲生我池中其葉何離離傍能行仁義莫若妾自知衆口鑠黄金使君生别離念君去我時獨愁常苦悲想見君顏色感結傷心脾念君常苦悲夜夜不能寐莫以賢豪故棄􅂢素所愛莫以魚肉賤棄捐葱與薤莫以麻枲賤棄捐營與蒯岀亦復苦愁入亦復苦愁邊地多悲風樹木何修修從君致獨樂延年壽千秋雜詩二首并序王宋王宋者平虜􅀅軍劉勲妻也入門二十年後勲悅山陽司馬氏女以宋無子出之還於道中作詩其一翩翩牀前帳張以蔽光輝昔將爾同去今􅀅爾同歸緘藏篋笥裏當復何時披其二誰言去婦薄去婦情更重千里不唾井况乃昔所奉遠望未爲遥踟躕不得住雜詩五首曹植其一明月照高樓流光正徘徊上有愁思婦悲歎有餘哀借問歎者誰言是客子妻君行踰十年孤妾當獨栖君若清路塵妾􅀂濁水泥浮沉各異勢㑹合何時諧願爲西南風長逝入君懷君懷時不開妾心當何依其二西北有織婦綺縞何繽紛眀晨秉機杼日莫不成文太息終長夜悲嘯入靑雲妾身守空房良人行從軍自期三年歸今已歷九春􅀌鳥繞林翔嗷嗷鳴索群願爲南流景馳光見我君其三微隂翳陽景清風飄我衣逰魚潛渌水翔鳥薄天飛眇眇客行去遥役不得歸始岀嚴霜結今夜白露晞逰子歎黍離䖏者歌式微慷􅁣對嘉賓悽愴内傷悲其四攬衣出中閨逍遥歩兩楹閒房何寂寞綠草破堦庭空室自生風百鳥翩南征春思安可忘憂慼與我并佳人在遠道妾身獨單煢懽㑹難再遇蘭芝不重榮人皆弃舊愛君豈􅀂平生􅀉松爲女蘿依水如浮萍束身奉衿帶朝夕可墮傾儻願終盻盻永副我中情其五南國有佳人容華若李朝逰桃江北岸夕宿湘川沚時俗薄朱顏誰爲發皓齒俛仰􅀊􅀅暮榮曜難永恃美女篇美女妖且閒採桑岐路間長條紛冉冉落葉何翩翩攘袖見素手皓腕約金環頭上金雀􅁫腰佩翠琅玕明珠交玉体珊瑚間朱顏羅衣何飄飄輕裙隨風還顧盻爲光彩長嘯氣若蘭行徒用息駕休者以忘飱借問女安居乃在城南端青樓臨大路高門結重􅀜容華輝朗日誰不希令顏媒氏何所營玉帛不時安佳人慕高義求賢良獨難衆人何嗷嗷安知彼所歡盛年處房室中夜起長歎種􅁑篇種葛􅀯山下葛蔓自成隂與君初婚時結髮恩義深歡愛在枕席宿昔同衣衾竊慕棠棣篇好樂如瑟琴行年􅀅晚暮佳人懷異心恩絶曠不接我情逐抑沈出門當何顧徘徊歩北林下有交頸獸仰見雙栖禽攀枝長歎息淚下沾羅衿良馬知我愁延頸對我吟昔爲同池魚今若商與參往古皆歡遇我獨困於今棄置委天命悲愁安可任浮萍篇浮萍􅀉清水隨風東西流結髮辭嚴親來爲君子逑恪勤在朝夕無端􅀗罪尤在昔􅀩恩惠和樂如瑟琴何意今摧頽曠若商與參茱茰自有芳不􅀂桂與蘭新人雖可愛無若故人歡行雲有反期君恩儻中還慊慊仰天嘆愁心􅀅何愬日月不常處人生忽若寓悲風來入懷淚落如垂露小篋造裳衣裁縫紈與素棄婦詩曹植石榴植前庭綠葉摇縹靑丹華灼烈烈惟彩有光榮光好曄流離可以處淑靈有鳥飛來集樹翼以悲鳴夫何爲丹華丹華實不成拊心長歎息無子當歸寧有子月經天無子若流星天月相終始流星沒無精栖遲失所宜下與瓦石并憂懷從中來歎息通雞鳴返側不能寐逍遥於前庭踟躕還入房肅肅帷幕聲褰幃更攝帶撫弦彈素箏慷􅁣有餘音要妙悲且清收淚長歎息何以􅀒神靈招摇待霜露何必春夏成晚穫爲良實願君且安寧樂府二首魏明帝其一昭昭素明月暉光燭我牀憂人不能寐耿耿夜何長微風衝閨闥羅帷自飄颺攬衣曳長帶縱屣下高堂東西安所之徘徊以傍徨春鳥何南飛翩翩獨翶翔悲聲命儔匹哀鳴傷我腸感物懷所思泣涕忽沾裳佇立吐高吟舒憤訴窮蒼其二種瓜東井上冉冉自踰垣與君新爲婚瓜葛相結連􅀉託不肖軀有如􅀝太山莬絲無枝株蔓延自登縁萍藻託清流常恐身不全被􅀩丘山惠賤妾執拳拳天日昭知之想君亦俱然詠懷詩二首阮籍其一二妃㳺江濵逍遥從風翔交甫解環佩婉孌有芬芳猗靡情歡愛千載不相忘傾城迷下蔡容好結中腸感激生憂思萱草樹蘭房膏沐爲誰施其雨怨朝陽如何金石交一旦便離傷其二昔日䌓華子安陵與龍陽夭夭桃李花灼灼有輝光悅懌􅀂九春磬折似秋霜流眄發媚姿言笑吐芬芳携手等歡愛宿昔同衾裳願爲雙飛鳥比翼共翶翔丹青著眀誓永世不相忘樂府七首傳玄靑靑河邊草篇靑靑河邊草悠悠萬里道草生在春時遠道還有期春至不草生期盡歎無聲感物懷思心夢想發中情夢君如鴛鴦比翼雲間翔旣􅁴寂無見曠如參與商夢君結同心北翼逰北林旣斍寂無見曠如商與參河洛自用固不如中岳安回流不汲汲浮雲往自還悲風動思心悠悠誰知者懸景無停居忽如馳駟馬傾耳懷音響轉目涙双墮生存無㑹期要君黃泉下豫章行苦相身爲女卑陋難再陳兒男當門戶墮地自生神雄心志四海萬里望風塵女育無欣愛不爲家所珍長大逃深室藏頭羞見人垂淚適他鄕忽如雨絶雲低頭和顏色素頰結朱唇跪拜無復數婢妾如嚴賔情合双雲漢葵藿傾陽春心乖甚永火百惡集其身玉顏隨年變丈夫多好新昔爲形與影今爲胡與秦胡秦時相見一絶踰參辰艶歌行有女懷芬芳提提歩東廂蛾眉分翠羽明發目清揚丹唇翳皓齒秀色若珪璋巧笑露歡靨衆媚不可詳容儀希世出無乃古毛嬙頭安金歩摇耳繫明月璫珠環約素腕翠爵垂鮮光文袍綴藻黼玉體映羅裳容華旣以艶志節擬秋霜徽音冠青雲聲響流四方妙哉英媛德宜配侯與王靈應萬世合日月時相望媒氏陳束帛羔鴈鳴前堂百兩盈中路起􅀂鵉鳳翔凡夫徒踴躍望絶殊參商怨歌行昭昭朝時日皎皎晨明月十五入君門一别終華髮同心忽異離曠如胡與越胡越有㑹時參辰遼且闊形影雖髣髴音聲寂無達纎絃感促柱觸之哀聲發情思如循環憂來不可遏塗山有餘恨詩人詠采葛蜻蚓吟牀下囘風起幽闥春榮隨露落芙蓉生木末自傷命不遇良辰永乖别已爾可柰何譬如紈素裂􅀌雌翔故巢星流光景絶魂神馳萬里甘心要同穴明月篇皎皎眀月光灼灼朝日輝昔爲春蠒絲今爲秋女衣丹唇列素齒翠彩發蛾眉嬌子多好言歡合易為姿王顏盛有時秀色隨年衰常恐新間舊變故興細微浮萍無根本非水􅀅何依憂喜更相接樂極還自悲秋蘭篇秋蘭䕃玉池池水清且芳芙蓉隨風發中有双鴛鴦双魚自踴躍兩鳥時廻翔君期歷九秋與妾同衣裳西長安行所思􅀆何在乃在西長安何用存問妾香䙞雙珠環何用重存問羽爵翠琅玕今我兮聞君更有􅀆異心香亦不可燒環亦不可沈香燒日有歇環沈日自深和班氏詩一首傳玄秋胡納令室三日宦他鄕皎皎潔婦姿泠泠守空房嬿婉不終久别如參與商憂來猶四海易感難可防人言生日短愁者苦夜長百草揚春華攘腕採柔桑素手尋繁枝落葉不盈筐羅衣翳玉體廻目流彩章君子倦仕歸車馬如龍驤精誠馳萬里旣至兩相忘行人悅令色請息此路傍誘以逢郎喩遂下黃金裝烈烈貞女忿言辭厲秋霜長驅及君室奉金升北堂母立呼婦來歡情樂未央秋胡見此婦惕然懷􅊥湯􅀒心豈不慙永誓非所望清濁自異源鳧鳳不並翔引身赴長流果哉潔婦腸彼夫旣不淑此婦亦太剛情詩五首張華其一北方有佳人端坐鼓鳴琴終晨撫管絃日夕不成音憂來結不觧我思存所欽君子尋時役幽妾懷苦心初爲三載别於今久滯淫昔柳生戶牖庭内自成隂翔鳥鳴翠偶草虫相和吟心悲易感激俛仰淚流衿願託晨風翼束帶侍衣衾其二明月曜清景曨光照玄墀幽人守靜夜廻身入空帷束帶俟將朝廓落晨星稀寐假交精爽覿我佳人姿巧笑媚歡靨縣娟眸與眉寐言増長歎悽然心獨悲其三清風動帷簾晨月燭幽房佳人處遐遠蘭室無容光衿懷擁虚景輕衾覆空牀居歡惜夜促在慼怨宵長撫枕獨吟歎綿綿心内傷其四君居北海陽妾在江南隂懸邈脩途遠山川阻且深承歡注隆愛結分投所欽䘖恩守篤義萬里託徵心其五逰目四野外逍遥獨延佇蘭蕙緣清渠繫華䕃綠墅佳人不在玆取此欲誰與巢居斍風飄穴處識隂雨未曽遠别離安知慕儔侶雜詩二首其一張華逍遥逰春空容與綠流阿白蘋開素葉朱草茂丹華微風摇茞若層波動芰荷榮彩曜中林流馨入綺羅王孫逰不歸脩路邈以遐誰與翫遺芳佇立獨咨嗟其二荏苒日月運寒暑忽流易同好逰不存苕苕逺離析房櫳自來風戶庭無行迹兼葭生牀下蛛蝥綱四璧懷思豈不隆感物重鬱積逰鴈比翼翔歸鴻知接翮來哉彼君子無愁徒自隔内顧詩二首潘岳其一靜居懷所歡登城望四澤春草欝靑靑桑柘何奕奕芳林振朱榮渌水激素石初征冰未泮忽焉袗絺綌漫漫三千里苕苕遠行客馳情戀朱顏寸隂過盈尺夜愁極清晨朝悲終日夕山川信悠永願言良弗􅀗引領訊歸雲沉思不可釋其二獨悲安所慕人生若朝露綿邈􅀉絶域眷戀想平素爾情旣來追我心亦還顧形體隔不達精爽交中路不見山下松隆冬不易故不見陵澗柏歲寒守一度無謂希見疎在遠分彌固悼亡詩二首潘岳其一苒荏冬春謝寒暑忽流易之子歸窮泉重壤永幽隔􅀻懷誰克從淹留亦何益僶俛恭朝命廻心返初役望廬思其人入室想所歷幃屏無髣髴翰墨有餘迹流芳未及歇遺挂猶在壁悵恍如或存回遑忡驚惕如彼翰林鳥雙栖一朝隻如彼逰川魚比目中路析春風縁隟來晨霤依簷滴寢息何時忘沉憂日盈積庶幾有時哀莊缶猶可擊其二皎皎窓中月照我室南端清商􅀿秋至溽暑隨節䦨凛凛凉風升始􅁴夏衾單豈曰無重纊誰與同歲寒歲寒無與同朗月何朧朧展轉眄枕席長簞竟牀空牀空委清塵室虛來悲風獨無李氏靈彷彿覩爾容撫衿長歎息不斍涕沾胷沾胷安能已悲懷從中起寢興自存形遺音猶在耳上慙東門吳下愧􅀩莊子賦詩欲言志零落難具紀命也可柰何長戚自令鄙王昭君辭一首并序石崇王眀君者本爲王昭君以觸文帝諱故改匈奴盛請婚於漢元帝詔以後宮良家子眀君配焉昔公主嫁烏孫令琵琶馬上作樂以慰其道路之思其送眀君亦必爾也其新造之曲多哀聲故叙之於紙云爾我本漢家子將適單于庭辭訣未及終前驅已抗旌僕御涕流離轅馬爲悲鳴哀鬱傷五内泣涙沾珠瓔行行日已遠乃造匈奴城延我於穹盧加我閼氏名殊􅀋非所安雖貴非所榮父子見陵辱對之慙且驚熬身良未易黙黙以苟生荀生亦聊積何思常憤盈願假飛鴻翼棄之以遐征飛鴻不我顧佇立以屏營昔爲匣中玉今爲糞上英朝華不足歡甘爲草秋并傳語後世人遠嫁難爲情嬌女詩一首左思吾家有嬌女皎皎頗白晢小字爲紈素口齒自清歷􅁂髮覆廣額双耳似連璧明朝弄梳臺黛眉􅀋掃跡濃朱衍丹唇黄􅊯瀾漫赤嬌語若連􅃈忿速乃明􅖓握筆利彤管篆刻未期益埶書愛綈素誦習矜所􅀗其姊字惠芳兩目燦如畫輕粧喜樓邊臨鏡忘紡績舉觶擬京兆立的成復易玩弄眉頰間劇兼機杼役從容好趙舞延袖像飛翮上下絃柱際文史輙卷襞顧眄屏風􅀞如見巳指擿丹青日塵闇眀義爲隱􅞾馳騖翔園林菓下皆生摘紅葩掇紫萍蔕實驟抵擲貪華風雨中倐忽數百適務躡霜雪戯重綦常累積并心注肴饌端坐理盤槅翰墨戢閒按相與數離逖動爲罏鉦屈屣履往之適止爲荼菽據吹吁對鼎䥶脂膩漫白袖煙薫染珂錫衣被皆重施難與沈水碧任其孺子意羞受長者責瞥聞當與杖淚掩俱向壁玉臺新詠卷之二玉臺新詠目錄卷之二於清河見輓船士新婚與妻别一首魏文帝清河一首又樂府塘上行一首甄皇后雜詩二首并序劉勲妻王宋雜詩五首曹植樂府三首又棄婦一首又樂府二首魏明帝詠懷詩二首阮籍樂府詩七首傳玄和班氏詩一首又情詩五首張華雜詩二首又内顧詩二首潘岳悼亡詩二首又王昭君辭一首并序石崇嬌女詩一首左思
