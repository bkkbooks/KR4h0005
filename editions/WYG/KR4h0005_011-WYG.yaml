野雲無期兮風有止思心多端兮誰能理燕人美篇傅𤣥擬四愁詩四首并序附盤中詩後昔張平子作四愁詩體小而俗七言類也聊擬而作之名曰擬四愁詩其辭曰我所思兮在瀛洲願為雙鵠戯中流牽牛織女期在秋山髙水深路無由愍余不遘嬰殷憂佳人貽我明月珠何以要之比目魚海廣無舟悵勞劬寄言飛龍天馬駒風起雲披飛龍逝驚波滔天馬不厲何為多念心憂世其一我所思兮在珠崖願為比翼浮清池柔剛合德配二儀形影一絶長别離愍余不遘情如攜佳人貽我蘭蕙草何以要之同心鳥火熱水深憂盈抱申以琬琰夜光寳卞和旣没玉不察存若流光忽電滅何為多念獨藴結其二我所思兮在崑山願為鹿闚虞淵日月囘曜照景天參辰曠隔㑹無縁愍余不遘罹百艱佳人貽我蘇合香何以要之翠鴛鴦懸度弱水川無梁申以錦衣文繡裳三光騁邁景不􅅏鮮矣民生忽如浮何為多念袛自愁其三我所思兮在朔方願為飛鴈俱南翔煥乎人道著三光胡越殊心生異鄉愍余不遘罹百殃佳人貽我羽葆纓何以要之影與形增冰憂結繁華零申以日月指明星星辰有翳日月移駑馬哀鳴慙不馳何為多念徒自虧其四山樹髙鳥鳴悲泉水深鯉魚肥空倉雀常苦飢吏人婦㑹夫希出門望見白衣謂當是而更非還入門中心悲北上堂西入階急機絞杼聲催長歎息當語誰君有行妾念之出有日還無期結巾帶長相思君忘妾天知之妾忘君罪當治妾有行宜知之黄者金白者玉髙者山下者谷姓為蘇字伯玉作人才多智謀足家居長安身在蜀何惜馬嗁歸不數羊肉千斤酒百斛令君馬肥麥與粟今時人智不足與其書不能讀當從中央周四角盤中詩一首張載擬四愁詩四首我所思兮在南巢欲徃從之巫山髙登崖逺望涕泗交我之懷矣心傷勞佳人貽我筒中布何以贈之流黄素願因飄風超逺路終然莫致增想慕我所思兮在朔湄欲徃從之白雪霏登崖永眺涕泗頺我之懷矣心傷悲佳人遺我雲中翮何以贈之連城璧願因歸鴻起遐隔終然莫致增永積我所思兮在隴原欲徃從之隔泰山登崖逺望涕泗連我之懷矣心傷煩佳人遺我雙角端何以贈之雕玉環願因行雲超重巒終然莫致增永歎我所思兮在營州欲徃從之路阻脩登崖逺望涕泗流我之懷矣心傷憂佳人遺我緑綺琴何以贈之雙南金願因流波超重深終然莫致增永吟晉惠帝時童謠歌一首鄴中女子莫千妖前至三月抱胡腰陸機樂府燕歌行一首四時代序逝不追寒風習習落葉飛蟋蟀在堂露盈階念君逺遊常苦悲君何緬然乆不歸賤妾悠悠心無違白日旣没明鐙煇寒禽赴林匹鳥棲雙鳩關關宿河湄憂來感物涕不晞非君之念思為誰别日何早㑹何遲鮑照雜詩八首淮南王好長生服食鍊氣讀仙經琉璃藥盌牙作盤金鼎玉匕合神丹合神丹戯紫房紫房彩女弄明璫鸞歌鳯舞斷君腸朱城九門門九開願逐明月入君懐入君懐結君珮怨君恨君恃君愛築城思堅劒思利同盛同衰莫相棄代淮南王二首朱唇動素腕舉洛陽少年邯鄲女古稱緑水今白紵催弦急管為君舞窮秋九月荷葉黄北風驅鴈天雨霜夜長酒多樂未央春風澹蕩使思多天色淨緑氣妍和桃含紅蕚蘭紫牙朝日灼爍發園花巻櫎結帷羅玉筵齊謳秦吹盧女弦千金顧笑買芳年代白紵歌辭二首中庭五株桃一株先作花陽春妖冶二三月從風簸蕩落西家西家思婦見之惋零淚霑衣撫心歎初送我君出户時何言淹留節回換牀席生塵明鏡垢纎腰瘦削髪蓬亂人生不得常稱意惆悵徙倚至夜半剉蘗染黄絲黄絲厯亂不可治昔我與君始相值爾時自謂可君意結帶與我言死生好惡不相置今日見我顏色衰意中錯漠與先異還君玉釵瑇瑁簪不忍見之益悲思奉君金巵之酒盌瑇瑁玉匣之雕琴七彩芙蓉之羽帳九華蒲萄之錦衾紅顏零落嵗将暮寒花宛轉時欲沈願君裁悲且滅思聽我抵節行路吟不見柏梁銅雀上寜聞古時清吹音璿閨玉墀上椒閣文忩繡戸垂綺幕中有一人字金蘭被服纎羅蕰芳霍春鷰差池風散梅開帷對影弄禽雀含歌攬淚不能言人生幾時得為樂寜作野中雙飛鳬不願雲間别趐鶴行路難四首釋寶月行路難一首君不見孤鴈關外發酸嘶度楊越空城客子心腸斷幽閨思婦氣欲絶凝霜夜下拂羅衣浮雲中斷開明月夜夜遙遙徒相思年年望望情不歇寄我匣中青銅鏡倩人為君除白髪行路難行路難夜聞南城漢使度使我流淚憶長安陸厥李夫人及貴人歌一首屬車挂席塵豹尾香烟滅彤殿向蘼蕪青蒲復委絶坐委絶對蘼蕪臨丹階泣椒塗寡鶴羈雌飛且上雕梁翠壁網踟蛛洞房明月夜對此淚如珠沈約雜詩八詠四首望秋月秋月光如鍊照曜三爵臺徘徊九華殿九華瑇瑁梁華榱與壁璫以兹雕麗色持照明月光凝華入黼帳清暉懸洞房先過飛鷰户却照班姬牀桂宫裊裊落桂枝寒露淒凄凝白露上林晩葉颯颯鳴鴈門早鴻離離度湛秀質兮似規委清光兮如素照愁軒之蓬影映金階之輕步居人臨此笑以歌别客對之傷且慕經衰圃映寒叢凝清夜帶秋風隨庭雪以偕素與池荷而共紅臨玉墀之皎皎含霜靄之濛濛轥天衢而徒步轢長漢而飛空隱巖崖而半出隔帷櫎而纔通散朱庭之奕奕入青瑣而玲瓏閒階悲寡鵠沙州怨别鴻昭姬泣胡殿明君思漢宫余亦何為者淹留此山東望秋月臨春風春風起春樹遊絲曖如網落花雰似霧先泛天淵池還過細栁枝蜨逢飛搖颺鷰值羽差池揚桂斾動芝蓋開燕裾吹趙帶趙帶飛參差燕裾合且離回簪復轉黛顧步惜容儀容儀已炤灼春風復回薄氛氲桃李花青柎含素蕚旣為風所開復為風所落搖緑蔕杭紫莖舞春雪雜流鶯曲房開兮金鋪響金鋪響兮妾思驚梧桐未陰淇川如碧迎行雨於髙唐送歸鴻於碣石經洞房響紈素感幽閨思帷帟想芳園可以遊念蘭翹兮漸堪摘拂明鏡之冬塵解羅衣之秋襞旣鏗鏘以動珮又氛氲而流麝始搖蕩以入閨終徘徊而縁隙鳴珠簾於繡户散芳塵於綺席是時悵思婦安能乆行役佳人不在兹春風為誰惜臨春風蘭葉參差桃半紅飛芳舞縠戯春風翡翠羣飛飛不息願在雲間長比翼春日白紵曲一首白露欲凝草已黄金琯玉柱響洞房雙心一影俱回翔吐情寄君君莫忘秋日白紵曲一首呉均行路難二首君不見上林苑中客冰羅霧縠象牙席盡是得意忘言者探腸見膽無所惜白酒甜鹽甘如乳緑觴皎鏡華如碧少年持名不肯嘗安知白駒應過隙博山鑪中百和香鬱金蘇合及都梁逶迤好氣佳容貎經過青瑣厯紫房已入中山陰后帳復上皇帝班姬牀班姬失寵顏不開奉帝供養長信臺日暮耿耿不能寐秋風切切四靣來玉階行路生細草金鑪香炭變成灰得意失意須臾頃非君方寸逆所裁洞庭水上一株桐經霜觸浪困嚴風昔時㨨心曜白日今旦臥死黄沙中洛陽名工見咨嗟一剪一刻作琵琶白璧規心學明月珊瑚映靣作風花帝王見賞不見忘提攜把握登建章掩抑摧藏張女彈殷勤促柱楚明光年年月月對君子遥遙夜夜宿未央未央彩女弃鳴箎爭見拂拭生光儀茱萸錦衣玉作匣安念昔日枯樹枝不學衡山南嶺桂至今千年猶未知張率雜詩四首長相思乆離别美人之逺如雨絶獨延佇心中結望雲去去逺望鳥飛飛滅空望終若斯珠淚不能雪長相思乆别離所思何在若天垂鬱陶相望不得知玉階月夕映羅帷羅帷風夜吹長思不能寢坐望天河移擬樂府長相思二首歌兒流唱聲欲清舞女趁節體自輕歌舞並妙㑹人情依弦度曲婉盈盈揚蛾為態誰目成妙聲屢唱輕體飛流津染靣散芳菲俱動齊息不相違令彼嘉客澹忘歸時乆翫夜明星稀白紵歌辭二首費昶行路難二首君不見長安客舍門倡家少女名桃根貧窮夜紡無鐙燭何言一朝奉至尊至尊離宫百餘處千門萬户不知曙惟聞啞啞城上烏玉欄金井牽鹿盧丹梁翠柱飛屠蘇香薪桂火炊彫胡當年翻覆無常定薄命為女何必麤君不見人生百年如流電心中埳君不見我昔初入椒房時詎減班姬與飛鷰朝踰金梯上鳯樓暮下瓊鉤息鸞殿柏臺晝夜香錦帳自飄颺笙歌膝上吹琵琶陌上桑過蒙恩所賜餘光曲霑被旣逢陰后不自專復值程姬有所避黄河千年始一清微軀再逢永無議蛾眉偃月徒自妍傳粉施朱欲誰為不如天淵水中鳥雙去雙歸長比翅梁簡文雜題一十二首芙蓉作船絲作䋏北斗横天月將落采蓮渡頭礙黄河郎今欲渡畏風波浮雲似帳月成鈎那能夜夜南陌頭宜城􅀈酒今行熟停鞍繫馬暫棲宿青牛丹轂七香車可憐今夜宿倡家倡家髙樹烏欲棲羅帷翠帳向君低織成屏風銀屈膝朱唇玉靣鐙前出相看氣息望君憐誰能含羞不自前烏棲曲四首雲中亭幛羽檄驚甘泉烽火通夜明貳師將軍新築營嫖姚校尉初出征復有山西將絶世受雄名三門應遁甲五壘學神兵白雲隨陣色蒼山答鼓聲邐迤觀鵝翼參差覩鴈行先平小月陣却滅大宛城善馬還長樂黄金付水衡小婦趙人能鼓瑟侍婢初筓解鄭聲庭前桃花飛已合必應紅妝起見迎雜句從軍行一首别觀蒲萄帶實垂江南荳蔻生連枝無情無意猶如此有心有恨徒别離蜘蛛作絲滿帳中芳草結葉當行路紅臉脉脉一生嗁黄鳥飛飛有時度故人雖故昔經新新人雖新復應故可憐淮水去來潮春隄楊栁覆河橋淚跡未􅏫詎終朝行聞玉珮已相要桃紅李白若朝莊羞持憔悴比新楊不惜暫住君前死愁無西國更生香和蕭侍中子顯春别四首蜨黄花紫鷰相追楊低栁合路塵飛已見垂鉤挂緑樹誠知淇水霑羅衣兩童夾車問不已五馬城南猶未歸鶯嗁春欲駛無為空掩扉雜句春情一首窺紅對鏡歛雙眉含愁拭淚坐相思念人一去許多時眼語笑靨迎來情心懐心想甚分明憶人不忍語銜恨獨吞聲擬古一首朝日斜來照尸春鳥爭飛出林片光片影皆麗一聲一囀煎心上林紛紛花落淇水漠漠苔浮年馳節流易盡何為忍憶含羞倡樓怨節一首湘東王春别應令四首七言昆明夜月光如練上林朝花色如霰花朝月夜動春心誰忍相思不相見試看機上文龍錦還瞻庭裏合歡枝映日通風影朱幔飄花拂葉度金池不聞離人當重合惟悲合罷㑹成離門前楊栁亂如絲直置佳人不自持適言新作裂紈詩誰悟今成織素辭日暮徙倚渭橋西正見涼月與雲齊若使月光無近逺應照離人今夜嗁蕭子顯雜詩七首翻鶯度鷰雙比翼楊栁千條共一色但看陌上攜手歸誰能對此空中憶幽宫積草自芳菲黄鳥芳樹情相依爭風競日常聞響重花叠葉不通飛當知此時動妾思慙使羅袂拂君衣江東大道日華春垂楊挂栁埽輕塵淇水昨送淚霑巾紅妝宿昔已應新銜悲攬涕别心知桃花李色任風吹本知人心不似樹可意人别似花離春别四首握中酒桮瑪瑙鍾裾邉雜珮琥珀龍欲持寄君心不惜共指三星今何夕淚黛紅輕㸃花色還欲令人不相識金壺夜水誰能多莫持賖用比懸河樂府烏棲曲應令二首風光遲舞出青蘋蘭條翠鳥鳴發春洛陽梨花落如雪河邉細草細如茵桐生井底葉交枝今看無端雙鷰離五重飛樓入河漢九華閣道暗清池遙看白馬津上吏傳道黄龍征戍兒明月金光徒照妾浮雲玉葉君不知思君昔去栁依依至今八月避暑歸明珠蠶繭勉登機鬱金香蘤特香衣洛陽城頭鷄欲曙丞相府中烏未飛夜夢征人縫狐貉私憐織婦裁錦緋呉刀鄭綿絡寒閨夜被薄芳年海上水中鳬日暮寒夜空城雀燕歌行王筠行路難一首千門皆閉夜何央百憂俱集斷人腸探揣箱中取刀尺拂拭機上斷流黄情人逐情雖可恨復畏邉逺乏衣裳已繅一繭催衣縷復擣百和裛衣香猶憶去時腰大小不知今日身短長裲襠雙心共一袜衵複兩邉作八襊襻帶雖安不忍縫開孔裁穿猶未逹胷前却月兩相連本照君心