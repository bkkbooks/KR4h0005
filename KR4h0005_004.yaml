body:
  text: 王僧達七夕月下遠山斂氛祲廣庭揚月波氣往風集隙秋還露泫柯節期既已孱中宵振綺羅來歡詎終夕收淚泣分河為織女贈牽牛婺女儷經星姮娥棲飛月慚無二媛靈託身侍天闕閶闔殊未輝咸池豈沐髮漢陰不夕張長河為誰越雖有促宴期方須涼風發虛計雙曜周空遲三星沒非怨杼軸勞但念芳菲歇秋胡詩九首椅梧傾高鳳寒谷待鳴律影響豈不懷自遠每相匹婉彼幽間女作嬪君子室峻節貫秋霜明艷侔朝日嘉運既我從欣願自此畢燕居未及歡良人顧有違脫巾千里外結綬登王畿戒徒在昧旦左右來相依驅車出郊郭行路正倭遲存為久離別沒為長不歸嗟余怨行役三陟窮晨暮嚴駕越風寒解鞍犯霜露原隰多悲涼回飆卷高樹離獸起荒蹊驚鳥縱橫去悲哉遊宦子勞此山川路迢遙行人遠婉轉年運徂良時為此別日月方向除孰知寒暑積僶俯見榮枯歲暮臨空房涼風起坐隅寢興日已寒白露生庭蕪勤役從歸願反路遵山河昔辭秋未素今也歲載華蠶月歡時暇桑野多經過佳人從所務窈窕援高柯傾城誰不顧弭節停中阿年往誠思勞事遠闊音形雖為五載別相與昧平生捨車遵往路鳧藻馳目成南金豈不重聊自意所輕義心多苦調密比金玉聲高節難久淹朅來空復辭遲遲前途盡依依造門基上堂拜嘉慶入室問何之日暮行採歸物色桑榆時美人望昏至慚嘆前相持有懷誰能已聊用申苦難離居殊年歲一別阻河關春來無時豫秋至應早寒明發動愁心閨中起長歎慘悽歲方晏落日遊子顏高張生絶絃聲急由調起自昔枉光塵結言固終始如何久為別百行愆諸己君子失時義誰與偕沒齒愧彼行露詩甘之長川汜玩月城西門廨中始見西南樓纖纖如玉鉤末映東北墀娟娟似蛾眉蛾眉蔽珠櫳玉鉤隔綺窗三五二八時千里與君同夜移衡漢落徘徊帷幌中歸華先委露別葉早辭風客遊厭辛苦仕子倦飄塵休瀚自公日宴慰及私辰蜀琴抽白雪郢曲繞陽春肴乾酒未缺金壺啓夕輪回軒駐輕蓋留酌待情人代京雒篇鳳樓十二重四戶八綺窗繡桷金蓮花桂柱玉盤龍珠簾無隔露羅幌不勝風寶帳三千萬為爾一朝容揚芬紫煙上垂綵緑雲中春吹回白日霜歌落塞鴻但懼秋塵起盛愛逐衰蓬坐視青苔滿臥對錦筵空琴瑟縱橫散舞衣不復縫古來皆歇薄君意豈獨濃唯見雙黃鵠千里一相從擬樂府白頭吟直如朱絲繩清如玉壺冰何慚宿昔意猜恨坐相仍人情賤恩舊世義逐衰興毫髮一為瑕丘山不可勝食苗實碩鼠點白信蒼蠅鳧鵠遠成美薪芻前見凌申黜褒女進班去信姬升周王日淪惑漢帝益嗟稱心賞猶難恃貌恭豈易憑古來共如此非君獨撫膺採桑詩季春梅始落女工事蠶作採桑淇洧間還戲上宮閣早蒲時結陰晚篁初解籜藹藹霧滿閨融融景盈幕乳燕逐草蟲巢蜂拾花萼是節最暄妍佳服又新爍欽歎對迥塗陽歌弄場藿抽琴試佇思薦珮杲誠託承君郢中美服義久心諾衛風古愈艷鄭俗舊浮薄虛願悲渡湘空賦笑瀍洛盛明難重來淵意為誰涸君其且調絃桂酒妾行酌夢還詩銜淚出郭門撫劍無人逵沙風暗塞起離心眷鄉畿夜分就孤枕夢想暫言歸孀婦當戶歎繅絲復鳴機慊款論久別相將還綺幃靡靡簷下涼朧朧窗裏暉刈蘭爭芬芳採菊競葳蕤開奩集香蘇探袖解纓徽寐中長路近覺後大江違驚起空歎息恍惚神魂飛白水漫浩浩高山壯巍巍波潮異往復風雲改榮衰此土非吾土慷慨當訴誰擬古河畔草未黃胡鷹已矯翼秋蟲挾戶吟寒婦晨夜織去歲征人還流傳舊相識聞君上壠時東望久歎息宿昔改衣帶旦暮異容色念此憂如何夜長愁更多明鏡塵匣中寶琴生網羅詠雙燕雙燕戲雲崖羽翮始差池出入南閨裏經過北堂垂意欲巢君幕層楹不可窺沉吟芳歲晚徘徊韶景移悲歌辭舊愛銜泥覓新知贈故人馬子喬二首寒灰滅更然夕華晨更鮮春冰雖暫解冬冰還復堅佳人捨我去賞愛長絶緣歡至不留時每念輒傷年贈故人馬子喬二首雙劍將別離先在匣中鳴煙雨交將夕從此遂分形雌沉吳江水雄飛入楚城吳江深無底楚闕有崇扃一為天地別豈直限幽明神物終不隔千祀儻還并學阮步兵體沉情發遐慮紆鬱懷所思髣佛聞簫管鳴鳳接嬴姬聯綿共雲翼嬿婉相攜持寄言芳華士寵利不常期涇渭分清濁視彼國風詩擬樂府四首飛來雙白鵠可憐雙白鵠雙雙絶塵氛連翩弄光景交頸遊青雲逢羅復逢繳雌雄一旦分哀聲流海曲孤叫出江濆豈不慕前侶為爾不及群步步一零淚千里猶待君樂哉新相知悲矣生別離持此百年命共逐寸陰移譬如空山草零落心自知陽春曲百里望咸陽知是帝京邑緑樹搖雲光春城起風色佳人愛景華流靡園塘側妍姿艷月映羅衣飄蟬翼宋玉歌陽春巴人長歎息雅鄭不同賞那令君愴惻生平重愛惠私自憐何極長別離生離不可聞況復長相思如何與君別當我盛年時蕙花每搖蕩妾心空自持榮乏草木歡悴極霜露悲富貴身難老貧賤顏易衰持此斷君腸君亦宜自疑淮陰有逸將折翮謝翻飛楚亦扛鼎士出門不得歸正為隆準公杖劍入紫微君才定何如白日下爭暉長相思晨有行路客依依造門端人馬風塵色知從河塞還時我有同栖結官遊邯鄲將不異客子分飢復共寒煩君尺帛書寸心從此殫道妾長憔悴豈復歌笑顏簷隱千霜樹庭枯十載蘭經春不舉袖秋落寧復看一見願道意君門已九關虞卿棄相印簷笠為同歡閨陰欲早霜何事空盤桓擬青青河畔草裊裊臨窗竹藹藹垂門桐灼灼青軒女泠泠高堂中明志逸秋霜玉顏掩春紅人生誰不別恨君早從戎鳴絃慚夜月紺黛羞春風擬客從遠方來客從遠方來贈我漆鳴琴木有相思文絃有別離音終身執此調歲寒不改心願作陽春曲宮商長相尋題書後寄行人自君之出矣臨軒不解顏砧杵夜不發高門晝常關帳中流熠耀庭前華紫蘭楊枯識節異鴻來知客寒遊月暮冬盡除春待君還古意贈今人寒鄉無異服褐氈代文練月月望君歸年年不解綖荊揚春早和幽冀猶霜霰北寒妾已知南心君不見誰為道辛苦寄情雙飛燕形迫杼煎絲顏落風催電容華一朝改唯餘心不變代葛沙門妻郭小玉詩二首明月何皎皎垂幌照羅茵若共相思夜知同憂怨晨芳華豈矜貌霜露不憐人君非青雲逝飄迹事咸秦妾持一生淚經秋復度春君子將徭役遺我雙題錦臨當欲去時復留相思枕題用常著心枕以憶同寢行行日已遠轉覺思彌甚詠七寶扇妙縞貴東夏巧緩出吳闉裁狀白玉璧縫似明月輪表裹鏤七寶中銜駭雞珍畫作景山樹圖為河洛神來延揮握玩入與鐶釧親生風長袖際晞華紅粉津拂眄迎嬌意隱映含歌人時移務忘故節改競存新卷情隨象簟舒心謝錦茵厭歇何足道敬哉先後晨聽鄰妓披衽乏遊術憑軾寡文才蓬門長自寂虛席視生埃貴里臨倡館東鄰歌吹臺雲間嬌響徹風末艷聲來飛華瑤翠幄揚芬金碧杯久絶中州美從念尸鄉灰遺情悲近世中山安在哉古意二首遊禽暮知返行人獨不歸坐銷芳草氣空度明月輝嚬容入朝鏡思淚點春衣巫山綵雲沒淇上緑楊稀待君竟不至秋雁雙雙飛霜氣下孟津秋風度函谷念君凄已寒當軒卷羅縠纖手廢裁縫曲鬢罷膏沐千里不相聞寸心鬱氛氳況復飛螢夜木葉亂紛紛詠琵琶抱月如可明懷風殊復清絲中傳意緒花裏寄春情掩抑有奇態悽鏘多好聲芳袖幸時拂龍門空自生詠幔幸得與珠綴羃䍥君之楹月映不辭卷風來輒自輕每聚金爐氣時駐玉琴聲但願置尊酒蘭缸當夜明巫山高響像巫山高薄暮陽臺曲煙霞乍舒卷蘅芳自斷續彼美如可期寤言紛在屬撫然坐相思秋風下庭緑贈王主簿二首日落窗中坐紅粧好顏色舞衣襞未縫流黃覆不織蜻蛉草際飛遊蜂花上食一遇長相思願寄連翩翼清吹要碧玉調絃命緑珠輕歌急綺帶含笑解羅襦餘曲詎幾許高駕且踟蹰徘徊憐暮景唯有洛城隅同王主簿怨情掖庭娉絶國長門失歡宴相逢詠蘼蕪辭寵悲團扇花叢亂數蝶風簾入雙燕徒使春帶賒坐惜紅顏變平生一顧重夙昔千金賤故人心尚爾故心人不見夜聽妓二首瓊閨釧響聞瑤席芳塵滿要取洛陽人共命江南管情多舞態遲意傾歌弄緩知君密見親寸心傳玉鋺上客光四座佳麗直千金挂叉報纓絶墮珥答琴心蛾眉已共笑清香復入襟歡樂夜方靜翠帳垂沉沉詠邯鄲故才人嫁為厮養卒婦生平宮閣裏出入侍丹墀開笥方羅縠窺鏡比蛾眉初別意未解去久日生悲憔悴不自識嬌羞餘故姿夢中忽髣佛猶言承宴私秋夜秋夜促織鳴南鄰搗衣急思君隔九重夜夜空佇立北窗輕幔垂西戶月光入何知白露下坐視前階濕誰能長分居秋盡冬復及雜詩五首燈發翠斜漢裏蓄寶宕山峰抽莖類仙掌銜光似燭龍飛蛾再三繞輕花四五重孤對相思夕空照舞衣縫燭杏梁賓未散桂宮明欲沉曖色輕帷裏低光照寶琴徘徊雲髻影灼爍綺疏金恨君秋月夜遺我洞房陰席本生朝夕池落景照參差汀洲蔽杜若幽渚奪江蘺遇君時採擷玉座奉金巵但願羅衣拂無使素塵彌鏡臺玲瓏類丹檻苕亭似玄闕對鳳縣清冰垂龍挂明月照粉拂紅粧插花理雲髮玉顏徒自見常畏君情歇落梅新葉初苒苒初蕊新霏霏逢君後園宴相隨巧笑歸親勞君王指擲以贈南威用持插雲髻翡翠比光暉日暮長零落君思不可追中山王孺子妾歌如姬寢臥內班妾坐同車洪波陪飲帳林光宴春餘歲暮寒飆及秋水落芙蕖子瑕矯後駕安陵泣前魚賤妾終已矣君子定焉如雜詩趙女修麗姿燕姬正容飾粧成桃毀紅黛起草慚色羅裙數十重猶輕一蟬翼不言縠袖軟專歎風多力鏘珮玉池邊弄笑銀臺側折柳貽目成採蒲贈心識來時嬌未盡還去媚何極鮑照朗月出東山照我綺窗前窗中多佳人被服妖且妍靚妝坐帷裏當戶弄清弦鬢奪衛女迅體絶飛燕先為君歌一曲當作朗月篇酒至顏自解聲和心亦宣千金何足重所存意氣間東門行傷禽惡弦驚倦客惡離聲離聲斷客情賓御皆涕零涕零心斷絶將去復還訣一息不相知何況異鄉別遙遙征駕遠杳杳白日晚居人掩閨臥行子夜中飯野風吹草木行子心腸斷食梅常苦酸衣葛常苦寒絲竹徒滿座憂人不解顏長歌欲自慰彌起長恨端芳樹相思早春日煙華雜如霧復此佳麗人含情結芳樹綺羅已自憐萱風多有趣去來徘徊者佳人不可遇回文詩枝大柳塞北葉暗榆關東垂條逐絮轉落蕊散花業池蓮照曉月幔錦披朝風低吹雜綸羽薄粉艷粧紅離情隔遠道歎結深閨中蕭咨議西上夜禁徘徊將所愛惜別在河梁襟袖三春隔江山千里長寸心無遠近邊地有風霜勉哉勤歲暮敬矣慎容光山中殊未懌杜若空自芳銅雀臺妓繐幃飄井幹樽酒若平生鬱鬱西陵樹詎聞鼓吹聲芳襟染淚迹嬋娟空復情玉座猶寂寞況乃妾身輕贈故人芳洲有杜若可以慰佳期望望忽超遠何由見所思我行未千里山川已間之離居方歲月佳人不在茲清風動簾夜孤月照窗時安得同攜手酌酒賦新詩別江水曹山中上芳月故人清樽賞遠山翠百重回流映千丈花枝聚如雪垂藤散似網別後能相思何嗟異風壤離夜詩玉繩隱高樹斜漢映層臺離堂華燭盡別幌清琴哀翻潮尚知恨客思眇難裁山川不可盡況乃故人杯詠竹火籠庭雪亂如花井冰粲成玉因炎入貂袖懷溫奉芳褥體密用宜通文斜性非曲暫承君王旨請謝陽春旭邯鄲行趙女擫鳴琴邯鄲紛屣步長袖曳三街兼金輕一顧有美獨臨風佳人在遐路相思欲褰衽叢臺日已暮自君之出矣楊柳正依依君出無消息惟見黃鶴飛關山多險阻士馬少光輝流年無止極君去何時歸
