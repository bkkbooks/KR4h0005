  - {type: variant, offset: 3603, length: 355, content: 山千里長寸心無遠近邊地有風霜勉哉勤歲暮敬矣慎容光山中殊未懌杜若空自芳銅雀臺妓繐幃飄井幹樽酒若平生鬱鬱西陵樹詎聞鼓吹聲芳襟染淚迹嬋娟空復情玉座猶寂寞況迺妾身輕贈故人芳洲有杜若可以慰佳期望望忽超遠何由見所思我行未千里山川已間之離居方歲月佳人不在茲清風動簾夜孤月照窗時安得同攜手酌酒賦新詩別江水曹山中上芳月故人清樽賞遠山翠百重迴流映千丈花枝聚如雪垂籐散似網別後能相思何嗟異風壤離夜詩玉繩隱高樹斜漢映層臺離堂華燭盡別幌清琴哀翻潮尚知恨客思眇難裁山川不可盡況乃故人桮詠竹火籠庭雪亂如花井冰粲成玉因炎入貂袖懷溫奉芳褥體密用宜通文斜性非曲暫承君王旨請謝陽春旭邯鄲行趙女擫鳴琴邯鄲紛躧步長袖曳三街兼金輕一顧有美獨臨風佳人在遐路相思欲褰衽叢臺日已暮自君之出矣楊柳正依依君出無消息惟見黃鶴飛關山多險阻士馬少光輝流年無止極君去何時歸, WYG: 淹四首逺}
