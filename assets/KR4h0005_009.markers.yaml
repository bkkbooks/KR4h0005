  - {type: variant, offset: 8134, length: 378, content: 工歌巧舞入人意白日西傾楊柳垂含情弄態兩相知西飛迷雀東羈雉倡樓秦女乍相值誰家妖麗鄰中止輕粧薄粉光閭里網戶珠綴曲瓊鉤芳茵翠被香氣流少年年幾方三六含嬌聚態傾人目餘香落蕊坐相催可憐絕世為誰媒燕歌行燕趙佳人本自多遼東少婦學春歌黃龍戍北花如錦元菟城前月似蛾如何此時別夫婿金羈翠眊往交河還聞入漢去燕營怨妾心中百恨生漫漫悠悠天未曉遙遙夜夜聽寒更自從異縣同心別偏恨同時成異節橫波滿臉萬行啼翠眉漸斂千重結并海連天合不開那堪春日上春臺惟見遠舟如落葉復看遙舸似行杯沙汀野鶴嘯羈雌妾心無趣坐傷離翻嗟漢使音塵斷空傷賤妾燕南陲烏栖曲四首沙棠作船桂為楫夜渡江南採蓮葉復值西施新浣紗共泛江干瞻月華月華似碧星如珮流影燈明玉堂內邯鄆九投朝始成金巵銀椀共君傾交龍成錦鬭鳳紋芙蓉為帶石榴裙日下城南兩相忘月沒參橫掩羅帳七彩隨珠九華玉蛺蝶為歌明星曲蘭房椒閣夜方開那知步步香風逐別詩二首別罷花枝不共攀別後, WYG: 庫全}
