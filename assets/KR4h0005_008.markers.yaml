  - {type: variant, offset: 3727, length: 902, content: 年別羅衣雙帶長春樓怨難守玉階空自傷對此歸飛燕啣泥遶曲房差池入綺幕上下傍雕梁故居尤可念故人安可忘相思昏望絕宿昔夢容光魂交忽在御轉側定他鄉徒然居枕席誰與同衣裳空使蘭膏夜炯炯對繁霜春宵春宵猶自長春心非一傷月帶園樓影風飄花樹香誰能對雙燕暝暝守空床冬曉冬曉風正寒偏念客衣單臨粧罷鉛黛念淚剪綾紈寄語龍城下詎知書信難三婦艷大婦縫羅裙中婦料繡文惟餘最小婦窈窕舞昭君丈人慎勿去聽我駐浮雲閨怨本無金屋寵長作玉階悲一乖西北麗寧復城南期永巷愁無盡應門閉有時空勞織素巧徒為團扇辭匡床終不共何由橫自私奉和逐涼詩鐘鳴夜未央避暑起徬徨長河似曳素明星若散璫倚巖欣石冷臨池愛水涼月纖張敞畫荷妖韓壽香對此遊清夜何勞娛洞房塘上行苦辛篇蒲生伊何陳曲中多苦辛黃金坐銷鑠白玉遂淄磷裂衣工毀嫡掩袖切讒新嫌成跡易已愛去理難申秦雲猶變色魯日尚迴輪妾歌已腸斷君心終未親怨退寵辭金屋見譴斥甘泉枕席秋風起房櫳明月懸燭避窗中影香迴爐上煙丹庭斜草徑素壁點苔錢歌起蒲生曲樂奏下山弦新聲昔廣宴餘杯今自傳王嬙向絕漠宗女入祁連雁書猶未返角馬無歸年昭臺省媵御曾坂無棄捐後薪隨復積前魚誰復憐應令詠舞倡女多艷色入選盡華年舉腕嫌衫重迴腰覺態妍情繞陽春吹影逐相思弦履度開裾襵鬟轉匝花鈿所愁餘曲罷為欲在君前應令詠舞新粧本絕世妙舞亦如仙傾腰逐韻管斂衽聽張弦袖輕風易入釵重步難前笑態千金重衣香十里傳時持比飛燕定當誰可憐有所思行佳人遠于隔乃在天一方望望江山阻悠悠道路長別前秋葉落別後春花芳雷歎一聲響雨淚忽成行悵望情無極傾心還自傷隴西行借問隴西行何當驅馬征草合前迷路雲濃後闇城寄語幽閨妾羅袖勿空縈和徐主簿望月樓上徘徊月窗中愁思人照雪光偏冷臨花色轉春星流時入暈桂長欲侵輪願以重光曲承君歌扇塵愛妾換馬渥水出騰駒湘川實應圖來從西北道去逐東南隅琴聲悲玉匣山路泣蘼蕪似鹿將含笑千金會不俱詠美人絳樹及西施俱是好容儀非關能結束本自細腰肢鏡前難並照相將映綠池看粧畏水動歛袖避風吹轉手齊裾亂橫簪歷鬢垂曲中人未取誰堪白日移不分他相識惟聽使君知七夕玉匣卷懸衣高樓開夜扉嫦娥隨月落織女逐星移離前忿促夜別後對空機倩語雕陵鵲填河未可飛遠期篇憶別春花飛已見秋葉稀淚粉羞明鏡愁帶減寬衣得書言未反夢見道應歸坐使紅顏歇獨掩青樓扉和, WYG: 二首}
