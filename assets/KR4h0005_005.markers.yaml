  - {type: variant, offset: 4284, length: 396, content: 望飛鴻鴻飛滿西洲望郎上青樓樓高望不見盡日欄杆頭欄杆十二曲垂手明如玉卷簾天自高海水搖空綠海水夢悠悠君愁我亦愁南風知我意吹夢到西洲潘岳黃門述哀青春速天機素秋馳白日美人歸重泉悽愴無終畢殯宮已肅清松柏轉蕭索俯仰未能弭尋念非但一拊衿悼寂寞怳然若有失明月入綺窗髣髴想蕙質消憂非萱草永懷寄夢寐夢寐復冥冥何由覿爾形我慚北海術爾無帝女靈願言出遠山徘徊泣松銘雨絕無還雲華落豈留英日月方代序寢興何時平塘上行澤蘭被荒徑孤芳豈自通幸逢瑤池曠得與金芝叢朝承紫臺露夕潤淥池風既美修嫮女復悅繁華童夙昔玉霜滿旦暮翠條空葉飄儲胥右芳歇露寒東紀化尚盈昃俗志信頹隆財殫交易絕華落愛難終所惜改歡眄豈恨逐征蓬願回朝陽景持照長門宮秋夜月洛宵向分紫煙鬱氛氳曀曀螢入霧離離雁度雲巴童暗理瑟漢女夜縫裙新知樂如是久要詎相聞詠鶴閑園有孤鶴摧藏信可憐寧望春皋下刷羽翫花鈿何時秋海上照影弄長川曉鳴動遙怨夕唳感孀眠哀咽芳林右憫默華池邊猶冀凌霄志萬里共翩翩, WYG: 賤}
