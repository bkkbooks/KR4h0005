江水清且深何用通音信蓮花瑇瑁簪莵絲從長風根莖無斷絶無情尚不離有情安可别南山一樹桂上有雙鴛鴦千年長交頸歡愛不相忘賈充與妻李夫人連句詩三首室中是阿誰歎息聲正悲賈公歎息亦何為但恐大義虧夫人大義同膠漆匪石心不移賈公人誰不慮終日月有合離夫人我心子所逹子心我亦知賈公若能不食言與君同所宜夫人孫綽情人碧玉歌二首碧玉小家女不敢攀貴德感郎千金意慙無傾城色碧玉破瓜時相為情顛倒感郎不羞難回身就郎抱王獻之詩二首桃葉復桃葉渡江不用檝但渡無所苦我自迎接汝桃葉復桃葉桃葉連桃根相憐兩樂事獨使我殷勤情人桃葉歌桃葉答團扇歌三首七寶畫團扇粲爛明月光與郎却暄暑相憶莫相忘青青林中竹可作白團扇動搖郎玉手因風託方便團扇復團扇持許自障靣顦顇無復理羞與郎相見謝靈運東陽谿中贈答二首可憐誰家婦縁流洒素足明月在雲間苕苕不可得可憐誰家郎縁流乘素舸但問情若為月就雲中墮宋孝武詩三首督䕶上征去儂亦思聞許願作石尤風四靣斷行旅黄河流無極洛陽數千里坎軻我途間何由見歡子丁督䕶歌二首自君之出矣金翠闇無精思君如日月回還晝夜生擬徐幹詩一首許瑤之詩二首端木生河側因病遂成姸朝將雲髻别夜與蛾睂連詠柟榴枕昔如影與形今如胡與越不知行逺近忘去離年月閨婦答隣人鮑令暉寄行人一首桂吐兩三枝蘭開四五葉是時君不歸春風徒笑妾近代西曲歌五首生長石城下開門對城樓城中美年少出入見依投石城樂有客數寄書無信心相憶莫作瓶落井一去無消息估客樂歌舞諸年少娉婷無踵跡菖蒲花可憐聞名不曾識烏夜嗁朝發襄陽城暮至大隄宿大隄諸女兒花豓驚郎目襄陽樂蹔出白門前楊栁可藏烏郎作沈水香儂作博山鑪陽叛兒近代呉歌九首朝日照北林初花錦繡色誰能春不思獨在機中織春歌鬱蒸仲暑月長嘯北湖邉芙蓉如結葉抛豓未成蓮夏歌秋風入忩裏羅帳起飄颺仰頭看明月寄情千里光秋歌淵冰厚三尺素雪覆千里我心如松柏君心復何似冬歌黄葛結蒙籠生在洛谿邉花落逐流去何見逐流還前谿畱衫繡兩襠迮置羅裳裏微歩動輕塵羅衣隨風起上聲歌遙遙天無柱流漂萍無根單身如螢火持底報郎恩歡聞紅羅複斗帳四角垂珠璫玉枕龍鬚席郎眠何處牀長樂佳栁樹得春風一低復一昂誰能空相憶獨眠度三陽獨曲近代雜歌三首稽亭故人去九里新人還送一便迎兩無有暫時閒尋陽樂青荷蓋緑水芙蓉發紅鮮下有並根藕上生同心蓮青陽歌曲春蠶不應老晝夜常懐思何惜微軀盡纒綿自有時蠶絲歌近代雜詩一首玉釧色未分衫輕似露腕舉袖欲鄣羞回持理髪亂丹陽孟珠歌一首陽春二三月草與水同色道逢遊冶郎恨不早相識錢唐蘇小歌一首妾乘油壁車郎騎青驄馬何處結同心西陵松柏下王元長詩四首花蔕今何在示是林下生何當垂兩髻團扇雲間明擬古自君之出矣金鑪香不燃思君如明燭中宵空自煎代徐幹秋夜長復長夜長樂未央舞袖拂明燭歌聲繞鳯梁秋夜冰容慙逺鑒水質謝明暉是照相思夕早望行人歸詠火謝朓詩四首夕殿下珠簾流螢飛復息長夜縫羅衣思君此何極玉階怨渠盌送佳人玉桮要上客車馬一東西别後思今夕金谷聚緑草蔓如絲雜樹紅英發無論君不歸君歸芳已歇王孫遊佳期期未歸望望下鳴機徘徊東陌上月出行人稀同王主簿有所思虞炎有所思一首紫藤拂花樹黄鳥閒青枝思君一歎息苦淚應言垂沈約詩三首分首桃林岸送别峴山頭若欲寄音息漢水向東流襄陽白銅鍉殘朱猶曖曖餘粉上霏霏昨宵何處宿今晨拂露歸早行逢故人車中為贈影逐斜月來香隨逺風入言是定知非欲笑翻成泣為隣人有懐不至施榮泰詠王昭君一首垂羅下椒閤舉袖拂胡塵唧唧撫心歎蛾睂誤殺人髙爽詩一首長筵廣未同上客嬌難逼還桮了不顧回身正顏色詠酌酒人呉興妖神贈謝府君覽一首玉釵空中墮金鈿色行歇獨泣謝春風孤夜傷明月江洪詩七首風生緑葉聚波動紫莖開含花復含實正待佳人來白日和清風輕雲雜髙樹忽然當此時采蔆復相遇采蔆二首潺湲復皎潔輕鮮自可悦横使有情禽照影遂孤絶塵容不忍飭臨池思客歸誰能取緑水無趣浣羅衣緑水曲二首孀居憎四時況在秋閨内淒葉流晩暉虚庭吐寒菜北牖風催樹南籬寒蛩吟庭中無限月思婦夜鳴砧秋風二首上車畏不妍顧眄更斜轉太恨畫睂長猶言顏色淺詠美人治妝范靜婦詩三首早信丹青巧重貨洛陽師千金買蟬鬢百萬寫蛾睂今朝猶漢地明旦入胡關髙堂歌吹逺遊子夢中還王昭君歎二首輕鬢學浮雲雙蛾擬初月水澂正落釵萍開理垂髪映水曲何遜詩五首苑門闢千扇苑户開萬扉樓殿閒珠履竹樹隔羅衣南苑閨閤行人斷房櫳月影斜誰能北忩下獨對後園花閨怨鷰子戯還檐花飛落枕前寸心君不見拭淚坐調絃為人妾思可聞不可見能重復能輕鏡前飄落粉琴上響餘聲詠春風竹葉響南忩月光照東壁誰知夜獨覺枕前雙淚滴秋閨怨呉均雜絕句四首晝蟬已傷念夜露復霑衣昔别昔何道今令螢火飛錦腰連枝滴繡領合歡斜夢中難言見終成亂眼花蜘蛛檐下挂絡緯井邉嗁何當得見子照鏡忩東西泣聽離夕歌悲銜别時酒自從今日去當復相思否王僧孺詩二首雪罷枝即青冰開水便緑復聞黄鳥聲全作相思曲春思日晩應歸去上客强盤桓稍知玉釵重漸覺羅襦寒為徐僕射妓作徐悱婦詩三首長廊欣目送廣殿悦逢迎何當曲房裏幽隠無人聲光宅寺夕泣已非踈夢嗁真太數惟當夜枕知過此無人覺題甘蕉葉示人兩葉雖為贈交情永未因同心處何限支子最關人摘同心支子贈謝孃因附此詩姚翻詩三首臨妝欲含涕羞畏家人知還持粉中絮擁淚不聽垂代陳慶之美人為詠覺罷方知恨人心定不同誰能對角枕長夜一邉空夢見故人黄昬信使斷銜怨心悽悽回鐙向下榻轉靣闇中嗁有期不至王環代西豐侯美人一首於今辭燕語方念泣離違無因從朔鴈一向黄河飛梁武帝詩二十七首秋月出中天逺近無偏異共照一光輝各懐離别思邉戎詩堂中綺羅人席上歌舞兒待我光泛灎為君照參差詠燭昔聞蘭蕙月獨是桃李年春心儻未寫為君照情筵詠筆柯亭有竒竹含情復抑揚妙聲發玉指龍音響鳯皇詠笛腕弱復低舉身輕由回縱可謂寫自歡方與心期共詠舞傾城非人美千載難屢逢雖懐軒中意媿無鬢髪容連句詩階上歌入懐庭中花照眼春心一如此情來不可限蘭葉始滿地梅花已落枝持此可憐意摘以寄心知朱日光素冰黄花映白雪折梅待佳人共道陽春月春歌三首江南蓮花開紅光覆碧水色同心復同藕異心無異閨中花如繡簾上露如珠欲知有所思停織復歭􅡨玉盤著朱李金桮盛白酒雖欲持自新復恐不甘口含桃落花日黄鳥營飛時君住馬已疲妾去蠶欲饑夏歌四首繡帶合歡炬錦衣連理文情懐入夜月含笑出朝雲七彩紫金柱九華白玉梁但歌雲不去含情有餘香吹蒲未可停絃斷當更續俱作雙絲引共奏同心曲當信抱梁期莫聽回風音鏡上兩入髻分明無兩心秋歌四首恃愛如欲進含羞未肯前口朱發豓歌玉指弄嬌絃朝日照綺錦光風動紈羅巧笑倩兩犀美目揚雙蛾子夜歌二首花色過桃杏名稱重金瓊名歌非下里含笑作上聲上聲歌一首豓豓金樓女心如玉池蓮持底報郎恩俱期遊梵天南有相思木含情復同心遊女不可求誰能息空陰歡聞歌二首手中白團扇淨如秋團月清風任動生嬌香承意發團扇歌一首杏梁日始照蕙席歡未極碧玉奉金桮緑酒助花色碧玉歌一首陌頭征人去閨中女下機含情不能言送别霑羅衣草樹非一香花葉百種色寄語古情人知我心相憶龍馬紫金鞍翠眊白玉羈照燿雙闕下知是襄陽兒襄陽白銅鞮歌三首梁簡文雜題二十一首被空眠數覺寒重夜風吹羅幃非海水那得度前知寒閨本自巫山來無人覩容色惟有楚王臣曾言夢相識行雨依帷濛重翠帶日聚輕紅定為歌聲起非關團扇風梁塵兎絲生雲夜蛾形出漢時欲傳千里意不照十年悲華月北斗闌干去夜夜心獨傷月輝横射枕鐙光半隱牀夜夜曲蹔别兩成疑開簾生舊憶都如未有情更似新相識從頓還城南客行祗念路相將度江口誰知隄上人拭淚空摇手春江曲新禽應節歸俱向吹樓飛入簾驚釧響來忩礙舞衣新鷰彈箏北忩下夜響清音愁張髙絃易斷心傷曲不遒彈箏錦幔扶船烈蘭橈拂浪浮去燭猶文水餘香尚滿舟夜遣内人還後舟頂分如兩髻簪長驗上頭捉桮如欲轉疑殘已復留詠武陵王左右伍暠傳桮可歎不可思可思不可見餘絃斷琴柱殘朱染歌扇寂寂暮檐響黯黯垂簾色惟有翎甋苔如見踟蛛織入林看碚􅓓春至定無賖何時一可見更得詠梅花有所傷三首遊戯長楊苑攜手雲臺間歡樂未窮已白日下西山遊人腰肢本獨絶睂眼特驚人判自無相比還來有洛神絶句賜麗人散誕垂紅帔斜柯挿玉簪可憐無有比恐許直千金遙望别來顦顇乆他人怪容色只有匣中鏡還持自相識愁閨照鏡可憐片雲生蹔重復還輕欲使荆王夢應過白帝城浮雲緑葉朝朝黄紅顏日日異譬喻持相比那堪不愁思寒閨婉娩新上頭煎裙出樂遊帶前結香草鬟邉挿石榴和人渡水蕭子顯二首金羈遊狹子綺機離思妾春度人不歸望花盡成葉春閨思二月春心動遊望桃花初回身隠日扇却步歛風裾詠苑中遊人劉孝綽詩二首蔆莖時繞釧櫂水或沾妝不辭紅袖濕惟憐緑葉香遙見美人采荷采蔆非采菉日暮且盈舠歭􅡨未敢進畏欲比殘桃詠小兒采蔆庾肩吾詩四首歌聲臨畫閤舞袖出芳林石城定若逺前谿應幾深詠舞曲應令故年齊總角今春半上頭那知夫壻好能降使君留詠主人少姬應教委翠似知節含芳如有情全由履跡少併欲上階生詠長信宫中草蘭䑓上客至綺席清絃撫自作明君辭還教緑珠舞石崇金谷妓王臺卿同蕭治中十詠二首空度髙樓月非復三五年何須照牀裏終是一人眠蕩婦髙樓月歛容送君别一歛無開時只應待相見還將笑解睂南浦别佳人劉孝儀詩二首金鈿已照曜白日未蹉跎欲待黄昏後含嬌渡淺河詠織女蓮名堪百萬石性重千金不解無情物那得似人心詠石蓮劉孝威八絶初筓一首合鬟仍昔髪略鬢即前絲從今一梳罷無復更縈時和定襄侯江伯搖八絶楚越衫一首裁縫在篋笥薰鬢帶餘香開看不忍著一見落千行和定襄侯劉泓詠繁華一首可憐宜出衆的的最分明秀媚開雙眼風流著語聲何曼才為徐陵傷妾一首遲遲衫掩淚憫憫恨縈胷無復專房日猶望下山逢蕭驎詠衵複一首的的金弦淨離離寶襊分纎腰非學楚寛帶為思君紀少瑜詠殘鐙一首殘鐙猶未滅將盡更揚輝惟餘一兩燄纔得解羅衣王叔英婦暮寒一首梅花自爛發百舌早迎春逾寒衣逾薄未肯壊腰身戴暠詠欲眠詩一首拂枕熏紅帊回鐙復解衣傍邉知夜乆不喚定應歸劉孝威二首朝日大風霜寄事是交傷葉落枝柯淨常自起棊張古體雜意可憐將可念可念直千金惟言有一恨恨不遂人心詠佳麗玉臺新詠巻十玉臺新詠跋右玉臺新詠集十巻幼時至外家李氏於廢書中得之舊京本也宋失一葉閒復多錯謬版亦時有刓者欲求他本是正多不獲嘉定乙亥在㑹稽始從人借得豫章刻本財五巻葢至刻者中徙故弗畢也又聞有得石氏所藏錄本者復求觀之以補亡校脱於是其書復全可繕寫夫詩者情之發也征戍之勞苦室家之怨思動於中而形於言先王不能禁也豈惟不能禁且逆探其情而著之東山杕杜之詩是矣若其他變風化雅謂豈無膏沐誰適為容終朝采緑不盈一掬之類以此集揆之語意未大異也顧其發乎情則同而止乎禮義者蓋以矣然其間僅合者亦一二焉其措詞託興髙古要非後世樂府所能及自唐苗閒集已不足道而況近代挾邪之説號為以筆墨動摇者乎又自漢魏以來作者皆在焉多蕭統文選所不載覽者可以覩歴世文章盛衰之變云是嵗十月旦日書其後永嘉陳玉文
