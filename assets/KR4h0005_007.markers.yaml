  - {type: variant, offset: 4650, length: 797, content: 動玉釧逐弦搖留賓惜殘弄負態動餘嬌詠內人晝眠北窗聊就枕南簷日未斜攀鉤落綺障插捩舉琵琶夢笑開嬌靨眠鬟壓落花簟文生玉腕香汗浸紅紗夫壻恒相伴莫誤是倡家詠中婦織流黃翻花滿階砌愁人獨上機浮雲西北起孔雀東南飛調絲時遶腕易鑷乍牽衣鳴梭逐動釧紅妝映落暉櫂歌行妾家住湘川菱歌本自便風生解刺浪水深能捉船葉亂由牽荇絲飄為折蓮濺妝疑薄汗霑衣似故湔浣紗流暫濁汰錦色還鮮參同趙飛燕借問李延年從來入弦管誰在櫂歌前和人以妾換馬功名幸多種何事苦生離誰言似白玉定是媿青驪必取匣中釧迴作飾金羈真成恨不已願得路旁兒詠舞戚里多妖麗重聘蔑燕餘逐節工新舞嬌態似凌虛納花承襵概垂翠逐璫舒扇開衫影亂巾度履行疎徒勞交甫憶自有專城居採蓮晚日照空磯採蓮承晚暉風起湖難渡蓮多摘未稀櫂動芙蓉落船移白鷺飛荷絲傍遶腕菱角遠牽衣常聞蕖可愛採擷欲為裙葉滑不留綖心忙無假薰千春誰與樂惟有妾隨君採桑春色映空來先發院邊梅細萍重疊長新花歷亂開連珂往淇上接幰至叢臺叢臺可憐妾當窗望飛蝶忌跌行衫領熨斗成褫襵下床著珠珮捉鏡安花鑷薄晚畏蠶飢競採春桑葉寄語採桑伴訝今春日短枝高攀不及葉細籠難滿年年將使君歷亂遣相聞欲知琴裏意還贈錦中文何當照梁日還作入山雲重門皆已閉方知客留袂可憐黃金絡復以青絲繫必也為人時誰令畏夫壻半路溪相逢半路溪隔溪猶不渡望望判知是翩翩識行步摘贈蘭澤芳欲表同心句先持動舊情恐君疑妾妬小垂手舞女出西秦躡影舞陽春且復小垂手廣袖拂紅塵折腰應兩笛頓足轉雙巾蛾眉與慢臉見此空愁人傷別離朝望青波道夜上白登臺月中含桂樹流影自徘徊寒沙逐風起春花犯雪開夜長無與悟衣單為誰裁蛾眉漸成光燕姬戲小堂朝舞開春閣鈴盤出步廊起龍調節奏卻鳳點笙簧樹交臨舞席荷生夾妓航竹密無分影花疎有異香舉杯聊轉笑歡茲樂未央詠風樓上起朝妝風花下砌傍入鏡先飄粉翻衫好染香度舞飛長袖傳歌共繞梁欲因吹少女還將拂大王看摘薔薇倡女倦春閨迎風戲玉除近叢看影密隔樹望釵疎橫枝斜綰袖嫩葉下牽裾牆高舉不及花新摘未舒莫疑插鬢少分人猶有餘, SBCK: 曲四首}
